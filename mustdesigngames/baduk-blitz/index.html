<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#0a0610">
<title>Baduk Blitz</title>
<meta name="description" content="Play 9×9 Go against an AI on a blitz clock — capture, make territory, and don't let your flag fall.">
<style>
  :root{
    --bg:#0a0610; --bg2:#1a0a18; --felt:#3a0a14;
    --gold:#ffcc33; --gold2:#ffe88a; --hot:#ff2a5c; --neon:#39ff9e;
    --cream:#f5ecd6; --mute:#7a6a5a;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; height:100%;}
  body{
    background:
      radial-gradient(ellipse at 50% -10%, #4a0a24 0%, transparent 55%),
      radial-gradient(ellipse at 50% 110%, #2a0628 0%, transparent 60%),
      var(--bg);
    color:var(--cream);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",sans-serif;
    display:flex; justify-content:center; overscroll-behavior:none; touch-action:manipulation;
  }
  #app{width:100%; max-width:520px; min-height:100%; display:flex; flex-direction:column;}

  .hud{display:flex; align-items:center; gap:6px; padding:max(10px,env(safe-area-inset-top)) 12px 8px;
       border-bottom:1px solid #2a0820;}
  .hud .title{
    font-size:clamp(13px, 4.4vw, 18px); font-weight:900; letter-spacing:1px;
    flex:1 1 auto; min-width:0; text-transform:uppercase; white-space:nowrap;
    background:linear-gradient(180deg,var(--gold2),var(--gold) 60%,#b88a1a);
    -webkit-background-clip:text; background-clip:text; color:transparent;
    text-shadow:0 0 12px rgba(255,170,60,.35);
  }
  .stat{text-align:center; min-width:0; flex:0 0 auto;}
  .stat .v{font-size:clamp(12px, 3.6vw, 16px); font-weight:800; font-variant-numeric:tabular-nums; white-space:nowrap;}
  .stat .k{font-size:9px; letter-spacing:1.2px; text-transform:uppercase; opacity:.55; margin-top:2px;}
  .stat .v.streak{color:var(--neon); text-shadow:0 0 8px rgba(57,255,158,.45);}
  .stat .v.best{color:var(--gold); text-shadow:0 0 10px rgba(255,204,51,.5);}

  .prompt{text-align:center; padding:8px 14px 2px;}
  .prompt .t{font-size:14px; font-weight:800; letter-spacing:2px; text-transform:uppercase; color:var(--gold2);}
  .prompt .s{font-size:11px; opacity:.65; margin-top:3px; letter-spacing:.4px; line-height:1.35;}

  .clocks{display:flex; align-items:center; gap:8px; padding:8px 12px 4px;}
  .pl{flex:1 1 0; display:flex; align-items:center; gap:8px; padding:9px 12px; border-radius:12px;
      border:1px solid #2a0820; background:linear-gradient(180deg,rgba(255,204,51,.05),rgba(0,0,0,.25));
      transition:border-color .15s, box-shadow .15s;}
  .pl.active{border-color:var(--gold); box-shadow:0 0 16px rgba(255,204,51,.28);}
  .pl .who{display:flex; align-items:center; gap:6px; font-size:11px; font-weight:800; letter-spacing:1px; text-transform:uppercase; opacity:.85;}
  .pl .clk{margin-left:auto; font-size:17px; font-weight:900; font-variant-numeric:tabular-nums;}
  .pl.low .clk{color:var(--hot); text-shadow:0 0 8px rgba(255,42,92,.5);}
  .caps{flex:0 0 auto; text-align:center; min-width:52px;}
  .caps b{display:block; font-size:14px; font-weight:900; font-variant-numeric:tabular-nums;}
  .caps span{font-size:8px; letter-spacing:1px; text-transform:uppercase; opacity:.5;}
  .dot{width:15px; height:15px; border-radius:50%; display:inline-block;}
  .dot.b{background:radial-gradient(circle at 35% 30%,#5a544c,#0c0b0a); box-shadow:0 0 6px rgba(0,0,0,.6);}
  .dot.w{background:radial-gradient(circle at 35% 30%,#fff,#cabfa9); border:1px solid #b3a88f;}

  .boardwrap{flex:1; display:flex; align-items:center; justify-content:center; padding:6px 10px;
             overflow:hidden; min-width:0;
             filter:drop-shadow(0 0 22px rgba(255,170,60,.18));}
  canvas{display:block; touch-action:none; border-radius:10px; cursor:pointer;
         box-shadow:0 0 0 2px #5a3a10, 0 0 0 4px #2a1808, 0 14px 40px rgba(0,0,0,.6);}

  .controls{padding:8px 14px max(14px,env(safe-area-inset-bottom));}
  .actionrow{display:flex; gap:10px;}
  .actionrow button{
    flex:1; padding:16px 6px; border-radius:14px; font-size:13px; font-weight:900; font-family:inherit;
    cursor:pointer; letter-spacing:2px; text-transform:uppercase; transition:transform .08s, opacity .15s;
    border:1px solid #5a2a3a; background:linear-gradient(180deg,#2a121e,#1a0612); color:var(--gold);
    box-shadow:inset 0 1px 0 rgba(255,200,80,.14), 0 2px 6px rgba(0,0,0,.5);
  }
  .actionrow button:active{transform:scale(.97);}
  .actionrow .resign{color:#d99; }
  .nextbtn{
    width:100%; padding:18px; border-radius:14px; font-size:15px; font-weight:900;
    font-family:inherit; letter-spacing:2.5px; text-transform:uppercase;
    background:linear-gradient(180deg,var(--gold2),var(--gold) 50%,#b8861a);
    color:#1a0612; border:none; cursor:pointer;
    box-shadow:0 0 22px rgba(255,204,51,.5), inset 0 1px 0 rgba(255,255,255,.4);
  }
  .nextbtn:active{transform:scale(.98);}
  .hidden{display:none!important;}

  .muteBtn{background:none;border:none;color:var(--gold);font-size:18px;opacity:.6;cursor:pointer;flex:0 0 auto;}

  .flash{
    position:fixed; left:50%; top:16%; transform:translateX(-50%) scale(.9);
    background:rgba(10,6,16,.92); backdrop-filter:blur(6px);
    padding:14px 28px; border-radius:36px; border:1px solid #5a2a3a;
    font-size:20px; font-weight:900; letter-spacing:2px; text-transform:uppercase;
    opacity:0; transition:opacity .2s, transform .25s; pointer-events:none; text-align:center;
    font-variant-numeric:tabular-nums; z-index:5;
  }
  .flash.show{opacity:1; transform:translateX(-50%) scale(1);}
  .flash.win{color:var(--neon); border-color:var(--neon); box-shadow:0 0 40px rgba(57,255,158,.5);}
  .flash.lose{color:var(--hot); border-color:var(--hot); box-shadow:0 0 40px rgba(255,42,92,.5);}
  @keyframes shake{0%,100%{transform:translateX(-50%) scale(1);}25%{transform:translateX(calc(-50% - 8px)) scale(1);}75%{transform:translateX(calc(-50% + 8px)) scale(1);}}
  .flash.lose.show{animation:shake .3s ease-in-out;}
</style>
</head>
<body>
<div id="app">
  <div class="hud">
    <div class="title">Baduk Blitz</div>
    <div class="stat"><div class="v streak" id="streak">0</div><div class="k">Streak</div></div>
    <div class="stat"><div class="v best" id="best">0</div><div class="k">Best</div></div>
    <button class="muteBtn" id="muteBtn">♪</button>
  </div>

  <div class="prompt">
    <div class="t" id="pTitle">Your move</div>
    <div class="s" id="pSub">You're Black — tap an intersection to place a stone.</div>
  </div>

  <div class="clocks">
    <div class="pl" id="plB"><span class="who"><span class="dot b"></span>You</span><span class="clk" id="clkB">2:00</span></div>
    <div class="caps"><b id="capsTxt">0 · 0</b><span>Captures</span></div>
    <div class="pl" id="plW"><span class="who"><span class="dot w"></span>AI</span><span class="clk" id="clkW">2:00</span></div>
  </div>

  <div class="boardwrap"><canvas id="board"></canvas></div>

  <div class="controls">
    <div class="actionrow" id="playRow">
      <button id="passBtn">Pass</button>
      <button id="resignBtn" class="resign">Resign</button>
    </div>
    <button class="nextbtn hidden" id="newBtn">New game ›</button>
  </div>
</div>
<div class="flash" id="flash"></div>

<script>
"use strict";
/* ============================================================
   Baduk Blitz — 9×9 Go vs an AI, on a blitz clock.
   You play Black (you move first); the AI plays White with komi.
   Capture, build territory, and don't let your clock flag.
   ============================================================ */

const EMPTY=0, BLACK=1, WHITE=2;
const N=9;
const KOMI=6.5;
const CLOCK_MS=120000;                 // 2:00 blitz each
const opp=c=>c===BLACK?WHITE:BLACK;

/* ---------- Go rules engine (unchanged core: capture, suicide, ko) ---------- */
const inb=(c,r)=>r>=0&&r<N&&c>=0&&c<N;
const nbrs=(c,r)=>[[c+1,r],[c-1,r],[c,r+1],[c,r-1]];
function clone(b){return b.map(row=>row.slice());}
function emptyBoard(){return Array.from({length:N},()=>new Array(N).fill(EMPTY));}
function group(b,c,r){
  const col=b[r][c], seen=new Set([c+","+r]), stones=[[c,r]], libs=new Set(), st=[[c,r]];
  while(st.length){ const [x,y]=st.pop();
    for(const [nx,ny] of nbrs(x,y)){ if(!inb(nx,ny)) continue; const v=b[ny][nx];
      if(v===EMPTY) libs.add(nx+","+ny);
      else if(v===col && !seen.has(nx+","+ny)){ seen.add(nx+","+ny); stones.push([nx,ny]); st.push([nx,ny]); } } }
  return {stones, libs};
}
function boardKey(b){return b.map(r=>r.join("")).join("");}
function tryPlay(b,c,r,colour,koKey){
  if(!inb(c,r)||b[r][c]!==EMPTY) return {ok:false};
  const nb=clone(b); nb[r][c]=colour; const o=opp(colour); let captured=[];
  for(const [nx,ny] of nbrs(c,r)){ if(inb(nx,ny)&&nb[ny][nx]===o){ const g=group(nb,nx,ny);
    if(g.libs.size===0){ g.stones.forEach(([x,y])=>{nb[y][x]=EMPTY;captured.push([x,y]);}); } } }
  if(captured.length===0 && group(nb,c,r).libs.size===0) return {ok:false};   // suicide
  if(koKey && boardKey(nb)===koKey) return {ok:false};                        // ko
  return {ok:true, board:nb, captured};
}
function isEyeish(b,c,r,colour){
  for(const [nx,ny] of nbrs(c,r)){ if(inb(nx,ny) && b[ny][nx]!==colour) return false; }
  return true;
}
function legalMoves(b,colour,koKey){
  const out=[];
  for(let r=0;r<N;r++) for(let c=0;c<N;c++){
    if(b[r][c]!==EMPTY) continue;
    if(isEyeish(b,c,r,colour)) continue;      // don't fill your own eyes
    if(tryPlay(b,c,r,colour,koKey).ok) out.push([c,r]);
  }
  return out;
}
function filled(b){ let n=0; for(let r=0;r<N;r++) for(let c=0;c<N;c++) if(b[r][c]!==EMPTY) n++; return n; }

/* ---------- Area scoring (stones + surrounded territory + komi) ---------- */
function score(b){
  let bl=0, wh=0; const owner=emptyBoard().map(r=>r.map(()=>-1));
  for(let r=0;r<N;r++) for(let c=0;c<N;c++){ if(b[r][c]===BLACK) bl++; else if(b[r][c]===WHITE) wh++; }
  const seen=new Set();
  for(let r=0;r<N;r++) for(let c=0;c<N;c++){
    if(b[r][c]!==EMPTY || seen.has(c+","+r)) continue;
    const region=[], st=[[c,r]]; seen.add(c+","+r); const borders=new Set();
    while(st.length){ const [x,y]=st.pop(); region.push([x,y]);
      for(const [nx,ny] of nbrs(x,y)){ if(!inb(nx,ny)) continue; const v=b[ny][nx];
        if(v===EMPTY){ if(!seen.has(nx+","+ny)){ seen.add(nx+","+ny); st.push([nx,ny]); } }
        else borders.add(v); } }
    let own=0; if(borders.size===1) own=[...borders][0];
    if(own===BLACK) bl+=region.length; else if(own===WHITE) wh+=region.length;
    region.forEach(([x,y])=>owner[y][x]=own);
  }
  return {blackTotal:bl, whiteTotal:wh+KOMI, owner};
}

/* ---------- AI (greedy one-ply: area + safety + captures) ---------- */
function groupStats(b){
  const seen=new Set(); let bAtari=0,wAtari=0,bLibs=0,wLibs=0;
  for(let r=0;r<N;r++) for(let c=0;c<N;c++){
    const col=b[r][c]; if(col===EMPTY||seen.has(c+","+r)) continue;
    const g=group(b,c,r); g.stones.forEach(([x,y])=>seen.add(x+","+y));
    if(col===BLACK){ bLibs+=g.libs.size; if(g.libs.size===1) bAtari+=g.stones.length; }
    else          { wLibs+=g.libs.size; if(g.libs.size===1) wAtari+=g.stones.length; }
  }
  return {bAtari,wAtari,bLibs,wLibs};
}
function evalBoard(b, me){
  const sc=score(b), gs=groupStats(b);
  const myArea = me===BLACK? sc.blackTotal : sc.whiteTotal;
  const opArea = me===BLACK? sc.whiteTotal : sc.blackTotal;
  const myAtari = me===BLACK? gs.bAtari : gs.wAtari;   // own stones in danger
  const opAtari = me===BLACK? gs.wAtari : gs.bAtari;   // enemy stones I can threaten
  const myLibs  = me===BLACK? gs.bLibs  : gs.wLibs;
  const opLibs  = me===BLACK? gs.wLibs  : gs.bLibs;
  return (myArea-opArea) + 2*opAtari - 3*myAtari + 0.05*(myLibs-opLibs);
}
function aiBestMove(streak){
  const me=WHITE, moves=legalMoves(board, me, koKey);
  if(!moves.length) return null;
  const fillFrac=filled(board)/(N*N), scored=[];
  for(const [c,r] of moves){
    const res=tryPlay(board,c,r,me,koKey); if(!res.ok) continue;
    let v=evalBoard(res.board, me) + res.captured.length*1.5;
    const edge=Math.min(c,r,N-1-c,N-1-r);
    v += (1-fillFrac)*(edge>=2?0.4:edge===1?0.05:-0.4);   // open near the middle, not the first line
    v += (Math.random()-0.5)*0.05;
    scored.push({c,r,v});
  }
  if(!scored.length) return null;
  scored.sort((a,b)=>b.v-a.v);
  // Difficulty ramp: early in a streak the AI occasionally plays 2nd/3rd best.
  const blunder=Math.max(0, 0.22 - streak*0.05);
  let idx=0;
  if(Math.random()<blunder && scored.length>2) idx=1+((Math.random()*Math.min(3,scored.length-1))|0);
  const cur=evalBoard(board, me), best=scored[idx];
  if(fillFrac>0.72 && best.v < cur-1.5) return null;      // only self-harming moves left → pass
  return [best.c, best.r];
}

/* ---------- Audio ---------- */
let actx=null, muted=false;
function ac(){ if(!actx){ try{actx=new (window.AudioContext||window.webkitAudioContext)();}catch(e){} } return actx; }
function tone(f,t0,dur,type="sine",g=.16){ const a=ac(); if(!a||muted) return;
  const o=a.createOscillator(), gn=a.createGain(); o.type=type; o.frequency.value=f;
  gn.gain.setValueAtTime(0,t0); gn.gain.linearRampToValueAtTime(g,t0+.01);
  gn.gain.exponentialRampToValueAtTime(.0001,t0+dur); o.connect(gn).connect(a.destination); o.start(t0); o.stop(t0+dur+.02); }
const sndClack=()=>{ const a=ac(); if(a) tone(180,a.currentTime,.05,"triangle",.10); };
const sndCap  =()=>{ const a=ac(); if(a){ tone(150,a.currentTime,.16,"sine",.16); tone(75,a.currentTime+.02,.2,"triangle",.1);} };
const sndWin  =()=>{ const a=ac(); if(a){ [523.25,659.25,783.99,1046.5,1318.5].forEach((f,i)=>tone(f,a.currentTime+i*.07,.4,"triangle",.18)); tone(2093,a.currentTime+.35,.5,"sine",.12);} };
const sndLose =()=>{ const a=ac(); if(a){ tone(330,a.currentTime,.2,"sawtooth",.14); tone(220,a.currentTime+.12,.32,"sawtooth",.13); tone(110,a.currentTime+.28,.4,"triangle",.12);} };

/* ---------- State ---------- */
const cv=document.getElementById("board"), ctx=cv.getContext("2d");
let board=emptyBoard(), toMove=BLACK, koKey=null, lastMove=null;
let caps={[BLACK]:0,[WHITE]:0}, passes=0, phase="play", showOwner=null;
let clocks={[BLACK]:CLOCK_MS,[WHITE]:CLOCK_MS};
let streak=+(localStorage.getItem("bb_streak")||0);
let best=+(localStorage.getItem("bb_best")||0);
let geom={pad:0,cell:0,size:0};
function save(){ localStorage.setItem("bb_streak",streak); localStorage.setItem("bb_best",best); }

/* ---------- Geometry & render ---------- */
function resize(){
  const wrap=cv.parentElement, avail=Math.min(wrap.clientWidth, window.innerHeight*0.52);
  const dpr=Math.min(window.devicePixelRatio||1,3), size=Math.max(200,Math.floor(avail));
  cv.style.width=size+"px"; cv.style.height=size+"px"; cv.width=size*dpr|0; cv.height=size*dpr|0;
  ctx.setTransform(dpr,0,0,dpr,0,0);
  const pad=size*0.06, cell=(size-2*pad)/(N-1); geom={pad,cell,size}; draw();
}
const xy=(c,r)=>[geom.pad+c*geom.cell, geom.pad+r*geom.cell];
function draw(){
  const {pad,cell,size}=geom; if(!size) return;
  const g=ctx.createLinearGradient(0,0,size,size);
  g.addColorStop(0,"#e6c078"); g.addColorStop(1,"#b88636"); ctx.fillStyle=g; ctx.fillRect(0,0,size,size);
  if(showOwner){ for(let r=0;r<N;r++) for(let c=0;c<N;c++){ const o=showOwner[r][c];
    if(o===BLACK||o===WHITE){ const [x,y]=xy(c,r); ctx.fillStyle=o===BLACK?"rgba(20,18,14,.34)":"rgba(250,247,238,.44)";
      ctx.fillRect(x-cell/2,y-cell/2,cell,cell); } } }
  ctx.strokeStyle="rgba(60,42,12,.9)"; ctx.lineWidth=Math.max(1,cell*0.03);
  for(let i=0;i<N;i++){ let [x0,y0]=xy(i,0),[x1,y1]=xy(i,N-1); ctx.beginPath();ctx.moveTo(x0,y0);ctx.lineTo(x1,y1);ctx.stroke();
    let [a0,b0]=xy(0,i),[a1,b1]=xy(N-1,i); ctx.beginPath();ctx.moveTo(a0,b0);ctx.lineTo(a1,b1);ctx.stroke(); }
  for(const [c,r] of [[2,2],[6,6],[2,6],[6,2],[4,4]]){ const [sx,sy]=xy(c,r);
    ctx.fillStyle="rgba(60,42,12,.85)"; ctx.beginPath(); ctx.arc(sx,sy,Math.max(2,cell*0.05),0,7); ctx.fill(); }
  for(let r=0;r<N;r++) for(let c=0;c<N;c++) if(board[r][c]!==EMPTY) stone(c,r,board[r][c]);
  if(lastMove){ const [mx,my]=xy(lastMove[0],lastMove[1]);
    ctx.strokeStyle=board[lastMove[1]][lastMove[0]]===BLACK?"rgba(255,204,51,.95)":"rgba(255,42,92,.9)";
    ctx.lineWidth=cell*0.06; ctx.beginPath(); ctx.arc(mx,my,cell*0.17,0,7); ctx.stroke(); }
}
function stone(c,r,colour){ const {cell}=geom,[x,y]=xy(c,r),rad=cell*0.46;
  ctx.beginPath(); ctx.arc(x+rad*0.15,y+rad*0.2,rad,0,7); ctx.fillStyle="rgba(0,0,0,.22)"; ctx.fill();
  const gr=ctx.createRadialGradient(x-rad*0.35,y-rad*0.4,rad*0.1,x,y,rad);
  if(colour===BLACK){ gr.addColorStop(0,"#56504a"); gr.addColorStop(.45,"#26231f"); gr.addColorStop(1,"#0c0b0a"); }
  else { gr.addColorStop(0,"#fff"); gr.addColorStop(.5,"#f1ece0"); gr.addColorStop(1,"#cabfa9"); }
  ctx.beginPath(); ctx.arc(x,y,rad,0,7); ctx.fillStyle=gr; ctx.fill();
}

/* ---------- HUD ---------- */
const $=id=>document.getElementById(id);
const fmtClock=ms=>{ ms=Math.max(0,ms); const s=Math.ceil(ms/1000); return Math.floor(s/60)+":"+String(s%60).padStart(2,"0"); };
function setStatus(t,s){ $("pTitle").textContent=t; if(s!=null) $("pSub").textContent=s; }
function syncHud(){ $("streak").textContent=streak; $("best").textContent=best; $("capsTxt").textContent=caps[BLACK]+" · "+caps[WHITE]; }
function renderClocks(){
  $("clkB").textContent=fmtClock(clocks[BLACK]); $("clkW").textContent=fmtClock(clocks[WHITE]);
  const active=phase==="play"?toMove:0;
  $("plB").classList.toggle("active",active===BLACK); $("plW").classList.toggle("active",active===WHITE);
  $("plB").classList.toggle("low",clocks[BLACK]<=20000); $("plW").classList.toggle("low",clocks[WHITE]<=20000);
}
function showControls(mode){
  $("playRow").classList.toggle("hidden",mode!=="play");
  $("newBtn").classList.toggle("hidden",mode==="play");
}
let flashT=null;
function flash(msg,kind){ const f=$("flash"); f.textContent=msg; f.className="flash show "+(kind||"");
  clearTimeout(flashT); flashT=setTimeout(()=>f.classList.remove("show"),1800); }

/* ---------- Clock ---------- */
let clockInt=null, lastTick=0;
function runClock(){ stopClock(); lastTick=Date.now();
  clockInt=setInterval(()=>{
    if(phase!=="play") return;
    const now=Date.now(); clocks[toMove]-=now-lastTick; lastTick=now;
    if(clocks[toMove]<=0){ clocks[toMove]=0; renderClocks(); onTimeout(toMove); return; }
    renderClocks();
  },200);
}
function stopClock(){ if(clockInt){ clearInterval(clockInt); clockInt=null; } }
function onTimeout(side){
  gameOver(side===WHITE, side===BLACK?"Out of time":"AI flagged",
           side===BLACK?"Your blitz clock ran out.":"White ran out of time.", "Flag falls");
}

/* ---------- Move application ---------- */
function applyMove(c,r,colour){
  const prevKey=boardKey(board);
  const res=tryPlay(board,c,r,colour,koKey);
  if(!res.ok) return false;
  board=res.board;
  const capd=res.captured.length;
  caps[colour]+=capd;
  koKey = capd===1 ? prevKey : null;   // simple ko: can't immediately recreate the position
  lastMove=[c,r]; passes=0;
  if(capd>0) sndCap(); else sndClack();
  syncHud(); draw();
  return true;
}
function afterMove(colour){
  if(phase!=="play") return;
  toMove=opp(colour); lastTick=Date.now(); renderClocks();
  if(toMove===BLACK){ setStatus("Your move","Tap to place. Pass twice to count the board."); }
  else { setStatus("Blitz…","White is reading the board."); scheduleAI(); }
}
function doPass(colour){
  if(phase!=="play") return;
  passes++;
  if(passes>=2){ endByScore(); return; }
  lastMove=null; draw();
  toMove=opp(colour); lastTick=Date.now(); renderClocks();
  if(toMove===BLACK){ setStatus("Your move","White passed — pass again to count, or play on."); }
  else { setStatus("Blitz…","White is reading the board."); scheduleAI(); }
}

/* ---------- Input ---------- */
function onBoardTap(e){
  if(phase!=="play" || toMove!==BLACK) return;
  ac();
  const rect=cv.getBoundingClientRect();
  const x=e.clientX-rect.left, y=e.clientY-rect.top;
  const c=Math.round((x-geom.pad)/geom.cell), r=Math.round((y-geom.pad)/geom.cell);
  if(!inb(c,r)) return;
  const [ix,iy]=xy(c,r); if(Math.hypot(x-ix,y-iy)>geom.cell*0.55) return;   // must tap near a point
  if(board[r][c]!==EMPTY){ flash("Occupied","lose"); return; }
  if(!applyMove(c,r,BLACK)){ flash("Illegal","lose"); return; }
  afterMove(BLACK);
}
cv.addEventListener("pointerdown", onBoardTap);

/* ---------- AI turn ---------- */
function scheduleAI(){
  setTimeout(()=>{
    if(phase!=="play" || toMove!==WHITE) return;
    const mv=aiBestMove(streak);
    if(!mv){ doPass(WHITE); }
    else { applyMove(mv[0],mv[1],WHITE); afterMove(WHITE); }
  }, 360+Math.random()*420);
}

/* ---------- End of game ---------- */
function gameOver(playerWon, title, sub, flashMsg){
  phase="over"; stopClock();
  if(playerWon){ streak++; best=Math.max(best,streak); sndWin(); flash(flashMsg||"You win","win"); }
  else { streak=0; sndLose(); flash(flashMsg||"You lose","lose"); }
  save(); syncHud(); renderClocks();
  setStatus(title, sub);
  showControls("over");
}
function endByScore(){
  phase="over"; stopClock();
  const sc=score(board); showOwner=sc.owner; lastMove=null; draw();
  const bt=sc.blackTotal, wt=sc.whiteTotal, margin=Math.abs(bt-wt);
  const won=bt>wt;
  gameOver(won,
    won ? "You win by "+margin.toFixed(1) : "White wins by "+margin.toFixed(1),
    "Black "+bt+"  ·  White "+wt.toFixed(1)+"  ("+KOMI+" komi)",
    (won?"+":"−")+margin.toFixed(1));
}
function resign(){ if(phase!=="play") return; gameOver(false,"You resigned","White wins by resignation.","Resigned"); }

/* ---------- New game ---------- */
function newGame(){
  board=emptyBoard(); toMove=BLACK; koKey=null; lastMove=null; showOwner=null;
  caps={[BLACK]:0,[WHITE]:0}; passes=0; phase="play";
  clocks={[BLACK]:CLOCK_MS,[WHITE]:CLOCK_MS};
  resize(); renderClocks(); syncHud();
  setStatus("Your move","You're Black. Capture, wall off territory — most points wins. Both pass to count.");
  showControls("play"); runClock();
}

/* ---------- Wire up ---------- */
$("passBtn").onclick=()=>{ if(phase==="play"&&toMove===BLACK){ ac(); doPass(BLACK); } };
$("resignBtn").onclick=resign;
$("newBtn").onclick=newGame;
$("muteBtn").onclick=e=>{ muted=!muted; e.target.style.opacity=muted?.25:.6; e.target.textContent=muted?"♪̸":"♪"; if(!muted) ac(); };
window.addEventListener("resize",resize);

newGame();
</script>
