<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Moss Dew Garden</title>
<meta name="description" content="A cozy standalone gardening game — sow, tend and harvest a living garden through the seasons. In development.">
<meta name="apple-mobile-web-app-title" content="Moss Dew Garden">
<link rel="canonical" href="https://mustdesigngames.mattdanusergrant.com/mossdewgarden/">
<style>
  *,*::before,*::after{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(120% 120% at 50% 0%, #fbf4e4 0%, #eadfc4 55%, #d9e4c4 100%);
    color:#33402c;
    font-family:'Iowan Old Style','Palatino Linotype',Palatino,Georgia,serif;
    -webkit-font-smoothing:antialiased;text-align:center;padding:32px;
  }
  .card{max-width:520px}
  .sprout{font-size:64px;line-height:1;filter:drop-shadow(0 4px 6px rgba(60,80,40,.18));
    animation:sway 4.5s ease-in-out infinite;transform-origin:50% 90%}
  @keyframes sway{0%,100%{transform:rotate(-3deg)}50%{transform:rotate(3deg)}}
  h1{font-size:clamp(34px,9vw,52px);margin:.35em 0 .1em;letter-spacing:.5px;font-weight:600}
  .tag{font-size:13px;letter-spacing:.22em;text-transform:uppercase;color:#6d7b56;font-family:system-ui,sans-serif}
  p{font-size:18px;line-height:1.6;color:#4a5740;margin:.9em auto 0;max-width:42ch}
  .soil{margin-top:34px;display:flex;gap:10px;justify-content:center;font-size:26px;opacity:.9}
  .soon{margin-top:30px;display:inline-block;font-family:system-ui,sans-serif;font-size:13px;
    letter-spacing:.12em;text-transform:uppercase;color:#7a613a;
    border:1px solid #cbb98e;border-radius:999px;padding:8px 18px}
  a.back{display:block;margin-top:26px;font-family:system-ui,sans-serif;font-size:14px;color:#6d7b56;text-decoration:none}
  a.back:hover{text-decoration:underline}
</head>
<body>
  <main class="card">
    <div class="sprout">🌱</div>
    <div class="tag">Must Design Games</div>
    <h1>Moss Dew Garden</h1>
    <p>A standalone gardening game — sow a seed, tend it through the seasons,
       and harvest a living garden that grows in real time. Cozy, calm, one-handed.</p>
    <div class="soil">🌾 🌷 🍓 🌻 🪷</div>
    <div class="soon">Growing — coming soon</div>
    <a class="back" href="https://mustdesigngames.mattdanusergrant.com/">← Back to the arcade</a>
  </main>
</body>
</html>
