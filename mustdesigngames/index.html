<style>
  *,*::before,*::after{box-sizing:border-box}

  /* ── Top nav ────────────────────────────────────────────────────── */

  .hero h1{

  /* ── Living Game of Life background (same as the home screen after its intro) ── */
  #intro-canvas{position:fixed;inset:0;width:100%;height:100%;z-index:-1;pointer-events:none}

  /* ── Game list (vertical, sorted by latest change) ── */
  /* ── Sort control ── */
  .listhead{margin:40px 0 0;display:flex;align-items:baseline;justify-content:space-between;gap:14px;flex-wrap:wrap;width:min(1000px,calc(100vw - 44px));position:relative;left:50%;transform:translateX(-50%)}

  .listhead .sortnote{font-size:13px;color:var(--muted)}

  /* ── Game table (sortable) ── */
  .tablewrap{margin:14px 0 0;overflow-x:auto;-webkit-overflow-scrolling:touch;width:min(1000px,calc(100vw - 44px));position:relative;left:50%;transform:translateX(-50%)}
  table.gtable{width:100%;border-collapse:separate;border-spacing:0 10px;min-width:720px;font-size:14px}
  .gtable th{

  .gtable th.sortable{cursor:pointer;user-select:none;transition:color .15s}
  .gtable th.sortable:hover{color:var(--ink)}
  .gtable th .ar{display:inline-block;width:.7em;opacity:0;margin-left:3px;font-size:9px}
  .gtable th[aria-sort] .ar{opacity:1;color:var(--ink)}
  .gtable th[aria-sort="descending"] .ar::after{content:'▼'}
  .gtable th[aria-sort="ascending"] .ar::after{content:'▲'}
  .gtable td{background:var(--paper);border-top:1.5px solid var(--line);border-bottom:1.5px solid var(--line);padding:16px 14px;vertical-align:middle;transition:border-color .15s}
  .gtable td:first-child{border-left:1.5px solid var(--line);border-top-left-radius:14px;border-bottom-left-radius:14px}
  .gtable td:last-child{border-right:1.5px solid var(--line);border-top-right-radius:14px;border-bottom-right-radius:14px}
  .gtable tr:hover td{border-color:var(--line-2)}
  .gtable th:nth-child(2),.gtable td:nth-child(2){width:50%}
  .g-thumb{width:192px;height:120px;object-fit:cover;border-radius:9px;border:1px solid var(--line-2);display:block;background:var(--bg)}

  .g-desc b{color:var(--ink-2);font-weight:600}

    <script>
    /* One row per game. Hand-tagged (genre / controls / players / time / intent) +
       measured (size = code KB of index.html + engine.js) + updated date + client-only
       play counts (localStorage). Thumbnails live in ./thumbs/<slug>.jpg — re-screenshot
       a game's page to refresh one. Promote/demote by editing this array (see mdg.html tiers). */
    const GAMES = [
      {slug:"metropolisdawngrid", name:"Metropolis Dawn Grid", updated:"2026-07-09", change:"Minimap overview + legend, click-to-upgrade previews, city water meter", size:105, desc:"A lean <b>city-builder</b> set on one shared world: zone your district, wire up the supply chain, and lay rail across the map. Ship your surplus out by train while the neighbours build theirs.", intent:"Can a shared-world city builder work async, on one grid?"},
      {slug:"moondruidguardians", href:"https://moondruidguardians.mattdanusergrant.com/", name:"Moon Druid Guardians", updated:"2026-07-09", change:"Promoted from the workshop, rebuilt as a desktop base-builder survival roguelike", size:66, desc:"A defensive <b>base-builder roguelike</b> under the moon. Bud Glimmer spirits to harvest moonlight and sap, grow a druid garrison around the Elderbough, and hold against escalating nights of the Gloam, then spend Lunar Dew to hold longer.", intent:"A WC3-style opening, purely defensive. How long can you hold?"},
      {slug:"mosslings", name:"Mosslings", updated:"2026-07-08", change:"Reverted to the Mosslings name. Moss Dapple Grove spun off as its own game", size:136, desc:"A cozy <b>virtual pet</b> kept in a jar of moss and dew. Adopt the little plant-creature, keep it fed, happy and rested, and let the garden you grow feed the care loop back.", intent:"A cozy care loop that earns a daily check-in."},
      {slug:"honk-beach", name:"Honk Beach", updated:"2026-07-06", change:"Added to the arcade", size:20, desc:"A frantic one-tap <b>arcade</b> defense. Your beach picnic is under siege by a mob of hungry geese. Tap to shoo them off before they make off with lunch; built phone-first for pure reaction.", intent:"One-tap defense. Pure reaction, phone-first."},
      {slug:"keeprippingpacks", name:"Keep Ripping Packs", updated:"2026-07-06", change:"Added to the arcade", size:425, desc:"An <b>economy sim</b> running on the dopamine of the pack rip. Tear open boosters, sort the spill, craft complete Sets, and sell into a live market that moves with supply.", intent:"The dopamine of pack-opening as a full economy."},
      {slug:"rhythm-rpg", name:"Rolls Per Groove", updated:"2026-07-06", change:"Added to the arcade", size:25, desc:"A <b>rhythm RPG</b> where every lane is a class and every note is an attack. Fight through short, intense songs, then spend what you earn levelling your party between battles.", intent:"Every lane a class, every note an attack."},
      {slug:"sigil-tactics", name:"Sigil Tactics", updated:"2026-07-06", change:"Added to the arcade", size:134, desc:"A compact <b>tactics</b> card-battler fought 5v5 on a 5×4 grid. Initiative runs on speed, positioning is push-and-pull, and free sigils chain into bonus turns.", intent:"Initiative-by-speed and push/pull as the core tactic."},
      {slug:"switchback-td", name:"Switchback TD", updated:"2026-07-06", change:"Added to the arcade", size:87, desc:"Maze-building <b>tower defense</b> where you draw the path yourself. Wind the lane back on itself to buy time, then hold the line as each wave floods through.", intent:"Maze-building TD. The player draws the path."},
      {slug:"airwolf", name:"Airwolf", updated:"2026-07-06", change:"Added to the arcade", size:47, desc:"A tight, one-screen <b>shmup</b> starring an attack helicopter. Strafe the ground, dodge the fire coming back at you, and see how long you last on a single run.", intent:"How much game fits on one screen?"},
      {slug:"apple-tree-lane", name:"Apple Tree Lane", updated:"2026-07-07", change:"Promoted from the workshop", size:47, desc:"A cozy orchard <b>farm sim</b> run from a Farm HQ: mind six trees across a weekly economy: slingshot pests on patrol, press cider, and host you-pick days. Four modes, one orchard.", intent:"Can four mini-modes share one orchard economy?"},
      {slug:"bannerfall", name:"Bannerfall", updated:"2026-07-06", change:"Added to the arcade", size:27, desc:"A rarity-driven <b>auto-battler</b>: field a squad of creatures from commons to legendaries and let the fight play out. Line up the right roster and push for the banner.", intent:"A rarity-driven creature battler."},
      {slug:"berm-burner", name:"Berm Burner", updated:"2026-07-06", change:"Added to the arcade", size:24, desc:"A downhill trail-<b>racing</b> prototype about flow. Carve each berm clean, stay off the brakes, and string the whole run together to the bottom.", intent:"Downhill flow. Carve berms, keep speed."},
      {slug:"bloom-again", name:"Bloom Again", updated:"2026-07-06", change:"Added to the arcade", size:28, desc:"A quiet <b>ambient</b> slice, more mood piece than challenge. Drift through the Hollow, light the Lantern's frames one by one, and watch it bloom.", intent:"A quiet mood piece. Light the frames."},
      {slug:"jabber-jawbreaker", name:"Jabber Jawbreaker", updated:"2026-07-08", change:"Added to the arcade", size:67, desc:"A 3-round <b>word</b>-boxing bout on a shared 5×5 letter grid. Thirteen word mini-games rotate as rounds, and each score becomes damage. Drain your rival's health or land a KO.", intent:"13 word mini-games fought as a 3-round boxing match."},
      {slug:"groundwork", name:"Groundwork", updated:"2026-07-06", change:"Added to the arcade", size:18, desc:"A land-parcel <b>puzzle</b> dressed up as a job sheet. Read the brief, work the parcel, and bring “Hollow Field” up to spec one task at a time.", intent:"A land-parcel job sheet as a puzzle."},
      {slug:"matgo", name:"Matgo", updated:"2026-07-06", change:"Added to the arcade", size:30, desc:"Korean Go-Stop (Hwatu), a flower <b>card game</b> played against an AI. Match cards, weigh whether to call Go or Stop, and race the deck to points.", intent:"Korean Go-Stop (Hwatu) against an AI."},
      {slug:"multiplayerdeckgarage", name:"Multiplayer Deck Garage", updated:"2026-07-14", change:"Renamed from Match Deck Gathering", size:138, desc:"A browser <b>card-game platform</b> more than a single game: one shared deck engine and lobby. Build a card game, spin up a variant, then deal it to friends over a room code.", intent:"One engine, many card games. Deal by room code."},
      {slug:"prism-pond", name:"Prism Pond", updated:"2026-07-06", change:"Added to the arcade", size:68, desc:"A spatial light <b>puzzle</b> set in a still pond. Route beams around the central hub, bend them through the colours, and light every node to solve it.", intent:"Route light beams. A spatial colour puzzle."},
      {slug:"word-pounce", name:"Word Pounce", updated:"2026-07-06", change:"Added to the arcade", size:103, desc:"A quick daily <b>word</b> game with a Wordle-and-Hangman streak. Read the clue, trace the word on the grid, and claim it before your guesses run out.", intent:"Wordle meets Hangman."},
      {slug:"baduk-bets", name:"Baduk Bets", updated:"2026-07-08", change:"Renamed from Baduk Blitz. Accounts + play-money chips added; wagering on the way", size:38, desc:"Correspondence <b>Go</b> at scale: play many 9×9 games at once, asynchronously (take your turn whenever) and bet play-money chips on games in progress. Capture stones, wall off territory, most points wins.", intent:"Play many games of Go asynchronously; bet on games in progress."},
    ];

    // ── Client-only play tracking (localStorage; private to each visitor, no backend) ──
    let PLAYS = {};
    try { PLAYS = JSON.parse(localStorage.getItem('mdg-plays') || '{}') || {}; } catch (e) {}
    const playN = s => (PLAYS[s] && PLAYS[s].n) || 0;
    const playLast = s => (PLAYS[s] && PLAYS[s].last) || 0;
    function recordPlay(s){
      const e = PLAYS[s] || {n:0}; e.n++; e.last = Date.now(); PLAYS[s] = e;
      try { localStorage.setItem('mdg-plays', JSON.stringify(PLAYS)); } catch (err) {}
    }

    function ago(ms){
      const days = Math.round((Date.now() - ms) / 86400000);
      if (days <= 0) return 'today';
      if (days === 1) return 'yesterday';
      if (days < 7) return days + ' days ago';
      if (days < 14) return 'a week ago';
      if (days < 61) return Math.round(days / 7) + ' weeks ago';
      return Math.round(days / 30.4) + ' months ago';
    }
    const fmt = new Intl.DateTimeFormat('en-US', {month:'short', day:'numeric', year:'numeric'});
    const esc = s => String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

    // Columns: label, sort key, cell renderer. `key:null` → not sortable.
    const COLS = [
      {label:'', key:null, cell:g => `<img class="g-thumb" src="./thumbs/${g.slug}.jpg" alt="${esc(g.name)} thumbnail" width="92" height="58">`},
      {label:'Game', key:'name', val:g => g.name.toLowerCase(), cell:g =>
        `<a class="g-name" href="${g.href||'./'+g.slug+'/'}" data-slug="${g.slug}"${g.href?' target="_blank" rel="noopener"':''} title="${esc(g.intent)}">${esc(g.name)}</a><div class="g-desc">${g.desc}</div>`},
      {label:'Updated', key:'updated', val:g => g.updated, cell:g =>
        `<span class="g-when"><time datetime="${g.updated}" title="${fmt.format(new Date(g.updated+'T00:00:00'))} · ${esc(g.change)}">${ago(new Date(g.updated+'T00:00:00').getTime())}</time></span>`},
      {label:'Size', key:'size', val:g => g.size, cell:g => `<span class="g-num">${g.size} KB</span>`},
      {label:'Played', key:'played', val:g => playN(g.slug)*1e13 + playLast(g.slug), cell:g => {
        const n = playN(g.slug);
        return `<span class="g-played${n?'':' zero'}"${n?` title="last played ${esc(ago(playLast(g.slug)))}"`:''}>${n?n+'×':'—'}</span>`;
      }},
      {label:'', key:null, cell:g => `<a class="g-play" href="${g.href||'./'+g.slug+'/'}" data-slug="${g.slug}"${g.href?' target="_blank" rel="noopener"':''}>play <span aria-hidden="true">→</span></a>`},
    ];

    let sortKey = 'updated', sortDir = -1;   // default: latest change first
    const collator = new Intl.Collator(undefined, {numeric:true, sensitivity:'base'});
    const colByKey = k => COLS.find(c => c.key === k);

    function render(){
      // header
      document.getElementById('games-head').innerHTML = COLS.map(c => {
        if (!c.key) return '<th></th>';
        const active = c.key === sortKey;
        const aria = active ? ` aria-sort="${sortDir<0?'descending':'ascending'}"` : '';
        return `<th class="sortable" data-key="${c.key}"${aria}>${esc(c.label)}<span class="ar"></span></th>`;
      }).join('');
      // body
      const col = colByKey(sortKey);
      const rows = GAMES.slice().sort((a,b) => {
        const va = col.val(a), vb = col.val(b);
        const cmp = typeof va === 'number' ? va - vb : collator.compare(va, vb);
        return cmp * sortDir || collator.compare(a.name, b.name);
      });
      document.getElementById('games-body').innerHTML = rows.map(g =>
        '<tr>' + COLS.map(c => `<td>${c.cell(g)}</td>`).join('') + '</tr>'
      ).join('');
    }

    document.getElementById('count').textContent = GAMES.length + ' prototypes';
    document.getElementById('games-head').addEventListener('click', e => {
      const th = e.target.closest('th[data-key]'); if (!th) return;
      const k = th.dataset.key;
      if (k === sortKey) sortDir = -sortDir;
      else { sortKey = k; sortDir = (k === 'name' || k === 'genre') ? 1 : -1; }  // text asc, metrics desc
      render();
    });
    document.getElementById('games-body').addEventListener('click', e => {
      const a = e.target.closest('a[data-slug]'); if (!a) return;
      const slug = a.dataset.slug;
      recordPlay(slug);   // localStorage write is synchronous, so it persists before navigation
    });
    render();
    </script>
