<style>
  *,*::before,*::after{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:var(--bg);color:var(--ink);

  .wrap{max-width:820px;margin:0 auto;padding:0 28px 80px}

  /* ── Living Game of Life background (same as the home screen after its intro) ── */
  #intro-canvas{position:fixed;inset:0;width:100%;height:100%;z-index:-1;pointer-events:none}

  /* ── Game list (vertical, sorted by latest change) ── */
  /* ── Sort control ── */
  .listhead{margin:40px 0 0;display:flex;align-items:baseline;justify-content:space-between;gap:14px;flex-wrap:wrap;width:min(920px,calc(100vw - 44px));position:relative;left:50%;transform:translateX(-50%)}
  .listhead .count{font-size:13px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);font-weight:500}
  .listhead .sortnote{font-size:13px;color:var(--muted)}

  /* ── Game table (sortable) ── */
  .tablewrap{margin:14px 0 0;overflow-x:auto;-webkit-overflow-scrolling:touch;width:min(920px,calc(100vw - 44px));position:relative;left:50%;transform:translateX(-50%)}
  table.gtable{width:100%;border-collapse:separate;border-spacing:0 8px;min-width:600px;font-size:14px}
  .gtable th{
    text-align:left;font-family:'Inter',sans-serif;font-weight:500;
    font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);
    padding:0 12px 12px;white-space:nowrap;
  }
  .gtable th.sortable{cursor:pointer;user-select:none;transition:color .15s}
  .gtable th.sortable:hover{color:var(--ink)}
  .gtable th .ar{display:inline-block;width:.7em;opacity:0;margin-left:3px;font-size:9px}
  .gtable th[aria-sort] .ar{opacity:1;color:var(--ink)}
  .gtable th[aria-sort="descending"] .ar::after{content:'▼'}
  .gtable th[aria-sort="ascending"] .ar::after{content:'▲'}
  .gtable td{background:var(--paper);border-top:1.5px solid var(--line);border-bottom:1.5px solid var(--line);padding:9px 12px;vertical-align:middle;transition:border-color .15s}
  .gtable td:first-child{border-left:1.5px solid var(--line);border-top-left-radius:12px;border-bottom-left-radius:12px}
  .gtable td:last-child{border-right:1.5px solid var(--line);border-top-right-radius:12px;border-bottom-right-radius:12px}
  .gtable tr:hover td{border-color:var(--line-2)}
  .gtable th:nth-child(2),.gtable td:nth-child(2){width:52%}
  .g-thumb{width:96px;height:60px;object-fit:cover;border-radius:7px;border:1px solid var(--line-2);display:block;background:var(--bg)}
  .g-name{font-family:'Fraunces',serif;font-weight:500;font-size:16px;color:var(--ink);letter-spacing:-0.01em;display:block}
  .g-name:hover{text-decoration:underline}
  .g-desc{color:var(--muted);font-size:12.5px;line-height:1.45;margin-top:2px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .g-tag{color:var(--ink-2);font-weight:600}
  .g-num{font-variant-numeric:tabular-nums;color:var(--ink-2);white-space:nowrap}
  .g-when{color:var(--muted);white-space:nowrap}
  .g-played{font-variant-numeric:tabular-nums;color:var(--ink-2);white-space:nowrap}
  .g-played.zero{color:var(--muted)}
  .g-play{font-family:'Fraunces',serif;font-size:12.5px;font-weight:500;display:inline-flex;align-items:center;gap:4px;border-radius:999px;padding:5px 13px 6px;background:transparent;color:var(--muted);border:1.5px solid var(--line-2);transition:border-color .15s,background .15s,color .15s;white-space:nowrap}
  .g-play:hover{background:var(--ink);color:var(--bg);border-color:var(--ink)}

    <script>
    /* One row per game. Hand-tagged (genre / controls / players / time / intent) +
       measured (size = code KB of index.html + engine.js) + updated date + client-only
       play counts (localStorage). Thumbnails live in ./thumbs/<slug>.jpg — re-screenshot
       a game's page to refresh one. Promote/demote by editing this array (see mdg.html tiers). */
    const GAMES = [
      {slug:'metropolisdawngrid', name:'Metropolis Dawn Grid', updated:'2026-07-07', change:'Guided first-run onboarding + supply-chain bootstrap fix', genre:'City builder', size:64, desc:'one shared world; build your district, run the supply chain, lay rail, and ship your surplus out by train.', intent:'Can a shared-world city builder work async, on one grid?'},
      {slug:'mossdewgarden', name:'Moss Dew Garden', updated:'2026-07-07', change:'Harvests you can use — the garden now feeds the care loop', genre:'Virtual pet', size:136, desc:'adopt a little plant-creature and keep it fed, happy, and rested.', intent:'A cozy care loop that earns a daily check-in.'},
      {slug:'honk-beach', name:'Honk Beach', updated:'2026-07-06', change:'Added to the arcade', genre:'Arcade', size:20, desc:'defend your beach picnic from a siege of hungry geese. Tap to shoo!', intent:'One-tap defense — pure reaction, phone-first.'},
      {slug:'keeprippingpacks', name:'Keep Ripping Packs', updated:'2026-07-06', change:'Added to the arcade', genre:'Economy sim', size:425, desc:'rip booster packs, sort the spill, craft Sets, and sell on a live market.', intent:'The dopamine of pack-opening as a full economy.'},
      {slug:'rhythm-rpg', name:'Rolls Per Groove', updated:'2026-07-06', change:'Added to the arcade', genre:'Rhythm RPG', size:25, desc:'every lane a class, every note an attack; fight short songs, then level your party between battles.', intent:'Every lane a class, every note an attack.'},
      {slug:'sigil-tactics', name:'Sigil Tactics', updated:'2026-07-06', change:'Added to the arcade', genre:'Tactics', size:134, desc:'a 5v5 card-battler on a 5×4 grid — initiative by speed, push-and-pull positioning, chaining sigils.', intent:'Initiative-by-speed and push/pull as the core tactic.'},
      {slug:'switchback-td', name:'Switchback TD', updated:'2026-07-06', change:'Added to the arcade', genre:'Tower defense', size:87, desc:'maze-building; wind the path, hold the wave.', intent:'Maze-building TD — the player draws the path.'},
      {slug:'airwolf', name:'Airwolf', updated:'2026-07-06', change:'Added to the arcade', genre:'Shmup', size:47, desc:'a side-scrolling attack-helicopter shooter; strafe the ground and survive the run.', intent:'How much game fits on one screen?'},
      {slug:'baduk-blitz', name:'Baduk Blitz', updated:'2026-07-06', change:'Added to the arcade', genre:'Board', size:35, desc:'Go on a blitz clock; capture territory on a small board before the timer runs out.', intent:'Go under a blitz clock — speed on an ancient game.'},
      {slug:'bannerfall', name:'Bannerfall', updated:'2026-07-06', change:'Added to the arcade', genre:'Auto-battler', size:27, desc:'field units of different rarities and fight for the banner.', intent:'A rarity-driven creature battler.'},
      {slug:'berm-burner', name:'Berm Burner', updated:'2026-07-06', change:'Added to the arcade', genre:'Racing', size:24, desc:'a downhill trail-riding prototype; carve the berms and hold your speed through the run.', intent:'Downhill flow — carve berms, keep speed.'},
      {slug:'bloom-again', name:'Bloom Again', updated:'2026-07-06', change:'Added to the arcade', genre:'Ambient', size:28, desc:'an atmospheric slice; move through the Hollow and light the Lantern Frame.', intent:'A quiet mood piece — light the frames.'},
      {slug:'groundwork', name:'Groundwork', updated:'2026-07-06', change:'Added to the arcade', genre:'Puzzle', size:18, desc:'a land-parcel prototype; work the job sheet and bring "Hollow Field" up to spec.', intent:'A land-parcel job sheet as a puzzle.'},
      {slug:'matgo', name:'Matgo', updated:'2026-07-06', change:'Added to the arcade', genre:'Card', size:30, desc:'Korean Go-Stop (Hwatu); match flower cards, call Go or Stop, and race to points.', intent:'Korean Go-Stop (Hwatu) against an AI.'},
      {slug:'multiplayerdeckgateway', name:'Multiplayer Deck Gateway', updated:'2026-07-06', change:'Added to the arcade', genre:'Card platform', size:138, desc:'a shared deck engine and lobby; build browser card games and deal them to friends by room code.', intent:'One engine, many card games — deal by room code.'},
      {slug:'prism-pond', name:'Prism Pond', updated:'2026-07-06', change:'Added to the arcade', genre:'Puzzle', size:68, desc:'route light beams around the hub and solve the pond.', intent:'Route light beams — a spatial colour puzzle.'},
      {slug:'word-pounce', name:'Word Pounce', updated:'2026-07-06', change:'Added to the arcade', genre:'Word', size:103, desc:'Wordle-and-Hangman-flavoured guessing in fast rounds.', intent:'Wordle meets Hangman.'},
    ];

    // ── Client-only play tracking (localStorage; private to each visitor, no backend) ──
    let PLAYS = {};
    try { PLAYS = JSON.parse(localStorage.getItem('mdg-plays') || '{}') || {}; } catch (e) {}
    const playN = s => (PLAYS[s] && PLAYS[s].n) || 0;
    const playLast = s => (PLAYS[s] && PLAYS[s].last) || 0;
    function recordPlay(s){
      const e = PLAYS[s] || {n:0}; e.n++; e.last = Date.now(); PLAYS[s] = e;
      try { localStorage.setItem('mdg-plays', JSON.stringify(PLAYS)); } catch (err) {}
    }

    function ago(ms){
      const days = Math.round((Date.now() - ms) / 86400000);
      if (days <= 0) return 'today';
      if (days === 1) return 'yesterday';
      if (days < 7) return days + ' days ago';
      if (days < 14) return 'a week ago';
      if (days < 61) return Math.round(days / 7) + ' weeks ago';
      return Math.round(days / 30.4) + ' months ago';
    }
    const fmt = new Intl.DateTimeFormat('en-US', {month:'short', day:'numeric', year:'numeric'});
    const esc = s => String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

    // Columns: label, sort key, cell renderer. `key:null` → not sortable.
    const COLS = [
      {label:'', key:null, cell:g => `<img class="g-thumb" src="./thumbs/${g.slug}.jpg" alt="${esc(g.name)} thumbnail" width="92" height="58">`},
      {label:'Game', key:'name', val:g => g.name.toLowerCase(), cell:g =>
        `<a class="g-name" href="./${g.slug}/" title="${esc(g.intent)}">${esc(g.name)}</a><div class="g-desc"><b class="g-tag">${esc(g.genre)}</b> — ${esc(g.desc)}</div>`},
      {label:'Updated', key:'updated', val:g => g.updated, cell:g =>
        `<span class="g-when"><time datetime="${g.updated}" title="${fmt.format(new Date(g.updated+'T00:00:00'))} — ${esc(g.change)}">${ago(new Date(g.updated+'T00:00:00').getTime())}</time></span>`},
      {label:'Size', key:'size', val:g => g.size, cell:g => `<span class="g-num">${g.size} KB</span>`},
      {label:'Played', key:'played', val:g => playN(g.slug)*1e13 + playLast(g.slug), cell:g => {
        const n = playN(g.slug);
        return `<span class="g-played${n?'':' zero'}"${n?` title="last played ${esc(ago(playLast(g.slug)))}"`:''}>${n?n+'×':'—'}</span>`;
      }},
      {label:'', key:null, cell:g => `<a class="g-play" href="./${g.slug}/" data-slug="${g.slug}">play <span aria-hidden="true">→</span></a>`},
    ];

    let sortKey = 'updated', sortDir = -1;   // default: latest change first
    const collator = new Intl.Collator(undefined, {numeric:true, sensitivity:'base'});
    const colByKey = k => COLS.find(c => c.key === k);

    function render(){
      // header
      document.getElementById('games-head').innerHTML = COLS.map(c => {
        if (!c.key) return '<th></th>';
        const active = c.key === sortKey;
        const aria = active ? ` aria-sort="${sortDir<0?'descending':'ascending'}"` : '';
        return `<th class="sortable" data-key="${c.key}"${aria}>${esc(c.label)}<span class="ar"></span></th>`;
      }).join('');
      // body
      const col = colByKey(sortKey);
      const rows = GAMES.slice().sort((a,b) => {
        const va = col.val(a), vb = col.val(b);
        const cmp = typeof va === 'number' ? va - vb : collator.compare(va, vb);
        return cmp * sortDir || collator.compare(a.name, b.name);
      });
      document.getElementById('games-body').innerHTML = rows.map(g =>
        '<tr>' + COLS.map(c => `<td>${c.cell(g)}</td>`).join('') + '</tr>'
      ).join('');
    }

    document.getElementById('count').textContent = GAMES.length + ' prototypes';
    document.getElementById('games-head').addEventListener('click', e => {
      const th = e.target.closest('th[data-key]'); if (!th) return;
      const k = th.dataset.key;
      if (k === sortKey) sortDir = -sortDir;
      else { sortKey = k; sortDir = (k === 'name' || k === 'genre') ? 1 : -1; }  // text asc, metrics desc
      render();
    });
    document.getElementById('games-body').addEventListener('click', e => {
      const a = e.target.closest('a[href^="./"]'); if (!a) return;
      const slug = a.dataset.slug || a.getAttribute('href').replace(/[./]/g,'');
      recordPlay(slug);   // localStorage write is synchronous, so it persists before navigation
    });
    render();
    </script>
