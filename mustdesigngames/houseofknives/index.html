<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>House of Knives — Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ============ MDG house tokens + faction hues ============ */
:root{
  --bg:#FBF8F2; --paper:#FFFFFF; --ink:#15161C; --ink2:#2A2A2A; --muted:#6A6A6A;
  --line:#E5E0D2; --line2:#CBC4B2; --accent:#1A1A1A; --codebg:#F4F0E6;
  --shadow:0 1px 0 rgba(0,0,0,.02),0 14px 36px rgba(15,16,28,.06);
  --shadow-hover:0 18px 48px rgba(15,16,28,.10);
  --W:#a8893c; --U:#4e6f96; --B:#5c4a63; --R:#a84e35; --G:#5f7345;
  --Wbg:#f3ecd9; --Ubg:#e4ebf3; --Bbg:#eae4ee; --Rbg:#f5e4de; --Gbg:#e7ecdd;
  --hurt:#a83232; --good:#3f7245; --focus:#4e6f96;
  --back1:#e8e0cc; --back2:#d6ccae;
}
@media (prefers-color-scheme: dark){:root{
  --bg:#13110E; --paper:#1D1A16; --ink:#EDE8DF; --ink2:#CAC5BC; --muted:#8A857B;
  --line:#2C2924; --line2:#3C3830; --accent:#EDE8DF; --codebg:#252219;
  --shadow:0 1px 0 rgba(0,0,0,.2),0 14px 36px rgba(0,0,0,.35);
  --shadow-hover:0 18px 48px rgba(0,0,0,.5);
  --W:#c9ab5e; --U:#7d9cc0; --B:#a08aab; --R:#c97a5e; --G:#8ba06a;
  --Wbg:#2a2617; --Ubg:#1a2129; --Bbg:#241f28; --Rbg:#2a1c16; --Gbg:#1e2317;
  --hurt:#d96a6a; --good:#7fae86; --focus:#7d9cc0;
  --back1:#26221a; --back2:#332e22;
}}
:root[data-theme="dark"]{
  --bg:#13110E; --paper:#1D1A16; --ink:#EDE8DF; --ink2:#CAC5BC; --muted:#8A857B;
  --line:#2C2924; --line2:#3C3830; --accent:#EDE8DF; --codebg:#252219;
  --shadow:0 1px 0 rgba(0,0,0,.2),0 14px 36px rgba(0,0,0,.35);
  --shadow-hover:0 18px 48px rgba(0,0,0,.5);
  --W:#c9ab5e; --U:#7d9cc0; --B:#a08aab; --R:#c97a5e; --G:#8ba06a;
  --Wbg:#2a2617; --Ubg:#1a2129; --Bbg:#241f28; --Rbg:#2a1c16; --Gbg:#1e2317;
  --hurt:#d96a6a; --good:#7fae86; --focus:#7d9cc0;
  --back1:#26221a; --back2:#332e22;
}
:root[data-theme="light"]{
  --bg:#FBF8F2; --paper:#FFFFFF; --ink:#15161C; --ink2:#2A2A2A; --muted:#6A6A6A;
  --line:#E5E0D2; --line2:#CBC4B2; --accent:#1A1A1A; --codebg:#F4F0E6;
  --shadow:0 1px 0 rgba(0,0,0,.02),0 14px 36px rgba(15,16,28,.06);
  --shadow-hover:0 18px 48px rgba(15,16,28,.10);
  --W:#a8893c; --U:#4e6f96; --B:#5c4a63; --R:#a84e35; --G:#5f7345;
  --Wbg:#f3ecd9; --Ubg:#e4ebf3; --Bbg:#eae4ee; --Rbg:#f5e4de; --Gbg:#e7ecdd;
  --hurt:#a83232; --good:#3f7245; --focus:#4e6f96;
  --back1:#e8e0cc; --back2:#d6ccae;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{background:var(--bg); color:var(--ink); font:16px/1.5 'Inter',system-ui,-apple-system,sans-serif; -webkit-font-smoothing:antialiased; min-height:100dvh}
h1,h2,h3,.disp{font-family:'Fraunces',Georgia,serif; font-weight:500; letter-spacing:-0.01em; margin:0}
button{font:inherit; color:inherit; background:none; border:none; cursor:pointer; padding:0}
.num{font-variant-numeric:tabular-nums}
@media (prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important}}

/* ============ App chrome ============ */
#app{max-width:900px; margin:0 auto; padding:10px 10px 140px}
.topbar{display:flex; align-items:center; justify-content:space-between; gap:10px; padding:6px 2px 10px}
.brand{font-family:'Fraunces',Georgia,serif; font-size:20px; font-weight:600; letter-spacing:-0.01em}
.brand em{font-style:italic; color:var(--ink2); font-weight:400}
.topbtns{display:flex; gap:6px}
.chip{border:1px solid var(--line2); border-radius:999px; padding:5px 12px; font-size:13px; font-weight:500; background:var(--paper); box-shadow:var(--shadow)}
.chip:active{transform:translateY(1px)}
.chip.primary{background:var(--ink); color:var(--bg); border-color:var(--ink)}
.chip:disabled{opacity:.4; cursor:default}
.eyebrow{font-size:11.5px; letter-spacing:.18em; text-transform:uppercase; color:var(--muted); font-weight:500}

/* ============ Board ============ */
.board{display:flex; flex-direction:column; gap:6px}
.brow{display:grid; grid-template-columns:repeat(3,1fr); gap:6px}
.rowlabel{display:flex; align-items:center; justify-content:space-between; padding:2px 4px}
.rowlabel .eyebrow{font-size:10.5px}
.midline{height:0; border-top:2px dashed var(--line2); margin:4px 8px; position:relative}
.cell{background:var(--paper); border:1px solid var(--line); border-radius:12px; min-height:78px; padding:6px; position:relative; box-shadow:var(--shadow); cursor:pointer; transition:border-color .15s, box-shadow .15s}
.cell.room{border-style:solid; background:linear-gradient(180deg,var(--paper),var(--codebg))}
.cell.enemy{opacity:.98}
.cell.hot{border-color:var(--focus); box-shadow:0 0 0 2px var(--focus), var(--shadow)}
.cell.pick{border-color:var(--good); box-shadow:0 0 0 2px var(--good), var(--shadow); animation:pulse 1.2s infinite}
@keyframes pulse{50%{box-shadow:0 0 0 4px var(--good), var(--shadow)}}
.cellname{font-size:10px; letter-spacing:.14em; text-transform:uppercase; color:var(--muted); font-weight:500}
.cellname .zonehint{display:block; letter-spacing:0; text-transform:none; opacity:.8; font-size:9px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
.stack{display:flex; flex-wrap:wrap; gap:4px; margin-top:5px; align-items:flex-start}

/* mini card */
.mini{width:52px; min-height:40px; border-radius:7px; border:1px solid var(--line2); background:var(--paper); position:relative; padding:3px 4px 2px; font-size:10px; line-height:1.15; overflow:hidden; flex:0 0 auto}
.mini .mn{font-family:'Fraunces',Georgia,serif; font-weight:600; font-size:9.5px; letter-spacing:0; display:block; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
.mini .ph{position:absolute; right:3px; bottom:1px; font-weight:600; font-size:10px}
.mini .cost{position:absolute; left:3px; bottom:1px; color:var(--muted); font-size:9px}
.mini.W{border-color:var(--W); background:var(--Wbg)} .mini.U{border-color:var(--U); background:var(--Ubg)}
.mini.B{border-color:var(--B); background:var(--Bbg)} .mini.R{border-color:var(--R); background:var(--Rbg)}
.mini.G{border-color:var(--G); background:var(--Gbg)}
.mini.dn{background:repeating-linear-gradient(45deg,var(--back1),var(--back1) 4px,var(--back2) 4px,var(--back2) 8px); border-color:var(--line2)}
.mini.dn .mn{visibility:hidden}
.mini.tapped{transform:rotate(8deg); opacity:.55}
.mini.leader{border-width:2px}
.mini.leader::before{content:"♛"; position:absolute; top:0; right:3px; font-size:9px}
.mini.hurt .ph{color:var(--hurt)}
.mini.plotcard::before{content:"◉"; position:absolute; top:1px; right:3px; font-size:8px; color:var(--muted)}

/* ============ Hand tray ============ */
.tray{position:fixed; left:0; right:0; bottom:0; background:var(--paper); border-top:1px solid var(--line); box-shadow:0 -8px 30px rgba(0,0,0,.08); z-index:30}
.tray-inner{max-width:900px; margin:0 auto; padding:8px 10px calc(10px + env(safe-area-inset-bottom))}
.tray-head{display:flex; justify-content:space-between; align-items:center; margin-bottom:6px}
.handrow{display:flex; gap:6px; overflow-x:auto; padding-bottom:4px}
.hcard{flex:0 0 92px; border-radius:10px; border:1.5px solid var(--line2); background:var(--paper); padding:6px; font-size:11px; cursor:pointer; text-align:left}
.hcard .hn{font-family:'Fraunces',Georgia,serif; font-weight:600; font-size:12px; line-height:1.1; display:block; min-height:26px}
.hcard .ht{color:var(--muted); font-size:10px}
.hcard .hb{display:flex; justify-content:space-between; margin-top:3px; font-weight:600; font-size:11px}
.hcard.W{border-color:var(--W)} .hcard.U{border-color:var(--U)} .hcard.B{border-color:var(--B)} .hcard.R{border-color:var(--R)} .hcard.G{border-color:var(--G)}
.hcard.sel{outline:2px solid var(--focus)}

/* ============ Sheets & modals ============ */
.scrim{position:fixed; inset:0; background:rgba(10,9,6,.45); z-index:40; display:flex; align-items:flex-end; justify-content:center}
@media(min-width:640px){.scrim{align-items:center}}
.sheet{background:var(--paper); border:1px solid var(--line); border-radius:16px 16px 0 0; width:100%; max-width:640px; max-height:86dvh; overflow-y:auto; padding:16px 16px calc(16px + env(safe-area-inset-bottom)); box-shadow:var(--shadow-hover)}
@media(min-width:640px){.sheet{border-radius:16px}}
.sheet h3{font-size:20px; margin-bottom:2px}
.sheet .sub{color:var(--muted); font-size:13px; margin:0 0 12px}
.acts{display:flex; flex-direction:column; gap:8px; margin-top:10px}
.act{border:1px solid var(--line2); border-radius:10px; padding:10px 12px; text-align:left; background:var(--paper); font-size:14px}
.act b{font-weight:600}
.act small{display:block; color:var(--muted); font-size:12px}
.act:not(:disabled):hover{border-color:var(--ink); box-shadow:var(--shadow)}
.act:disabled{opacity:.45; cursor:default}
.act.danger{border-color:var(--hurt)}
.bigcard{border:2px solid var(--line2); border-radius:14px; padding:12px; margin:8px 0; background:var(--paper)}
.bigcard.W{border-color:var(--W); background:var(--Wbg)} .bigcard.U{border-color:var(--U); background:var(--Ubg)}
.bigcard.B{border-color:var(--B); background:var(--Bbg)} .bigcard.R{border-color:var(--R); background:var(--Rbg)}
.bigcard.G{border-color:var(--G); background:var(--Gbg)}
.bigcard .bch{display:flex; justify-content:space-between; align-items:baseline; gap:8px}
.bigcard .bcn{font-family:'Fraunces',Georgia,serif; font-weight:600; font-size:18px}
.bigcard .bct{font-size:12px; color:var(--muted); margin:2px 0 6px}
.bigcard .bcx{font-size:13px}
.bigcard .bcf{font-size:12px; font-style:italic; color:var(--muted); margin-top:6px}
.bigcard .bcs{font-weight:600; font-size:15px; margin-top:6px}
.klist{display:flex; gap:6px; flex-wrap:wrap; margin-top:4px}
.kw{font-size:10.5px; letter-spacing:.06em; text-transform:uppercase; border:1px solid var(--line2); border-radius:999px; padding:1px 8px; font-weight:600}

/* payment bar / prompt bar */
.promptbar{position:fixed; left:0; right:0; bottom:0; z-index:50; background:var(--ink); color:var(--bg)}
.promptbar .pin{max-width:900px; margin:0 auto; padding:10px 14px calc(10px + env(safe-area-inset-bottom)); display:flex; align-items:center; justify-content:space-between; gap:10px; font-size:14px}
.promptbar .chip{background:var(--bg); color:var(--ink); border-color:var(--bg)}
.promptbar .chip.ghost{background:transparent; color:var(--bg); border-color:var(--bg)}

/* log */
.logwrap{margin-top:14px; background:var(--paper); border:1px solid var(--line); border-radius:12px; padding:10px 12px}
.logwrap h3{font-size:14px}
#log{list-style:none; margin:6px 0 0; padding:0; font-size:12.5px; color:var(--ink2); max-height:180px; overflow-y:auto}
#log li{padding:2px 0; border-bottom:1px dashed var(--line)}
#log li.hl{font-weight:600}

/* overlays */
.full{position:fixed; inset:0; z-index:60; background:var(--bg); display:flex; align-items:center; justify-content:center; padding:20px}
.fullin{max-width:480px; width:100%; text-align:center}
.fullin h1{font-size:clamp(34px,7vw,52px); line-height:1.05}
.fullin p{color:var(--ink2)}
.deckpick{display:grid; grid-template-columns:repeat(auto-fit,minmax(130px,1fr)); gap:10px; margin:14px 0; text-align:left}
.dopt{border:2px solid var(--line2); border-radius:12px; padding:12px; background:var(--paper); cursor:pointer}
.dopt h3{font-size:16px}
.dopt p{font-size:11.5px; color:var(--muted); margin:4px 0 0}
.dopt.sel{outline:3px solid var(--focus)}
.roomopt{display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin:12px 0}
.spacer{height:10px}
.statusline{display:flex; gap:10px; align-items:center; flex-wrap:wrap; font-size:13px; color:var(--ink2); padding:4px 2px}
.statusline b{font-weight:600}
.pill{border:1px solid var(--line2); border-radius:999px; padding:1px 9px; font-size:12px}
.pill.lost{color:var(--hurt); border-color:var(--hurt)}
.helpbody{font-size:14px; line-height:1.55}
.helpbody h4{font-family:'Fraunces',Georgia,serif; margin:14px 0 4px; font-size:16px}
.helpbody p{margin:6px 0}
.helpbody .kw{margin-right:4px}
kbd.gold{font-family:inherit; border:1px solid var(--line2); border-radius:5px; padding:0 5px; background:var(--codebg); font-size:12px}
#hovercard{position:fixed; z-index:90; width:280px; pointer-events:none; display:none}
#hovercard .bigcard{margin:0; box-shadow:var(--shadow-hover)}
.zlink{font-size:12px}
.toast{position:fixed; top:14px; left:50%; transform:translateX(-50%); background:var(--ink); color:var(--bg); border-radius:999px; padding:8px 18px; font-size:13.5px; z-index:80; box-shadow:var(--shadow-hover); max-width:88vw; text-align:center}


/* Desktop: the war-table fills the window — board rows stretch with viewport height */
@media (min-width:900px){
  #app{max-width:1160px}
  .cell{min-height:clamp(78px, calc((100dvh - 440px)/4), 300px); padding:10px}
  .cellname{font-size:11.5px}
  .cellname .zonehint{font-size:10.5px}
  .stack{gap:6px; margin-top:8px}
  .mini{width:96px; min-height:66px; border-radius:9px; padding:6px 7px 4px; font-size:12px}
  .mini .mn{font-size:11.5px; white-space:normal; line-height:1.15; max-height:2.3em; overflow:hidden}
  .mini .ph{font-size:12.5px; right:5px; bottom:3px}
  .mini .cost{font-size:10.5px; left:5px; bottom:3px}
  .mini.leader::before{font-size:11px; right:5px; top:2px}
  .brow{gap:10px}
  .board{gap:10px}
  .midline{margin:6px 10px}
}

/* Wide desktop: the hand leaves the bottom tray and floats along the board's left edge */
@media (min-width:1200px){
  #app{margin-left:max(232px, calc((100vw - 1160px)/2)); margin-right:auto; padding-bottom:40px}
  .tray{position:fixed; left:16px; right:auto; top:96px; bottom:auto; width:196px;
    background:none; border:none; box-shadow:none; z-index:20}
  .tray-inner{max-width:none; padding:0}
  .tray-head{flex-direction:column; align-items:flex-start; gap:8px; margin-bottom:10px}
  .tray-head > span:last-child{display:flex; gap:6px}
  .handrow{flex-direction:column; overflow-x:visible; overflow-y:auto;
    max-height:calc(100dvh - 190px); gap:8px; padding:2px 4px 8px 2px}
  .hcard{flex:0 0 auto; width:100%; background:var(--paper); box-shadow:var(--shadow)}
  .hcard:hover{box-shadow:var(--shadow-hover)}
}
</style>
</head>
<body>
<div id="app"></div>
<div id="overlays"></div>
<script>
'use strict';
/* =====================================================================
   House of Knives — playable prototype (hotseat, pass-and-play)
   Rules: see ../rules.md. Engine implements rules v0.1 exactly;
   deviations are listed in ../decision-log.md (§ prototype).
   ===================================================================== */

/* ---------- card data (injected at end of file; engine boots via KC_INIT) ---------- */
let CARDS = [];   // set by KC_INIT
let DECKS = {};   // color -> [30 ids]
const COLORS = {W:'White',U:'Blue',B:'Black',R:'Red',G:'Green'};
const ROOMS = ['Crypt','Keep','Gatehouse'];           // index 0,1,2 = player's left,center,right
const ZONE_OF_ROOM = ['discard pile','deck','hand'];
const BREACH_TEXT = [
  'Crypt falls: entire discard pile is exiled!',
  'Keep falls: top 3 cards of the deck are discarded!',
  'Gatehouse falls: a random card is discarded from hand!'
];
const byId = {}; // cid -> card def

/* ---------- state ---------- */
let S = null;            // game state (serializable)
let UNDO = [];           // snapshot stack
let VIEW = {sheet:null, picking:null, flow:null, toast:null}; // transient ui (not undone)

function freshPlayer(name, color){
  return { name, color, deck:[], hand:[], discard:[], exile:[],
    rooms:[[],[],[]], fields:[[],[],[]],
    leader:null, mustered:false, overgrowUsed:0, lost:false };
}
function newGame(c0, c1, solo){
  S = { seed: Math.floor(Math.random()*1e9), turn:1, active:0, phase:'setup', pendingFx:[], solo:!!solo,
        players:[freshPlayer(solo?'You':'Player 1', c0), freshPlayer(solo?'The Rival':'Player 2', c1)],
        inst:{}, nextI:1, log:[], winner:null, setupStage:0 };
  for (const [pi, col] of [[0,c0],[1,c1]]){
    const p = S.players[pi];
    const list = (DECKS[col]||[]).slice();
    shuffle(list);
    p.deck = list.map(cid => makeInst(cid, pi));
    // leader instance (not in deck)
    const ldef = CARDS.find(c => c.color===col && c.type==='leader');
    p.leader = makeInst(ldef.id, pi);
    p.hand.push(p.leader);                 // presented to all, then hidden in hand
    for(let k=0;k<4;k++) p.hand.push(p.deck.pop());
  }
  logLine(`A new siege begins — ${COLORS[c0]} vs ${COLORS[c1]}.`, true);
}
function makeInst(cid, owner){
  const id = 'i'+(S.nextI++);
  S.inst[id] = { id, cid, owner, faceup:true, tapped:false, dmg:0, arrived:-1, buffs:[] };
  return id;
}
function I(id){ return S.inst[id]; }
function D(id){ return byId[I(id).cid]; }
function P(){ return S.players[S.active]; }
function OPP(){ return S.players[1-S.active]; }
function viewer(){ return (S && S.solo) ? 0 : (S ? S.active : 0); } // solo: board always from the human's seat
function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } }
function logLine(t, hl){ S.log.push({t, hl:!!hl, turn:S.turn}); }
function snapshot(){ UNDO.push(JSON.stringify(S)); if (UNDO.length>80) UNDO.shift(); }
function undo(){ if(!UNDO.length) return toast('Nothing to undo'); S = JSON.parse(UNDO.pop()); VIEW={sheet:null,picking:null,flow:null,aiBusy:VIEW.aiBusy}; render(); }

/* ---------- derived stats (statics + turn buffs) ---------- */
function whereIs(iid){ // -> {pi, zone:'room'|'field'|'hand'|'deck'|'discard'|'exile', idx}
  for (let pi=0;pi<2;pi++){ const p=S.players[pi];
    for(let r=0;r<3;r++){ if(p.rooms[r].includes(iid)) return {pi,zone:'room',idx:r};
                          if(p.fields[r].includes(iid)) return {pi,zone:'field',idx:r}; }
    if(p.hand.includes(iid)) return {pi,zone:'hand',idx:-1};
    if(p.deck.includes(iid)) return {pi,zone:'deck',idx:-1};
    if(p.discard.includes(iid)) return {pi,zone:'discard',idx:-1};
    if(p.exile.includes(iid)) return {pi,zone:'exile',idx:-1};
  }
  return null;
}
function condOK(cond, iid, ctx){
  if(!cond) return true;
  const w = whereIs(iid); if(!w) return false;
  if(cond.startsWith('in_room')){ const want = cond.split(':')[1];
    if(w.zone!=='room') return false;
    return (want==='any') || (ROOMS[w.idx]===want);
  }
  if(cond==='on_battlefield') return w.zone==='field';
  if(cond==='defending') return !!(ctx && ctx.defending);
  return true;
}
function stats(iid, ctx){
  const d = D(iid), inst = I(iid);
  let p = d.power||0, h = d.health||0;
  if (inst.faceup && d.effects) for(const e of d.effects){
    if(e.trigger==='static' && e.op==='buff'){
      if((e.target==='self'||!e.target) && condOK(e.condition, iid, ctx)){ p+=e.p||0; h+=e.h||0; }
    }
  }
  // auras from faceup friendly cards: same-space, same-room, and global scopes
  const w = whereIs(iid);
  if(w && (w.zone==='field'||w.zone==='room') && isUnit(iid) && inst.faceup){
    const own=S.players[inst.owner];
    const srcs=[];
    for(let z=0;z<3;z++){ srcs.push(...own.fields[z], ...own.rooms[z]); }
    for(const oid of srcs){ if(!I(oid).faceup) continue; const od=D(oid); if(!od.effects) continue;
      const ow=whereIs(oid);
      for(const e of od.effects){
        if(e.trigger!=='static' || e.op!=='buff') continue;
        if(e.target==='units_in_lane'){ if(oid!==iid && ow.zone==='field' && w.zone==='field' && ow.idx===w.idx){ p+=e.p||0; h+=e.h||0; } }
        else if(e.target==='units_in_room'){ if(oid!==iid && ow.zone==='room' && w.zone==='room' && ow.idx===w.idx){ p+=e.p||0; h+=e.h||0; } }
        else if(e.target==='all_friendly_units'){ if(condOK(e.condition, oid) && condOK(e.condition, iid)){ p+=e.p||0; h+=e.h||0; } }
      } }
  }
  for(const b of inst.buffs){ p+=b.p||0; h+=b.h||0; }
  return {p:Math.max(0,p), h};
}
function hp(iid){ const s=stats(iid); return s.h - I(iid).dmg; }
function hasKw(iid, kw){ const d=D(iid); return I(iid).faceup && (d.keywords||[]).includes(kw); }
function isUnit(iid){ const t=D(iid).type; return t==='unit'||t==='leader'; }
function canDefend(iid, breach){ // untapped OR bulwark; faceup irrelevant in rooms post-reveal
  if(!isUnit(iid)) return false;
  return !I(iid).tapped || hasKw(iid,'bulwark');
}

/* ---------- mana: pay-as-you-go ---------- */
function manaSources(pi){ // untapped castle cards + leader-in-castle
  const p=S.players[pi]; const out=[];
  for(let r=0;r<3;r++) for(const iid of p.rooms[r]){
    if(!I(iid).tapped) out.push(iid);
  }
  return out;
}
function sourceColor(iid){ // what colored pip this taps for; null = gold only
  if(!I(iid).faceup) return null;
  if(D(iid).type==='leader') return '*';
  return D(iid).color;
}
function canColorFor(iid, cost){ // could this source cover a colored pip (revealing if facedown)?
  if(I(iid).faceup){ const c=sourceColor(iid); return c==='*'||c===cost.color; }
  return D(iid).type==='leader' || D(iid).color===cost.color; // reveal rides on the tap [OP]
}
function canAfford(pi, cost, extraTapped){ // greedy check: colored first
  const srcs = manaSources(pi).filter(x=>!(extraTapped||[]).includes(x));
  const col = S.players[pi].color;
  let colored = cost.colored||0, generic = cost.generic||0;
  let colSrc = srcs.filter(x=>{const c=sourceColor(x); return c==='*'||c===cardColorNeeded(cost, pi);}).length;
  // colored pips are of the card's own color — computed by caller via cost.color
  if(colSrc < colored) return false;
  return srcs.length >= colored + generic;
}
function cardColorNeeded(cost, pi){ return cost.color; } // set when initiating payment

/* ---------- turn engine ---------- */
function beginTurn(){
  const p = P();
  p.mustered=false; p.overgrowUsed=0;
  const exhausted = p.deck.length===0;
  for(const iid of Object.keys(S.inst)){ const inst=S.inst[iid];
    if(inst.owner===S.active){
      if(exhausted && iid===p.leader){ if(inst.tapped) logLine('The deck is spent — the exhausted Leader cannot rise.', true); }
      else inst.tapped=false;
    }
    inst.buffs = inst.buffs.filter(b=>b.duration!=='turn' || inst.owner!==S.active);
  }
  // clear all turn buffs owned by active player's cards (fresh turn)
  S.phase='main';
  if(!draw(S.active,1)) return; // turn-order compensation lives in the opening draws
  logLine(`— Turn ${S.turn}, ${p.name} (${COLORS[p.color]}) —`, true);
}
function draw(pi, n){
  const p=S.players[pi];
  for(let k=0;k<n;k++){
    if(!p.deck.length){
      logLine(`${p.name}'s deck is empty — nothing to draw.`);
      continue;
    }
    p.hand.push(p.deck.pop());
  }
  return true;
}
function endTurn(){
  S.raided=null;
  for(const iid of Object.keys(S.inst)){ S.inst[iid].buffs = S.inst[iid].buffs.filter(b=>b.duration!=='turn'); S.inst[iid].dmg = 0; }
  UNDO=[]; // undo never crosses turns
  S.active = 1-S.active;
  if(S.active===0) S.turn++;
  VIEW.sheet=null; VIEW.flow=null;
  if(S.solo){
    beginTurn(); render();
    if(S.phase!=='over' && S.active===1) setTimeout(aiKickoff, window.KC_AI_DELAY||600);
    return;
  }
  showPass(()=>{ beginTurn(); render(); });
}
function eliminate(pi, why){
  S.players[pi].lost = true; S.winner = 1-pi;
  logLine(`☠ ${why}. ${S.players[1-pi].name} rules the field!`, true);
  S.phase='over';
}

/* ---------- basic actions ---------- */
function muster(hidx, room, facedown){
  snapshot();
  const p=P(); const iid = p.hand[hidx];
  const d = D(iid);
  if(p.mustered && !hasOvergrowDef(d)) { UNDO.pop(); return toast('Already placed a card this turn'); }
  if(p.mustered && hasOvergrowDef(d) && p.overgrowUsed>=1){ UNDO.pop(); return toast('Only one Overgrow placement per turn'); }
  if(p.mustered) p.overgrowUsed++;
  p.hand.splice(hidx,1);
  I(iid).faceup = !facedown;
  p.rooms[room].push(iid);
  if(p.mustered) logLine(`${p.name} lets another card take root in the ${ROOMS[room]} (Overgrow).`);
  else logLine(`${p.name} places a card ${facedown?'facedown':`(${d.name})`} in the ${ROOMS[room]}.`);
  p.mustered = true;
  VIEW.sheet=null; render();
}
function hasOvergrowDef(d){ return (d.keywords||[]).includes('overgrow'); }
</script>
<script>
/* ================= payment flow =================
   VIEW.picking = {kind:'pay', cost:{generic,colored,color}, tapped:[], onDone(tappedList), label}
   Player taps highlighted castle sources until paid. */
function startPayment(cost, label, onDone, exclude){
  // exclude: cards that may not finance this cost (the card paying for itself; reserved tribute)
  const ex = exclude||[];
  const srcs = manaSources(S.active).filter(s=>!ex.includes(s));
  const colOK = srcs.filter(s=>canColorFor(s, cost));
  const total = (cost.generic||0)+(cost.colored||0);
  if(srcs.length < total || colOK.length < (cost.colored||0)){ if(UNDO.length) UNDO.pop(); return toast('Not enough untapped castle cards to pay '+costStr(cost)); }
  if(total===0){ onDone([]); return; }
  VIEW.picking = {kind:'pay', cost, tapped:[], onDone, label, exclude:ex};
  VIEW.sheet=null; render();
}
function payProgress(){
  const pk=VIEW.picking; const cost=pk.cost;
  const colorTaps=pk.tapped.filter(iid=>canColorFor(iid,cost));
  const colored = Math.min(cost.colored||0, colorTaps.length);
  const generic = pk.tapped.length - colored;
  return {colored, generic, needC:(cost.colored||0)-colored, needG:(cost.generic||0)-generic};
}
function clickPaySource(iid){
  const pk=VIEW.picking;
  if((pk.exclude||[]).includes(iid)) return toast('That card cannot finance this cost');
  const idx = pk.tapped.indexOf(iid);
  if(idx>=0){ pk.tapped.splice(idx,1); render(); return; }
  pk.tapped.push(iid);
  const pr = payProgress();
  if(pr.needC<=0 && pr.needG<=0 && pk.tapped.length >= (pk.cost.generic||0)+(pk.cost.colored||0)){
    // allocate colored pips: faceup color-sources first; reveal facedown ones only as needed [OP: reveal rides the tap]
    let need = pk.cost.colored||0;
    const faceupCap = pk.tapped.filter(t=>I(t).faceup && canColorFor(t,pk.cost));
    const downCap   = pk.tapped.filter(t=>!I(t).faceup && canColorFor(t,pk.cost));
    need -= Math.min(need, faceupCap.length);
    for(const t of downCap){ if(need<=0) break;
      I(t).faceup=true; need--;
      logLine(`${P().name} reveals ${D(t).name} as it taps for ${pk.cost.color}.`); }
    for(const t of pk.tapped){ I(t).tapped = true; }
    const done = pk.onDone; VIEW.picking=null;
    done(pk.tapped);
  }
  render();
}
function costStr(c){ const parts=[]; if(c.generic) parts.push(c.generic); if(c.colored) parts.push(c.color.repeat(c.colored)); return parts.join('+')||'0'; }
function fullCost(d){ return {generic:d.cost.generic||0, colored:d.cost.colored||0, color:d.color}; }

/* ================= deploy ================= */
function deployFromHand(hidx, fieldIdx){
  const p=P(); const iid=p.hand[hidx]; const d=D(iid);
  snapshot();
  startPayment(fullCost(d), `Deploy ${d.name}`, ()=>{
    p.hand.splice(p.hand.indexOf(iid),1);
    I(iid).faceup=true; I(iid).arrived=S.turn*2+S.active;
    p.fields[fieldIdx].push(iid);
    logLine(`${p.name} deploys ${d.name} to the ${['left','center','right'][fieldIdx]} field.`);
    fireTrigger(iid,'arrival', ()=>render());
  });
}
function deployFromCastle(iid){
  const p=P(); const w=whereIs(iid); const d=D(iid);
  snapshot();
  // a card cannot tap to finance its own deployment
  startPayment(fullCost(d), `Deploy ${d.name}`, ()=>{
    p.rooms[w.idx].splice(p.rooms[w.idx].indexOf(iid),1);
    I(iid).faceup=true; I(iid).arrived=S.turn*2+S.active;
    p.fields[w.idx].push(iid);
    logLine(`${p.name} marches ${d.name} out of the ${ROOMS[w.idx]}.`);
    fireTrigger(iid,'arrival', ()=>render());
  }, [iid]);
}

/* ================= tap actions ================= */
function tapForManaSolo(iid, reveal){
  // outside payment: tapping for mana alone is pointless (no floating mana), but
  // reveal-with-tap is how you flip a card faceup. We allow it as "tap: reveal".
  snapshot();
  I(iid).tapped=true;
  if(reveal && !I(iid).faceup){ I(iid).faceup=true; logLine(`${P().name} reveals ${D(iid).name} in the ${ROOMS[whereIs(iid).idx]}.`); }
  else logLine(`${P().name} taps a card in the ${ROOMS[whereIs(iid).idx]}.`);
  VIEW.sheet=null; render();
}
function castleMove(iid, toRoom){
  snapshot();
  const w=whereIs(iid); const p=P();
  I(iid).tapped=true;
  p.rooms[w.idx].splice(p.rooms[w.idx].indexOf(iid),1);
  p.rooms[toRoom].push(iid);
  logLine(`${p.name} moves a ${I(iid).faceup?D(iid).name:'facedown card'} from the ${ROOMS[w.idx]} to the ${ROOMS[toRoom]}.`);
  VIEW.sheet=null; render();
}
function fieldMove(iid, toIdx){
  snapshot();
  const w=whereIs(iid); const p=P();
  I(iid).tapped=true;
  p.fields[w.idx].splice(p.fields[w.idx].indexOf(iid),1);
  p.fields[toIdx].push(iid);
  logLine(`${D(iid).name} repositions to the ${['left','center','right'][toIdx]} field.`);
  VIEW.sheet=null; render();
}
function retreat(iid){
  snapshot();
  const w=whereIs(iid); const p=P();
  I(iid).tapped=true;
  p.fields[w.idx].splice(p.fields[w.idx].indexOf(iid),1);
  p.rooms[w.idx].push(iid); I(iid).faceup=true;
  logLine(`${D(iid).name} falls back into the ${ROOMS[w.idx]}.`);
  VIEW.sheet=null; render();
}

/* ================= raids =================
   Flow object drives multi-step combat UI.
   flow = {type:'raid', lane, raiders:[], stage, clash:{defenders, assign:{rid:target}}, ...} */
function canRaidFrom(lane){
  if(S.raided && S.raided[lane]) return false;
  return P().fields[lane].some(iid=>raidEligible(iid, lane));
}
function raidEligible(iid, lane){
  if(I(iid).tapped) return false;
  const arrivedThisTurn = I(iid).arrived === S.turn*2+S.active;
  if(arrivedThisTurn && !hasKw(iid,'frenzy')) return false;
  return isUnit(iid);
}
function startRaid(lane){
  VIEW.flow = {type:'raid', lane, raiders:[], flankers:[], stage:'select'};
  VIEW.sheet=null; render();
}
function toggleRaider(iid){
  const f=VIEW.flow; const w=whereIs(iid);
  const arr = (w.idx===f.lane)?f.raiders:f.flankers;
  const i=arr.indexOf(iid);
  if(i>=0) arr.splice(i,1); else arr.push(iid);
  render();
}
function launchRaid(){
  const f=VIEW.flow;
  const party=[...f.raiders, ...f.flankers];
  if(!party.length) return toast('Choose at least one raider');
  snapshot();
  S.raided = S.raided||{}; S.raided[f.lane]=true;
  const p=P(), o=OPP();
  for(const iid of f.flankers){ // flank: move into lane as part of the attack
    const w=whereIs(iid);
    p.fields[w.idx].splice(p.fields[w.idx].indexOf(iid),1);
    p.fields[f.lane].push(iid);
  }
  const oppLanePre = 2-f.lane;
  for(const iid of party){ I(iid).tapped=true; fireTriggerSync(iid,'raid',{auto:true, oppLane:oppLanePre}); }
  const laneNames=['left','center','right'];
  logLine(`⚔ ${p.name} raids from the ${laneNames[f.lane]} field with ${party.length} unit(s)!`, true);
  const oppLane = 2-f.lane;
  const defenders = o.fields[oppLane].filter(iid=>canDefend(iid));
  const bystanders = o.fields[oppLane].filter(iid=>isUnit(iid) && !canDefend(iid));
  f.party=party; f.oppLane=oppLane; f.defenders=defenders; f.bystanders=bystanders;
  if(defenders.length===0 && bystanders.length===0){
    logLine(`The ${laneNames[oppLane]} approach is undefended — the raiders pour through!`);
    startBreach(party, oppLane, f.lane);
    return;
  }
  // living bodies block the lane even tapped: there is always a clash if units are present
  f.stage='assign'; f.assign={};
  autoAssign(f);
  render();
}
function autoAssign(f){
  // greedy: spread raiders across defenders (biggest raider onto killable defender), then extras gang the biggest defender
  f.assign={};
  const rs=[...f.party].sort((a,b)=>stats(b).p-stats(a).p);
  const ds=[...f.defenders].sort((a,b)=>hp(b)-hp(a));
  let di=0;
  for(const r of rs){
    if(ds.length){ f.assign[r]=ds[di%ds.length]; di++; }
    else if(f.bystanders.length){ f.assign[r]=f.bystanders[0]; }
    else f.assign[r]=null;
  }
}
function validAssignment(f){
  // every defender must be engaged before tapped targets / unassigned allowed
  const engaged=new Set(Object.values(f.assign).filter(Boolean));
  const allDef=f.defenders.every(d=>engaged.has(d));
  if(allDef) return true;
  // if not all defenders engaged: no raider may target bystander or be unassigned — unless party smaller than defenders
  for(const r of f.party){ const t=f.assign[r];
    if(!t || f.bystanders.includes(t)) return false; }
  return true;
}
function resolveClash(){
  const f=VIEW.flow;
  if(!validAssignment(f)) return toast('Every defender must be engaged before hitting tapped units');
  const p=P(), o=OPP();
  // simultaneous: raiders hit targets; each defender hits one raider (auto-choice for flow)
  const dmgMap={};
  for(const r of f.party){ const t=f.assign[r]; if(t) dmgMap[t]=(dmgMap[t]||0)+stats(r).p; }
  for(const d of f.defenders){
    const target=pickDefStrike(d, f.party);
    if(target) dmgMap[target]=(dmgMap[target]||0)+stats(d,{defending:true}).p;
  }
  applyDamageMap(dmgMap);
  const laneNames=['left','center','right'];
  logLine(`Steel meets steel in the ${laneNames[f.oppLane]} lane.`);
  reapDead();
  if(S.phase==='over'){ VIEW.flow=null; render(); return; }
  // breakthrough only if NO living enemy unit remains in the lane — tapped bodies still block
  const survivorsD = o.fields[f.oppLane].filter(isUnit);
  const survivorsR = f.party.filter(iid=>alive(iid));
  if(survivorsD.length===0 && survivorsR.length){
    logLine(`The lane is cleared — ${survivorsR.length} raider(s) storm the castle!`, true);
    startBreach(survivorsR, f.oppLane, f.lane);
  } else {
    logLine(survivorsR.length? 'The raid is repelled — bodies still hold the lane.' : 'The raiding party is annihilated.');
    VIEW.flow=null; flushPending();
  }
}
function pickDefStrike(d, party){
  const alive_=party.filter(alive); if(!alive_.length) return null;
  const power=stats(d,{defending:true}).p;
  const killable=alive_.filter(r=>hp(r)<=power).sort((a,b)=>stats(b).p-stats(a).p);
  if(killable.length) return killable[0];
  return alive_.sort((a,b)=>stats(b).p-stats(a).p)[0];
}
function applyDamageMap(m){ for(const [iid,n] of Object.entries(m)){ I(iid).dmg+=n; } }
function alive(iid){ const w=whereIs(iid); return w && (w.zone==='field'||w.zone==='room') && hp(iid)>0; }
function reapDead(){
  // defender's dead are gathered first: if both Leaders would fall at once, the attacker's falls last
  for(const pi of [1-S.active, S.active]){ const p=S.players[pi];
    for(let z=0;z<3;z++){
      for(const arr of [p.rooms[z], p.fields[z]]){
        for(const iid of [...arr]){
          if(isUnit(iid) && hp(iid)<=0){
            arr.splice(arr.indexOf(iid),1);
            const d=D(iid);
            logLine(`${d.name} is slain.`);
            fireTriggerSync(iid,'demise',{auto:true});
            if(d.type==='leader'){ eliminate(pi, `${d.name}, Leader of ${p.name}, has fallen`); return; }
            p.discard.push(iid); I(iid).dmg=0; I(iid).tapped=false; I(iid).buffs=[];
          }
        }
      }
    }
  }
}

/* ================= breach ================= */
function startBreach(raiders, roomIdx, homeLane){
  const o=S.players[1-S.active];
  const room=o.rooms[roomIdx];
  logLine(`🏰 The ${ROOMS[roomIdx]} of ${o.name} is breached!`, true);
  if(room.length===0){ // an empty room cannot fall — nothing to sack
    logLine('…but the room stands empty. Nothing to sack.');
    finishBreach(roomIdx, homeLane, raiders); return;
  }
  // 1. reveal everything
  for(const iid of room){ if(!I(iid).faceup){ I(iid).faceup=true; logLine(`Revealed: ${D(iid).name}.`); } }
  // 2. traps MAY spring (owner's choice; prototype steward: hold vs chaff parties)
  const partyPower = raiders.reduce((a,r)=>a+stats(r).p,0);
  for(const iid of [...room]){
    const d=D(iid);
    if(d.type==='plot' && d.trap){
      if(partyPower<3 && raiders.length<2){ logLine(`${d.name} lies in wait — not worth springing on this rabble.`); continue; }
      logLine(`⚠ Trap! ${d.name} springs!`, true);
      runEffects(iid, (d.effects||[]).filter(e=>e.trigger==='trap'), {raiders, roomIdx, roomOwner:1-S.active, auto:true});
      room.splice(room.indexOf(iid),1); o.discard.push(iid);
      reapDead(); if(S.phase==='over'){ VIEW.flow=null; render(); return; }
    }
  }
  const liveRaiders = raiders.filter(alive);
  if(!liveRaiders.length){ logLine('The raiders perish among the traps.'); finishBreach(roomIdx, homeLane, raiders); return; }
  // 3. garrison clash — enters whenever units are present, so raiders can also
  // slaughter defenseless (tapped) occupants, the tapped Leader above all
  const garrison = room.filter(iid=>isUnit(iid) && canDefend(iid));
  const helpless = room.filter(iid=>isUnit(iid) && !canDefend(iid));
  if(garrison.length || helpless.length){
    VIEW.flow={type:'garrison', roomIdx, homeLane, party:liveRaiders, defenders:garrison,
      bystanders: room.filter(iid=>isUnit(iid)&&!canDefend(iid)), assign:{}, stage:'assign', raidersAll:raiders};
    autoAssign(VIEW.flow);
    render(); return;
  }
  roomFalls(roomIdx, homeLane, liveRaiders, raiders);
}
function resolveGarrison(){
  const f=VIEW.flow;
  if(!validAssignment(f)) return toast('Every garrison defender must be engaged first');
  const o=S.players[1-S.active];
  const dmgMap={};
  for(const r of f.party){ const t=f.assign[r]; if(t) dmgMap[t]=(dmgMap[t]||0)+stats(r).p; }
  for(const d of f.defenders){ const t=pickDefStrike(d,f.party); if(t) dmgMap[t]=(dmgMap[t]||0)+stats(d,{defending:true}).p; }
  applyDamageMap(dmgMap);
  logLine(`The garrison of the ${ROOMS[f.roomIdx]} fights in the halls.`);
  reapDead(); if(S.phase==='over'){ VIEW.flow=null; render(); return; }
  const survG=o.rooms[f.roomIdx].filter(iid=>isUnit(iid)&&canDefend(iid));
  const survR=f.party.filter(alive);
  if(!survG.length && survR.length) roomFalls(f.roomIdx, f.homeLane, survR, f.raidersAll);
  else { logLine(survR.length?'The garrison holds! The raid is repelled — but the room lies exposed.':'The raiders die in the halls.');
         finishBreach(f.roomIdx, f.homeLane, f.raidersAll); }
}
function roomFalls(roomIdx, homeLane, survivors, allRaiders){
  const o=S.players[1-S.active];
  logLine('💥 '+BREACH_TEXT[roomIdx], true);
  if(roomIdx===0){ // crypt: exile all discard
    o.exile.push(...o.discard); o.discard=[];
  } else if(roomIdx===1){ // keep: mill 3
    for(let k=0;k<3;k++){ if(o.deck.length) o.discard.push(o.deck.pop()); }
    if(!o.deck.length){} // deck-out only on draw
  } else { // gatehouse: random discard
    if(o.hand.length){ const j=Math.floor(Math.random()*o.hand.length);
      const c=o.hand.splice(j,1)[0]; o.discard.push(c);
      logLine(`${o.name} discards ${D(c).name}.`); }
  }
  // breach riders on surviving raiders
  for(const r of survivors){ fireTriggerSync(r,'breached',{roomIdx, roomOwner:1-S.active, auto:true}); }
  reapDead();
  finishBreach(roomIdx, homeLane, allRaiders);
}
function finishBreach(roomIdx, homeLane, raiders){
  // survivors were never moved in the data model — they simply stand tapped at home
  VIEW.flow=null;
  if(S.phase!=='over') logLine('The raiders slip back to their lines.');
  flushPending();
}
function flushPending(){
  if(S.phase==='over' || !S.pendingFx || !S.pendingFx.length){ render(); return; }
  const fx=S.pendingFx.shift();
  runEffects(fx.iid, [fx.e], {}, ()=>flushPending());
}

/* ================= sneak ================= */
function canSneak(iid){ return hasKw(iid,'sneak') && !I(iid).tapped && whereIs(iid).zone==='field'
  && !(I(iid).arrived===S.turn*2+S.active && !hasKw(iid,'frenzy')); }
function startSneak(iid){
  VIEW.flow={type:'sneakpick', unit:iid}; VIEW.sheet=null; render();
}
function sneakInto(iid, roomIdx){
  snapshot();
  I(iid).tapped=true;
  logLine(`🗡 ${D(iid).name} slips past the walls into the ${ROOMS[roomIdx]}!`, true);
  VIEW.flow=null;
  startBreach([iid], roomIdx, null);
}

/* ================= plots ================= */
function roomCount(iid){ const w=whereIs(iid); return S.players[w.pi].rooms[w.idx].length-1; } // others
function canSpring(iid){
  const d=D(iid); if(d.type!=='plot'||d.trap) return false;
  const w=whereIs(iid); if(!w||w.zone!=='room'||w.pi!==S.active) return false;
  if((d.scheme||0) > roomCount(iid)) return false;
  const roomMates=S.players[w.pi].rooms[w.idx].filter(x=>x!==iid && !I(x).tapped).length;
  if((d.tribute||0) > roomMates) return false;
  return true;
}
function springPlot(iid){
  const d=D(iid); const w=whereIs(iid); const p=P();
  snapshot();
  // reserve tribute up front (facedown workers first) — a card is mana OR tribute, never both
  const reserved=p.rooms[w.idx].filter(x=>x!==iid&&!I(x).tapped)
    .sort((a,b)=>(I(a).faceup?1:0)-(I(b).faceup?1:0)).slice(0, d.tribute||0);
  if(reserved.length < (d.tribute||0)){ UNDO.pop(); return toast('Not enough untapped cards in the room for Tribute'); }
  startPayment(fullCost(d), `Spring ${d.name}`, ()=>{
    for(const t of reserved){ I(t).tapped=true; }
    if(d.tribute) logLine(`${d.tribute} conspirator(s) tap in tribute.`);
    I(iid).faceup=true;
    logLine(`◉ ${p.name} springs the plot: ${d.name}!`, true);
    p.rooms[w.idx].splice(p.rooms[w.idx].indexOf(iid),1);
    runEffects(iid, (d.effects||[]).filter(e=>e.trigger==='sprung'), {roomIdx:w.idx, roomOwner:I(iid).owner}, ()=>{
      p.discard.push(iid);
      reapDead(); render();
    });
  }, [iid, ...reserved]);
}

/* ================= effects interpreter ================= */
function fireTrigger(iid, trig, done, ctx){
  const es=(D(iid).effects||[]).filter(e=>e.trigger===trig);
  if(!es.length){ if(done) done(); return; }
  runEffects(iid, es, ctx||{}, done);
}
function fireTriggerSync(iid, trig, ctx){ fireTrigger(iid, trig, null, ctx); }
function scaleN(e, iid, ctx){
  if(e.n==='count_room'){ const w=ctx.roomIdx!==undefined?{pi:I(iid).owner, idx:ctx.roomIdx}:whereIs(iid);
    return S.players[I(iid).owner].rooms[w.idx?w.idx:0].length; }
  return e.n||0;
}
function runEffects(iid, effects, ctx, done){
  const owner=I(iid).owner; const p=S.players[owner], o=S.players[1-owner];
  const queue=[...effects];
  const step=()=>{
    if(!queue.length){ if(done) done(); else render(); return; }
    const e=queue.shift();
    const n = (typeof e.n==='string')? evalScale(e.n, iid, ctx) : (e.n||0);
    switch(e.op){
      case 'buff': {
        if(e.duration==='static') break; // statics handled in stats()
        applyToTargets(e, iid, ctx, t=>{ I(t).buffs.push({p:e.p||0,h:e.h||0,duration:'turn'}); }, step); return; }
      case 'damage': applyToTargets(e, iid, ctx, t=>{ I(t).dmg+=n; logLine(`${D(iid).name} deals ${n} to ${D(t).name}.`); reapDead(); }, step); return;
      case 'heal': applyToTargets(e, iid, ctx, t=>{ I(t).dmg=Math.max(0,I(t).dmg-n); logLine(`${D(t).name} is healed ${n}.`); }, step); return;
      case 'draw': draw(owner,n); logLine(`${p.name} draws ${n}.`); break;
      case 'mill': { const who=(e.who==='self')?p:o; for(let k=0;k<n;k++) if(who.deck.length) who.discard.push(who.deck.pop());
        logLine(`${who.name}'s deck loses its top ${n}.`); break; }
      case 'discard_random': { const who=(e.who==='self')?p:o; for(let k=0;k<n;k++){ if(!who.hand.length) break;
        const j=Math.floor(Math.random()*who.hand.length); const c=who.hand.splice(j,1)[0]; who.discard.push(c);
        logLine(`${who.name} discards ${D(c).name}.`);} break; }
      case 'exile_discard': { const who=(e.who==='self')?p:o;
        if(e.n==='all'||n>=who.discard.length){ who.exile.push(...who.discard); who.discard=[]; logLine(`${who.name}'s discard pile is exiled.`); }
        else { for(let k=0;k<n;k++) if(who.discard.length) who.exile.push(who.discard.pop()); logLine(`${n} card(s) exiled from ${who.name}'s discard.`);} break; }
      case 'recover': { const pool=p.discard.filter(c=>e.filter==='any'||D(c).type===(e.filter==='unit'?'unit':'plot'));
        if(!pool.length){ logLine('Nothing to recover.'); break; }
        if(ctx.auto){ // combat-time: auto-pick the highest-cost card(s), no UI
          const best=[...pool].sort((a,b)=>(D(b).cost.generic+D(b).cost.colored)-(D(a).cost.generic+D(a).cost.colored)).slice(0,n||1);
          for(const c of best){ p.discard.splice(p.discard.indexOf(c),1);
            if(e.to==='hand') p.hand.push(c); else { I(c).faceup=true; p.rooms[1].push(c); }
            logLine(`${p.name} recovers ${D(c).name}.`); }
          break; }
        // choose up to n via picker
        pickFromList(pool, Math.min(n||1,pool.length), `Recover from your discard`, chosen=>{
          for(const c of chosen){ p.discard.splice(p.discard.indexOf(c),1);
            if(e.to==='hand'){ p.hand.push(c); }
            else { I(c).faceup=true; p.rooms[1].push(c); }
            logLine(`${p.name} recovers ${D(c).name} to ${e.to==='hand'?'hand':'the Keep'}.`); }
          step(); });
        return; }
      case 'untap': { pickTargets('friendly_tapped', n, iid, ctx, ts=>{ for(const t of ts){ I(t).tapped=false; logLine(`${D(t).name} untaps.`);} step(); }); return; }
      case 'foresee': { if(ctx.auto){ S.pendingFx.push({iid, e}); logLine(`${D(iid).name} will foresee once the dust settles.`); break; }
        foreseeUI(owner, n, step); return; }
      case 'peek': { const cands=[]; for(let r=0;r<3;r++) for(const c of o.rooms[r]) if(!I(c).faceup) cands.push(c);
        if(!cands.length){ logLine('No facedown cards to spy on.'); break; }
        pickFromList(cands, Math.min(n||1,cands.length), 'Spy on facedown cards', chosen=>{
          VIEW.reveal={cards:chosen.map(c=>byId[I(c).cid]), title:'Your spies report:'};
          logLine(`${p.name} peeks at ${chosen.length} facedown card(s).`); step(); }); return; }
      case 'summon': { const pool=p.hand.filter(c=>D(c).type==='unit' && (!e.maxCost || (D(c).cost.generic+D(c).cost.colored)<=e.maxCost));
        if(!pool.length){ logLine('No unit to summon.'); break; }
        pickFromList(pool, 1, 'Summon a unit for free', chosen=>{
          const c=chosen[0]; p.hand.splice(p.hand.indexOf(c),1); I(c).faceup=true;
          if(e.to==='lane'){ I(c).arrived=S.turn*2+S.active; p.fields[1].push(c); }
          else p.rooms[ctx.roomIdx!==undefined?ctx.roomIdx:1].push(c);
          logLine(`${D(c).name} answers the call!`); step(); }); return; }
      case 'move_free': break; // niche; skipped in v1 engine (validator strips)
      default: break;
    }
    step();
  };
  step();
}
function evalScale(expr, iid, ctx){
  const w = ctx.roomIdx!==undefined ? {pi:I(iid).owner, idx:ctx.roomIdx} : whereIs(iid);
  const roomLen = (w && w.idx!==undefined && w.idx>=0 && S.players[w.pi||I(iid).owner].rooms[w.idx]) ? S.players[w.pi||I(iid).owner].rooms[w.idx].length : 0;
  if(expr==='count_room') return roomLen;
  if(expr==='count_room_half') return Math.ceil(roomLen/2);
  return 0;
}
/* target application: immediate for group targets, picker for chosen ones */
function applyToTargets(e, iid, ctx, fn, done){
  const owner=I(iid).owner; const o=S.players[1-owner]; const p=S.players[owner];
  const t=e.target;
  const run=(list)=>{ for(const x of list) fn(x); done(); };
  if(t==='self') return run([iid]);
  if(t==='raiders' && ctx.raiders) return run(ctx.raiders.filter(alive));
  if(t==='units_in_room' && ctx.roomIdx!==undefined){
    const ro = ctx.roomOwner!==undefined ? S.players[ctx.roomOwner] : o;
    return run(ro.rooms[ctx.roomIdx].filter(isUnit)); }
  if(t==='all_friendly_units'){ const l=[]; for(let z=0;z<3;z++){ l.push(...p.fields[z].filter(isUnit), ...p.rooms[z].filter(x=>isUnit(x)&&I(x).faceup)); } return run(l); }
  if(t==='units_in_lane'){ // choose one enemy battlefield space
    VIEW.picking={kind:'lane', owner:1-owner, label:`${D(iid).name}: choose an enemy battlefield space`, onPick:(idx)=>{
      VIEW.picking=null; run(o.fields[idx].filter(isUnit)); }};
    render(); return; }
  if(t==='enemy_leader'){ const li=o.leader; const w=whereIs(li);
    if(w && I(li).faceup) return run([li]); logLine('The enemy Leader is hidden.'); return done(); }
  // chosen unit targets
  if(ctx.auto){
    const cands=[];
    for(let pi=0;pi<2;pi++){ const pp=S.players[pi];
      for(let z=0;z<3;z++) for(const c of [...pp.fields[z], ...pp.rooms[z]]){
        if(!isUnit(c)||!I(c).faceup) continue;
        if(t==='friendly_unit'&&pi===owner) cands.push(c);
        if(t==='enemy_unit'&&pi!==owner) cands.push(c);
      } }
    if(!cands.length){ logLine('No legal target.'); return done(); }
    let pickIid;
    if(t==='friendly_unit') pickIid=cands.sort((a,b)=>I(b).dmg-I(a).dmg)[0]; // most wounded ally
    else { const laneC=(ctx.oppLane!==undefined)?cands.filter(c=>{const cw=whereIs(c); return cw.zone==='field'&&cw.idx===ctx.oppLane;}):[];
      const poolC=laneC.length?laneC:cands;
      pickIid=poolC.sort((a,b)=>hp(a)-hp(b))[0]; } // weakest enemy, prefer the contested lane
    return run([pickIid]);
  }
  pickTargets(t, 1, iid, ctx, ts=>{ run(ts); });
}
function pickTargets(kind, n, srcIid, ctx, cb){
  const owner=I(srcIid).owner;
  const cands=[];
  for(let pi=0;pi<2;pi++){ const pp=S.players[pi];
    for(let z=0;z<3;z++){
      for(const c of [...pp.fields[z], ...pp.rooms[z]]){
        if(!isUnit(c)) continue;
        if(!I(c).faceup) continue; // facedown untargetable
        if(kind==='friendly_unit' && pi===owner) cands.push(c);
        if(kind==='enemy_unit' && pi!==owner) cands.push(c);
        if(kind==='friendly_tapped' && pi===owner && I(c).tapped) cands.push(c);
      } } }
  if(!cands.length){ logLine('No legal target.'); cb([]); return; }
  pickFromList(cands, Math.min(n,cands.length), 'Choose target', cb);
}
function pickFromList(cands, n, title, cb){
  VIEW.picking={kind:'list', cands, n, title, chosen:[], onDone:cb};
  render();
}
function foreseeUI(pi, n, done){
  const p=S.players[pi];
  const top=p.deck.slice(-n).reverse(); // top of deck = end of array
  VIEW.picking={kind:'foresee', cards:top, decided:[], n, onDone:(arr)=>{
    // arr = [{iid, where:'top'|'bottom'}] in chosen order
    for(const c of top) p.deck.splice(p.deck.indexOf(c),1);
    const tops=arr.filter(x=>x.where==='top').map(x=>x.iid);
    const bots=arr.filter(x=>x.where==='bottom').map(x=>x.iid);
    for(const c of [...tops].reverse()) p.deck.push(c);      // first chosen = topmost
    for(const c of bots) p.deck.unshift(c);
    logLine(`${p.name} foresees ${n}.`);
    VIEW.picking=null; done(); }};
  render();
}
</script>
<script>
/* ================= rendering ================= */
const app=document.getElementById('app');
const overlays=document.getElementById('overlays');
function esc(s){ return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function toast(msg){ VIEW.toast=msg; render(); setTimeout(()=>{ if(VIEW.toast===msg){ VIEW.toast=null; render(); } }, 2200); }

function miniHTML(iid, opts){
  const inst=I(iid); const d=D(iid);
  const mine = inst.owner===viewer();
  const showFace = inst.faceup || (mine && !(opts&&opts.hideOwn));
  const cls=['mini'];
  if(!inst.faceup && !showFace){ cls.push('dn'); }
  else if(!inst.faceup && showFace){ cls.push('dn'); } // own facedown still shows back in grid; peek via sheet
  else cls.push(d.color);
  if(inst.tapped) cls.push('tapped');
  if(d.type==='leader') cls.push('leader');
  if(d.type==='plot' && inst.faceup) cls.push('plotcard');
  const st = isUnit(iid)? stats(iid):null;
  const hurt = st && inst.dmg>0;
  if(hurt) cls.push('hurt');
  const ph = st? `<span class="ph num">${st.p}/${Math.max(0,st.h-inst.dmg)}</span>`:'';
  const nm = inst.faceup? esc(d.name) : (mine? '🂠' : '');
  return `<div class="${cls.join(' ')}" data-i="${iid}">
    <span class="mn">${inst.faceup?esc(d.name):''}</span>${inst.faceup?ph:''}
    ${inst.faceup?`<span class="cost num">${costStr(fullCost(d))}</span>`:''}
  </div>`;
}
function cellHTML(pi, zone, idx){
  const p=S.players[pi];
  const arr = zone==='room'? p.rooms[idx] : p.fields[idx];
  const mine = pi===S.active;
  const labels = zone==='room' ? ROOMS : ['Field','Field','Field'];
  const zh = zone==='room' ? `<span class="zonehint">→ ${ZONE_OF_ROOM[idx]}${idx===1?` (${p.deck.length})`:idx===0?` (${p.discard.length})`:` (${p.hand.length})`}</span>`:'';
  const hot = cellIsHot(pi, zone, idx) ? ' hot':'';
  const pick = cellIsPick(pi, zone, idx) ? ' pick':'';
  return `<div class="cell ${zone==='room'?'room':''} ${mine?'':'enemy'}${hot}${pick}" data-cell="${pi}:${zone}:${idx}">
    <div class="cellname"><span>${labels[idx]}</span> ${zh}</div>
    <div class="stack">${arr.map(iid=>miniHTML(iid)).join('')||'<span style="color:var(--muted);font-size:10px">—</span>'}</div>
  </div>`;
}
function cellIsHot(pi, zone, idx){
  const f=VIEW.flow;
  if(f && f.type==='raid' && f.stage==='select' && pi===S.active && zone==='field') return idx===f.lane || Math.abs(idx-f.lane)===1;
  return false;
}
function cellIsPick(pi, zone, idx){
  const pk=VIEW.picking;
  if(pk && pk.kind==='lane' && pi===pk.owner && zone==='field') return true;
  const f=VIEW.flow;
  if(f && f.type==='sneakpick' && pi!==S.active && zone==='room') return true;
  return false;
}
function boardHTML(){
  const me=viewer(), op=1-viewer();
  // opponent rows are mirrored: their rooms render right-to-left from my perspective
  const oppOrder=[2,1,0];
  return `<div class="board">
    <div class="rowlabel"><span class="eyebrow">${esc(S.players[op].name)} — ${COLORS[S.players[op].color]} castle</span>
      <span class="eyebrow num">hand ${S.players[op].hand.length} · deck ${S.players[op].deck.length}</span></div>
    <div class="brow">${oppOrder.map(i=>cellHTML(op,'room',i)).join('')}</div>
    <div class="brow">${oppOrder.map(i=>cellHTML(op,'field',i)).join('')}</div>
    <div class="midline"></div>
    <div class="brow">${[0,1,2].map(i=>cellHTML(me,'field',i)).join('')}</div>
    <div class="brow">${[0,1,2].map(i=>cellHTML(me,'room',i)).join('')}</div>
    <div class="rowlabel"><span class="eyebrow">Your castle — ${COLORS[S.players[me].color]}</span>
      <span class="eyebrow">crypt · keep · gatehouse</span></div>
  </div>`;
}
function statusHTML(){
  const p=P();
  const busy=VIEW.aiBusy?`<span class="pill" style="border-color:var(--hurt);color:var(--hurt)">The Rival is scheming…</span>`:'';
  return `<div class="statusline">
    <b class="num">Turn ${S.turn}</b>
    <span class="pill">${esc(p.name)}</span>${busy}
    <span>${p.mustered? 'castle card placed':'castle card available'}</span>
    <span class="num">hand ${S.players[viewer()].hand.length}</span>
  </div>`;
}
function trayHTML(){
  const p=S.players[viewer()];
  return `<div class="tray"><div class="tray-inner">
    <div class="tray-head">
      <span class="eyebrow">Your hand — tap a card</span>
      <span style="display:flex;gap:6px">
        <button class="chip" id="btnUndo" ${VIEW.aiBusy?'disabled':''}>Undo</button>
        <button class="chip primary" id="btnEnd" ${VIEW.aiBusy?'disabled':''}>End turn</button>
      </span>
    </div>
    <div class="handrow">${p.hand.map((iid,ix)=>{
      const d=D(iid);
      return `<button class="hcard ${d.color}" data-h="${ix}">
        <span class="hn">${esc(d.name)}</span>
        <span class="ht">${d.type}${d.trap?' · trap':''}</span>
        <span class="hb"><span class="num">${costStr(fullCost(d))}</span>${isUnitDef(d)?`<span class="num">${d.power}/${d.health}</span>`:''}</span>
      </button>`; }).join('')||'<span style="color:var(--muted);font-size:13px;padding:8px">No cards in hand</span>'}</div>
  </div></div>`;
}
function isUnitDef(d){ return d.type==='unit'||d.type==='leader'; }
function logHTML(){
  const items=S.log.slice(-40).map(l=>`<li class="${l.hl?'hl':''}">${esc(l.t)}</li>`).reverse().join('');
  return `<div class="logwrap"><h3 class="disp">Chronicle</h3><ul id="log">${items}</ul></div>`;
}

function render(){
  if(!S){ renderSetup(); return; }
  if(S.phase==='setup'){ renderLeaderSetup(); return; }
  if(S.phase==='over'){ renderGame(); renderVictory(); return; }
  renderGame();
}
function renderGame(){
  app.innerHTML = `
    <div class="topbar">
      <span class="brand">House <em>of</em> Knives</span>
      <span class="topbtns">
        <button class="chip" id="btnHelp">Rules</button>
        <button class="chip" id="btnTheme">◐</button>
      </span>
    </div>
    ${statusHTML()}
    ${boardHTML()}
    ${raidBarHTML()}
    ${logHTML()}
    <div class="spacer"></div>
    ${S.phase==='main'?trayHTML():''}`;
  overlays.innerHTML = sheetHTML() + flowHTML() + pickingHTML() + revealHTML() + (VIEW.toast?`<div class="toast">${esc(VIEW.toast)}</div>`:'');
  wire();
}
function raidBarHTML(){
  if(S.phase!=='main' || S.active!==viewer()) return '';
  const names=['left','center','right'];
  const btns=[0,1,2].map(i=>{
    const used=S.raided&&S.raided[i];
    const can=canRaidFrom(i);
    return `<button class="chip" data-raid="${i}" ${(!can||used)?'disabled':''}>${used?'✓ raided':'⚔ raid'} ${names[i]}</button>`;
  }).join('');
  const sneaks=[];
  for(let z=0;z<3;z++) for(const iid of P().fields[z]) if(canSneak(iid)) sneaks.push(iid);
  const sneakBtn = sneaks.length? `<button class="chip" id="btnSneak">🗡 Sneak (${sneaks.length})</button>`:'';
  return `<div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;justify-content:center">${btns}${sneakBtn}</div>`;
}

/* ---------- sheets: card/cell inspection & actions ---------- */
function openCell(pi, zone, idx){
  VIEW.sheet={kind:'cell', pi, zone, idx}; render();
}
function bigCardHTML(iid, showFace){
  const inst=I(iid); const d=D(iid);
  if(!showFace) return `<div class="bigcard"><div class="bch"><span class="bcn">Facedown card</span></div>
    <div class="bcx">Taps for 1 Gold. Hidden from your enemy${inst.owner===viewer()?'':' — and from you'}.</div></div>`;
  const st=isUnit(iid)?stats(iid):null;
  return `<div class="bigcard ${d.color}">
    <div class="bch"><span class="bcn">${esc(d.name)}</span><span class="num" style="font-weight:600">${costStr(fullCost(d))}</span></div>
    <div class="bct">${COLORS[d.color]} ${d.type}${d.trap?' — TRAP':''}${d.scheme?` · Scheme ${d.scheme}`:''}${d.tribute?` · Tribute ${d.tribute}`:''}</div>
    ${(d.keywords&&d.keywords.length)?`<div class="klist">${d.keywords.map(k=>`<span class="kw">${k}</span>`).join('')}</div>`:''}
    <div class="bcx">${esc(d.text||'')}</div>
    ${st?`<div class="bcs num">${st.p} power · ${Math.max(0,st.h-inst.dmg)}/${st.h} health${inst.tapped?' · tapped':''}</div>`:''}
    ${d.flavor?`<div class="bcf">${esc(d.flavor)}</div>`:''}
  </div>`;
}
function sheetHTML(){
  const sh=VIEW.sheet; if(!sh) return '';
  if(sh.kind==='cell'){
    const p=S.players[sh.pi];
    const arr = sh.zone==='room'? p.rooms[sh.idx] : p.fields[sh.idx];
    const mine = sh.pi===viewer();
    const title = sh.zone==='room'? `${ROOMS[sh.idx]} — ${mine?'your':esc(p.name)+"'s"} castle` : `${['Left','Center','Right'][sh.idx]} field — ${mine?'yours':esc(p.name)}`;
    const sub = sh.zone==='room'? `Breached: ${BREACH_TEXT[sh.idx].split(': ')[1]}` : 'Lane-locked: this space clashes straight across the midline.';
    const cards = arr.length? arr.map(iid=>{
      const showFace = I(iid).faceup || mine;
      return `<div data-insp="${iid}">${bigCardHTML(iid, showFace)}
        ${mine && S.phase==='main' && S.active===sh.pi && !VIEW.aiBusy ? actionRowHTML(iid, sh) : ''}</div>`;
    }).join('') : '<p class="sub">Empty.</p>';
    let zoneBtns='';
    if(sh.zone==='room'){
      if(sh.idx===0) zoneBtns=`<div class="acts">
        <button class="act" data-zv="${sh.pi}:discard"><b>View ${mine?'your':'their'} discard pile (${p.discard.length})</b><small>Discards are public — anyone may read them</small></button>
        ${p.exile.length?`<button class="act" data-zv="${sh.pi}:exile"><b>View exiled cards (${p.exile.length})</b><small>Cast out of the game</small></button>`:''}</div>`;
      if(sh.idx===1) zoneBtns=`<p class="sub">Deck: ${p.deck.length} cards — facedown and private, as at a table.</p>`;
      if(sh.idx===2) zoneBtns=mine?'':`<p class="sub">Hand: ${p.hand.length} cards — hidden, as at a table.</p>`;
    }
    return `<div class="scrim" data-close="1"><div class="sheet">
      <h3 class="disp">${title}</h3><p class="sub">${sub}</p>${cards}${zoneBtns}
      ${mine&&sh.zone==='room'&&!P().mustered&&P().hand.length?`<button class="act" id="fromHandHere"><b>Place a card from hand here</b><small>Your one free castle placement this turn</small></button>`:''}

        .concat([`<button class="act" data-mv="retreat"><b>Retreat into the ${ROOMS[w.idx]}</b><small>falls back faceup into your castle</small></button>`]);

      <h3 class="disp">Move where?</h3><p class="sub">Moving taps this card — that is its action for the turn.</p>
      <div class="acts">${opts.join('')}</div></div></div>`;
  }
  if(sh.kind==='zone'){
    const p=S.players[sh.pi]; const arr=sh.z==='discard'?p.discard:p.exile;
    const who = sh.pi===viewer()?'Your':esc(p.name)+"'s";
    return `<div class="scrim" data-close="1"><div class="sheet">
      <h3 class="disp">${who} ${sh.z==='discard'?'discard pile':'exiled cards'} <span class="num">(${arr.length})</span></h3>

      <div class="acts"><button class="act" data-close="1"><b>Close</b></button></div>
    </div></div>`;
  }
  if(sh.kind==='help') return helpSheet();
  return '';
}
function actionRowHTML(iid, sh){
  const inst=I(iid); const d=D(iid);
  if(inst.tapped) return `<p class="sub">Tapped — no action left this turn.${hasKw(iid,'bulwark')?' (Bulwark: still defends.)':''}</p>`;
  const acts=[];
  if(sh.zone==='room'){
    if(!inst.faceup) acts.push(`<button class="act" data-act="reveal" data-i="${iid}"><b>Tap &amp; reveal</b><small>Flip faceup (rides on a tap) — abilities live, taps for its color</small></button>`);
    acts.push(`<button class="act" data-act="move" data-i="${iid}"><b>Move to an adjacent room</b><small>Uses its tap</small></button>`);
    if(isUnit(iid)) acts.push(`<button class="act" data-act="deployC" data-i="${iid}"><b>Deploy to the ${['left','center','right'][sh.idx]} field</b><small>Pay ${costStr(fullCost(d))} — marches out of its own column</small></button>`);
    if(canSpring(iid)) acts.push(`<button class="act" data-act="spring" data-i="${iid}"><b>◉ Spring this plot</b><small>Pay ${costStr(fullCost(d))}${d.tribute?` + tap ${d.tribute} roommate(s)`:''}</small></button>`);
    else if(d.type==='plot'&&!d.trap&&inst.owner===S.active&&(d.scheme||0)>roomCount(iid))
      acts.push(`<p class="sub">Scheme ${d.scheme}: needs ${d.scheme} other cards in this room (has ${roomCount(iid)}).</p>`);
  } else {
    acts.push(`<button class="act" data-act="move" data-i="${iid}"><b>Reposition / retreat</b><small>Uses its tap — no attack</small></button>`);
    if(canSneak(iid)) acts.push(`<button class="act" data-act="sneak" data-i="${iid}"><b>🗡 Sneak into a room</b><small>Bypass the battlefield entirely</small></button>`);
  }
  return `<div class="acts">${acts.join('')}</div>`;
}

/* ---------- flow modals ---------- */
function flowHTML(){
  const f=VIEW.flow; if(!f) return '';
  if(f.type==='raid' && f.stage==='select'){
    const lanes=['left','center','right'];
    const elig = P().fields[f.lane].filter(iid=>raidEligible(iid,f.lane));
    const flankSrc = [0,1,2].filter(i=>Math.abs(i-f.lane)===1)
      .flatMap(i=>P().fields[i].filter(iid=>raidEligible(iid,i)));
    const row=(iid,arr)=>{ const on=arr.includes(iid); const st=stats(iid);
      return `<button class="act" data-tr="${iid}" style="${on?'outline:2px solid var(--good)':''}"><b>${esc(D(iid).name)}</b> <span class="num">${st.p}/${hp(iid)}</span><small>${arr===VIEW.flow.flankers?'flanks in from the adjacent field':'in the raiding lane'}${on?' — joining':''}</small></button>`; };
    return `<div class="scrim"><div class="sheet">
      <h3 class="disp">Raid — ${lanes[f.lane]} lane</h3>
      <p class="sub">Choose raiders. They tap to attack; flankers move &amp; attack as one action. The clash crosses the midline into ${esc(OPP().name)}'s ${lanes[2-f.lane]} field, behind which stands their ${ROOMS[2-f.lane]}.</p>
      ${elig.map(iid=>row(iid,f.raiders)).join('')}
      ${flankSrc.map(iid=>row(iid,f.flankers)).join('')}
      <div class="acts">
        <button class="act" id="goRaid"><b>⚔ Launch the raid (${f.raiders.length+f.flankers.length})</b></button>
        <button class="act" id="cancelFlow"><b>Cancel</b></button>
      </div></div></div>`;
  }
  if((f.type==='raid'&&f.stage==='assign') || f.type==='garrison'){
    const isG=f.type==='garrison';
    const tgt=(r)=>{ const cur=f.assign[r];
      const opts=[...f.defenders, ...f.bystanders].map(d=>{
        const st=stats(d,{defending:true});
        return `<button class="chip" data-as="${r}:${d}" style="${cur===d?'background:var(--ink);color:var(--bg)':''}">${esc(D(d).name)} ${st.p}/${hp(d)}${f.bystanders.includes(d)?' (tapped)':''}</button>`; }).join('');
      return `<div style="margin:8px 0;padding:8px;border:1px solid var(--line);border-radius:10px">
        <b>${esc(D(r).name)}</b> <span class="num">${stats(r).p}/${hp(r)}</span> strikes →<br>
        <div style="display:flex;gap:5px;flex-wrap:wrap;margin-top:5px">${opts||'<span class="sub">no targets</span>'}</div></div>`; };
    return `<div class="scrim"><div class="sheet">
      <h3 class="disp">${isG?`Garrison clash — the ${ROOMS[f.roomIdx]}`:'The lane clash'}</h3>
      <p class="sub">Assign each raider a target. Every ${isG?'garrison defender':'defender'} must be engaged before tapped bystanders may be struck. Defenders strike back simultaneously.</p>
      ${f.party.filter(alive).map(tgt).join('')}
      <div class="acts">
        <button class="act" id="autoAsn"><b>Auto-assign</b></button>
        <button class="act" id="fight"><b>⚔ Fight!</b></button>
      </div></div></div>`;
  }
  if(f.type==='sneakpick'){
    return `<div class="scrim"><div class="sheet">
      <h3 class="disp">🗡 Sneak — choose a room to infiltrate</h3>
      <p class="sub">${esc(D(f.unit).name)} slips past the battlefield. Tap a glowing enemy room on the board, or cancel.</p>
      <div class="roomopt">${[0,1,2].map(r=>`<button class="act" data-sn="${r}"><b>${ROOMS[r]}</b><small>${esc(OPP().name)}'s ${ZONE_OF_ROOM[r]}</small></button>`).join('')}</div>
      <div class="acts"><button class="act" id="cancelFlow"><b>Cancel</b></button></div></div></div>`;
  }
  return '';
}

  if(!S.revealDone){
    app.innerHTML=`<div class="topbar"><span class="brand">House <em>of</em> Knives</span></div>
      <div style="max-width:560px;margin:0 auto">
      <p class="eyebrow">The Houses present their Leaders</p>
      <h1 class="disp" style="font-size:24px;line-height:1.15">Know your enemy's face. You will not know their address.</h1>

      <p style="color:var(--ink2);font-size:14px">Each Leader now goes into its owner's hand. It may be hidden among the opening castle cards — or held back. The crown's face is public; its address is the first bluff.</p>

    <p class="eyebrow">${esc(p.name)} — seed your castle</p>

    <p style="color:var(--ink2);font-size:14px">Your Leader may take a room — or stay in your hand. Then you refill to five${pi>0?` (+${pi} for going ${['first','second','third','fourth'][pi]})`:''}.</p>

  const g=document.getElementById('ogo');
  if(g) g.onclick=()=>{

function helpSheet(){
  return `<div class="scrim" data-close="1"><div class="sheet helpbody">

    <p>When your deck runs empty, your Leader no longer untaps — an exhausted King is a waiting target.</p>

    <p>Plots hide among your workers and tap for Gold like anything else. Spring one by paying its cost with enough cards gathered in its room (<span class="kw">Scheme N</span>). <span class="kw">Trap</span> plots spring free when their room is breached. Plots are always consumed.</p>

    <p><span class="kw" style="border-color:var(--W)">Bulwark</span> White: defends while tapped. <span class="kw" style="border-color:var(--U)">Foresee</span> Blue: sees &amp; orders the deck. <span class="kw" style="border-color:var(--B)">Sneak</span> Black: infiltrates rooms directly. <span class="kw" style="border-color:var(--R)">Frenzy</span> Red: raids the turn it arrives. <span class="kw" style="border-color:var(--G)">Overgrow</span> Green: extra castle placements.</p>
    <div class="acts"><button class="act" data-close="1"><b>Close</b></button></div>
  </div></div>`;
}

  overlays.querySelectorAll('[data-act]').forEach(el=>el.onclick=()=>{

    if(act==='spring') springPlot(iid);

  });
  overlays.querySelectorAll('[data-a]').forEach(el=>el.onclick=()=>{

function wireTheme(){
  const b=document.getElementById('btnTheme');
  if(b) b.onclick=()=>{ const r=document.documentElement;
    const cur=r.dataset.theme|| (matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');
    r.dataset.theme = cur==='dark'?'light':'dark'; };
}
const FACTION_BLURB={W:'The shield-wall. Garrisons that defend even tapped.',U:'The spymaster. Sees the deck, exposes schemes.',B:'The underworld. Sneaks past walls; raises the dead.',R:'The torch. Strikes the turn it arrives.',G:'The wild growth. Out-builds the one-card law.'};

/* ---------- boot ---------- */
window.KC_INIT = function(cards, decks){
  CARDS = cards; DECKS = decks;
  for(const c of CARDS) byId[c.id]=c;
  initHover();
  render();
};
/* mouseover preview: a big card follows the pointer on desktop.
   Never leaks: enemy facedown cards preview as a card back only. */
function initHover(){
  if(!matchMedia('(hover:hover) and (pointer:fine)').matches) return;
  const hc=document.createElement('div'); hc.id='hovercard'; document.body.appendChild(hc);
  const iidOf=(el)=>{
    const t=el.closest('[data-i],[data-h],[data-pl],[data-tr]');
    if(!t) return null;
    if(t.dataset.i) return t.dataset.i;
    if(t.dataset.pl) return t.dataset.pl;
    if(t.dataset.tr) return t.dataset.tr;
    if(t.dataset.h!==undefined && S && S.players) return S.players[viewer()].hand[+t.dataset.h]||null;
    return null;
  };
  document.addEventListener('mouseover',(ev)=>{
    if(!S){ hc.style.display='none'; return; }
    const iid=iidOf(ev.target);
    if(!iid || !S.inst[iid]){ hc.style.display='none'; return; }
    const showFace = I(iid).faceup || I(iid).owner===viewer() || whereIs(iid)&&whereIs(iid).zone==='hand';
    hc.innerHTML = bigCardHTML(iid, showFace);
    hc.style.display='block';
  });
  document.addEventListener('mouseout',(ev)=>{ if(!iidOf(ev.target)) return; hc.style.display='none'; });
  document.addEventListener('mousemove',(ev)=>{
    if(hc.style.display==='none') return;
    const w=290, h=hc.offsetHeight||220;
    let x=ev.clientX+18, y=ev.clientY+14;
    if(x+w>innerWidth) x=ev.clientX-w-14;
    if(y+h>innerHeight) y=Math.max(8, innerHeight-h-8);
    hc.style.left=x+'px'; hc.style.top=y+'px';
  });
}

<script>
'use strict';
/* =====================================================================
   The Rival — a solo opponent for playtesting.
   HARD CONSTRAINT: the Rival is a PLAYER, not a system. Every move it
   makes is a legal human play under rules.md; it reads only public
   information plus its own hidden cards, exactly like a person across
   the table. It exists so the tabletop game can be tested solo — it
   adds no rules and never will.
   ===================================================================== */
window.KC_AI_DELAY = window.KC_AI_DELAY===undefined ? 650 : window.KC_AI_DELAY;
const AI_PI = 1;
function aiP(){ return S.players[AI_PI]; }
function aiRand(a){ return a[Math.floor(Math.random()*a.length)]; }

/* ---- opening: seed one facedown card per room; maybe hide the Leader ---- */
function aiSeedOpening(){
  const p=aiP();
  const picks=[];
  if(Math.random()<0.55) picks.push(p.leader);                    // wall the crown up…
  const traps=p.hand.filter(x=>D(x).trap && !picks.includes(x));
  const units=p.hand.filter(x=>isUnit(x)&&x!==p.leader&&!picks.includes(x)).sort((a,b)=>fullCostN(a)-fullCostN(b));
  const rest=p.hand.filter(x=>!picks.includes(x));
  for(const pool of [traps, units, rest]) for(const c of pool){ if(picks.length<3 && !picks.includes(c)) picks.push(c); }
  const rooms=[0,1,2].sort(()=>Math.random()-0.5);
  picks.slice(0,3).forEach((iid,k)=>{ p.hand.splice(p.hand.indexOf(iid),1); I(iid).faceup=false; p.rooms[rooms[k]].push(iid); });
  draw(AI_PI, 3+AI_PI);
  logLine('The Rival seals one hidden card into each room and draws '+(3+AI_PI)+'.');
}
function fullCostN(iid){ const d=D(iid); return (d.cost.generic||0)+(d.cost.colored||0); }

/* ---- turn driver: paced steps, all through the same engine actions a human uses ---- */
function aiKickoff(){
  if(S.phase==='over'){ return; }
  VIEW.aiBusy=true; render();
  const steps=[aiMuster, aiDeploy, aiDeploy, aiSpring, aiSneaks, ()=>aiRaid(0), ()=>aiRaid(1), ()=>aiRaid(2)];
  let k=0;
  const tick=()=>{
    if(S.phase==='over'){ VIEW.aiBusy=false; render(); return; }
    if(k<steps.length){
      try{ steps[k++](); aiSettle(); }catch(e){ console.warn('rival stumbled:', e); VIEW.picking=null; VIEW.flow=null; }
      render();
      setTimeout(tick, window.KC_AI_DELAY);
    } else {
      VIEW.aiBusy=false;
      snapshot(); logLine('The Rival ends the turn.');
      endTurn();
    }
  };
  setTimeout(tick, window.KC_AI_DELAY);
}

/* ---- settle any pending choice the way a table player would ---- */
function aiSettle(){
  for(let guard=0; guard<24; guard++){
    if(VIEW.flow){
      const f=VIEW.flow;
      if(f.type==='garrison' || (f.type==='raid'&&f.stage==='assign')){ autoAssign(f); f.type==='garrison'?resolveGarrison():resolveClash(); continue; }
      if(f.type==='raid'&&f.stage==='select'){ VIEW.flow=null; continue; }
      if(f.type==='sneakpick'){ VIEW.flow=null; continue; }
    }
    const pk=VIEW.picking;
    if(!pk) return;
    if(pk.kind==='pay'){
      const srcs=manaSources(AI_PI).filter(x=>!pk.tapped.includes(x)&&!(pk.exclude||[]).includes(x));
      if(!srcs.length){ VIEW.picking=null; undo(); return; }
      // spend faceup color-matches before revealing hidden cards
      srcs.sort((a,b)=>(I(b).faceup?1:0)-(I(a).faceup?1:0));
      clickPaySource(srcs[0]); continue;
    }
    if(pk.kind==='list'){ const pick=pk.cands.slice(0,pk.n); VIEW.picking=null; pk.onDone(pick); continue; }
    if(pk.kind==='foresee'){ const done=pk.onDone; done(pk.cards.map(iid=>({iid,where:'top'}))); continue; }
    if(pk.kind==='lane'){ const human=S.players[0];
      const idx=[0,1,2].sort((a,b)=>human.fields[b].length-human.fields[a].length)[0];
      const cb=pk.onPick; cb(idx); continue; }
    return;
  }
}

/* ---- affordability: can the Rival pay and still keep two guards untapped? ---- */
function aiCanAfford(d, reserve){
  const srcs=manaSources(AI_PI);
  const cost=fullCost(d);
  const total=(cost.generic||0)+(cost.colored||0);
  if(srcs.filter(x=>canColorFor(x,cost)).length < (cost.colored||0)) return false;
  return srcs.length - total >= (reserve===undefined?2:reserve);
}

function aiMuster(){
  const p=aiP();
  if(p.mustered || !p.hand.length) return;
  const plots=p.hand.filter(x=>D(x).type==='plot');
  const pick = plots.length ? plots.sort((a,b)=>(D(b).scheme||0)-(D(a).scheme||0))[0]
             : [...p.hand].sort((a,b)=>fullCostN(b)-fullCostN(a))[0];
  const counts=p.rooms.map(r=>r.length);
  const room = D(pick).type==='plot'
    ? counts.indexOf(Math.max(...counts))   // schemes join the crowd
    : counts.indexOf(Math.min(...counts));  // bodies spread the watch
  muster(p.hand.indexOf(pick), room, true);
}

function aiDeploy(){
  const p=aiP();
  const units=p.hand.filter(x=>isUnit(x)&&D(x).type!=='leader'&&aiCanAfford(D(x)))
    .sort((a,b)=>fullCostN(a)-fullCostN(b));
  if(!units.length) return;
  const iid=units[0];
  const human=S.players[0];
  // deploy toward the human lane with the least standing defense (remember: boards invert)
  const lane=[0,1,2].sort((a,b)=>{
    const hpA=human.fields[2-a].reduce((n,x)=>n+hp(x),0), hpB=human.fields[2-b].reduce((n,x)=>n+hp(x),0);
    return hpA-hpB; })[0];
  deployFromHand(p.hand.indexOf(iid), lane);
  aiSettle(); // pay
}

function aiSpring(){
  const p=aiP();
  for(let r=0;r<3;r++) for(const iid of p.rooms[r]){
    const d=D(iid);
    if(d.type==='plot' && !d.trap && canSpring(iid) && aiCanAfford(d,1)){ springPlot(iid); aiSettle(); return; }
  }
}

function aiSneaks(){
  const human=S.players[0];
  for(let z=0;z<3;z++) for(const iid of [...aiP().fields[z]]){
    if(!canSneak(iid)) continue;
    // prefer the room sheltering a revealed, tapped Leader; else the most crowded room
    let best=-1, bestScore=-1;
    for(let r=0;r<3;r++){ const room=human.rooms[r]; if(!room.length) continue;
      let sc=room.length;
      if(room.includes(human.leader) && I(human.leader).faceup && I(human.leader).tapped) sc+=100;
      if(sc>bestScore){ bestScore=sc; best=r; } }
    if(best<0) return;
    sneakInto(iid, best); aiSettle(); return; // one infiltration per turn keeps it watchable
  }
}

function aiRaid(lane){
  if(S.phase!=='over' && S.raided && S.raided[lane]) return;
  const p=aiP(), human=S.players[0];
  const party=p.fields[lane].filter(x=>raidEligible(x,lane));
  if(!party.length) return;
  const enemy=human.fields[2-lane];
  const myPower=party.reduce((n,x)=>n+stats(x).p,0);
  const theirHP=enemy.reduce((n,x)=>n+hp(x),0);
  const roomBehind=human.rooms[2-lane];
  if(enemy.length===0 && roomBehind.length===0) return;          // nothing to sack
  if(enemy.length>0 && myPower < theirHP) return;                // can't clear the lane
  startRaid(lane); VIEW.flow.raiders=party; launchRaid();
  aiSettle();
}
</script>
