<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Municipal District Grid</title>
<meta name="description" content="A streamlined 2D city builder — connect to the highway, power and water your district, watch it grow. From Must Design Games." />
<script>!function(){var t=localStorage.getItem('theme')||(matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');document.documentElement.setAttribute('data-theme',t)}()</script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/assets/site.css" />
<style>
  html,body{height:100%}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:'Inter',system-ui,-apple-system,sans-serif;display:flex;flex-direction:column;height:100dvh;overflow:hidden;-webkit-font-smoothing:antialiased;transition:background .5s ease,color .5s ease}
  .bar{display:flex;align-items:center;gap:clamp(8px,2vw,16px);padding:10px clamp(12px,3vw,22px);border-bottom:1.5px solid var(--line);background:var(--bg);flex-shrink:0}
  .bar .home{font-family:'Fraunces',serif;font-weight:600;font-size:15px;color:var(--muted);text-decoration:none;letter-spacing:-.01em;transition:color .15s;white-space:nowrap}
  .bar .home:hover{color:var(--ink)}
  .bar .title{font-family:'Fraunces',serif;font-weight:600;font-size:clamp(14px,3.6vw,19px);letter-spacing:-.02em;color:var(--ink);white-space:nowrap}
  .bar .spacer{flex:1}
  .rci{display:flex;gap:9px;align-items:flex-end}
  .meter{display:flex;flex-direction:column;align-items:center;gap:3px;width:20px}
  .meter .bar{width:100%;height:26px;background:var(--line);border-radius:3px;overflow:hidden;position:relative;display:flex;align-items:flex-end}
  .meter .bar i{display:block;width:100%;height:8%;transition:height .5s ease,opacity .3s}
  .meter b{font-size:10px;font-weight:600;color:var(--muted);letter-spacing:.02em}
  @media(max-width:600px){.rci{display:none}}
  .stat{display:flex;flex-direction:column;align-items:flex-end;line-height:1.05;min-width:60px}
  .stat .n{font-family:'Fraunces',serif;font-weight:600;font-size:clamp(16px,4.4vw,22px);color:var(--ink);font-variant-numeric:tabular-nums}
  .stat .l{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);font-weight:500}
  .res{display:flex;gap:13px}
  .rstat{display:flex;flex-direction:column;align-items:flex-end;line-height:1.05;gap:1px}
  .rstat .rn{font-family:'Fraunces',serif;font-weight:600;font-size:15px;color:var(--ink);font-variant-numeric:tabular-nums;transition:color .3s}
  .rstat .rl{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:500;display:flex;align-items:center;gap:3px}
  .rstat .rl .dot{width:7px;height:7px;border-radius:2px}
  @media(max-width:860px){.res{display:none}}
  .stage{position:relative;flex:1;min-height:0}
  canvas{display:block;width:100%;height:100%;touch-action:none;cursor:crosshair}
  .toast{position:absolute;top:16px;left:50%;transform:translate(-50%,-8px);background:var(--paper);border:1.5px solid var(--line-2);border-radius:12px;padding:9px 16px;box-shadow:var(--shadow);font-size:14px;color:var(--ink);font-family:'Fraunces',serif;letter-spacing:-.01em;opacity:0;pointer-events:none;transition:opacity .4s ease,transform .4s ease;white-space:nowrap;z-index:5}
  .toast.on{opacity:1;transform:translate(-50%,0)}
  .toast b{color:var(--muted);font-weight:500;font-size:12px;margin-left:8px}
  .tools{display:flex;align-items:center;gap:7px;flex-wrap:wrap;padding:9px clamp(12px,3vw,22px);border-top:1.5px solid var(--line);background:var(--bg);flex-shrink:0}
  .tool{display:flex;align-items:center;gap:6px;cursor:pointer;font-size:13px;font-weight:500;color:var(--ink-2);background:var(--paper);border:1.5px solid var(--line-2);border-radius:9px;padding:7px 10px;transition:border-color .15s,transform .1s,background .15s;user-select:none}
  .tool:hover{border-color:var(--ink)}
  .tool:active{transform:translateY(1px)}
  .tool.sel{border-color:var(--ink);background:var(--ink);color:var(--bg)}
  .tool .sw{width:13px;height:13px;border-radius:3px;box-shadow:inset 0 0 0 1.5px rgba(0,0,0,.18)}
  .tool .key{font-size:10px;color:var(--muted);border:1px solid var(--line-2);border-radius:4px;padding:0 4px;line-height:15px}
  .tool.sel .key{color:var(--bg);border-color:rgba(255,255,255,.35)}
  .tools .spacer{flex:1}
  .reset{cursor:pointer;font-size:12px;color:var(--muted);background:none;border:none;font-family:inherit;text-decoration:underline;text-underline-offset:2px}
  .reset:hover{color:var(--ink)}
  .hint{font-size:12px;color:var(--muted);max-width:330px;line-height:1.4}
  @media(max-width:760px){.hint{display:none}}
</style>
</head>
<body>

  <header class="bar">
    <a class="home" href="/" title="Back to mattdanusergrant.com">← MDG</a>
    <span class="title">Municipal&nbsp;District&nbsp;Grid</span>
    <span class="spacer"></span>
    <div class="rci" id="rci" title="Demand — build what the district wants next">
      <div class="meter"><span class="bar"><i id="dem-res"></i></span><b>R</b></div>
      <div class="meter"><span class="bar"><i id="dem-com"></i></span><b>C</b></div>
      <div class="meter"><span class="bar"><i id="dem-ind"></i></span><b>I</b></div>
    </div>
    <div class="res" id="res" title="Supply chain — Works make Materials, Factories turn Materials into Goods, Shops sell Goods">
      <div class="rstat"><span class="rn" id="mat">0</span><span class="rl"><span class="dot" style="background:#BF8F45"></span>Materials</span></div>
      <div class="rstat"><span class="rn" id="goods">0</span><span class="rl"><span class="dot" style="background:#7C6CB0"></span>Goods</span></div>
    </div>
    <div class="stat"><span class="n" id="pop">0</span><span class="l">Population</span></div>
    <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Toggle light / dark mode" title="Toggle light / dark"><span class="toggle-track"><span class="toggle-thumb"><svg class="t-sun" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="4.2"/><path d="M12 2.5v2.6M12 18.9v2.6M4.6 4.6l1.9 1.9M17.5 17.5l1.9 1.9M2.5 12h2.6M18.9 12h2.6M4.6 19.4l1.9-1.9M17.5 6.5l1.9-1.9"/></svg><svg class="t-moon" viewBox="0 0 24 24" aria-hidden="true"><path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8z"/></svg></span></span></button>
  </header>

  <div class="stage">
    <canvas id="city"></canvas>
    <div class="toast" id="toast"></div>
  </div>

  <footer class="tools" id="tools">
    <div class="tool sel" data-brush="road"><span class="sw" data-sw="road"></span>Road<span class="key">1</span></div>
    <div class="tool" data-brush="res"><span class="sw" data-sw="res"></span>Homes<span class="key">2</span></div>
    <div class="tool" data-brush="com"><span class="sw" data-sw="com"></span>Shops<span class="key">3</span></div>
    <div class="tool" data-brush="ind"><span class="sw" data-sw="ind"></span>Works<span class="key">4</span></div>
    <div class="tool" data-brush="fac"><span class="sw" data-sw="fac"></span>Factory<span class="key">5</span></div>
    <div class="tool" data-brush="park"><span class="sw" data-sw="park"></span>Park<span class="key">6</span></div>
    <div class="tool" data-brush="power"><span class="sw" data-sw="power"></span>Power<span class="key">7</span></div>
    <div class="tool" data-brush="water"><span class="sw" data-sw="water"></span>Water<span class="key">8</span></div>
    <div class="tool" data-brush="bulldoze"><span class="sw" data-sw="bulldoze"></span>Clear<span class="key">9</span></div>
    <button class="reset" id="reset" type="button">Reset</button>
    <span class="spacer"></span>
    <span class="hint"><b>Works</b> make Materials → <b>Factories</b> make Goods → <b>Shops</b> sell them. Keep the chain fed; balance is the game.</span>
  </footer>

<script>
/* ============================================================
   Municipal District Grid — v0.4
   Streamlined 2D city builder. Now with a world connection and
   utilities: link your roads to the fixed HIGHWAY, and cover
   zones with POWER (plant) and WATER (tower) to let them grow.
   Coverage-based, not wire-dragging — kept in the streamlined
   spirit. Vanilla JS, zero-build. Themed to MDG.com.
   ============================================================ */
(function(){
  'use strict';
  var canvas=document.getElementById('city'), ctx=canvas.getContext('2d');
  var CELL=32, cols=0, rows=0, dpr=1;
  var grid=[], brush='road', painting=false, lastPaint=-1, dirty=true, svcDirty=false;
  var SAVE_KEY='mdg-district-grid-v1';
  var ZONES={res:1,com:1,ind:1,fac:1};
  var RP=5, RW=5;                                  // power / water coverage radius (Chebyshev)
  var matStock=0, goodsStock=0, matHealthy=true, goodsHealthy=true, CAPRES=99999;

  function idx(c,r){return r*cols+c;}
  function inB(c,r){return c>=0&&r>=0&&c<cols&&r<rows;}
  function newCell(c,r){return {t:'empty',lvl:0,grow:0,seed:((c*73856)^(r*19349))>>>0,pulse:-9999};}

  // ---- palettes ----
  var PAL={
    light:{
      road:'#B9B3A2',curb:'#9E9788',lane:'#EFEADB',
      hw:'#8E887B',hwMed:'#E7C24A',hwLane:'#F1ECDD',
      res:['#7EB277','#63A05C','#4C8047'],resRoof:['#B85C4A','#A8503E','#8F4433'],win:'#FBF6E6',door:'#6B4A38',
      com:['#6C9FCB','#5589BB','#41709C'],comRoof:'#33587C',awning:['#E4A65A','#D98F6E','#7FB0C4'],
      ind:['#D2A45C','#BF8F45','#A9792F'],indRoof:'#7E5B24',stack:'#8A8378',smoke:'rgba(120,110,95,.5)',
      fac:['#9585BE','#7C6CB0','#655499'],facRoof:'#4B3D77',facPipe:'#B6ADCB',
      park:'#5E9E52',parkTrunk:'#7A5537',parkDark:'#4A8341',grass:'rgba(95,158,82,.16)',
      plantBody:'#8A8478',plantRoof:'#6E5A45',plantStack:'#B85C4A',plantGlow:'#E7C24A',
      towerLeg:'#5F574B',towerTank:'#6E93A6',towerHi:'#A6C3CE',
      lot:'rgba(0,0,0,.05)',starve:'#C77A46',cuePow:'#E0A93E',cueWat:'#4C9AD1',cueMat:'#BF8F45',cueGood:'#7C6CB0',side:'rgba(0,0,0,.14)',
      car:['#C6553F','#4C7EA8','#D9AE52','#E7E1D2','#5C8A55']
    },
    dark:{
      road:'#524D44',curb:'#3D392F',lane:'#726B5E',
      hw:'#39352D',hwMed:'#C7A23E',hwLane:'#6E675B',
      res:['#79B075','#61A05F','#4F8553'],resRoof:['#B85E4C','#9E4E3E','#874536'],win:'#F2EDE2',door:'#B99A82',
      com:['#6FA4D2','#5589BA','#4676A2'],comRoof:'#2E5276',awning:['#E0A659','#D18C6C','#77A6BC'],
      ind:['#E0AB5B','#CA9647','#B27F33'],indRoof:'#7C5822',stack:'#5B554B',smoke:'rgba(180,170,150,.45)',
      fac:['#9C8CC6','#8474BA','#6E5DA4'],facRoof:'#463878',facPipe:'#B8AFD2',
      park:'#5FA054',parkTrunk:'#8A6343',parkDark:'#478542',grass:'rgba(95,160,84,.20)',
      plantBody:'#5B554B',plantRoof:'#463A2C',plantStack:'#B85E4C',plantGlow:'#E7C24A',
      towerLeg:'#4B443A',towerTank:'#5E8496',towerHi:'#8FB0BC',
      lot:'rgba(255,255,255,.055)',starve:'#D08A50',cuePow:'#E8B653',cueWat:'#5CA6DB',cueMat:'#CA9647',cueGood:'#8474BA',side:'rgba(0,0,0,.4)',
      car:['#D9664C','#5D93C4','#E4B85F','#EDE7DA','#6AA062']
    }
  };
  var SWATCH={road:'#9c968a',res:'#63A05C',com:'#5589BB',ind:'#BF8F45',fac:'#7C6CB0',park:'#4A8341',power:'#D9AE52',water:'#4C88B8',bulldoze:'#c96a5a'};

  function themeName(){var d=document.documentElement.getAttribute('data-theme');return d?(d==='dark'?'dark':'light'):(matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');}
  function cssVar(n){return getComputedStyle(document.documentElement).getPropertyValue(n).trim();}
  var pal,C={};
  function readTheme(){pal=PAL[themeName()];C.bg=cssVar('--bg');C.line=cssVar('--line');C.line2=cssVar('--line-2');dirty=true;}

  // ---- highway (fixed world connection along the top row) ----
  function ensureHighway(){for(var c=0;c<cols;c++){var g=grid[idx(c,0)];g.t='highway';g.lvl=0;g.grow=0;}}
  function seedRampIfEmpty(){
    // if there are no roads yet, drop a short on-ramp so the player has an obvious place to begin
    for(var i=0;i<grid.length;i++)if(grid[i]&&grid[i].t==='road')return;
    var mid=Math.floor(cols/2);
    if(inB(mid,1))grid[idx(mid,1)].t='road';
    if(inB(mid,2))grid[idx(mid,2)].t='road';
    dirty=true;
  }

  // ---- sizing ----
  function resize(){
    var st=canvas.parentNode.getBoundingClientRect();
    dpr=Math.min(window.devicePixelRatio||1,2);
    canvas.width=Math.round(st.width*dpr);canvas.height=Math.round(st.height*dpr);
    var nc=Math.max(6,Math.floor(st.width/CELL)),nr=Math.max(6,Math.floor(st.height/CELL));
    if(nc!==cols||nr!==rows){
      var old=grid,oc=cols,or=rows;cols=nc;rows=nr;grid=new Array(cols*rows);
      for(var r=0;r<rows;r++)for(var c=0;c<cols;c++)grid[idx(c,r)]=(old&&c<oc&&r<or)?old[r*oc+c]:newCell(c,r);
    }
    ensureHighway();dirty=true;
  }

  // ---- interaction ----
  function cellFromEvent(e){
    var rect=canvas.getBoundingClientRect();
    var x=(e.clientX-rect.left)/rect.width*canvas.width/dpr, y=(e.clientY-rect.top)/rect.height*canvas.height/dpr;
    return {c:Math.floor(x/CELL),r:Math.floor(y/CELL)};
  }
  function paintAt(c,r){
    if(!inB(c,r))return;var i=idx(c,r);if(i===lastPaint)return;lastPaint=i;var cell=grid[i];
    if(cell.t==='highway')return;                         // highway is fixed, can't be edited
    if(cell.t==='road'&&brush!=='road'&&brush!=='bulldoze')return; // protect the road network — only Clear removes a road
    if(brush==='bulldoze'){cell.t='empty';cell.lvl=0;cell.grow=0;}
    else if(brush==='road'){cell.t='road';cell.lvl=0;cell.grow=0;}
    else if(brush==='park'||brush==='power'||brush==='water'){cell.t=brush;cell.lvl=(brush==='park'?1:0);cell.grow=0;}
    else if(cell.t!==brush){cell.t=brush;cell.lvl=0;cell.grow=0;}
    dirty=true;svcDirty=true;scheduleSave();
  }
  function down(e){e.preventDefault();painting=true;lastPaint=-1;if(canvas.setPointerCapture)canvas.setPointerCapture(e.pointerId);var p=cellFromEvent(e);paintAt(p.c,p.r);}
  function move(e){if(!painting)return;var p=cellFromEvent(e);paintAt(p.c,p.r);}
  function up(){painting=false;lastPaint=-1;}
  canvas.addEventListener('pointerdown',down);
  canvas.addEventListener('pointermove',move);
  window.addEventListener('pointerup',up);
  canvas.addEventListener('contextmenu',function(e){e.preventDefault();});

  var tools=document.getElementById('tools');
  function selectBrush(b){brush=b;Array.prototype.forEach.call(tools.querySelectorAll('.tool'),function(el){el.classList.toggle('sel',el.getAttribute('data-brush')===b);});}
  tools.addEventListener('click',function(e){var t=e.target.closest('.tool');if(t)selectBrush(t.getAttribute('data-brush'));});
  window.addEventListener('keydown',function(e){var m={'1':'road','2':'res','3':'com','4':'ind','5':'fac','6':'park','7':'power','8':'water','9':'bulldoze'}[e.key];if(m)selectBrush(m);});
  document.getElementById('reset').addEventListener('click',function(){
    if(!confirm('Clear the whole city?'))return;
    for(var i=0;i<grid.length;i++)grid[i]=newCell(i%cols,(i/cols)|0);
    ensureHighway();seedRampIfEmpty();maxMS=-1;cars=[];computeServices();dirty=true;scheduleSave();
  });

  // ---- services: highway connectivity + power/water coverage ----
  function drivable(c,r){if(!inB(c,r))return false;var t=grid[idx(c,r)].t;return t==='road'||t==='highway';}
  var connected,powered,watered;
  function computeServices(){
    var n=cols*rows;connected=new Uint8Array(n);powered=new Uint8Array(n);watered=new Uint8Array(n);
    // BFS from highway through drivable cells → connected road network
    var q=[];for(var c=0;c<cols;c++){if(grid[idx(c,0)].t==='highway'){connected[idx(c,0)]=1;q.push(c);}} // row 0
    var head=0;
    while(head<q.length){
      var id=q[head++],cc=id%cols,cr=(id/cols)|0;
      var nb=[[cc-1,cr],[cc+1,cr],[cc,cr-1],[cc,cr+1]];
      for(var k=0;k<4;k++){var a=nb[k][0],bb=nb[k][1];if(drivable(a,bb)){var ni=idx(a,bb);if(!connected[ni]){connected[ni]=1;q.push(ni);}}}
    }
    // coverage stamps
    for(var r=0;r<rows;r++)for(var cx=0;cx<cols;cx++){
      var t=grid[idx(cx,r)].t;
      if(t==='power')stamp(powered,cx,r,RP);
      else if(t==='water')stamp(watered,cx,r,RW);
    }
  }
  function stamp(arr,cx,cy,rad){
    for(var dy=-rad;dy<=rad;dy++)for(var dx=-rad;dx<=rad;dx++){var a=cx+dx,b=cy+dy;if(inB(a,b))arr[idx(a,b)]=1;}
  }
  function nearConnected(c,r){
    return (inB(c-1,r)&&connected[idx(c-1,r)])||(inB(c+1,r)&&connected[idx(c+1,r)])||
           (inB(c,r-1)&&connected[idx(c,r-1)])||(inB(c,r+1)&&connected[idx(c,r+1)]);
  }
  // what's blocking a zone from growing? '' = nothing (grows)
  function blocker(c,r){
    if(!nearConnected(c,r))return 'disc';
    if(!powered[idx(c,r)])return 'pow';
    if(!watered[idx(c,r)])return 'wat';
    var t=grid[idx(c,r)].t;
    if(t==='com'&&!(goodsStock>0.01||goodsHealthy))return 'goods';  // shops need Goods
    if(t==='fac'&&!(matStock>0.01||matHealthy))return 'mat';        // factories need Materials
    return '';
  }
  // supply chain: Works → Materials → Factories → Goods → Shops (city-wide pools, no routing)
  var matWanted=false;
  function computeResources(){
    var works=0,facs=0,shops=0;
    for(var i=0;i<grid.length;i++){var g=grid[i];if(!g)continue;
      if(g.t==='ind')works+=g.lvl;else if(g.t==='fac')facs+=g.lvl;else if(g.t==='com')shops+=g.lvl;}
    matStock+=works*2;                                   // Works extract Materials
    var facCap=facs*3, drawn=Math.min(matStock,facCap);
    matStock-=drawn; goodsStock+=drawn*(2/3);            // Factories convert 3 Materials → 2 Goods
    var need=shops*1.5, sold=Math.min(goodsStock,need);
    goodsStock-=sold;
    matStock=Math.max(0,Math.min(matStock,CAPRES)); goodsStock=Math.max(0,Math.min(goodsStock,CAPRES));
    matHealthy=(facCap-drawn)<=0.01;                     // factories got all the Materials they wanted
    goodsHealthy=(need-sold)<=0.01;                      // shops got all the Goods they wanted
    matWanted=(facCap-drawn>0.01);                       // Works in demand when factories are starved
    demand.fac=(shops>0&&(!goodsHealthy||goodsStock<need+1))?3:(facs<shops?1:-1);  // grow factories to feed shops
  }

  function complement(c,r,t){
    var wants=t==='res'?{com:1,ind:1,park:1}:{res:1,park:1};
    for(var dr=-1;dr<=1;dr++)for(var dc=-1;dc<=1;dc++){if(!dc&&!dr)continue;
      if(inB(c+dc,r+dr)){var n=grid[idx(c+dc,r+dr)];if(n.lvl>0&&wants[n.t])return true;}}
    return false;
  }
  var MAXLVL=3,demand={res:0,com:0,ind:0};
  function computeDemand(){
    var R=0,Cc=0,I=0;
    for(var i=0;i<grid.length;i++){var g=grid[i];if(!g)continue;
      if(g.t==='res')R+=g.lvl;else if(g.t==='com')Cc+=g.lvl;else if(g.t==='ind')I+=g.lvl;}
    demand.res=(Cc+I)+3-R;demand.com=(R*0.6)+2-Cc;demand.ind=(R*0.5)+1-I;
  }
  var GROW_NEED=6, roadList=[];
  function tick(){
    computeServices();computeDemand();computeResources();roadList=[];
    for(var r=0;r<rows;r++)for(var c=0;c<cols;c++){
      var cell=grid[idx(c,r)];
      if(cell.t==='road'||cell.t==='highway')roadList.push([c,r]);
      if(!ZONES[cell.t]||cell.lvl>=MAXLVL)continue;
      if(blocker(c,r))continue;                          // connection + power + water + supply chain
      var rate=demand[cell.t]>0?1:0.28;
      if(cell.t==='ind'&&matWanted)rate=1;               // Works speed up when Materials are short
      if(complement(c,r,cell.t))rate*=1.6;
      cell.grow+=rate;
      if(cell.grow>=GROW_NEED){cell.grow=0;cell.lvl++;cell.pulse=performance.now();dirty=true;scheduleSave();}
    }
    updatePop();updateDemandUI();updateResourceUI();checkMilestone();manageCars();
  }

  // ---- population, demand UI, milestones ----
  var popEl=document.getElementById('pop'),popShown=0,popTarget=0;
  function updatePop(){var p=0;for(var i=0;i<grid.length;i++){var g=grid[i];if(!g)continue;
    if(g.t==='res')p+=g.lvl*g.lvl*45;else if(g.t==='com')p+=g.lvl*22;else if(g.t==='ind')p+=g.lvl*16;else if(g.t==='fac')p+=g.lvl*18;else if(g.t==='park')p+=8;}
    popTarget=p;}
  var matEl=document.getElementById('mat'),goodsEl=document.getElementById('goods');
  function updateResourceUI(){matEl.textContent=Math.round(matStock);goodsEl.textContent=Math.round(goodsStock);
    matEl.style.color=matHealthy?'':'#C85A42';goodsEl.style.color=goodsHealthy?'':'#C85A42';}
  var demBars={res:document.getElementById('dem-res'),com:document.getElementById('dem-com'),ind:document.getElementById('dem-ind')};
  var demColor={res:'#63A05C',com:'#5589BB',ind:'#BF8F45'};
  function updateDemandUI(){['res','com','ind'].forEach(function(t){var el=demBars[t];el.style.height=(Math.max(0.08,Math.min(1,demand[t]/8))*100)+'%';el.style.background=demColor[t];el.style.opacity=demand[t]>0.3?1:0.35;});}
  var MS=[{n:150,l:'Hamlet'},{n:500,l:'Village'},{n:1500,l:'Town'},{n:4000,l:'City'},{n:9000,l:'Metropolis'},{n:20000,l:'Megacity'}];
  var maxMS=-1,toastEl=document.getElementById('toast'),toastTimer=0;
  function checkMilestone(){var reached=maxMS;for(var i=0;i<MS.length;i++)if(popTarget>=MS[i].n)reached=i;if(reached>maxMS){maxMS=reached;showToast(MS[reached].l,MS[reached].n);scheduleSave();}}
  function showToast(label,n){toastEl.innerHTML=label+' <b>'+n.toLocaleString()+' people</b>';toastEl.classList.add('on');clearTimeout(toastTimer);toastTimer=setTimeout(function(){toastEl.classList.remove('on');},2800);}

  // ---- ambient cars (drive roads + highway) ----
  var cars=[];
  function adjDrive(c,r){var o=[];if(drivable(c-1,r))o.push([c-1,r]);if(drivable(c+1,r))o.push([c+1,r]);if(drivable(c,r-1))o.push([c,r-1]);if(drivable(c,r+1))o.push([c,r+1]);return o;}
  function spawnCar(){if(!roadList.length)return null;var s=roadList[(Math.random()*roadList.length)|0],a=adjDrive(s[0],s[1]);var t=a.length?a[(Math.random()*a.length)|0]:s;return {cc:s[0],cr:s[1],tc:t[0],tr:t[1],p:Math.random(),tint:(Math.random()*pal.car.length)|0};}
  function manageCars(){var want=Math.max(0,Math.min(9,Math.floor(roadList.length/9)));while(cars.length<want){var c=spawnCar();if(!c)break;cars.push(c);}while(cars.length>want)cars.pop();}
  function updateCars(dt){
    for(var i=cars.length-1;i>=0;i--){var car=cars[i];
      if(!drivable(car.cc,car.cr)){var s=spawnCar();if(s)cars[i]=s;else cars.splice(i,1);continue;}
      car.p+=dt*2.0;
      while(car.p>=1){car.p-=1;car.cc=car.tc;car.cr=car.tr;var a=adjDrive(car.cc,car.cr);
        if(a.length>1)a=a.filter(function(n){return !(n[0]===car.pc&&n[1]===car.pr);});
        if(!a.length)a=adjDrive(car.cc,car.cr);
        var nt=a.length?a[(Math.random()*a.length)|0]:[car.cc,car.cr];
        car.pc=car.cc;car.pr=car.cr;car.tc=nt[0];car.tr=nt[1];}
    }
  }

  // ---- rendering ----
  function px(v){return Math.round(v);}
  function easeOutBack(p){var c1=1.70158,c3=c1+1;return 1+c3*Math.pow(p-1,3)+c1*Math.pow(p-1,2);}
  function growScale(cell){var t=performance.now()-cell.pulse;if(t<0||t>=380)return 1;return Math.max(0,easeOutBack(t/380));}
  function drawGridPaper(){
    ctx.fillStyle=C.bg;ctx.fillRect(0,0,cols*CELL,rows*CELL);ctx.lineWidth=1;
    for(var c=0;c<=cols;c++){ctx.strokeStyle=(c%5===0)?C.line2:C.line;ctx.beginPath();ctx.moveTo(px(c*CELL)+0.5,0);ctx.lineTo(px(c*CELL)+0.5,rows*CELL);ctx.stroke();}
    for(var r=0;r<=rows;r++){ctx.strokeStyle=(r%5===0)?C.line2:C.line;ctx.beginPath();ctx.moveTo(0,px(r*CELL)+0.5);ctx.lineTo(cols*CELL,px(r*CELL)+0.5);ctx.stroke();}
  }
  function drawHighway(x,y,c){
    ctx.fillStyle=pal.hw;ctx.fillRect(x,y,CELL,CELL);
    ctx.fillStyle=pal.hwLane;ctx.fillRect(x,y+3,CELL,1);ctx.fillRect(x,y+CELL-4,CELL,1);
    ctx.fillStyle=pal.hwMed;for(var dx=1;dx<CELL-2;dx+=8)ctx.fillRect(x+dx,y+CELL/2-1,5,2);
    if(drivable(c,1)){ctx.fillStyle=pal.hw;ctx.fillRect(x+CELL/2-4,y+CELL-3,8,3);} // on-ramp blend downward
  }
  function drawRoad(x,y,c,r){
    var N=drivable(c,r-1),S=drivable(c,r+1),E=drivable(c+1,r),W=drivable(c-1,r);
    ctx.fillStyle=pal.road;ctx.fillRect(x+2,y+2,CELL-4,CELL-4);
    if(N)ctx.fillRect(x+2,y,CELL-4,3);if(S)ctx.fillRect(x+2,y+CELL-3,CELL-4,3);
    if(E)ctx.fillRect(x+CELL-3,y+2,3,CELL-4);if(W)ctx.fillRect(x,y+2,3,CELL-4);
    ctx.fillStyle=pal.curb;
    if(!N)ctx.fillRect(x+2,y+2,CELL-4,2);if(!S)ctx.fillRect(x+2,y+CELL-4,CELL-4,2);
    if(!E)ctx.fillRect(x+CELL-4,y+2,2,CELL-4);if(!W)ctx.fillRect(x+2,y+2,2,CELL-4);
    ctx.fillStyle=pal.lane;var m=CELL/2;
    if(E||W)for(var dx=4;dx<CELL-4;dx+=8)ctx.fillRect(x+dx,y+m-1,4,2);
    if(N||S)for(var dy=4;dy<CELL-4;dy+=8)ctx.fillRect(x+m-1,y+dy,2,4);
    if(!N&&!S&&!E&&!W)ctx.fillRect(x+m-2,y+m-2,4,4);
  }
  function py(v){return Math.round(v);}
  function drawPark(x,y,cell){
    ctx.fillStyle=pal.grass;ctx.fillRect(x+2,y+2,CELL-4,CELL-4);var s=growScale(cell),sd=cell.seed,n=1+(sd%3);
    for(var i=0;i<n;i++){var tx=x+6+((sd>>(i*3))%(CELL-14)),ty=y+8+((sd>>(i*2+1))%(CELL-16)),rad=px((3+(sd>>(i+2))%2)*s);
      ctx.fillStyle=pal.parkTrunk;ctx.fillRect(px(tx-1),px(ty+rad-1),2,px(3*s));
      ctx.fillStyle=(i%2)?pal.parkDark:pal.park;ctx.beginPath();ctx.arc(px(tx),py(ty),rad,0,6.2832);ctx.fill();}
  }
  function drawPlant(x,y,cell){
    var s=growScale(cell),w=px(22*s),h=px(14*s),bx=px(x+(CELL-w)/2),by=px(y+CELL-4-h);
    ctx.fillStyle=pal.side;ctx.fillRect(bx+2,by+h,w,3);
    ctx.fillStyle=pal.plantBody;ctx.fillRect(bx,by,w,h);
    ctx.fillStyle=pal.plantRoof;ctx.fillRect(bx,by,w,3);
    // two stacks with a warm glow band
    ctx.fillStyle=pal.plantStack;ctx.fillRect(bx+3,by-8*s,4,px(8*s));ctx.fillRect(bx+w-7,by-8*s,4,px(8*s));
    ctx.fillStyle=pal.plantGlow;ctx.fillRect(bx+3,by-2,4,2);ctx.fillRect(bx+w-7,by-2,4,2);
    ctx.fillStyle=pal.side;ctx.fillRect(bx,by,w,1);ctx.fillRect(bx,by+h-1,w,1);
  }
  function drawTower(x,y,cell){
    var s=growScale(cell),tw=px(16*s),th=px(9*s),tx=px(x+(CELL-tw)/2),ty=px(y+6);
    // legs
    ctx.fillStyle=pal.towerLeg;var lg=py(y+CELL-4);
    ctx.fillRect(tx+2,ty+th,2,lg-(ty+th));ctx.fillRect(tx+tw-4,ty+th,2,lg-(ty+th));ctx.fillRect(px(x+CELL/2-1),ty+th,2,lg-(ty+th));
    // tank
    ctx.fillStyle=pal.towerTank;ctx.fillRect(tx,ty,tw,th);
    ctx.fillStyle=pal.towerHi;ctx.fillRect(tx+2,ty+2,tw-4,2);
    ctx.fillStyle=pal.side;ctx.fillRect(tx,ty,tw,1);ctx.fillRect(tx,ty+th-1,tw,1);ctx.fillRect(tx,ty,1,th);ctx.fillRect(tx+tw-1,ty,1,th);
  }
  function buildingBase(x,y,cell,lvl){var pxs=Math.max(2,Math.round(CELL/12));var w=(4+lvl)*pxs,h=(3+lvl*1.9)*pxs,s=growScale(cell);w*=s;h*=s;w=px(w);h=px(h);return {bx:px(x+(CELL-w)/2),by:px(y+CELL-4-h),w:w,h:h,pxs:pxs};}
  function windows(b,cols_,rows_,seed,color){ctx.fillStyle=color;var ws=Math.max(2,px(b.pxs*0.9)),gap=b.pxs*0.7,sx=b.bx+b.pxs,sy=b.by+Math.round(b.pxs*2.4);
    for(var wy=0;wy<rows_;wy++)for(var wx=0;wx<cols_;wx++){var lx=sx+wx*(ws+gap),ly=sy+wy*(ws+gap);if(lx+ws<=b.bx+b.w-b.pxs*0.6&&ly+ws<=b.by+b.h-b.pxs*0.6&&((seed>>(wx+wy*3))&3)!==0)ctx.fillRect(px(lx),px(ly),ws,ws);}}
  function outline(b){ctx.fillStyle=pal.side;ctx.fillRect(b.bx,b.by,b.w,1);ctx.fillRect(b.bx,b.by+b.h-1,b.w,1);ctx.fillRect(b.bx,b.by,1,b.h);ctx.fillRect(b.bx+b.w-1,b.by,1,b.h);}
  function shadow(b){ctx.fillStyle=pal.side;ctx.fillRect(b.bx+b.pxs,b.by+b.h,b.w,b.pxs);}
  function drawHome(x,y,cell){var lvl=cell.lvl,b=buildingBase(x,y,cell,lvl);shadow(b);ctx.fillStyle=pal.res[lvl-1];ctx.fillRect(b.bx,b.by,b.w,b.h);
    var roofH=Math.round(b.pxs*(1.6+((cell.seed>>4)&1)));ctx.fillStyle=pal.resRoof[lvl-1];
    for(var i=0;i<roofH;i++){var inset=Math.round(i/roofH*b.w*0.42);ctx.fillRect(b.bx+inset,b.by-roofH+i,b.w-inset*2,1);}
    outline(b);windows(b,lvl,lvl+1,cell.seed,pal.win);
    ctx.fillStyle=pal.door;var dw=Math.max(2,b.pxs),dh=Math.max(3,px(b.pxs*1.6));ctx.fillRect(px(b.bx+b.w/2-dw/2),b.by+b.h-dh,dw,dh);}
  function drawShop(x,y,cell){var lvl=cell.lvl,b=buildingBase(x,y,cell,lvl);shadow(b);ctx.fillStyle=pal.com[lvl-1];ctx.fillRect(b.bx,b.by,b.w,b.h);
    ctx.fillStyle=pal.comRoof;ctx.fillRect(b.bx,b.by,b.w,Math.round(b.pxs*1.2));
    var ay=b.by+b.h-Math.round(b.pxs*2.4);ctx.fillStyle=pal.awning[cell.seed%pal.awning.length];ctx.fillRect(b.bx,ay,b.w,Math.max(2,px(b.pxs*0.9)));
    outline(b);windows(b,lvl+1,lvl,cell.seed,pal.win);ctx.fillStyle='rgba(255,255,255,.7)';ctx.fillRect(b.bx+b.pxs,b.by+b.h-Math.round(b.pxs*1.5),b.w-b.pxs*2,Math.max(2,px(b.pxs*0.8)));}
  function drawWorks(x,y,cell){var lvl=cell.lvl,b=buildingBase(x,y,cell,lvl);b.bx=px(b.bx-b.pxs*0.6);b.w=px(b.w+b.pxs*1.2);b.by=px(b.by+b.h*0.12);b.h=px(b.h*0.88);shadow(b);
    ctx.fillStyle=pal.ind[lvl-1];ctx.fillRect(b.bx,b.by,b.w,b.h);ctx.fillStyle=pal.indRoof;ctx.fillRect(b.bx,b.by,b.w,Math.round(b.pxs*1.1));outline(b);
    var sx=b.bx+((cell.seed&1)?b.w-Math.round(b.pxs*1.6):Math.round(b.pxs*0.6)),sh=Math.round(b.pxs*(2+lvl));
    ctx.fillStyle=pal.stack;ctx.fillRect(sx,b.by-sh,Math.max(2,px(b.pxs*0.8)),sh);
    ctx.fillStyle=pal.smoke;ctx.beginPath();ctx.arc(sx+1,b.by-sh-2,Math.max(2,b.pxs*0.9),0,6.2832);ctx.fill();
    windows(b,lvl+1,Math.max(1,lvl-1),cell.seed,'rgba(255,255,255,.66)');}
  function drawFactory(x,y,cell){var lvl=cell.lvl,b=buildingBase(x,y,cell,lvl);
    b.bx=px(b.bx-b.pxs*0.5);b.w=px(b.w+b.pxs);           // a touch wider than a house
    shadow(b);ctx.fillStyle=pal.fac[lvl-1];ctx.fillRect(b.bx,b.by,b.w,b.h);
    ctx.fillStyle=pal.facRoof;ctx.fillRect(b.bx,b.by,b.w,Math.round(b.pxs*1.2));outline(b);
    // twin vent pipes — distinguishes a Factory from Works' single stack
    var pw=Math.max(2,px(b.pxs*0.7));
    ctx.fillStyle=pal.facPipe;ctx.fillRect(b.bx+b.pxs,b.by-Math.round(b.pxs*1.4),pw,Math.round(b.pxs*1.4));
    ctx.fillRect(b.bx+b.w-b.pxs*2,b.by-Math.round(b.pxs*2),pw,Math.round(b.pxs*2));
    windows(b,lvl+1,Math.max(1,lvl),cell.seed,'rgba(255,255,255,.72)');}
  function drawCue(x,y,kind){var cx=x+CELL/2;
    if(kind==='disc'){ctx.fillStyle=pal.starve;ctx.fillRect(cx-1,y+4,2,6);ctx.fillRect(cx-1,y+12,2,2);}
    else if(kind==='pow'){ctx.fillStyle=pal.cuePow;ctx.fillRect(cx,y+4,2,4);ctx.fillRect(cx-2,y+7,4,2);ctx.fillRect(cx-1,y+8,2,4);}
    else if(kind==='wat'){ctx.fillStyle=pal.cueWat;ctx.fillRect(cx-1,y+4,2,2);ctx.fillRect(cx-2,y+6,4,2);ctx.fillRect(cx-1,y+8,2,2);}
    else if(kind==='mat'){ctx.fillStyle=pal.cueMat;ctx.fillRect(cx-2,y+5,4,4);}                       // solid cube = Materials
    else if(kind==='goods'){ctx.fillStyle=pal.cueGood;ctx.fillRect(cx-2,y+5,4,1);ctx.fillRect(cx-2,y+8,4,1);ctx.fillRect(cx-2,y+5,1,4);ctx.fillRect(cx+1,y+5,1,4);}}  // hollow box = Goods

  function draw(){
    if(!cols)return;
    ctx.save();ctx.setTransform(dpr,0,0,dpr,0,0);ctx.imageSmoothingEnabled=false;
    drawGridPaper();
    var c,r,cell,x,y;
    // coverage overlay for the active utility brush (so placement is legible)
    if((brush==='power'||brush==='water')&&(brush==='power'?powered:watered)){
      var arr=brush==='power'?powered:watered;
      ctx.fillStyle=brush==='power'?'rgba(224,169,62,.15)':'rgba(76,154,209,.15)';
      for(r=0;r<rows;r++)for(c=0;c<cols;c++)if(arr[idx(c,r)])ctx.fillRect(c*CELL+1,r*CELL+1,CELL-2,CELL-2);
    }
    // roads + highway first
    for(r=0;r<rows;r++)for(c=0;c<cols;c++){cell=grid[idx(c,r)];if(!cell)continue;x=c*CELL;y=r*CELL;
      if(cell.t==='highway')drawHighway(x,y,c);else if(cell.t==='road')drawRoad(x,y,c,r);}
    // structures
    for(r=0;r<rows;r++)for(c=0;c<cols;c++){
      cell=grid[idx(c,r)];if(!cell)continue;var t=cell.t;if(t==='empty'||t==='road'||t==='highway')continue;
      x=c*CELL;y=r*CELL;
      if(t==='park'){drawPark(x,y,cell);continue;}
      if(t==='power'){drawPlant(x,y,cell);continue;}
      if(t==='water'){drawTower(x,y,cell);continue;}
      // zones: draw lot/building, then a cue for what's missing
      if(cell.lvl<1){ctx.fillStyle=pal.lot;ctx.fillRect(x+2,y+2,CELL-4,CELL-4);}
      else if(t==='res')drawHome(x,y,cell);else if(t==='com')drawShop(x,y,cell);else if(t==='ind')drawWorks(x,y,cell);else drawFactory(x,y,cell);
      if(cell.lvl<MAXLVL){var bl=connected?blocker(c,r):'';if(bl)drawCue(x,y,bl);}
    }
    // cars on top
    for(var i=0;i<cars.length;i++){var car=cars[i];var fx=(car.cc+(car.tc-car.cc)*car.p+0.5)*CELL,fy=(car.cr+(car.tr-car.cr)*car.p+0.5)*CELL;ctx.fillStyle=pal.car[car.tint];ctx.fillRect(px(fx-2),px(fy-2),4,4);}
    ctx.restore();
  }

  Array.prototype.forEach.call(document.querySelectorAll('[data-sw]'),function(el){el.style.background=SWATCH[el.getAttribute('data-sw')];});
  new MutationObserver(readTheme).observe(document.documentElement,{attributes:true,attributeFilter:['data-theme']});
  matchMedia('(prefers-color-scheme:dark)').addEventListener('change',readTheme);

  // ---- save / load ----
  var saveTimer=0;
  function scheduleSave(){clearTimeout(saveTimer);saveTimer=setTimeout(save,400);}
  function save(){try{var out=[];for(var r=0;r<rows;r++)for(var c=0;c<cols;c++){var g=grid[idx(c,r)];if(g&&g.t!=='empty'&&g.t!=='highway')out.push([c,r,g.t,g.lvl]);}
    localStorage.setItem(SAVE_KEY,JSON.stringify({v:5,ms:maxMS,mat:matStock,goods:goodsStock,cells:out}));}catch(e){}}
  function load(){try{var raw=localStorage.getItem(SAVE_KEY);if(!raw)return;var d=JSON.parse(raw);
    var list=Array.isArray(d)?d:(d.cells||[]);if(!Array.isArray(d)&&typeof d.ms==='number')maxMS=d.ms;
    if(!Array.isArray(d)){if(typeof d.mat==='number')matStock=d.mat;if(typeof d.goods==='number')goodsStock=d.goods;}
    list.forEach(function(a){var c=a[0],r=a[1];if(inB(c,r)){var g=grid[idx(c,r)];if(g.t==='highway')return;g.t=a[2];g.lvl=a[3]||0;g.grow=0;g.pulse=-9999;}});
    dirty=true;}catch(e){}}

  // ---- animation loop ----
  var lastFrame=performance.now(),lastAmbient=0;
  function anyPulse(){var now=performance.now();for(var i=0;i<grid.length;i++){if(grid[i]&&now-grid[i].pulse<380)return true;}return false;}
  function frame(now){
    var dt=Math.min(0.05,(now-lastFrame)/1000);lastFrame=now;
    if(svcDirty){computeServices();svcDirty=false;dirty=true;}
    if(popShown!==popTarget){var d=popTarget-popShown;popShown+=Math.abs(d)<=2?d:Math.ceil(d/8);popEl.textContent=popShown.toLocaleString();dirty=true;}
    if(cars.length)updateCars(dt);
    if(dirty||anyPulse()){draw();dirty=false;lastAmbient=now;}
    else if(cars.length&&now-lastAmbient>33){draw();lastAmbient=now;}
    requestAnimationFrame(frame);
  }

  // ---- boot ----
  readTheme();
  window.addEventListener('resize',resize);
  resize();load();ensureHighway();seedRampIfEmpty();
  computeServices();updatePop();computeDemand();computeResources();updateDemandUI();updateResourceUI();
  roadList=[];for(var r0=0;r0<rows;r0++)for(var c0=0;c0<cols;c0++){var tt=grid[idx(c0,r0)].t;if(tt==='road'||tt==='highway')roadList.push([c0,r0]);}
  manageCars();
  requestAnimationFrame(frame);
  setInterval(tick,650);
})();
</script>
<script src="/assets/site.js"></script>
</body>
</html>
