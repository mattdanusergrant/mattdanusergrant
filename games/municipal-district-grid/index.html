<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Municipal District Grid</title>
<meta name="description" content="A streamlined 2D city builder — zone the grid, watch the district grow. From Must Design Games." />
<!-- theme-init: read saved theme before paint (matches the rest of MDG.com) -->
<script>!function(){var t=localStorage.getItem('theme')||(matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');document.documentElement.setAttribute('data-theme',t)}()</script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/assets/site.css" />
<style>
  html,body{height:100%}
  body{
    margin:0;background:var(--bg);color:var(--ink);
    font-family:'Inter',system-ui,-apple-system,sans-serif;
    display:flex;flex-direction:column;height:100dvh;overflow:hidden;
    -webkit-font-smoothing:antialiased;
    transition:background .5s ease,color .5s ease;
  }

  /* ---- top bar (slim, site-styled) ---- */
  .bar{
    display:flex;align-items:center;gap:14px;
    padding:10px clamp(12px,3vw,22px);
    border-bottom:1.5px solid var(--line);
    background:var(--bg);flex-shrink:0;
  }
  .bar .home{font-family:'Fraunces',serif;font-weight:600;font-size:15px;color:var(--muted);text-decoration:none;letter-spacing:-.01em;transition:color .15s;white-space:nowrap}
  .bar .home:hover{color:var(--ink)}
  .bar .title{font-family:'Fraunces',serif;font-weight:600;font-size:clamp(14px,3.6vw,19px);letter-spacing:-.02em;color:var(--ink);white-space:nowrap}
  .bar .title b{color:var(--ink)}
  .bar .spacer{flex:1}
  .stat{display:flex;flex-direction:column;align-items:flex-end;line-height:1.05}
  .stat .n{font-family:'Fraunces',serif;font-weight:600;font-size:clamp(16px,4.4vw,22px);color:var(--ink);font-variant-numeric:tabular-nums}
  .stat .l{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);font-weight:500}

  /* ---- play area ---- */
  .stage{position:relative;flex:1;min-height:0}
  canvas{display:block;width:100%;height:100%;touch-action:none;cursor:crosshair}

  /* ---- toolbar ---- */
  .tools{
    display:flex;align-items:center;gap:8px;flex-wrap:wrap;
    padding:9px clamp(12px,3vw,22px);
    border-top:1.5px solid var(--line);background:var(--bg);flex-shrink:0;
  }
  .tool{
    display:flex;align-items:center;gap:7px;cursor:pointer;
    font-family:'Inter',sans-serif;font-size:13px;font-weight:500;color:var(--ink-2);
    background:var(--paper);border:1.5px solid var(--line-2);border-radius:9px;
    padding:7px 11px;transition:border-color .15s,transform .1s,background .15s;
    user-select:none;
  }
  .tool:hover{border-color:var(--ink)}
  .tool:active{transform:translateY(1px)}
  .tool.sel{border-color:var(--ink);background:var(--ink);color:var(--bg)}
  .tool .sw{width:13px;height:13px;border-radius:3px;box-shadow:inset 0 0 0 1.5px rgba(0,0,0,.18)}
  .tool .key{font-size:10px;color:var(--muted);border:1px solid var(--line-2);border-radius:4px;padding:0 4px;line-height:15px}
  .tool.sel .key{color:var(--bg);border-color:rgba(255,255,255,.35)}
  .tools .spacer{flex:1}
  .hint{font-size:12px;color:var(--muted);max-width:340px;line-height:1.4}
  @media(max-width:560px){.hint{display:none}}

  /* the theme toggle inherits site.css styling; just space it */
  .theme-toggle{background:none;border:none;cursor:pointer;padding:0;flex-shrink:0}
</style>
</head>
<body>

  <header class="bar">
    <a class="home" href="/" title="Back to mattdanusergrant.com">← MDG</a>
    <span class="title">Municipal&nbsp;<b>District&nbsp;Grid</b></span>
    <span class="spacer"></span>
    <div class="stat"><span class="n" id="pop">0</span><span class="l">Population</span></div>
    <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Toggle light / dark mode" title="Toggle light / dark"><span class="toggle-track"><span class="toggle-thumb"><svg class="t-sun" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="4.2"/><path d="M12 2.5v2.6M12 18.9v2.6M4.6 4.6l1.9 1.9M17.5 17.5l1.9 1.9M2.5 12h2.6M18.9 12h2.6M4.6 19.4l1.9-1.9M17.5 6.5l1.9-1.9"/></svg><svg class="t-moon" viewBox="0 0 24 24" aria-hidden="true"><path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8z"/></svg></span></span></button>
  </header>

  <div class="stage"><canvas id="city"></canvas></div>

  <footer class="tools" id="tools">
    <div class="tool sel" data-brush="road"><span class="sw" data-sw="road"></span>Road<span class="key">1</span></div>
    <div class="tool" data-brush="res"><span class="sw" data-sw="res"></span>Homes<span class="key">2</span></div>
    <div class="tool" data-brush="com"><span class="sw" data-sw="com"></span>Shops<span class="key">3</span></div>
    <div class="tool" data-brush="ind"><span class="sw" data-sw="ind"></span>Works<span class="key">4</span></div>
    <div class="tool" data-brush="bulldoze"><span class="sw" data-sw="bulldoze"></span>Clear<span class="key">5</span></div>
    <span class="spacer"></span>
    <span class="hint">Paint <b>roads</b>, then zone beside them — buildings grow where a zone touches a road. Drag to paint.</span>
  </footer>

<script>
/* ============================================================
   Municipal District Grid — v0.1
   A streamlined 2D city builder. Zone the grid, watch it grow.
   Vanilla JS, zero-build. Themed to MDG.com (light/dark toggle).
   ============================================================ */
(function(){
  'use strict';

  var canvas=document.getElementById('city'), ctx=canvas.getContext('2d');
  var CELL=30;               // logical px per cell (scaled to DPR on draw)
  var cols=0, rows=0, dpr=1;
  var grid=[];               // flat array of cells
  var brush='road';
  var painting=false, lastPaint=-1;

  // cell: {t:'empty'|'road'|'res'|'com'|'ind', lvl:0, grow:0, seed:0}
  function idx(c,r){return r*cols+c;}
  function inBounds(c,r){return c>=0&&r>=0&&c<cols&&r<rows;}

  // ---- theme-aware palettes (buildings). Grid/paper read from CSS vars. ----
  var PAL={
    light:{
      road:'#B9B3A2', roadEdge:'#A49E8C', roadLine:'#E7E2D4',
      res:['#6FA36A','#5C9256','#4C8047'], resRoof:'#3C6A38', win:'#F5EFDE',
      com:['#5C8FBE','#4E7FAE','#41709C'], comRoof:'#365B7E',
      ind:['#C99A54','#BC8A43','#A9792F'], indRoof:'#7E5B24',
      lot:'rgba(0,0,0,.045)'
    },
    dark:{
      road:'#514C43', roadEdge:'#403C34', roadLine:'#6A6459',
      res:['#6FA96E','#5E9760','#4F8553'], resRoof:'#39663B', win:'#EDE8DF',
      com:['#5F97C8','#5286B6','#4676A2'], comRoof:'#31567A',
      ind:['#D8A455','#C89446','#B27F33'], indRoof:'#7C5822',
      lot:'rgba(255,255,255,.05)'
    }
  };
  var SWATCH={road:'#9c968a',res:'#5C9256',com:'#4E7FAE',ind:'#BC8A43',bulldoze:'#c96a5a'};

  function themeName(){
    var d=document.documentElement.getAttribute('data-theme');
    if(d) return d==='dark'?'dark':'light';
    return matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';
  }
  function cssVar(n){return getComputedStyle(document.documentElement).getPropertyValue(n).trim();}
  var pal, C={};
  function readTheme(){
    pal=PAL[themeName()];
    C.bg=cssVar('--bg'); C.paper=cssVar('--paper');
    C.line=cssVar('--line'); C.line2=cssVar('--line-2'); C.muted=cssVar('--muted');
  }

  // ---- sizing ----
  function resize(){
    var st=canvas.parentNode.getBoundingClientRect();
    dpr=Math.min(window.devicePixelRatio||1,2);
    canvas.width=Math.round(st.width*dpr);
    canvas.height=Math.round(st.height*dpr);
    var nc=Math.max(6,Math.floor(st.width/CELL));
    var nr=Math.max(6,Math.floor(st.height/CELL));
    if(nc!==cols||nr!==rows){
      var old=grid, oc=cols, or=rows;
      cols=nc; rows=nr; grid=new Array(cols*rows);
      for(var r=0;r<rows;r++)for(var c=0;c<cols;c++){
        grid[idx(c,r)]=(old&&c<oc&&r<or)?old[r*oc+c]:{t:'empty',lvl:0,grow:0,seed:(c*7+r*13)%97};
      }
    }
    draw();
  }

  // ---- interaction ----
  function cellFromEvent(e){
    var rect=canvas.getBoundingClientRect();
    var x=(e.clientX-rect.left)/rect.width*canvas.width/dpr;
    var y=(e.clientY-rect.top)/rect.height*canvas.height/dpr;
    return {c:Math.floor(x/CELL), r:Math.floor(y/CELL)};
  }
  function paintAt(c,r){
    if(!inBounds(c,r))return;
    var i=idx(c,r); if(i===lastPaint)return; lastPaint=i;
    var cell=grid[i];
    if(brush==='bulldoze'){cell.t='empty';cell.lvl=0;cell.grow=0;}
    else if(brush==='road'){cell.t='road';cell.lvl=0;cell.grow=0;}
    else{ // zone
      if(cell.t!==brush){cell.t=brush;cell.lvl=0;cell.grow=0;}
    }
    draw();
  }
  function down(e){e.preventDefault();painting=true;lastPaint=-1;var p=cellFromEvent(e);paintAt(p.c,p.r);}
  function move(e){if(!painting)return;var p=cellFromEvent(e);paintAt(p.c,p.r);}
  function up(){painting=false;lastPaint=-1;}
  canvas.addEventListener('pointerdown',down);
  canvas.addEventListener('pointermove',move);
  window.addEventListener('pointerup',up);
  canvas.addEventListener('contextmenu',function(e){e.preventDefault();});

  // ---- brush selection ----
  var tools=document.getElementById('tools');
  function selectBrush(b){
    brush=b;
    Array.prototype.forEach.call(tools.querySelectorAll('.tool'),function(el){
      el.classList.toggle('sel',el.getAttribute('data-brush')===b);
    });
  }
  tools.addEventListener('click',function(e){
    var t=e.target.closest('.tool'); if(t)selectBrush(t.getAttribute('data-brush'));
  });
  window.addEventListener('keydown',function(e){
    var m={'1':'road','2':'res','3':'com','4':'ind','5':'bulldoze'}[e.key];
    if(m)selectBrush(m);
  });

  // ---- simulation: zones grow if orthogonally adjacent to a road ----
  function nearRoad(c,r){
    return (inBounds(c-1,r)&&grid[idx(c-1,r)].t==='road')||
           (inBounds(c+1,r)&&grid[idx(c+1,r)].t==='road')||
           (inBounds(c,r-1)&&grid[idx(c,r-1)].t==='road')||
           (inBounds(c,r+1)&&grid[idx(c,r+1)].t==='road');
  }
  var GROW_STEPS=6, MAXLVL=3;
  function tick(){
    var changed=false;
    for(var r=0;r<rows;r++)for(var c=0;c<cols;c++){
      var cell=grid[idx(c,r)];
      if(cell.t==='res'||cell.t==='com'||cell.t==='ind'){
        if(cell.lvl<MAXLVL && nearRoad(c,r)){
          cell.grow++;
          if(cell.grow>=GROW_STEPS){cell.grow=0;cell.lvl++;changed=true;}
        }
      }
    }
    updatePop();
    if(changed)draw();
  }
  var popEl=document.getElementById('pop'), popShown=0, popTarget=0;
  function updatePop(){
    var p=0;
    for(var i=0;i<grid.length;i++){
      var cell=grid[i]; if(!cell)continue;
      if(cell.t==='res')p+=cell.lvl*cell.lvl*45;
      else if(cell.t==='com')p+=cell.lvl*20;
      else if(cell.t==='ind')p+=cell.lvl*14;
    }
    popTarget=p;
  }
  // smooth count-up for the headline number
  function animPop(){
    if(popShown!==popTarget){
      var d=popTarget-popShown;
      popShown+= Math.abs(d)<=2 ? d : Math.ceil(d/8);
      popEl.textContent=popShown.toLocaleString();
    }
    requestAnimationFrame(animPop);
  }

  // ---- rendering ----
  function px(v){return Math.round(v);}
  function drawGridPaper(){
    ctx.fillStyle=C.bg; ctx.fillRect(0,0,cols*CELL,rows*CELL);
    // minor lines every cell, major every 5 (engineering grid paper)
    ctx.lineWidth=1;
    for(var c=0;c<=cols;c++){
      ctx.strokeStyle=(c%5===0)?C.line2:C.line;
      ctx.beginPath();ctx.moveTo(px(c*CELL)+0.5,0);ctx.lineTo(px(c*CELL)+0.5,rows*CELL);ctx.stroke();
    }
    for(var r=0;r<=rows;r++){
      ctx.strokeStyle=(r%5===0)?C.line2:C.line;
      ctx.beginPath();ctx.moveTo(0,px(r*CELL)+0.5);ctx.lineTo(cols*CELL,px(r*CELL)+0.5);ctx.stroke();
    }
  }
  function drawRoad(x,y,c,r){
    ctx.fillStyle=pal.road; ctx.fillRect(x+2,y+2,CELL-4,CELL-4);
    ctx.fillStyle=pal.roadEdge; ctx.fillRect(x+2,y+2,CELL-4,2); ctx.fillRect(x+2,y+CELL-4,CELL-4,2);
    // dashed centre line, oriented toward connected neighbours
    var horiz=(inBounds(c-1,r)&&grid[idx(c-1,r)].t==='road')||(inBounds(c+1,r)&&grid[idx(c+1,r)].t==='road');
    ctx.fillStyle=pal.roadLine; var mid=CELL/2;
    if(horiz||!( (inBounds(c,r-1)&&grid[idx(c,r-1)].t==='road')||(inBounds(c,r+1)&&grid[idx(c,r+1)].t==='road') )){
      for(var dx=4;dx<CELL-4;dx+=8) ctx.fillRect(x+dx,y+mid-1,4,2);
    } else {
      for(var dy=4;dy<CELL-4;dy+=8) ctx.fillRect(x+mid-1,y+dy,2,4);
    }
  }
  // pixel-art building: chunky body scaled by level, roof band, window dots
  function drawBuilding(x,y,cell){
    var kind=cell.t, lvl=cell.lvl;
    ctx.fillStyle=pal.lot; ctx.fillRect(x+2,y+2,CELL-4,CELL-4); // zoned lot tint
    if(lvl<1)return; // zoned but not yet built — just the lot
    var body=pal[kind][lvl-1];
    var roof=kind==='res'?pal.resRoof:kind==='com'?pal.comRoof:pal.indRoof;
    var pxs=Math.round(CELL/10);                 // one "pixel" of the sprite
    var w=(3+lvl)*pxs, h=(3+lvl)*pxs;            // footprint grows with level
    var bx=px(x+(CELL-w)/2), by=px(y+(CELL-h)/2);
    // shadow
    ctx.fillStyle='rgba(0,0,0,.10)'; ctx.fillRect(bx+pxs,by+h-pxs,w,pxs);
    // body
    ctx.fillStyle=body; ctx.fillRect(bx,by,w,h);
    // roof band
    ctx.fillStyle=roof; ctx.fillRect(bx,by,w,pxs*1.4);
    // outline
    ctx.fillStyle='rgba(0,0,0,.16)';
    ctx.fillRect(bx,by,w,1); ctx.fillRect(bx,by+h-1,w,1);
    ctx.fillRect(bx,by,1,h); ctx.fillRect(bx+w-1,by,1,h);
    // windows — a little grid of lit pixels, more with level
    ctx.fillStyle=kind==='res'?pal.win:'rgba(255,255,255,.72)';
    var cellsAcross=lvl+1;
    var gap=pxs, wsz=pxs*0.9;
    var startX=bx+pxs, startY=by+pxs*2;
    for(var wy=0;wy<cellsAcross;wy++)for(var wx=0;wx<cellsAcross;wx++){
      var lx=startX+wx*(wsz+gap*0.4), ly=startY+wy*(wsz+gap*0.4);
      if(ly+wsz<by+h-pxs*0.5 && lx+wsz<bx+w-pxs*0.4 && (cell.seed+wx*3+wy*7)%5!==0)
        ctx.fillRect(px(lx),px(ly),Math.max(2,px(wsz)),Math.max(2,px(wsz)));
    }
  }
  function draw(){
    if(!cols)return;
    ctx.save();
    ctx.setTransform(dpr,0,0,dpr,0,0);
    ctx.imageSmoothingEnabled=false;
    drawGridPaper();
    for(var r=0;r<rows;r++)for(var c=0;c<cols;c++){
      var cell=grid[idx(c,r)]; if(!cell||cell.t==='empty')continue;
      var x=c*CELL, y=r*CELL;
      if(cell.t==='road')drawRoad(x,y,c,r);
      else drawBuilding(x,y,cell);
    }
    ctx.restore();
  }

  // ---- swatches on the toolbar ----
  Array.prototype.forEach.call(document.querySelectorAll('[data-sw]'),function(el){
    el.style.background=SWATCH[el.getAttribute('data-sw')];
  });

  // ---- react to theme toggle: re-read palette + redraw ----
  new MutationObserver(function(){readTheme();draw();})
    .observe(document.documentElement,{attributes:true,attributeFilter:['data-theme']});
  matchMedia('(prefers-color-scheme:dark)').addEventListener('change',function(){readTheme();draw();});

  // ---- boot ----
  readTheme();
  window.addEventListener('resize',resize);
  resize();
  updatePop(); requestAnimationFrame(animPop);
  setInterval(tick,650);
})();
</script>
<script src="/assets/site.js"></script>
</body>
</html>
