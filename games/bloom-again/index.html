<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Bloom Again · Stable Build Coming</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
<!-- #LLM-generated - stable build placeholder -->
<style>
  :root{--bg:#FBF8F2;--ink:#15161C;--ink-2:#2A2A2A;--muted:#6A6A6A;--line:#E5E0D2;--line-2:#CBC4B2}
  *,*::before,*::after{box-sizing:border-box}
  html,body{margin:0;padding:0;height:100%}
  body{background:var(--bg);color:var(--ink);font-family:'Inter',system-ui,sans-serif;font-size:16px;line-height:1.55;-webkit-font-smoothing:antialiased;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:28px}
  h1{font-family:'Fraunces',serif;font-weight:500;font-size:clamp(28px,6vw,44px);letter-spacing:-0.02em;margin:0 0 12px;line-height:1.1}
  p{color:var(--muted);margin:0 0 32px;font-size:15px}
  .links{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
  .btn-edge{font-family:'Fraunces',serif;font-size:14px;font-weight:500;color:var(--ink);border:1.5px solid var(--line-2);border-radius:999px;padding:7px 18px 8px;transition:border-color .15s}
  .btn-edge:hover{border-color:var(--ink);text-decoration:none}
  .btn-back{font-family:'Fraunces',serif;font-size:14px;font-weight:500;color:var(--muted);text-decoration:none;padding:7px 4px;transition:color .15s}
  .btn-back:hover{color:var(--ink)}
  a{color:inherit;text-decoration:none}
</style>
</head>
<body>
  <h1>Bloom Again</h1>
  <p>Stable build not yet uploaded.<br>Try the live edge build while you wait.</p>
  <div class="links">
    <a class="btn-edge" href="https://mattdanusergrant.github.io/mustdesigngames/bloom-again/" target="_blank" rel="noopener">Play Edge build →</a>
    <a class="btn-back" href="/design-lab.html">← Back to Design Lab</a>
  </div>
</body>
</html>
