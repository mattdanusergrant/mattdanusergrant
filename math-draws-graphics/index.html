<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Math Draws Graphics · MDG</title>
<script>!function(){var t=localStorage.getItem('theme')||(matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');document.documentElement.setAttribute('data-theme',t);addEventListener('storage',function(e){if(e.key==='theme'&&e.newValue)document.documentElement.setAttribute('data-theme',e.newValue)})}()</script>

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

<style>

  :root{
    --bg:#FBF8F2; --paper:#FFFFFF; --ink:#15161C; --ink-2:#2A2A2A; --muted:#6A6A6A;
    --line:#E5E0D2; --line-2:#CBC4B2; --accent:#E8A317; --stage:#0a0a14;
  }
  [data-theme="dark"]{
    --bg:#13110E; --paper:#1D1A16; --ink:#EDE8DF; --ink-2:#CAC5BC; --muted:#7A756D;
    --line:#2C2924; --line-2:#3C3830;
  }
  @media(prefers-color-scheme:dark){:root:not([data-theme="light"]){
    --bg:#13110E; --paper:#1D1A16; --ink:#EDE8DF; --ink-2:#CAC5BC; --muted:#7A756D;
    --line:#2C2924; --line-2:#3C3830;
  }}
  *{box-sizing:border-box; margin:0; padding:0}
  html,body{height:100%}
  body{
    font-family:'Inter',system-ui,-apple-system,Segoe UI,Roboto,sans-serif; font-size:14px; line-height:1.4;
    color:var(--ink); background:var(--bg); overflow:hidden;
    -webkit-tap-highlight-color:transparent; -webkit-font-smoothing:antialiased;
  }
  .app{display:flex; height:100dvh}
  .stage{flex:1; position:relative; background:var(--stage); min-width:0; overflow:hidden}
  #c{cursor:grab; touch-action:none; transform-origin:center center; will-change:transform}
  .resetview{position:absolute; top:10px; right:10px; z-index:5; font:inherit; font-size:12px;
    background:var(--paper); color:var(--ink); border:1.5px solid var(--line-2);
    border-radius:999px; padding:6px 12px; cursor:pointer; opacity:.92}
  .resetview:hover{border-color:var(--ink)}
  canvas{display:block; width:100%; height:100%; touch-action:none}

  .panel{
    width:320px; flex:none; order:-1; background:var(--paper); border-right:1.5px solid var(--line);
    display:flex; flex-direction:column; overflow-y:auto;
  }
  .head{padding:18px 18px 14px; border-bottom:1.5px solid var(--line)}
  .actions{display:flex; gap:8px}
  .actions button{flex:1}
  .titlecard{background:var(--bg); border:1.5px solid var(--line-2); border-radius:12px; padding:13px 16px; margin-bottom:12px}
  .titlecard h1{margin:0; font-family:'Fraunces',Georgia,serif; font-weight:500; font-size:clamp(21px,5vw,27px);
    line-height:1.0; letter-spacing:-0.01em; color:var(--ink)}
  .titlecard .tag{margin:8px 0 0; color:var(--muted); font-style:italic; font-size:12.5px}
  button{
    font:inherit; font-family:'Fraunces',serif; font-weight:500; color:var(--ink); cursor:pointer;
    background:transparent; border:1.5px solid var(--line-2); border-radius:999px;
    padding:8px 12px; transition:.15s;
  }
  button:hover{border-color:var(--ink); color:var(--ink)}
  button:active{transform:translateY(1px)}
  button.go{background:var(--ink); color:var(--bg); border:1.5px solid var(--ink)}
  button.go:hover{background:var(--ink-2); border-color:var(--ink-2); color:var(--bg)}
  button.mini{background:transparent; border:none; color:var(--muted); font-family:'Inter',sans-serif; font-size:11.5px; padding:6px 2px 0; text-align:left}
  button.mini:hover{color:var(--ink); border:none}

  .tabs{display:grid; grid-template-columns:1fr 1fr; gap:6px; padding:12px 16px}
  .tabs button{padding:8px 6px; font-size:13px}
  .tabs button.on{background:var(--ink); color:var(--bg); border-color:var(--ink)}

  .section{padding:6px 18px 16px}
  .section h3{
    font-family:'Inter',sans-serif; font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--muted);
    margin:14px 0 9px; font-weight:600;
  }
  .ctrl{margin:11px 0}
  .ctrl label{display:flex; justify-content:space-between; align-items:baseline; color:var(--muted); margin-bottom:5px}
  .ctrl .val{color:var(--ink); font-variant-numeric:tabular-nums; font-weight:600}
  input[type=range]{width:100%; accent-color:var(--accent); cursor:pointer}
  input[type=color]{
    width:100%; height:34px; background:var(--paper); border:1.5px solid var(--line-2);
    border-radius:8px; cursor:pointer; padding:3px;
  }
  .row{display:flex; gap:10px}
  .row>*{flex:1}

  .seg{display:flex; background:transparent; border:1.5px solid var(--line-2); border-radius:999px; overflow:hidden}
  .seg button{flex:1; border:none; border-radius:0; background:transparent; padding:8px 4px; font-size:12.5px; font-weight:500}
  .seg button.on{background:var(--ink); color:var(--bg)}
  .seg button:hover:not(.on){color:var(--ink)}

  .toggle{display:flex; align-items:center; justify-content:space-between; padding:8px 0; color:var(--muted)}
  .toggle input{width:18px; height:18px; accent-color:var(--accent); cursor:pointer}
  .toggle span{color:var(--ink); font-weight:500}

  .codehint{color:var(--muted); font-size:11px; margin-bottom:8px; line-height:1.5}
  textarea#code{
    width:100%; min-height:240px; resize:vertical; tab-size:2;
    background:var(--bg); color:var(--ink); border:1.5px solid var(--line-2); border-radius:10px;
    padding:10px; font:12.5px/1.5 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; white-space:pre;
  }
  textarea#code:focus{outline:none; border-color:var(--ink)}
  .err{color:#b4543a; font-size:11.5px; margin-top:7px; min-height:14px; font-family:ui-monospace,monospace; white-space:pre-wrap}
  .exrow{display:flex; flex-wrap:wrap; gap:6px; align-items:center; margin-bottom:8px}
  .exrow .exlabel{color:var(--muted); font-size:11px; margin-right:2px}
  .exrow button{background:transparent; border:1.5px solid var(--line-2); border-radius:999px; color:var(--ink); font-size:11.5px; padding:4px 11px; cursor:pointer}
  .exrow button:hover{border-color:var(--ink); color:var(--ink)}

  /* example picker: dropdown + prev/next steppers (replaces the long list) */
  .exnav{display:flex; gap:8px; align-items:stretch}
  .selwrap{position:relative; flex:1; min-width:0; display:flex}
  .selwrap::after{content:''; position:absolute; right:14px; top:50%; width:7px; height:7px; pointer-events:none;
    border-right:2px solid var(--muted); border-bottom:2px solid var(--muted); transform:translateY(-70%) rotate(45deg)}
  #ex-select{
    flex:1; min-width:0; appearance:none; -webkit-appearance:none;
    font-family:'Fraunces',serif; font-weight:500; font-size:14.5px; color:var(--ink);
    background:var(--bg); border:1.5px solid var(--line-2); border-radius:999px;
    padding:9px 30px 9px 15px; cursor:pointer; transition:.15s;
  }
  #ex-select:hover{border-color:var(--ink)}
  #ex-select:focus{outline:none; border-color:var(--ink)}
  .exstep{flex:none; width:40px; padding:8px 0; font-size:12px; color:var(--muted)}
  .exstep:hover{color:var(--ink); border-color:var(--ink)}

  .hint{padding:14px 18px 20px; color:var(--muted); font-size:11.5px; line-height:1.6; border-top:1.5px solid var(--line)}
  .hint b{color:var(--ink); font-weight:600}
  kbd{background:var(--bg); border:1px solid var(--line); border-bottom-width:2px; border-radius:5px;
    padding:1px 5px; font:inherit; font-family:ui-monospace,monospace; font-size:11px; color:var(--ink-2)}

  .info{color:var(--muted); font-size:12px; line-height:1.6}
  .info code{background:var(--bg); border:1px solid var(--line); border-radius:4px; padding:0 4px;
    color:var(--ink-2); font-size:11.5px; font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
  .info b{color:var(--ink); font-weight:600}
  .exrow button.on{background:var(--ink); color:var(--bg); border-color:var(--ink)}

  @media (max-width:820px){
    .app{flex-direction:column}
    .stage{height:52vh}
    .panel{width:auto; height:48vh; order:0; border-right:none; border-top:1.5px solid var(--line)}
  }

</style>

<body>
<div class="app">
  <div class="stage">
    <canvas id="c" title="Drag to pan · Shift-drag to spin in 3D · scroll to zoom · double-click to reset"></canvas>
    <button id="resetview" class="resetview" hidden>Reset view</button>
  </div>

  <aside class="panel">
    <div class="head">
      <header class="titlecard">
        <h1>Math<br>Draws<br>Graphics</h1>

      </header>
      <div class="actions">
        <button class="go" id="rand">🎲 Random</button>

<script>
"use strict";
const $ = s => document.querySelector(s);
const el = (t,c) => { const e = document.createElement(t); if(c) e.className = c; return e; };
const clamp = (v,a,b) => v < a ? a : v > b ? b : v;
const gcd = (a,b) => { a=Math.abs(a); b=Math.abs(b); while(b){ [a,b]=[b,a%b]; } return a||1; };
function hexA(h,a){ const n=parseInt(h.slice(1),16); return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${a})`; }
function hx(h){ const n=parseInt(h.slice(1),16); return [(n>>16)&255,(n>>8)&255,n&255]; }
function hexLerp(a,b,f){ const p=hx(a),q=hx(b); return `rgb(${Math.round(p[0]+(q[0]-p[0])*f)},${Math.round(p[1]+(q[1]-p[1])*f)},${Math.round(p[2]+(q[2]-p[2])*f)})`; }
function hslHex(h,s,l){ s/=100; l/=100; const k=n=>(n+h/30)%12; const a=s*Math.min(l,1-l);
  const f=n=>l-a*Math.max(-1,Math.min(k(n)-3,9-k(n),1)); const to=x=>Math.round(255*x).toString(16).padStart(2,'0');
  return `#${to(f(0))}${to(f(8))}${to(f(4))}`; }
const randHue = () => hslHex(Math.floor(Math.random()*360),85,60);

/* ---- state (math-example gallery: live code sketches only) ---- */
const style={ bg:'#0a0a14', trails:false };
const anim={ animate:true, evolveSpeed:0.5, phase:0 };

/* ---- code-sketch mode ---- */
const MANY_DOORS_SKETCH =
`// Many Doors, a long hallway lined with doors on both side walls.
// Animate ON; try Trails. ctx, w, h, t, TAU.

const N = 28, speed = 0.5, focal = Math.min(w, h) * 0.62, march = t * speed;
const cx = w / 2 + Math.sin(t * 0.7) * w * 0.012;
const cy = h / 2 + Math.sin(t * 1.3) * h * 0.008;
const WX = 0.40, HY = 0.52;          // corridor half width / height (world)
const DH = 0.80, GAP = 0.6;          // door height / door depth-span (world)

ctx.lineCap = 'butt';
ctx.lineJoin = 'miter';

// faint corridor: the four wall edges converging to the vanishing point
const e = focal;                     // scale at depth 1 (the nearest opening)
ctx.strokeStyle = 'rgba(255,255,255,0.14)';
ctx.lineWidth = 1;
ctx.beginPath();
ctx.moveTo(cx - WX*e, cy - HY*e); ctx.lineTo(cx, cy);
ctx.moveTo(cx + WX*e, cy - HY*e); ctx.lineTo(cx, cy);
ctx.moveTo(cx - WX*e, cy + HY*e); ctx.lineTo(cx, cy);
ctx.moveTo(cx + WX*e, cy + HY*e); ctx.lineTo(cx, cy);
ctx.stroke();

for (let i = N; i >= 1; i--) {
  const z = i - (march % 1);         // door near-edge depth, scrolling toward you
  if (z < 0.12) continue;            // stay drawn right up to the camera; drop only once it sweeps past
  const s = focal / z;
  if (WX * s < 0.4) continue;
  const zf = z + GAP, sf = focal / zf; // door far edge, set back along the wall
  // white on black: full bright through the approach, washing out only as it overtakes you (no pop)
  const pass = z > 0.4 ? 1 : Math.max(0, (z - 0.12) / 0.28);
  const alpha = Math.min(1, Math.max(0.05, 1.25 - z / N)) * pass;
  ctx.lineWidth = Math.min(9, Math.max(0.7, 4.2 / z));
  ctx.strokeStyle = 'rgba(255,255,255,' + alpha.toFixed(3) + ')';

  // one door on each side wall; near + far stiles ride the converging wall line,
  // verticals stay vertical, so each door foreshortens into a trapezoid
  for (let side = -1; side <= 1; side += 2) {
    const xn = cx + side * WX * s,   xf = cx + side * WX * sf;
    const floorN = cy + HY * s,      floorF = cy + HY * sf;
    const topN = cy + (HY - DH) * s, topF = cy + (HY - DH) * sf;
    ctx.beginPath();
    ctx.moveTo(xn, floorN); ctx.lineTo(xn, topN);
    ctx.lineTo(xf, topF);   ctx.lineTo(xf, floorF);
    ctx.closePath(); ctx.stroke();
  }
}`;
const TURNING_HALL_SKETCH =
`// Turning Hall, the corridor curves as you walk down it.
// Animate ON; try Trails. ctx, w, h, t, TAU.

const N = 22, speed = 0.5, focal = Math.min(w, h) * 0.62, march = t * speed;
const cy = h / 2 + Math.sin(t * 1.4) * h * 0.010;
const WX = 0.26, HY = 0.42;

ctx.lineCap = 'butt';
ctx.lineJoin = 'miter';

for (let i = N; i >= 1; i--) {
  const z = i - (march % 1);
  const s = focal / z;
  if (WX * s < 0.4) continue;
  // curving centre-line: far doors hold the vanishing point, near doors swing;
  // the wave travels toward you over time so you keep rounding the bend
  const bend = Math.sin(z * 0.45 - t * 0.9) * w * 0.16 * (1 - z / (N + 3));
  const dx = w / 2 + bend;
  const hue = (march * 45 + z * 14) % 360;
  const light = Math.max(10, 64 - z * 6);
  const alpha = Math.min(1, Math.max(0.05, 1.2 - z / N));
  ctx.strokeStyle = \`hsla(\${hue}, 85%, \${light}%, \${alpha})\`;
  ctx.lineWidth = Math.min(15, Math.max(0.8, 6.5 / z));
  const hw = WX * s, hh = HY * s, top = cy - hh, bot = cy + hh;
  ctx.beginPath();
  ctx.moveTo(dx - hw, bot); ctx.lineTo(dx - hw, top);
  ctx.lineTo(dx + hw, top); ctx.lineTo(dx + hw, bot);
  ctx.stroke();
}`;
const SWINGING_DOORS_SKETCH =
`// Swinging Doors, each door hinges open as you reach it.
// Animate ON; try Trails. ctx, w, h, t, TAU.

const N = 20, speed = 0.5, focal = Math.min(w, h) * 0.62, march = t * speed;
const cx = w / 2, cy = h / 2;
const WX = 0.28, HY = 0.44;

ctx.lineCap = 'butt';
ctx.lineJoin = 'miter';

for (let i = N; i >= 1; i--) {
  const z = i - (march % 1);
  const s = focal / z;
  if (WX * s < 0.4) continue;
  const hw = WX * s, hh = HY * s, top = cy - hh, bot = cy + hh;
  const hue = (march * 40 + z * 15) % 360;
  const light = Math.max(12, 66 - z * 6);
  const alpha = Math.min(1, Math.max(0.06, 1.2 - z / N));

  // openness ramps up as the door nears the camera
  const open = Math.min(1, Math.max(0, (6 - z) / 6));
  const theta = open * (Math.PI / 2) * 0.95;
  const hingeX = cx - hw;
  const freeX = hingeX + (2 * hw) * Math.cos(theta);
  const tilt = hh * 0.06 * open;

  // filled leaf (so a closed door occludes what's behind it)
  ctx.fillStyle = \`hsla(\${hue}, 70%, \${Math.max(8, light - 22)}%, \${0.85 * alpha})\`;
  ctx.beginPath();
  ctx.moveTo(hingeX, top);
  ctx.lineTo(freeX, top - tilt);
  ctx.lineTo(freeX, bot + tilt);
  ctx.lineTo(hingeX, bot);
  ctx.closePath(); ctx.fill();

  // door frame
  ctx.strokeStyle = \`hsla(\${hue}, 88%, \${light}%, \${alpha})\`;
  ctx.lineWidth = Math.min(15, Math.max(0.8, 6.5 / z));
  ctx.beginPath();
  ctx.moveTo(cx - hw, bot); ctx.lineTo(cx - hw, top);
  ctx.lineTo(cx + hw, top); ctx.lineTo(cx + hw, bot);
  ctx.stroke();

  // the swinging leaf's free edge
  ctx.strokeStyle = \`hsla(\${(hue + 30) % 360}, 90%, \${light + 8}%, \${alpha})\`;
  ctx.lineWidth = Math.min(8, Math.max(0.6, 4 / z));
  ctx.beginPath();
  ctx.moveTo(freeX, top - tilt); ctx.lineTo(freeX, bot + tilt);
  ctx.stroke();
}`;
const CARD_FAN_SKETCH =
`// Card Fan, an endless hand of cards spread about a hinge below the frame.
// Each card sits at fan angle theta and is rotated by the same theta, so the
// deck opens into an arc; the rank cascades through the fan and recycles,
// fanning out forever. Animate ON; try Trails. ctx, w, h, t, TAU.

const hx = w / 2, hy = h * 1.16;          // hinge (pivot) just below the canvas
const R  = Math.min(w, h) * 0.78;         // hinge -> card centre
const cw = Math.min(w, h) * 0.155;        // card width
const ch = cw * 1.45, rr = cw * 0.12;     // card height, corner radius
const spread = TAU * 0.34;                // total fan sweep (~122 deg)
const N = 23;                             // cards across the fan
const flow = t * 0.14;                    // continuous cascade

ctx.lineJoin = 'round';

// rounded-rect path, top-left at (x, y)
function rrect(x, y, ww, hh, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + ww, y, x + ww, y + hh, r);
  ctx.arcTo(x + ww, y + hh, x, y + hh, r);
  ctx.arcTo(x, y + hh, x, y, r);
  ctx.arcTo(x, y, x + ww, y, r);
  ctx.closePath();
}

// fan positions 0..1, drawn low-to-high so higher cards overlap (a real fan)
const fs = [];
for (let i = 0; i < N; i++) fs.push((((i / N + flow) % 1) + 1) % 1);
fs.sort((a, b) => a - b);

for (const f of fs) {
  const ang = -spread / 2 + f * spread;   // fan angle from vertical, left -> right
  const cx  = hx + Math.sin(ang) * R;
  const cy  = hy - Math.cos(ang) * R;     // centre rides a circle about the hinge
  const a   = Math.min(1, Math.min(f, 1 - f) / 0.05);  // fade both ends -> seamless loop
  const hue = (f * 300 + t * 24) % 360;

  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(ang);
  rrect(-cw / 2, -ch / 2, cw, ch, rr);
  ctx.fillStyle   = \`hsla(\${hue}, 55%, 8%, \${0.94 * a})\`;   // dark face occludes cards behind
  ctx.fill();
  ctx.lineWidth   = Math.max(1, cw * 0.05);
  ctx.strokeStyle = \`hsla(\${hue}, 85%, 62%, \${a})\`;
  ctx.stroke();
  ctx.beginPath();                                          // centre pip
  ctx.arc(0, 0, cw * 0.15, 0, TAU);
  ctx.fillStyle   = \`hsla(\${hue}, 85%, 64%, \${a})\`;
  ctx.fill();
  ctx.restore();
}`;
const WALK_SKETCH =
`// Walk Through Doors, first-person POV down an endless corridor.
// ARCHED = false -> squared corners; true -> round arches. Animate ON; try Trails.

const ARCHED = false;
const N      = 22;
const speed  = 0.55;
const focal  = Math.min(w, h) * 0.62;
const march  = t * speed;

const cx = w / 2 + Math.sin(t * 0.9) * w * 0.018;
const cy = h / 2 + Math.sin(t * 1.7) * h * 0.012;

ctx.lineCap = 'butt';
ctx.lineJoin = 'miter';

ctx.strokeStyle = 'hsla(0, 0%, 45%, 0.18)';
ctx.lineWidth = 1;
ctx.beginPath();
ctx.moveTo(0, 0); ctx.lineTo(cx, cy);
ctx.moveTo(w, 0); ctx.lineTo(cx, cy);
ctx.moveTo(0, h); ctx.lineTo(cx, cy);
ctx.moveTo(w, h); ctx.lineTo(cx, cy);
ctx.stroke();

for (let i = N; i >= 1; i--) {
  const z = i - (march % 1);
  const s = focal / z;
  const hw = 0.26 * s, hh = 0.42 * s;
  if (hw < 0.4) continue;
  const alpha = Math.min(1, Math.max(0.05, 1.2 - z / N));

  { name: 'Julia',           code: JULIA_SKETCH,       info: `The same map <code>z → z² + c</code>, but now <code>c</code> is fixed and the <b>starting</b> <code>z</code> is the pixel. Every <code>c</code> gives a different Julia set; this is <code>c = −0.8 + 0.156i</code>. <i>Raster: use PNG export.</i>` },
  { name: 'Grid of Life',    code: GRID_OF_LIFE_SKETCH,info: `Conway's <b>Game of Life</b>. Each cell counts its 8 neighbours: a live cell survives on 2–3, a dead cell is born on exactly 3. These two rules alone produce gliders, oscillators and chaos. It reseeds when it dies out.` },
  { name: 'Collatz',         code: COLLATZ_SKETCH,     info: `The <b>3n+1 conjecture</b>: from any <code>n</code>, take <code>n/2</code> if even or <code>3n+1</code> if odd, you always seem to reach 1. Each number's path is drawn from the root, turning by parity, overlapping into a coral. Unproven for 85+ years. <i>Raster: PNG.</i>` },
  { name: 'Barnsley Fern',   code: BARNSLEY_FERN_SKETCH, info: `An <b>iterated function system</b>: repeatedly apply one of four affine maps chosen at random (the "chaos game"). Pure randomness, yet the points always settle onto exactly the same fern. <i>Raster: use PNG export.</i>` },
  { name: 'Fourier',         code: FOURIER_SKETCH,     info: `Any periodic signal is a sum of sines. Here the odd harmonics <code>(4/nπ)·sin(n·t)</code> are drawn as stacked rotating circles; the tip's height traces a <b>square wave</b> on the right. This is the heart of Fourier analysis.` },
  { name: 'Hilbert Curve',   code: HILBERT_SKETCH,     info: `A <b>space-filling</b> fractal: one line that visits every cell of a grid without crossing itself, built by recursively rotating and linking four smaller copies. Points close on the line stay close in space, handy for image and database indexing.` },
  { name: 'Prime Spiral',    code: PRIME_SPIRAL_SKETCH,info: `<b>Ulam's spiral</b>. Write 1, 2, 3… along a square spiral and light up the primes. They fall on surprising diagonal streaks, the fingerprint of prime-rich polynomials like <code>4x²+bx+c</code>, still not fully understood.` },
  { name: 'Phyllotaxis',     code: PHYLLOTAXIS_SKETCH, info: `How a sunflower packs seeds. Seed <code>n</code> sits at angle <code>n × 137.5°</code>, the <b>golden angle</b>, <code>360°/φ²</code>, and radius <code>c·√n</code>. Because the golden angle never lines up, seeds fill space as tightly as possible.` },
  { name: 'Dragon Curve',    code: DRAGON_CURVE_SKETCH,info: `Fold a strip of paper in half again and again, then open every crease to 90°. The edge traces the <b>Heighway dragon</b>, a fractal that tiles the plane perfectly and never crosses itself.` },
  { name: 'Sierpinski',      code: SIERPINSKI_SKETCH,  info: `Take a triangle, remove its middle quarter, and repeat on the three corners forever. The limit has <b>zero area but infinite edge</b>, and it secretly appears in Pascal's triangle mod 2 and in the chaos game.` },
  { name: 'Koch Snowflake',  code: KOCH_SKETCH,        info: `Replace the middle third of every edge with a triangular bump, forever. The perimeter multiplies by <code>4/3</code> each step → <b>infinite length around a finite area</b>. Its fractal dimension is <code>log4/log3 ≈ 1.26</code>.` },
  { name: 'Pythagoras Tree', code: PYTHAGORAS_SKETCH,  info: `From a square, raise two smaller squares on top meeting at a right angle, the areas obey <code>a² + b² = c²</code>. Recurse on each new square. The branch angle (swaying here) decides how the "tree" leans.` },
  { name: "Metatron's Cube", code: METATRON_SKETCH,    info: `The 13 circles of the "Fruit of Life" (a centre, a hexagon at radius <code>2r</code>, another at <code>4r</code>) with a straight line joining <b>every</b> pair of centres. Those 78 lines contain the silhouettes of the Platonic solids.` },
  { name: 'Fibonacci',       code: FIBONACCI_SKETCH,   info: `The <b>golden spiral</b>. Squares with Fibonacci side lengths (1, 1, 2, 3, 5, 8…) tile a golden rectangle; a quarter-circle inside each square joins into a spiral that grows by <code>φ</code> every quarter-turn.` },
  { name: 'Lissajous',       code: LISSAJOUS_SKETCH,   info: `The table of curves <code>x = sin(a·θ), y = sin(b·θ)</code>. The frequency ratio <code>a:b</code> sets the knot; the animated phase makes each figure breathe. You see these whenever two signals drive an oscilloscope.` },
  { name: 'Doors',           code: WALK_SKETCH,        info: `A first-person corridor, a tiny lesson in <b>perspective projection</b>. An object at depth <code>z</code> appears at size proportional to <code>1/z</code>, so we loop depth layers, scale each by <code>focal/z</code>, and recycle the nearest one as you "walk" forward.` },
  { name: 'Many Doors',      code: MANY_DOORS_SKETCH,  info: `A long hallway lined with doors on both walls, from the same <code>1/z</code> perspective. Each door's near and far stiles ride the converging wall line at depths <code>z</code> and <code>z+gap</code>, while its verticals stay vertical, so every door foreshortens into a trapezoid. The whole rank scrolls toward you as you "walk".` },
  { name: 'Turning Hall',    code: TURNING_HALL_SKETCH,info: `A corridor whose centre-line bends by <code>sin(z·k − t)</code>, weighted by <code>(1 − z/N)</code> so the far end stays pinned to the vanishing point while the near hall swings, and the bend travels toward you.` },
  { name: 'Swinging Doors',  code: SWINGING_DOORS_SKETCH, info: `A perspective corridor where each door hinges open as you reach it. The free edge foreshortens by <code>cos(θ)</code> as it swings, and a filled leaf occludes the doors behind it.` },
  { name: 'Card Fan',        code: CARD_FAN_SKETCH,    info: `An endless hand of cards spread about a hinge below the frame. Each card sits at fan angle <code>θ = f·spread</code> and is <b>rotated by that same θ</b>, so its centre rides the circle <code>(sin θ, −cos θ)·R</code> about the pivot and the deck opens into an arc. The rank scrolls by <code>f = (i/N + t) mod 1</code> and fades to nothing at both ends, so cards stream through the fan and recycle — fanning out forever. Nearer cards draw last, so each overlaps the one behind, like a real hand.` },
  { name: 'Sound Waves',     code: SOUND_WAVES_SKETCH, info: `Overlaid sine waves <code>sin(2π·f·x + t)</code> at rising frequencies, each multiplied by a window <code>sin(πx)</code> that tapers both ends, like an oscilloscope tracing a packet of sound.` },
  { name: 'Straight Line',   code: LINE_SKETCH,        info: `The simplest equation, <code>y = m·x + b</code>: a constant <b>slope</b> <code>m</code> and intercept <code>b</code>. The slope sweeps as it animates. Every straight line on a graph is just those two numbers.` },
  { name: 'Parabola',        code: PARABOLA_SKETCH,    info: `The quadratic <code>y = a·x²</code>. Unlike a line, the slope <b>grows with x</b>, so the curve bends; <code>a</code> (breathing here) sets how tightly. It's the path of anything thrown under gravity.` },
  { name: 'Sine Curve',      code: SINE_CURVE_SKETCH,  info: `<code>y = sin(x)</code>, the pure wave: smooth, repeating every <code>2π</code>, swinging between −1 and 1. Scroll the <b>phase</b> to watch it travel. The building block every other wave is made from.` },
  { name: 'Waveforms',       code: WAVEFORMS_SKETCH,   info: `The four classic synth <b>waveforms</b> — sine, square, triangle, sawtooth. Same pitch, very different shape (and sound), because each stacks its harmonics differently. Unlike the smooth Sound Waves, three have hard corners.` },
  { name: 'Maximum Rainbows',code: RAINBOW_SKETCH,     info: `<b>Maximum rainbows.</b> Concentric arcs sweep the full <code>hue</code> wheel — <code>0°→360°</code>, twice over — and the whole spectrum rotates. No deep math, just colour: <code>hsl(hue, 90%, 60%)</code> stepped around the circle.` },
];
const CODE_KEY='spiroloom.sketch';
let codeText = (function(){ try{ return localStorage.getItem(CODE_KEY) || STELLATED_RD_SKETCH; }catch(e){ return STELLATED_RD_SKETCH; } })(), codeFn = null;
function saveSketch(){ try{ localStorage.setItem(CODE_KEY, codeText); }catch(e){} }
function compileCode(){
  try { codeFn = new Function('ctx','w','h','t','TAU', codeText); setCodeErr(''); }
  catch(e){ setCodeErr('Syntax: ' + e.message); }
}
function setCodeErr(msg){ const e=$('#err'); if(e) e.textContent=msg; }
function buildEditor(box){
  const hint=el('div','codehint'); hint.innerHTML='Live JS, edit and it redraws as you type. Globals: <code style="color:var(--accent)">ctx, w, h, t, TAU</code>. Auto-saved.';
  const ta=el('textarea'); ta.id='code'; ta.value=codeText; ta.spellcheck=false;
  ta.addEventListener('input',()=>{ codeText=ta.value; saveSketch(); compileCode(); refreshInfo(); dirty=true; });
  ta.addEventListener('keydown',e=>{
    if(e.key==='Tab'){ e.preventDefault(); const s=ta.selectionStart, en=ta.selectionEnd;
      ta.value=ta.value.slice(0,s)+'  '+ta.value.slice(en); ta.selectionStart=ta.selectionEnd=s+2;
      codeText=ta.value; saveSketch(); compileCode(); refreshInfo(); dirty=true; }
  });
  const err=el('div','err'); err.id='err';
  box.append(hint,ta,err); setCodeErr('');
}
function loadExample(i){
  codeText=SKETCHES[i].code;
  const ta=$('#code'); if(ta) ta.value=codeText;
  saveSketch(); compileCode(); refreshInfo(); anim.phase=0; dirty=true;
}
function buildExamples(){
  const sel=$('#ex-select'); if(!sel) return;
  sel.innerHTML='';
  SKETCHES.forEach((sk,i)=>{ const o=el('option'); o.value=i; o.textContent=sk.name; sel.append(o); });
  sel.onchange=()=>tryLoad(+sel.value);
  const prev=$('#ex-prev'), next=$('#ex-next');
  if(prev) prev.onclick=()=>stepEx(-1);
  if(next) next.onclick=()=>stepEx(1);
}
function tryLoad(i){
  if(SKETCHES.findIndex(x=>x.code===codeText)<0 &&
     !confirm('Load "'+SKETCHES[i].name+'"? This replaces your current sketch.')){ refreshInfo(); return; }
  loadExample(i);
}
function stepEx(d){
  const cur=SKETCHES.findIndex(s=>s.code===codeText);
  const base = cur<0 ? (d>0 ? -1 : 0) : cur;
  tryLoad((base+d+SKETCHES.length)%SKETCHES.length);
}
function refreshInfo(){
  const idx=SKETCHES.findIndex(s=>s.code===codeText);
  const info=$('#info');
  if(info) info.innerHTML = idx>=0 ? SKETCHES[idx].info
    : 'Custom sketch, pick an example above to see the maths behind it, or keep writing your own with <code>ctx, w, h, t, TAU</code>.';
  const sel=$('#ex-select'); if(sel) sel.value = idx>=0 ? String(idx) : '';
}

/* ---- canvas ---- */
const cv=$('#c'), ctx=cv.getContext('2d'), stage=$('.stage');
let dpr=1, stageR=0, dirty=true;
const view={s:1,x:0,y:0,rx:0,ry:0};   // s/x/y = zoom+pan (2D ctx); rx/ry = 3D tilt (CSS)
function resize(){
  const r=stage.getBoundingClientRect();
  dpr=Math.min(window.devicePixelRatio||1,2);
  cv.width=Math.max(1,Math.round(r.width*dpr));
  cv.height=Math.max(1,Math.round(r.height*dpr));
  cv.style.width=r.width+'px'; cv.style.height=r.height+'px';
  dirty=true; triggerDraw();
}
new ResizeObserver(resize).observe(stage);

/* ---- render ---- */
function render(){
  const w=cv.width/dpr, h=cv.height/dpr;
  ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.globalCompositeOperation='source-over'; ctx.globalAlpha=1; ctx.shadowBlur=0;
  ctx.fillStyle = (style.trails && anim.animate) ? hexA(style.bg,0.12) : style.bg;
  ctx.fillRect(0,0,w,h);
  if(codeFn){
    ctx.save();
    ctx.setTransform(dpr*view.s,0,0,dpr*view.s, dpr*view.x, dpr*view.y);
    ctx.lineWidth=2; ctx.lineJoin='round'; ctx.lineCap='round';
    ctx.strokeStyle='#cfe9ff'; ctx.fillStyle='#cfe9ff';
    try{ codeFn(ctx,w,h,anim.phase,Math.PI*2); }
    catch(e){ setCodeErr('Runtime: '+e.message); }
    ctx.restore();
  }
  ctx.setTransform(dpr,0,0,dpr,0,0);
}

/* ---- loop ---- */
let lastT=0;
function loop(now){
  if(!lastT) lastT=now;
  const dt=Math.min(0.05,(now-lastT)/1000); lastT=now;
  let active=false;
  if(anim.animate){ anim.phase+=anim.evolveSpeed*dt; active=true; }
  if(active||dirty){ render(); dirty=false; }
  requestAnimationFrame(loop);
}
function triggerDraw(){ dirty=true; }
function replay(){ anim.phase=0; dirty=true; }

/* ---- spin (3D tilt) + pan + zoom ----
   Zoom/pan live in the 2D context (crisp); the 3D spin is a CSS perspective
   tilt of the whole canvas plane, so it works for every example. */
function applyCam(){ cv.style.transform =
  'perspective(1100px) rotateX(' + view.rx.toFixed(2) + 'deg) rotateY(' + view.ry.toFixed(2) + 'deg)'; }
function isDefault(){ return view.s===1 && view.x===0 && view.y===0 && view.rx===0 && view.ry===0; }
function updateResetBtn(){ const b=$('#resetview'); if(b) b.hidden = isDefault(); }
function resetView(){ view.s=1; view.x=0; view.y=0; view.rx=0; view.ry=0; applyCam(); dirty=true; updateResetBtn(); }
function ptr(e){ const r=stage.getBoundingClientRect(); return { x:e.clientX-r.left, y:e.clientY-r.top }; }
function zoomAt(px,py,factor){
  const ns=Math.max(0.5,Math.min(view.s*factor,50));
  const wx=(px-view.x)/view.s, wy=(py-view.y)/view.s;   // world point under the cursor
  view.s=ns; view.x=px-wx*ns; view.y=py-wy*ns;          // keep it pinned there
  dirty=true; updateResetBtn();
}
cv.addEventListener('contextmenu', e=>e.preventDefault());
cv.addEventListener('wheel', e=>{ e.preventDefault(); const p=ptr(e); zoomAt(p.x,p.y, e.deltaY<0?1.12:1/1.12); }, {passive:false});
const drag={on:false,x:0,y:0,spin:false}, pts=new Map(); let pinchD=0;
cv.addEventListener('pointerdown', e=>{
  cv.setPointerCapture(e.pointerId); pts.set(e.pointerId, ptr(e));
  if(pts.size===1){ const p=ptr(e); drag.on=true; drag.x=p.x; drag.y=p.y;
    drag.spin = e.shiftKey || e.button===2;                // shift / right-drag = spin; else pan
    cv.style.cursor = drag.spin ? 'move' : 'grabbing'; }
  else { drag.on=false; const a=[...pts.values()]; pinchD=Math.hypot(a[0].x-a[1].x,a[0].y-a[1].y); }
});
cv.addEventListener('pointermove', e=>{
  if(!pts.has(e.pointerId)) return;
  const p=ptr(e); pts.set(e.pointerId,p);
  if(pts.size>=2){ const a=[...pts.values()], d=Math.hypot(a[0].x-a[1].x,a[0].y-a[1].y);
    if(pinchD>0) zoomAt((a[0].x+a[1].x)/2,(a[0].y+a[1].y)/2, d/pinchD); pinchD=d; return; }
  if(!drag.on) return;
  const dx=p.x-drag.x, dy=p.y-drag.y; drag.x=p.x; drag.y=p.y;
  if(drag.spin){ view.ry+=dx*0.5; view.rx-=dy*0.5; applyCam(); }  // spin in 3D
  else { view.x+=dx; view.y+=dy; dirty=true; }                    // pan
  updateResetBtn();
});
function endPtr(e){ pts.delete(e.pointerId); if(pts.size<2) pinchD=0; if(pts.size===0){ drag.on=false; cv.style.cursor='grab'; } }
cv.addEventListener('pointerup', endPtr); cv.addEventListener('pointercancel', endPtr);
cv.addEventListener('dblclick', e=>{ e.preventDefault(); resetView(); });

/* ---- actions ---- */
function pickRandom(){ loadExample(Math.floor(Math.random()*SKETCHES.length)); }
function savePNG(){
  const sv={...view}; view.s=1; view.x=0; view.y=0;   // export the full frame, not the zoomed crop
  render();
  const a=el('a'); a.href=cv.toDataURL('image/png'); a.download=`mdg-${Date.now()}.png`; a.click();
  Object.assign(view,sv); dirty=true;
}

/* ---- SVG export ---- */
const F=n=>Math.round(n*100)/100;
function svgDoc(w,h,bg,defs,body){
  return `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">`
    +`<rect width="${w}" height="${h}" fill="${bg}"/>`+(defs?`<defs>${defs}</defs>`:'')+body+`</svg>`;
}
function makeSVGRecorder(){
  const els=[], defs=[], stack=[]; let gid=0, d='';
  let st={ stroke:'#cfe9ff', fill:'#cfe9ff', width:2, cap:'round', join:'round', alpha:1 };
  function colorRef(c){
    if(c && c.__grad){ const id='g'+(gid++);
      defs.push(`<linearGradient id="${id}" gradientUnits="userSpaceOnUse" x1="${F(c.x0)}" y1="${F(c.y0)}" x2="${F(c.x1)}" y2="${F(c.y1)}">`+c.stops.map(s=>`<stop offset="${s.o}" stop-color="${s.c}"/>`).join('')+`</linearGradient>`);
      return `url(#${id})`; }
    return c;
  }
  const ctx={
    save(){ stack.push({...st}); }, restore(){ if(stack.length) st=stack.pop(); },
    beginPath(){ d=''; }, closePath(){ d+='Z'; },
    moveTo(x,y){ d+=`M${F(x)} ${F(y)}`; }, lineTo(x,y){ d+=(d?'L':'M')+`${F(x)} ${F(y)}`; },
    quadraticCurveTo(cx,cy,x,y){ d+=`Q${F(cx)} ${F(cy)} ${F(x)} ${F(y)}`; },
    bezierCurveTo(a,b,c,e,x,y){ d+=`C${F(a)} ${F(b)} ${F(c)} ${F(e)} ${F(x)} ${F(y)}`; },
    arc(cx,cy,r,a0,a1){ const T=Math.PI*2, da=a1-a0, x0=cx+r*Math.cos(a0), y0=cy+r*Math.sin(a0);
      if(Math.abs(da)>=T-1e-6){ const xm=cx-r*Math.cos(a0), ym=cy-r*Math.sin(a0);
        d+=(d?'L':'M')+`${F(x0)} ${F(y0)}A${F(r)} ${F(r)} 0 1 1 ${F(xm)} ${F(ym)}A${F(r)} ${F(r)} 0 1 1 ${F(x0)} ${F(y0)}`; }
      else { const x1=cx+r*Math.cos(a1), y1=cy+r*Math.sin(a1), large=Math.abs(da)>Math.PI?1:0, sweep=da>0?1:0;
        d+=(d?'L':'M')+`${F(x0)} ${F(y0)}A${F(r)} ${F(r)} 0 ${large} ${sweep} ${F(x1)} ${F(y1)}`; }
    },
    rect(x,y,w,h){ d+=`M${F(x)} ${F(y)}h${F(w)}v${F(h)}h${F(-w)}Z`; },
    stroke(){ if(d) els.push(`<path d="${d}" fill="none" stroke="${colorRef(st.stroke)}" stroke-width="${F(st.width)}" stroke-linecap="${st.cap}" stroke-linejoin="${st.join}"${st.alpha<1?` stroke-opacity="${st.alpha}"`:''}/>`); },
    fill(){ if(d) els.push(`<path d="${d}" fill="${colorRef(st.fill)}"${st.alpha<1?` fill-opacity="${st.alpha}"`:''}/>`); },
    fillRect(x,y,w,h){ els.push(`<rect x="${F(x)}" y="${F(y)}" width="${F(w)}" height="${F(h)}" fill="${colorRef(st.fill)}"${st.alpha<1?` fill-opacity="${st.alpha}"`:''}/>`); },
    strokeRect(x,y,w,h){ els.push(`<rect x="${F(x)}" y="${F(y)}" width="${F(w)}" height="${F(h)}" fill="none" stroke="${colorRef(st.stroke)}" stroke-width="${F(st.width)}"/>`); },
    clearRect(){}, fillText(){}, strokeText(){}, measureText(){ return {width:0}; }, setLineDash(){}, drawImage(){},
    createLinearGradient(x0,y0,x1,y1){ return {__grad:true,x0,y0,x1,y1,stops:[],addColorStop(o,c){ this.stops.push({o,c}); }}; },
    set strokeStyle(v){ st.stroke=v; }, get strokeStyle(){ return st.stroke; },
    set fillStyle(v){ st.fill=v; }, get fillStyle(){ return st.fill; },
    set lineWidth(v){ st.width=v; }, get lineWidth(){ return st.width; },
    set lineCap(v){ st.cap=v; }, get lineCap(){ return st.cap; },
    set lineJoin(v){ st.join=v; }, get lineJoin(){ return st.join; },
    set globalAlpha(v){ st.alpha=v; }, get globalAlpha(){ return st.alpha; },
    set globalCompositeOperation(v){}, get globalCompositeOperation(){ return 'source-over'; },
    set shadowBlur(v){}, get shadowBlur(){ return 0; }, set shadowColor(v){}, get shadowColor(){ return '#000'; },
    set font(v){}, set textAlign(v){}, set textBaseline(v){},
    translate(){}, scale(){}, rotate(){}, setTransform(){}, resetTransform(){}
  };
  return { ctx, defs:()=>defs.join(''), body:()=>els.join('') };
}
function buildSVG(){
  const w=cv.width/dpr, h=cv.height/dpr;
  const rec=makeSVGRecorder();
  if(codeFn){ try{ codeFn(rec.ctx,w,h,anim.phase,Math.PI*2); }catch(e){ setCodeErr('SVG: '+e.message); } }
  return svgDoc(F(w),F(h),style.bg, rec.defs(), rec.body());
}
function saveSVG(){
  const blob=new Blob([buildSVG()],{type:'image/svg+xml'});
  const url=URL.createObjectURL(blob);
  const a=el('a'); a.href=url; a.download=`mdg-${Date.now()}.svg`; a.click();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}

/* ---- UI ---- */
function syncStatic(){
  $('#animate').checked=anim.animate;
  $('#trails').checked=style.trails;
  $('#es').value=anim.evolveSpeed; $('#esv').textContent=anim.evolveSpeed.toFixed(2);
}
function wire(){
  $('#rand').onclick=pickRandom; $('#replay').onclick=replay; $('#save').onclick=savePNG; $('#saveSvg').onclick=saveSVG;
  $('#animate').onchange=e=>{ anim.animate=e.target.checked; dirty=true; };
  $('#trails').onchange=e=>{ style.trails=e.target.checked; dirty=true; };
  $('#es').oninput=e=>{ anim.evolveSpeed=parseFloat(e.target.value); $('#esv').textContent=anim.evolveSpeed.toFixed(2); };
  $('#resetview').onclick=resetView;
  window.addEventListener('keydown',e=>{
    if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.tagName==='SELECT') return;
    if(e.code==='Space'){ e.preventDefault(); replay(); }
    else if(e.key==='ArrowLeft') stepEx(-1);
    else if(e.key==='ArrowRight') stepEx(1);
    else if(e.key==='r'||e.key==='R') pickRandom();
    else if(e.key==='s'||e.key==='S') savePNG();
    else if(e.key==='v'||e.key==='V') saveSVG();
    else if(e.key==='a'||e.key==='A'){ anim.animate=!anim.animate; $('#animate').checked=anim.animate; dirty=true; }
  });
}

/* ---- init ---- */
buildExamples(); compileCode(); buildEditor($('#editor')); refreshInfo(); syncStatic(); wire(); resize();
requestAnimationFrame(loop);
</script>
</body>
</html>
