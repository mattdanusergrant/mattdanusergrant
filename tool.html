<style>
  *,*::before,*::after{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:var(--bg);color:var(--ink);font-family:'Inter',system-ui,-apple-system,sans-serif;font-size:14px;display:flex;flex-direction:column;height:100dvh;overflow:hidden;-webkit-font-smoothing:antialiased}
  a{color:inherit;text-decoration:none}

  /* ── Top nav (matches the rest of the site) ── */
  .nav{display:flex;justify-content:space-between;align-items:center;gap:16px;padding:0 28px;height:58px;flex-shrink:0;border-bottom:1px solid var(--line);font-size:14px;color:var(--muted);letter-spacing:.04em;background:var(--bg)}
  .nav .brand{font-family:'Fraunces',serif;font-weight:600;font-size:17px;color:var(--ink);letter-spacing:-0.01em;white-space:nowrap}
  .nav .links{display:flex;align-items:center}
  .nav .links a{margin-left:22px;transition:color .15s;white-space:nowrap}
  .nav .links a:hover{color:var(--ink)}
  .nav .links a.active{color:var(--ink);font-weight:600}

  /* ── The tool, filling the space between the bars ── */
  .frame-wrap{flex:1 1 auto;min-height:0;position:relative;background:var(--paper)}
  iframe.tool{position:absolute;inset:0;width:100%;height:100%;border:0;display:block}

  /* ── Bottom back-nav ── */
  .toolfoot{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:0 28px;height:46px;flex-shrink:0;border-top:1px solid var(--line);font-size:13.5px;color:var(--muted);letter-spacing:.04em;background:var(--bg)}
  .toolfoot a{transition:color .15s;white-space:nowrap}
  .toolfoot a:hover{color:var(--ink)}
  .toolfoot .left a{font-family:'Fraunces',serif;color:var(--ink)}
  .toolfoot .where{font-family:'Fraunces',serif;color:var(--muted);letter-spacing:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .toolfoot .right a{margin-left:18px}

  @media(max-width:560px){
    .nav,.toolfoot{padding:0 16px}
    .nav .links a{margin-left:14px}
    .toolfoot .where{display:none}
  }
</style>
</head>
<body>
  <nav class="nav">
    <a class="brand" href="/">Matt Danuser-Grant</a>
    <div class="links" id="nav-links">
      <a href="https://mustdesigngames.mattdanusergrant.com/">Must Design Games</a>
      <a href="/consulting.html">Consulting</a>
      <a href="/resume.html">Resume</a>
    </div>
    <button class="nav-toggle" type="button" aria-label="Menu" aria-controls="nav-links" aria-expanded="false"><svg class="i-bars" viewBox="0 0 24 24" width="22" height="22" aria-hidden="true"><path d="M3 6h18M3 12h18M3 18h18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg><svg class="i-x" viewBox="0 0 24 24" width="22" height="22" aria-hidden="true"><path d="M5 5l14 14M19 5L5 19" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></button>
    <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Toggle light / dark mode" title="Toggle light / dark"><span class="toggle-track"><span class="toggle-thumb"><svg class="t-sun" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="4.2"/><path d="M12 2.5v2.6M12 18.9v2.6M4.6 4.6l1.9 1.9M17.5 17.5l1.9 1.9M2.5 12h2.6M18.9 12h2.6M4.6 19.4l1.9-1.9M17.5 6.5l1.9-1.9"/></svg><svg class="t-moon" viewBox="0 0 24 24" aria-hidden="true"><path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8z"/></svg></span></span></button>
  </nav>

  <div class="frame-wrap"><iframe class="tool" id="frame" title="Tool" src="about:blank" allow="autoplay"></iframe></div>

  <footer class="toolfoot">
    <div class="left"><a href="/#tools">← Toolbox</a></div>
    <div class="where" id="toolname"></div>
    <div class="right"><a href="/">Home</a></div>
  </footer>
<script>
/* Frame a known toolbox tool inside the site shell. Whitelisted so the ?app
   param can only load a vetted tool — a local path or a first-party subdomain. */
(function(){
  var TOOLS={
    'math-draws-graphics':        { name:'Math Draws Graphics', src:'https://mathdrawsgraphics.mattdanusergrant.com/code-art/' },
    'code-art':                   { name:'Math Draws Graphics', src:'https://mathdrawsgraphics.mattdanusergrant.com/code-art/' },
    'pixel-art':                  { name:'Pixel Art',           src:'https://mathdrawsgraphics.mattdanusergrant.com/pixel-art/' },
    'makedopegrooves':            { name:'Make Dope Grooves',   src:'/makedopegrooves/' },
    'make-dope-grooves':          { name:'Make Dope Grooves',   src:'/makedopegrooves/' }, // legacy alias for old links
    'manufacture-digital-grooves':{ name:'Make Dope Grooves',   src:'/makedopegrooves/' }, // legacy alias for old links
    'multiplayer-deck-gateway':   { name:'Multiplayer Deck Gateway', src:'https://mustdesigngames.mattdanusergrant.com/multiplayerdeckgateway/' }
  };
  var key=new URLSearchParams(location.search).get('app');
  var t=TOOLS[key];
  if(!t){ location.replace('/tools.html'); return; }
  var f=document.getElementById('frame');
  f.src=t.src; f.title=t.name;
  document.getElementById('toolname').textContent=t.name;
  document.title=t.name+' · Matt Danuser-Grant';
})();
</script>
<script src="/assets/site.js?v=2" defer></script>
</body>
