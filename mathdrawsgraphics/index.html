<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Math Draws Graphics</title>
<meta name="description" content="Math Draws Graphics — making pictures with a computer. Toggle between Code Art (animated math sketches) and Pixel Art (a sprite editor).">
<script>!function(){try{var t=localStorage.getItem('theme')||(matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');document.documentElement.setAttribute('data-theme',t)}catch(e){}}()</script>
<style>
  :root{ --bg:#FBF8F2; --paper:#FFFFFF; --ink:#15161C; --muted:#6A6A6A; --line-2:#CBC4B2; --accent:#C9820A; }
  :root[data-theme="dark"]{ --bg:#13110E; --paper:#1D1A16; --ink:#EDE8DF; --muted:#7A756D; --line-2:#3A352E; --accent:#E8A317; }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{font:14px/1.4 'Inter',ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    color:var(--ink);background:var(--bg);overflow:hidden;display:flex;flex-direction:column}
  .umbrella{height:42px;flex:none;display:flex;align-items:center;gap:14px;padding:0 14px;
    background:var(--paper);border-bottom:1.5px solid var(--line-2)}
  .ub-brand{font-weight:700;font-size:13px;letter-spacing:.01em;color:var(--ink);white-space:nowrap;text-decoration:none}
  .ub-brand:hover{color:var(--accent)}
  .ub-tabs{display:flex;gap:6px}
  .ub-tab{font:inherit;font-size:12.5px;color:var(--muted);padding:5px 11px;
    border:1.5px solid transparent;border-radius:999px;white-space:nowrap;background:transparent;cursor:pointer}
  .ub-tab:hover{color:var(--ink);border-color:var(--line-2)}
  .ub-tab.on{color:var(--ink);border-color:var(--line-2);background:var(--bg)}
  .spacer{flex:1}
  .tt{appearance:none;border:1.5px solid var(--line-2);background:transparent;color:var(--muted);
    border-radius:999px;padding:5px 12px;font:inherit;font-size:12px;cursor:pointer}
  .tt:hover{border-color:var(--ink);color:var(--ink)}
  iframe#frame{flex:1;width:100%;border:0;display:block}
</style>
</head>
<body>
<nav class="umbrella">
  <a class="ub-brand" href="https://mattdanusergrant.com">Math Draws Graphics</a>
  <div class="ub-tabs" role="tablist">
    <button class="ub-tab" id="tab-code" data-mode="code" role="tab" type="button">Code Art</button>
    <button class="ub-tab" id="tab-pixel" data-mode="pixel" role="tab" type="button">Pixel Art</button>
  </div>
  <span class="spacer"></span>
  <button class="tt" id="tt" type="button" aria-label="Toggle light / dark">theme</button>
</nav>
<iframe id="frame" title="Math Draws Graphics"></iframe>
<script>
  var SRC={code:'code-art/',pixel:'pixel-art/'};
  var frame=document.getElementById('frame');
  function pick(){
    var h=(location.hash||'').replace('#','');
    if(h==='code'||h==='pixel') return h;
    try{var m=localStorage.getItem('mdg.mode'); if(m==='code'||m==='pixel') return m;}catch(e){}
    return 'code';
  }
  function setMode(mode,push){
    document.getElementById('tab-code').classList.toggle('on',mode==='code');
    document.getElementById('tab-pixel').classList.toggle('on',mode==='pixel');
    if(frame.getAttribute('src')!==SRC[mode]) frame.setAttribute('src',SRC[mode]);
    try{localStorage.setItem('mdg.mode',mode);}catch(e){}
    if(push && location.hash!=='#'+mode) history.replaceState(null,'','#'+mode);
  }
  document.querySelectorAll('.ub-tab').forEach(function(b){
    b.onclick=function(){ setMode(b.dataset.mode,true); };
  });
  addEventListener('hashchange',function(){ setMode(pick(),false); });
  // theme: keep the shell and the embedded tool in sync (same origin)
  document.getElementById('tt').onclick=function(){
    var d=document.documentElement, n=d.getAttribute('data-theme')==='dark'?'light':'dark';
    d.setAttribute('data-theme',n);
    try{localStorage.setItem('theme',n);}catch(e){}
    try{ frame.contentDocument.documentElement.setAttribute('data-theme',n); }catch(e){}
  };
  setMode(pick(),true);
</script>
</body>
</html>
