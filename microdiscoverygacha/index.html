      '<ul class="ob-list">'+
        '<li><b>✦ Pack Tokens</b>: you have three. A fresh one arrives every day.</li>'+
        '<li><b>Boosters</b>: spend a token, we deal two packs, you keep one (5 cards).</li>'+
        '<li><b>Level up</b>: pull a card you already own and it goes a level deeper.</li>'+
      '</ul>'+
      '<button class="done" id="ob-start">Open my first pack →</button>'+
      '<button class="ob-skip" id="ob-skip">Skip intro</button>'+
    '</div></div>';
  overlay.classList.add('intro');
  openOverlay(h);
  closeBtn.classList.remove('on'); /* no X during intro — Next / Skip drive it */
  sheet.querySelector('[data-goto="2"]').addEventListener('click',function(){
    sheet.querySelector('[data-step="1"]').hidden=true;
    sheet.querySelector('[data-step="2"]').hidden=false; sheet.scrollTop=0;
  });
  document.getElementById('ob-skip').addEventListener('click',function(){ finishOnboarding(false); });
  document.getElementById('ob-start').addEventListener('click',function(){ finishOnboarding(true); });
}
function finishOnboarding(openPack){
  S.onboarded=true; save();
  overlay.classList.remove('intro');
  MSG="firstbinder";
  if(openPack && S.tokens>0){ tokenFlow(); }   /* straight into the real pick-1-of-3; firstbinder shows after Done */
  else { closeOverlay(); }
}

/* Scroll Mode — an endless feed of your owned cards, one random card per screen */
function scrollMode(){
  var owned=CARDS.filter(function(c){return S.coll[c.id];});
  if(!owned.length) return;
  var bag=[], last=null;
  function refill(){ bag=owned.map(function(c){return c.id;});
    for(var i=bag.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)),t=bag[i];bag[i]=bag[j];bag[j]=t; }
    if(owned.length>1 && bag[bag.length-1]===last){ var s=bag[0];bag[0]=bag[bag.length-1];bag[bag.length-1]=s; }
  }
  function nextId(){ if(!bag.length) refill(); var id=bag.pop(); last=id; return id; }
  function slotHTML(){ var id=nextId(), c=cardById(id); return '<div class="sf-slot">'+faceHTML(c,S.coll[id]&&S.coll[id].foil)+'</div>'; }
  var h='<div class="sf-top">✧ Scroll Mode &nbsp;·&nbsp; swipe ‹ › to read · up-down for next card</div><div class="sf-feed" id="sffeed">';
  for(var i=0;i<5;i++) h+=slotHTML();
  h+='</div>';
  overlay.classList.add('scrollmode');
  openOverlay(h);
  var feed=document.getElementById('sffeed'), ticking=false;
  feed.addEventListener('scroll',function(){
    if(ticking) return; ticking=true;
    requestAnimationFrame(function(){ ticking=false;
      if(feed.scrollHeight-(feed.scrollTop+feed.clientHeight) < feed.clientHeight*1.5){
        var add=''; for(var k=0;k<4;k++) add+=slotHTML();
        feed.insertAdjacentHTML('beforeend',add);
        var cs=feed.querySelectorAll('.card'); for(var j=Math.max(0,cs.length-4);j<cs.length;j++) fitCard(cs[j]);
      }
      while(feed.children.length>16 && feed.children[0].getBoundingClientRect().bottom < -60){
        var hgt=feed.children[0].offsetHeight; feed.removeChild(feed.children[0]); feed.scrollTop-=hgt;
      }
    });
  });
}

/* ===== events ===== */
document.getElementById('home').addEventListener('click',function(){ renderCollection(); window.scrollTo(0,0); });
closeBtn.addEventListener('click',closeOverlay);
overlay.addEventListener('click',function(e){ if(e.target===overlay) closeOverlay(); });

view.addEventListener('click',function(e){
  var op=e.target.closest('[data-openpack]'); if(op){ if(S.tokens<1){ MSG="notokens"; renderCollection(); window.scrollTo(0,0); } else tokenFlow(); return; }
  var sm=e.target.closest('[data-scroll]'); if(sm){ scrollMode(); return; }
  var sr=e.target.closest('[data-series]'); if(sr){ activeSet=setsOf(sr.getAttribute('data-series'))[0]; renderCollection(); return; }
  var st=e.target.closest('[data-set]'); if(st){ activeSet=st.getAttribute('data-set'); renderCollection(); return; }
  var mn=e.target.closest('.mini[data-id]'); if(mn){ showCardModal(mn.getAttribute('data-id')); return; }
});
view.addEventListener('keydown',function(e){ if(e.key==='Enter'||e.key===' '){ var mn=e.target.closest('.mini[data-id]'); if(mn){ e.preventDefault(); showCardModal(mn.getAttribute('data-id')); } } });
sheet.addEventListener('click',function(e){ if(e.target.closest('a')) return;
  var ch=e.target.closest('[data-choose]'); if(ch){ S.tokens=Math.max(0,S.tokens-1); save(); packFlow(ch.getAttribute('data-choose')); return; }
  var card=e.target.closest('.card'); if(card){ if(card._noclick){ card._noclick=false; return; }
    var r=card.getBoundingClientRect(); flipCard(card,(e.clientX-r.left)>r.width/2?1:-1); } });
/* horizontal swipe pages the card (vertical swipes pass through to the feed) */
var _sx=0,_sy=0,_sc=null;
sheet.addEventListener('touchstart',function(e){ var card=e.target.closest('.card'); _sc=card; if(!card)return; card._noclick=false; var t=e.changedTouches[0]; _sx=t.clientX; _sy=t.clientY; },{passive:true});
sheet.addEventListener('touchend',function(e){ var card=_sc; _sc=null; if(!card||e.target.closest('a'))return;
  var t=e.changedTouches[0], dx=t.clientX-_sx, dy=t.clientY-_sy;
  if(Math.abs(dx)>38 && Math.abs(dx)>Math.abs(dy)*1.3){ card._noclick=true; flipCard(card,dx<0?1:-1); } },{passive:true});
sheet.addEventListener('keydown',function(e){
  var card=e.target.closest&&e.target.closest('.card');
  if(card&&(e.key==='ArrowRight'||e.key==='ArrowLeft')){ e.preventDefault(); flipCard(card,e.key==='ArrowRight'?1:-1); } });

var root=document.documentElement;
try{var saved=localStorage.getItem('mdg-mag-theme'); if(saved)root.setAttribute('data-theme',saved);}catch(e){}
function curTheme(){ return root.getAttribute('data-theme')||(window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light'); }

/* settings menu */
var gear=document.getElementById('gear'), menu=document.getElementById('settings'), themeVal=document.getElementById('theme-val');
function syncTheme(){ themeVal.textContent=curTheme()==='dark'?'Dark':'Light'; }
syncTheme();
var menuOpen=false, dangerBtns=[];
function disarmDanger(){ dangerBtns.forEach(function(b){ if(b._disarm) b._disarm(); }); }
function openMenu(){ menuOpen=true; menu.hidden=false; gear.setAttribute('aria-expanded','true'); disarmDanger(); }
function closeMenu(){ menuOpen=false; menu.hidden=true; gear.setAttribute('aria-expanded','false'); disarmDanger(); }
gear.addEventListener('click',function(e){ e.stopPropagation(); menuOpen?closeMenu():openMenu(); });
menu.addEventListener('click',function(e){ e.stopPropagation(); });
document.addEventListener('click',function(){ if(menuOpen) closeMenu(); });
document.addEventListener('keydown',function(e){ if(e.key==='Escape'&&menuOpen) closeMenu(); });

document.getElementById('set-theme').addEventListener('click',function(){
  var nxt=curTheme()==='dark'?'light':'dark'; root.setAttribute('data-theme',nxt);
  try{localStorage.setItem('mdg-mag-theme',nxt);}catch(e){} syncTheme();
});
document.getElementById('dbg-packs').addEventListener('click',function(){
  S.tokens+=10; save(); renderCollection(); closeMenu();
});
/* danger buttons take two taps: first arms (shows confirm label), second fires */
function armButton(btn, label, confirmLabel, onConfirm){
  btn._disarm=function(){ btn._armed=false; btn.classList.remove('armed'); btn.firstChild.textContent=label; };
  btn.addEventListener('click',function(){
    if(!btn._armed){ btn._armed=true; btn.classList.add('armed'); btn.firstChild.textContent=confirmLabel; return; }
    btn._disarm(); closeMenu(); onConfirm();
  });
  dangerBtns.push(btn);
}
armButton(document.getElementById('dbg-unlock'),'Unlock All Cards','Tap again to confirm: unlock all '+CARDS.length,function(){
  CARDS.forEach(function(c){ var max=cardPageList(c,1).maxContent, rec=S.coll[c.id]||{n:0,foil:false};
    rec.n=Math.max(rec.n,max); S.coll[c.id]=rec; }); /* max level = every page unlocked */
  save(); renderCollection();
});
armButton(document.getElementById('dbg-reset'),'Reset','Tap again to confirm: wipe everything',function(){
  try{ localStorage.removeItem(SKEY); }catch(e){}
  MSG=null; MSGN=0; activeSet=SETS[0];
  load(); initEconomy(); renderCollection(); runOnboarding();
});

load(); initEconomy(); renderCollection(); if(!S.onboarded) runOnboarding();

</script>
