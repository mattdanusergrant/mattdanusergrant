<script>

function motif(kind, a){
  var svg, i;
  if(kind==="scroll"){
    svg='<path d="M20 130 C 60 60, 120 60, 150 120 S 250 180, 290 110" fill="none" stroke="'+a+'" stroke-width="1.4" opacity=".9"/>'+
        '<path d="M40 150 C 90 100, 150 100, 190 150 S 300 200, 340 140" fill="none" stroke="'+a+'" stroke-width="1" opacity=".5"/>'+
        '<circle cx="150" cy="120" r="3" fill="'+a+'"/><circle cx="290" cy="110" r="2.5" fill="'+a+'"/>';
  } else if(kind==="wave"){
    svg=''; for(i=0;i<5;i++){var y=48+i*28;svg+='<path d="M0 '+y+' Q 90 '+(y-22)+' 180 '+y+' T 360 '+y+'" fill="none" stroke="'+a+'" stroke-width="1.2" opacity="'+(0.85-i*0.13)+'"/>';}
  } else if(kind==="grain"){
    svg=''; for(i=0;i<7;i++){var x=30+i*45;svg+='<path d="M'+x+' 10 C '+(x+26)+' 70, '+(x-20)+' 150, '+(x+14)+' 230" fill="none" stroke="'+a+'" stroke-width="'+(0.8+i%2*0.7)+'" opacity="'+(0.35+i%3*0.18)+'"/>';}
  } else if(kind==="strings"){
    svg=''; for(i=0;i<4;i++){var xs=120+i*40;svg+='<path d="M'+xs+' 18 L'+xs+' 224" stroke="'+a+'" stroke-width="1.2" opacity="'+(0.85-i*0.13)+'"/>';}
    svg+='<circle cx="180" cy="150" r="36" fill="none" stroke="'+a+'" stroke-width="1.3" opacity=".7"/>';
  } else if(kind==="orbit"){
    svg='<circle cx="180" cy="120" r="6" fill="'+a+'"/>';
    for(i=1;i<=3;i++){svg+='<ellipse cx="180" cy="120" rx="'+(45*i)+'" ry="'+(24*i)+'" fill="none" stroke="'+a+'" stroke-width="1" opacity="'+(0.7-i*0.14)+'" transform="rotate(-18 180 120)"/>';}
    svg+='<circle cx="308" cy="150" r="4" fill="'+a+'"/><circle cx="70" cy="96" r="3" fill="'+a+'" opacity=".7"/>';
  } else if(kind==="grid"){
    svg=''; for(i=0;i<=9;i++){svg+='<path d="M'+(i*40)+' 0 L'+(i*40)+' 240" stroke="'+a+'" stroke-width=".8" opacity=".28"/>';}
    for(i=0;i<=6;i++){svg+='<path d="M0 '+(i*40)+' L360 '+(i*40)+'" stroke="'+a+'" stroke-width=".8" opacity=".28"/>';}
    svg+='<circle cx="120" cy="80" r="3.5" fill="'+a+'"/><circle cx="240" cy="160" r="3.5" fill="'+a+'"/><circle cx="200" cy="80" r="2.5" fill="'+a+'" opacity=".8"/>';
  } else if(kind==="pulse"){
    svg='<path d="M0 120 L120 120 L150 120 L168 60 L188 186 L206 96 L224 132 L240 120 L360 120" fill="none" stroke="'+a+'" stroke-width="1.6" opacity=".95"/>'+
        '<path d="M0 120 L360 120" stroke="'+a+'" stroke-width=".8" opacity=".28"/>';
  } else {
    svg='<polygon points="180,30 300,120 240,220 120,220 60,120" fill="none" stroke="'+a+'" stroke-width="1.3" opacity=".9"/>'+
        '<path d="M60 120 L180 120 L300 120 M180 30 L180 120 M120 220 L180 120 L240 220" stroke="'+a+'" stroke-width="1" opacity=".55" fill="none"/>';
  }
  var grad='radial-gradient(120% 170% at 82% -10%, color-mix(in srgb,'+a+' 34%, transparent), transparent 62%),linear-gradient(160deg, var(--plate), var(--bg2))';
  return '<div class="motif" style="background:'+grad+'"></div><svg class="motif" viewBox="0 0 360 240" preserveAspectRatio="xMidYMid slice" aria-hidden="true">'+svg+'</svg>';
}

var CARDS = [

/* ---- How it's made — real makers, linked back to them ---- */
{ id:"philip-rickard", cat:"Hawaiian gold", where:"Honolulu", accent:"#c9a24b", motif:"scroll", lead:"How it’s made",
  title:"Philip Rickard", url:"https://www.philiprickard.com/", link:"Visit Philip Rickard",
  hook:"The jeweler who traced the Hawaiian heirloom bracelet to a Victorian gift — and still makes them by hand.",
  facts:["A band of gold is cut, formed to the wrist, and hand-engraved with scrolls, leaves, and a name.","The letters are filled with black enamel and polished flush, so the name reads sharp against bright gold.","Rickard spent six years researching the craft’s 1880s origin."],
  back:"Hawaiian heirloom jewelry traces to the 1880s, when Hawaiian royalty came home from Queen Victoria’s jubilee wearing black-enameled English keepsakes and made the look their own. Philip Rickard spent six years documenting that history before building the bracelets the traditional way — every scroll, leaf and letter cut into the gold by hand, then filled with black enamel and polished flush so a loved one’s name stays crisp for generations. That handing-down is the whole point of an heirloom." },
{ id:"na-hoku", cat:"Hawaiian jewelry", where:"Honolulu · since 1924", accent:"#c9a24b", motif:"scroll", lead:"How it’s made",
  title:"Nā Hoku", url:"https://www.nahoku.com/", link:"Visit Nā Hoku",
  hook:"A Honolulu family that has hand-engraved Hawaiian heirloom jewelry for a hundred years.",
  facts:["Every heirloom piece is engraved by hand — so no two are ever identical.","Flowers are carved in relief, standing up from a cut-away background.","The black in the lettering is enamel sunk into the metal, never paint."],
  back:"Founded in Honolulu in 1924, Nā Hoku is among the oldest names in Hawaiian heirloom jewelry, and a century on it still engraves the classic maile-and-plumeria designs by hand. The flowers are carved in relief so they stand above a cut-away ground, and names are sunk into the metal and inked with black enamel. Because a person does the cutting rather than a machine, no two pieces are truly identical — those tiny variations are the maker’s fingerprint." },
{ id:"maui-divers", cat:"Black coral", where:"Lahaina, Maui · est. 1958", accent:"#6f7f86", motif:"facet", lead:"How it’s made",
  title:"Maui Divers Jewelry", url:"https://www.mauidivers.com/", link:"Visit Maui Divers",
  hook:"They found Hawaiʻi’s black coral in 1958 — then figured out how to harvest it without wrecking the reef.",
  facts:["Licensed divers selectively cut mature black-coral colonies over 150 feet down.","The living tissue is stripped to a hard black skeleton that polishes up like glass.","They pioneered sustainable harvesting with the University of Hawaiʻi."],
  back:"Black coral isn’t a rock but the slow-grown skeleton of a deep-sea animal, and Hawaiʻi named it the state gem in 1987. Maui Divers found the islands’ beds off the Molokai Channel in the late 1950s and, working with the University of Hawaiʻi, helped set the licensed, selective, deep-diving harvest that keeps it sustainable. Stripped of its living tissue and polished, the dull black skeleton takes on a deep, glassy shine — often set against warm gold." },
{ id:"niihau-heritage", cat:"Shell lei", where:"Niʻihau & Kauaʻi", accent:"#d8a7a0", motif:"wave", lead:"How it’s made",
  title:"Niʻihau Heritage", url:"https://niihauheritage.org/", link:"Visit the Foundation",
  hook:"Keepers of the world’s rarest lei — necklaces sewn from shells smaller than a grain of rice.",
  facts:["Tiny kahelelani shells wash up on Niʻihau after winter storms and are sorted by hand.","Each shell is pierced with a fine needle and strung in traditional patterns.","One lei can hold ten thousand shells and take a year to finish."],
  back:"Niʻihau, the privately held ‘Forbidden Isle,’ is the one place tiny kahelelani and momi shells wash up in the numbers a lei-maker needs. Sorting them by size and color, piercing each with a needle, and stringing thousands in traditional patterns can take a year — which is why a genuine Niʻihau lei rivals fine jewelry in value. The Niʻihau Heritage Cultural Foundation guards that history, and the name itself, which Hawaiʻi law now protects from imitations." },
{ id:"kauai-curators", cat:"Shell lei", where:"Kauaʻi", accent:"#d8a7a0", motif:"wave", lead:"How it’s made",
  title:"Janelle Kienow", url:"https://www.kauaicurators.com/about/janelle-kienow/", link:"Visit Kauai Curators",
  hook:"Fifteen-plus years sorting and stringing Niʻihau shells — and defending the craft’s name.",
  facts:["Shells are graded by color: plain white is common; deep reds and blues are rare and costly.","Each shell is hand-pierced and knotted so it faces the light.","She advocates for protecting the ‘Niʻihau’ name from imitations."],
  back:"A Niʻihau lei’s worth lives in its color and its consistency: plain white shells are common, but deep reds, golds and blues are rare, and matching thousands of them is a feat of patient sorting. Janelle Kienow has done that work for over fifteen years, and she’s also a public advocate for protecting the ‘Niʻihau’ name from cheaper leis strung elsewhere. Every shell is hand-pierced and knotted so it turns toward the light." },
{ id:"martin-macarthur", cat:"Koa wood", where:"Hawaiʻi", accent:"#b07d3f", motif:"grain", lead:"How it’s made",
  title:"Martin & MacArthur", url:"https://www.martinandmacarthur.com/", link:"Visit Martin & MacArthur",
  hook:"Hawaiʻi koa makers who will openly show you how a koa ring is made.",
  facts:["Curly koa is chosen for grain that shimmers as it turns — an effect called chatoyance.","Rings are turned or bent-laminated, stabilized with resin, and finished to a gloss.","That shimmer is the wood catching light at different angles, not a stain."],
  back:"Koa is Hawaiʻi’s storied hardwood — the wood of voyaging canoes and royal bowls — and its most prized boards carry a rippling ‘curl’ that seems to shift as you turn them, an optical effect called chatoyance. Martin & MacArthur work that figured koa into rings and objects: turning or laminating it, stabilizing it with resin, and finishing it to a deep gloss that makes the grain look almost liquid. The shimmer isn’t stain — it’s the wood catching light at different angles." },
{ id:"pono-woodworks", cat:"Koa rings", where:"Big Island", accent:"#b07d3f", motif:"grain", lead:"How it’s made",
  title:"Pono Woodworks", url:"https://ponowoodworks.com/", link:"Visit Pono Woodworks",
  hook:"Koa rings made only from trees that were already dead or fallen.",
  facts:["No living koa is cut — the wood is salvaged or fallen.","It’s resin-stabilized under pressure so a ring can take daily wear.","A metal or second-wood liner adds strength inside the band."],
  back:"Koa grows slowly and matters ecologically, so Pono Woodworks makes its rings only from trees that were already dead or fallen — never freshly cut. The salvaged wood is infused with resin under pressure so a thin band can survive daily wear, and a metal or second-wood liner adds strength inside the ring. It’s a way to wear one of Hawaiʻi’s most meaningful woods without taking a living tree from the forest." },
{ id:"nakoa", cat:"Koa jewelry", where:"Hawaiʻi", accent:"#b07d3f", motif:"grain", lead:"How it’s made",
  title:"Nakoa", url:"https://nakoajewelry.com/", link:"Visit Nakoa",
  hook:"Forty-plus years hand-carving jewelry from Hawaiʻi’s canoe wood.",
  facts:["Koa built voyaging canoes and royal bowls long before it circled fingers.","Pieces are carved and sanded by hand to pull the curl forward.","Koa isn’t indestructible — an occasional wipe of oil keeps it glowing."],
  back:"Long before it circled fingers, koa built the great voyaging canoes and the calabashes of chiefs — so a koa ring carries a lot of Hawaiian history on a small band. Nakoa has hand-carved koa jewelry for more than forty years, sanding each piece to bring the curl forward. Koa isn’t indestructible, though: kept off long soaks and given the occasional wipe of oil, it holds its glow for decades." },
{ id:"flotsam", cat:"Sunrise shells", where:"North Shore, Oʻahu", accent:"#e0955a", motif:"facet", lead:"How it’s made",
  title:"Flotsam & Co.", url:"https://www.flotsamand.co/sunrise-shells", link:"Visit Flotsam & Co.",
  hook:"They free-dive a hundred feet for a thumbnail-sized shell that blushes pink to gold.",
  facts:["Sunrise shells bury in deep sand channels; divers fan the sand by hand to find them.","The color lives in a thin layer, so they’re never bleached or over-scrubbed.","The fragile shells are bezel-set in gold so they can actually be worn."],
  back:"The sunrise shell is a scallop no bigger than a thumbnail whose ribs run from pink through orange to gold, and tradition holds the finest were once reserved for aliʻi. You don’t really buy a good one — you find it, and Flotsam & Co. free-dive a hundred feet to fan the sand where the living scallops bury themselves. Because the color sits in a paper-thin layer, they’re never bleached; the fragile shells are cradled in gold bezels so they can survive being worn." },
{ id:"monica-shore", cat:"Sunrise shells", where:"Haleʻiwa, Oʻahu", accent:"#e0955a", motif:"facet", lead:"How it’s made",
  title:"MonicaByTheShore", url:"http://www.monicabytheshore.com/", link:"Visit MonicaByTheShore",
  hook:"North-Shore sunrise-shell jewelry, made one shell at a time.",
  facts:["Once reserved for aliʻi, sunrise shells are Hawaiʻi’s most coveted beach find.","Shells are graded on color, symmetry and no chips; matched pairs are hardest.","Each is set in gold to protect the thin, fragile shell."],
  back:"Sunrise shells are Hawaiʻi’s most coveted beach find, graded on color saturation, symmetry and freedom from chips — and a matched pair for earrings is far harder to assemble than a single shell. MonicaByTheShore makes North-Shore sunrise-shell jewelry a piece at a time, setting each thin shell in protective gold. It’s the small-maker counterpoint to the big houses: one person, one shell, one setting at a time." },
{ id:"kamaka", cat:"ʻUkulele", where:"Honolulu · since 1916", accent:"#b5732f", motif:"strings", lead:"How it’s made",
  title:"Kamaka Hawaii", url:"https://kamakahawaii.com/", link:"Visit Kamaka",
  hook:"Four generations building ʻukulele by hand — and they still air-dry their koa for six years.",
  facts:["Koa is air-dried five to six years so it won’t warp — never kiln-dried.","Sides are wetted and bent over heat; the top is braced to tune its voice.","Twenty-plus hands touch each one before it ships."],
  back:"The ʻukulele arrived with Portuguese laborers in the 1880s and became Hawaiian within a generation; by 1916 Samuel Kamaka was building them in his Honolulu garage. Four generations later, Kamaka still air-dries its koa for five or six years so it won’t warp, bends the sides over heat, and braces each top to tune its voice. More than twenty pairs of hands touch every instrument, and the company president plays each one before it’s allowed to ship." },
{ id:"koaloha", cat:"ʻUkulele", where:"Oʻahu", accent:"#b5732f", motif:"strings", lead:"How it’s made",
  title:"KoAloha", url:"https://www.koaloha.com/", link:"Visit KoAloha",
  hook:"Founded by an inventor who ran a plastics factory before he made ‘koa + aloha.’",
  facts:["Alvin ‘Pops’ Okami started KoAloha in the mid-1990s.","A distinctive internal bracing gives it a bright, projecting tone.","Still made by the Okami family and their team on Oʻahu."],
  back:"KoAloha was started in the mid-1990s by Alvin ‘Pops’ Okami, an inventor who had run a plastics factory before he turned to instruments — and it shows in a distinctive internal bracing that gives the ukes a bright, projecting tone. The name fuses koa and aloha, and the instruments are still built by the Okami family and their team on Oʻahu. It’s one of the four Hawaiian ‘K’ houses that define the modern ʻukulele." },
{ id:"kanilea", cat:"ʻUkulele", where:"Oʻahu · since 1998", accent:"#7d9b5b", motif:"strings", lead:"How it’s made",
  title:"Kanileʻa ʻUkulele", url:"https://kanileaukulele.com/", link:"Visit Kanileʻa",
  hook:"They plant a koa tree for every single ʻukulele they build.",
  facts:["Founded in 1998 by Joe and Kristen Souza.","High-end instruments made with a stated environmental streak.","One uke, one tree — trying to give back the forest they draw from."],
  back:"Kanileʻa, founded in 1998 by Joe and Kristen Souza, is the conservationist of Hawaiʻi’s ukulele builders: for every instrument it makes, the company plants a koa tree, trying to give back the forest it draws from. The instruments are high-end and finely finished, but the tree-per-uke pledge is the part players remember. It’s a small, concrete answer to a real question — what happens to the wood a craft depends on." },
{ id:"koolau", cat:"ʻUkulele", where:"Oʻahu", accent:"#b5732f", motif:"strings", lead:"How it’s made",
  title:"Koʻolau", url:"https://www.koolauukulele.com/", link:"Visit Koʻolau",
  hook:"The fourth Hawaiian ‘K’ — building with far more than koa.",
  facts:["Uses spruce, redwood, rosewood, tropical ash and more.","Leans into custom, made-to-order instruments.","Has focused on manufacturing fine Hawaiian ukes for decades."],
  back:"Koʻolau is the fourth of Hawaiʻi’s great ‘K’ ukulele houses, and the one that reaches furthest beyond koa — building with spruce, redwood, rosewood, tropical ash and more, and leaning into custom, made-to-order instruments. Different woods give different voices, so a Koʻolau can sound quite unlike an all-koa uke of the same size. It’s proof that ‘Made in Hawaiʻi’ is a standard of craft, not a single recipe." },
{ id:"pyzel", cat:"Surfboards", where:"Waialua, North Shore", accent:"#2f8f9d", motif:"wave", lead:"How it’s made",
  title:"Pyzel Surfboards", url:"https://pyzelsurfboards.com/", link:"Visit Pyzel",
  hook:"The North Shore shaper behind the boards John John Florence rides to world titles.",
  facts:["Jon Pyzel started in a backyard shaping bay in the mid-’90s.","A board is carved from a foam blank with a wood stringer, then glassed in fiberglass and resin.","The boards get tested on the heaviest waves on earth, minutes from the bay."],
  back:"The North Shore of Oʻahu is the proving ground for the surfing world, and the boards that survive there set the standard everywhere else. Jon Pyzel started shaping in a backyard bay in the mid-’90s and now makes the boards John John Florence rides to world titles. A board is carved from a foam blank with a wood stringer, then sealed in fiberglass and resin — but the real craft is in millimeters of shape, tested minutes from the bay on the heaviest waves anywhere." },
{ id:"tokoro", cat:"Surfboards", where:"Oʻahu", accent:"#2f8f9d", motif:"wave", lead:"How it’s made",
  title:"Tokoro Surfboards", url:"https://www.tokorosurfboards.com/", link:"Visit Tokoro",
  hook:"One of Hawaiʻi’s most respected shapers — and surfers.",
  facts:["Wade Tokoro shapes on Oʻahu.","Shaping is subtraction: cut the outline and curves, millimeters at a time.","Then glassed, hot-coated, sanded, and finned by hand."],
  back:"Wade Tokoro is one of Hawaiʻi’s most respected shapers, and a serious surfer himself — the kind of maker who knows exactly how a board should feel because he rides what he builds. Shaping is a craft of subtraction: the outline and curves are cut from a foam blank a fraction of an inch at a time, then the board is glassed, hot-coated, sanded and finned by hand. On Oʻahu, a shaper’s reputation is earned in the water, not the showroom." },
{ id:"aipa", cat:"Surfboards", where:"Oʻahu · since 1970", accent:"#c86b57", motif:"wave", lead:"How it’s made",
  title:"Aipa Surf Co.", url:"https://www.aipasurf.com/", link:"Visit Aipa",
  hook:"Ben Aipa invented the swallowtail — and his sons still run the shop.",
  facts:["Aipa started shaping in 1970 and rewrote what a surfboard tail could do.","He invented the double-edged swallowtail (1972) and the split-tail (1974).","The shop is now led by his sons, Duke and Akila."],
  back:"Ben Aipa started shaping in 1970 and rewrote what a surfboard tail could do, inventing the double-edged swallowtail in 1972 and the split-tail in 1974 — designs that let surfers turn harder and later than before. The shop is now run by his sons, Duke and Akila, carrying the family’s ideas forward. Aipa is a reminder that a single shaper’s inventions can change how the whole world surfs." },

/* ---- Makers of Thailand ---- */
{ id:"jim-thompson", cat:"Thai silk", where:"Bangkok · est. 1951", accent:"#b0563f", motif:"strings", lead:"How it’s made",
  title:"Jim Thompson", url:"https://www.jimthompson.com/", link:"Visit Jim Thompson",
  hook:"The house that turned hand-woven Thai silk from a dying village craft into a world-famous fabric.",
  facts:["Thai silk starts as yellow cocoons — the filament is reeled by hand into lustrous, slightly slubby thread.","The shimmer comes from triangular fibers that catch light like tiny prisms.","Founder Jim Thompson vanished in Malaysia’s Cameron Highlands in 1967 — never found."],
  back:"Thai silk is reeled from golden-yellow cocoons, and the hand-drawn filament keeps tiny irregularities — slubs — that give the cloth its texture, while the fiber’s triangular cross-section splits light like a prism for that famous shimmer. After WWII, an American ex-architect named Jim Thompson found the craft surviving in a weaving quarter of Bangkok, and built it into a global house without giving up the handwork. He walked into Malaysia’s Cameron Highlands in 1967 and was never seen again; the company, and the silk, carried on." },
{ id:"siam-celadon", cat:"Celadon", where:"Chiang Mai", accent:"#5f9b7a", motif:"facet", lead:"How it’s made",
  title:"Siam Celadon", url:"https://www.siamceladon.com/", link:"Visit Siam Celadon",
  hook:"Jade-green stoneware whose glassy skin cracks on purpose — a web you can hear forming.",
  facts:["Celadon’s green comes from a wood-ash glaze and a smoky, oxygen-starved kiln — not from pigment.","The crackle happens as glaze and clay shrink at different rates while cooling.","Chiang Mai is Thailand’s celadon capital, heir to old Lanna kingdom kilns."],
  back:"Celadon is high-fired stoneware with a glaze made largely of wood ash. Fired in a reduction kiln — starved of oxygen — traces of iron in the glaze turn jade green instead of rust brown; no pigment is involved. As the piece cools, glaze and clay shrink at slightly different rates, so the glassy skin crazes into a fine web, sometimes with an audible ping. Northern Thailand inherited the craft from the old Lanna kingdom’s kilns, and Chiang Mai houses like Siam Celadon keep the wood-ash tradition in production today." },
{ id:"sop-moei-arts", cat:"Karen weaving", where:"Mae Hong Son & Chiang Mai", accent:"#8a5a7d", motif:"grain", lead:"How it’s made",
  title:"Sop Moei Arts", url:"https://www.sopmoeiarts.com/", link:"Visit Sop Moei Arts",
  hook:"Karen weavers turning backstrap-loom cloth and basketry into a livelihood for their villages.",
  facts:["A backstrap loom has no frame — the weaver’s own body keeps the warp under tension.","Patterns are counted from memory, thread by thread, and handed down by teaching.","Sales fund a sustainable income for the Karen weavers and keep the skills alive."],
  back:"A backstrap loom is barely a machine at all: one end of the warp ties to a post, the other to a strap around the weaver’s lower back, and leaning keeps the threads taut. Everything else — the pattern, the beat, the selvedge — lives in the weaver’s hands and memory. Sop Moei Arts works with Karen weavers in Thailand’s northwest hills, turning that cloth and hand-woven basketry into contemporary textiles and décor, with the stated goal of a sustainable income for the weavers and the survival of the craft itself." },
{ id:"studio-naenna", cat:"Natural dye", where:"Chiang Mai", accent:"#4a5f9e", motif:"wave", lead:"How it’s made",
  title:"Studio Naenna", url:"https://www.studio-naenna.com/", link:"Visit Studio Naenna",
  hook:"Cloth dipped in a living indigo vat comes out green — and turns blue in front of your eyes.",
  facts:["Indigo isn’t water-soluble: the vat must be fermented so the dye can grip the fiber.","Cloth emerges yellow-green and turns blue as the dye meets oxygen.","Studio Naenna’s dye gardens and Karen weavers work at the foot of Doi Suthep, Chiang Mai."],
  back:"Real indigo is chemistry you can watch. The pigment won’t dissolve in water, so dyers keep a living, fermented vat that converts it to a soluble form; cloth dipped in comes out yellow-green, then blues before your eyes as air oxidizes the dye back into its insoluble form — now trapped inside the fiber. Deep shades take many dips, not one long soak. At Studio Naenna, in the shade of Chiang Mai’s Doi Suthep mountain, dye gardens and a resident group of Karen weavers keep the whole chain — plant, vat, loom — in one place." },
{ id:"doi-tung", cat:"Mulberry paper", where:"Chiang Rai · since 1988", accent:"#7d8f4f", motif:"scroll", lead:"How it’s made",
  title:"DoiTung", url:"https://www.doitung.com/", link:"Visit DoiTung",
  hook:"A royal project that swapped opium fields for mulberry paper, ceramics, and looms.",
  facts:["Saa paper is beaten from the inner bark of the paper mulberry tree — no wood pulp involved.","The pulp is floated onto screens and sun-dried into strong, textured sheets.","The DoiTung project began in 1988 to replace opium poppy with sustainable crafts and crops."],
  back:"Saa paper doesn’t come from a mill: the inner bark of the paper mulberry is soaked, boiled, and beaten to loose fibers, then floated onto screens in a water bath and lifted out as a wet sheet that sun-dries into strong, beautifully textured paper. On Doi Tung mountain in Thailand’s far north, that craft is part of a bigger story — the DoiTung Development Project, begun in 1988 under the Princess Mother to replace opium poppy with legal livelihoods: paper, ceramics, hand-woven textiles, and coffee, made by the mountain’s own communities." },
{ id:"prempracha", cat:"Studio ceramics", where:"Chiang Mai", accent:"#a2683c", motif:"orbit", lead:"How it’s made",
  title:"Prempracha’s Collection", url:"https://www.prempracha.com/", link:"Visit Prempracha",
  hook:"A Chiang Mai factory where clay goes from wheel to kiln to hand-painted glaze under one roof.",
  facts:["A full-service studio: throwing, molding, glazing, and firing all happen on site.","Stoneware is fired past 1,200 °C, where clay vitrifies — turns glassy and waterproof.","Each glaze color must survive the kiln: many pigments burn away or shift at temperature."],
  back:"Prempracha’s Collection is a full-service ceramic studio and factory in Chiang Mai — clay is thrown or molded, bisque-fired, glazed, and fired again, all under one roof. The hard part of pottery at this scale is that the kiln has the final word: stoneware vitrifies past 1,200 °C, becoming glassy and waterproof, but every glaze color has to survive that heat, and many pigments burn out or shift completely. What looks like painting is really a bet on chemistry — the true color only exists after the fire." },
{ id:"patapian", cat:"Bamboo craft", where:"Bangkok", accent:"#6b8f5a", motif:"grid", lead:"How it’s made",
  title:"PATAPiAN", url:"https://www.patapian.com/", link:"Visit PATAPiAN",
  hook:"Old Thai basket weaves, shrunk to jewelry-fine scale and blown up into lighting.",
  facts:["Bamboo is split, skinned, and shaved into strips thin enough to bend like ribbon.","Traditional Thai basketry weaves become lighting, tableware, and design objects.","Tight weaves need strips of near-identical width — the sizing is the hidden skill."],
  back:"Thai basketry starts with a knife, not a loom: bamboo is split along the grain, the glossy skin shaved off, and the culm sliced into strips so thin they bend like ribbon. The weave patterns — hexagonal, twill, coiled — are village knowledge centuries old. PATAPiAN, a Bangkok design studio, takes those same weaves up and down in scale, from jewelry-fine objects to woven lighting, tableware, and furniture, keeping the handwork while redrawing what a ‘basket’ can be." },
{ id:"siam-bronze", cat:"Bronzeware", where:"Bangkok · since 1954", accent:"#9c6a30", motif:"facet", lead:"How it’s made",
  title:"Siam Bronze Factory", url:"https://www.siambronzefactory.com/", link:"Visit Siam Bronze",
  hook:"Cutlery with the heft of a temple bell — solid bronze, cast and polished by hand since 1954.",
  facts:["Bronze is copper plus tin — harder than either, with a warm weight brass can’t match.","Each piece is cast solid, then ground and hand-polished to a mirror finish.","Siam Bronze has made flatware in Bangkok since 1954."],
  back:"Bronze is one of humanity’s oldest engineered materials — copper hardened with tin — and Thailand’s bronzeworkers have cast everything from temple bells to Buddha images with it. Siam Bronze Factory has applied that metal to the dinner table since 1954: flatware cast solid, ground true, and hand-polished until it shines. The result has a weight and warmth stamped stainless steel can’t fake, which is why bronze cutlery became one of Bangkok’s signature exports of the mid-century." },
{ id:"thai-benjarong", cat:"Benjarong", where:"Central Thailand", accent:"#a34f6e", motif:"orbit", lead:"How it’s made",
  title:"Thai Benjarong", url:"https://www.thaibenjarong.com/", link:"Visit Thai Benjarong",
  hook:"Five-color porcelain once reserved for the Siamese court — every dot laid by brush, refired again and again.",
  facts:["‘Benjarong’ comes from Sanskrit for ‘five colors’ — the classic royal palette.","Enamel colors are painted over the glaze and fused in repeated low-temperature firings.","Gold lines are painted last, so they sit raised above the surface."],
  back:"Benjarong is Thailand’s royal porcelain: the name comes from the Sanskrit for ‘five colors,’ and the ware began centuries ago as court pieces. The technique is over-glaze enameling — mineral colors are painted on top of already-glazed porcelain, then fused in repeated low-temperature firings, one pass per color family, with raised gold lines laid last. A single piece can pass through the kiln many times, and one slip on the final firing can undo weeks of brushwork. Studios like Thai Benjarong keep the pattern language of the old court ware in production today." },
{ id:"arts-of-the-kingdom", cat:"Royal crafts", where:"Ayutthaya", accent:"#b08d3a", motif:"scroll", lead:"Who makes it",
  title:"Arts of the Kingdom", url:"https://www.artsofthekingdom.com/", link:"Visit Arts of the Kingdom",
  hook:"Rural Thais trained into master artisans — nielloware, embroidery, and vine basketry fit for a palace.",
  facts:["Queen Sirikit founded the SUPPORT Foundation in 1976 to train rural Thais in royal crafts.","Nielloware inlays a black metal alloy into engraved silver and gold.","Yan lipao weaves a jungle vine into baskets fine enough to pass for cloth."],
  back:"Arts of the Kingdom showcases the Queen Sirikit Institute — the SUPPORT Foundation begun in 1976 to teach Thailand’s farming families the kingdom’s most demanding crafts, so the skills (and the incomes) wouldn’t die out. The repertoire is the old palace arts: nielloware, where a black metal alloy is fused into engraved silver; gold-and-silver brocade embroidery; and yan lipao, a jungle vine woven so finely the baskets read as fabric. Ordinary villagers trained into master artisans — the point was always both the craft and the livelihood." },

/* ---- Time ---- */
{ id:"time-relative", cat:"Time", accent:"#2f8f9d", motif:"pulse",
  title:"Why a Moving Clock Runs Slow", hook:"Time isn’t the same for everyone — it depends on how fast you move and how deep in gravity you sit.",
  facts:["Einstein showed moving clocks tick slower, and clocks deeper in gravity tick slower too.","The effect is tiny at everyday speeds, but real and measured.","A clock on a mountaintop runs slightly faster than one at sea level."], connects:"Relativity → GPS → smartphones",
  back:"We tend to picture time as one universal clock ticking the same for everyone, but Einstein showed it isn’t so. A clock that moves fast, or sits deeper in a gravitational field, genuinely ticks slower — time is ‘relative’ to your motion and place. The effect is far too small to feel at human speeds, yet it’s been measured with precise clocks, and a clock on a mountaintop really does run a hair faster than one at sea level." },
{ id:"gps-einstein", cat:"Time", accent:"#5b8fb0", motif:"orbit",
  title:"Why GPS Needs Einstein", hook:"Your phone’s map would drift miles off in a single day if it ignored relativity.",
  facts:["GPS satellites carry atomic clocks that, seen from the ground, tick a little fast.","The system corrects for both speed and gravity, exactly as relativity predicts.","Without the fix, positions would grow wrong by about 10 km every day."], connects:"Atomic clocks → GPS → self-driving cars",
  back:"GPS is the everyday proof that relativity is real. Each satellite carries an atomic clock, and because those clocks sit high in Earth’s weaker gravity and move quickly, they tick at a slightly different rate than clocks on the ground. The system bakes in the exact correction relativity predicts; without it, your position would drift by roughly ten kilometers a day. Einstein’s abstract theory is quietly keeping your map honest." },
{ id:"measuring-time", cat:"Time", where:"Ancient → 1600s", accent:"#b07d3f", motif:"scroll",
  title:"How Humans First Measured Time", hook:"Before clocks, people told time with shadows, dripping water, and burning rope.",
  facts:["Sundials split the day by the sun’s shadow; water clocks measured it by flow.","Mechanical clocks with an ‘escapement’ arrived in medieval Europe.","The pendulum (1650s) first made clocks accurate to seconds a day."], connects:"Sundials → clocks → atomic time",
  back:"For most of history, telling time meant watching something move steadily: a shadow crossing a sundial, water dripping through a marked vessel, a candle or knotted rope burning down. Medieval Europe added mechanical clocks with an ‘escapement’ that doled out a gear’s motion in even ticks, and in the 1650s Huygens’ pendulum made clocks accurate to seconds a day. Each step tightened humanity’s grip on ‘now.’" },
{ id:"atomic-clocks", cat:"Time", accent:"#2f8f9d", motif:"pulse",
  title:"Atomic Clocks", hook:"The most precise machines ever built keep time by counting the buzz of a single kind of atom.",
  facts:["A cesium atom flips between two states 9,192,631,770 times a second — that defines the second.","The best would lose under a second over the age of the universe.","They quietly underpin GPS, the internet, and finance."], connects:"Atomic clocks → GPS → the internet",
  back:"An atomic clock keeps time not with a swinging pendulum but with the rock-steady rhythm of an atom: a cesium atom flips between two energy states at a fixed rate, and 9,192,631,770 of those flips is defined as exactly one second. The best atomic clocks would drift less than a second across the entire age of the universe. That almost absurd precision is what makes GPS, synchronized networks, and modern finance possible." },
{ id:"longitude", cat:"Time", where:"1700s", accent:"#5b8fb0", motif:"wave",
  title:"The Longitude Problem", hook:"For centuries sailors could find how far north they were — but not how far east or west.",
  facts:["Longitude is really a time problem: compare local noon to the time back home.","Ships needed a clock that kept time through storms — pendulums couldn’t.","John Harrison’s marine chronometer finally solved it."], connects:"Clocks → navigation → global trade",
  back:"Sailors could always find their latitude from the sun and stars, but longitude — how far east or west — stumped them for centuries and wrecked countless ships. The trick is that longitude is really a time problem: if you know the time back home and compare it to local noon, the difference tells you how far around the globe you’ve come. The catch was building a clock that kept accurate time on a pitching deck, which John Harrison finally achieved in the 1700s." },
{ id:"time-trade", cat:"Time", where:"1800s", accent:"#b07d3f", motif:"grid",
  title:"Why Railroads Invented Time Zones", hook:"Standardized time is younger than the steam engine — the trains forced it into being.",
  facts:["Towns once each kept their own local noon; that chaos wrecked train schedules.","Railroads pushed standard time zones in the 1800s.","Synchronized time let markets and telegraphs coordinate worldwide."], connects:"Railroads → time zones → globalization",
  back:"Standardized time is surprisingly modern — and the railroads invented it. When every town kept its own local noon, train schedules became chaos, so railways imposed shared time zones in the 1800s. Synchronized clocks let markets open together, ships and telegraphs coordinate, and trade run on a common beat. The idea that ‘noon’ means the same thing across a whole region is an industrial-age convenience we now take completely for granted." },
{ id:"network-time", cat:"Time", accent:"#2f8f9d", motif:"pulse",
  title:"How the Internet Syncs a Billion Clocks", hook:"Every server, trade, and message depends on computers agreeing on ‘now.’",
  facts:["The Network Time Protocol (NTP) syncs devices to reference clocks over the internet.","It measures and cancels out network delay to stay within milliseconds.","Many reference clocks trace back to atomic time from GPS or national labs."], connects:"Atomic clocks → NTP → everything online",
  back:"Every trade, message, and log entry online depends on computers agreeing on the current instant, often to the millisecond. The Network Time Protocol keeps them in step: a device asks reference clocks for the time, measures how long the round trip took, and cancels out that delay to land on an accurate ‘now.’ Many of those reference clocks trace back, ultimately, to atomic time from GPS or national labs — so the internet quietly runs on atomic seconds." },

/* ---- Navigation ---- */
{ id:"polynesian-nav", cat:"Navigation", where:"The Pacific", accent:"#5b8fb0", motif:"wave",
  title:"Polynesian Wayfinding", hook:"Voyagers crossed thousands of miles of open Pacific with no instruments at all.",
  facts:["They read swells, winds, stars, clouds, and birds as a living map.","Star ‘paths’ rising and setting held their direction through the night.","The voyages of Hōkūleʻa proved the old methods still work."], connects:"Stars → compasses → satellites",
  back:"Long before compasses reached the Pacific, Polynesian navigators crossed thousands of miles of open ocean with no instruments — reading swells, winds, the flight of birds, and the rising and setting points of stars as a living map held in memory. The knowledge nearly vanished under colonization, but the 1970s voyages of the canoe Hōkūleʻa, guided by traditional wayfinders, proved the old methods still work. It’s one of humanity’s great feats of applied observation." },
{ id:"roman-roads", cat:"Navigation", where:"Ancient Rome", accent:"#b07d3f", motif:"grid",
  title:"Roman Roads", hook:"Some roads built two thousand years ago still carry traffic today.",
  facts:["Layered stone, gravel and fitted paving shed water and lasted centuries.","Roads let Rome move armies, mail, and trade at unheard-of speed.","‘All roads lead to Rome’ was an engineered network of ~80,000 km."], connects:"Roman roads → logistics → railroads",
  back:"Rome’s roads were engineered in layers — a deep foundation of stone and gravel topped with fitted paving that shed water — and some still carry traffic two thousand years later. They let Rome move armies, mail, and trade at speeds the ancient world had never seen, knitting a vast empire together. ‘All roads lead to Rome’ was literal: a network of about 80,000 kilometers, and the distant ancestor of every logistics system since." },
{ id:"compass", cat:"Navigation", where:"China → the world", accent:"#6f7f86", motif:"orbit",
  title:"The Magnetic Compass", hook:"A splinter of magnetized iron let ships sail out of sight of land.",
  facts:["Lodestone — naturally magnetized rock — lines up with Earth’s magnetic field.","First used for divination in China, then adapted for navigation.","It freed sailors from needing clear skies to hold a course."], connects:"Compass → maps → GPS",
  back:"The compass began as lodestone — naturally magnetized rock that lines up with Earth’s magnetic field — and was first used for divination in China before being adapted for navigation. Its power was simple but enormous: a ship could now hold a steady course even when clouds hid the sun and stars. That freedom to sail out of sight of land, in any weather, helped open the age of long-distance sea travel." },
{ id:"maps", cat:"Navigation", accent:"#5b8fb0", motif:"grid",
  title:"How a Flat Map Lies", hook:"You can’t peel a globe flat without stretching it — every map trades one truth for another.",
  facts:["A ‘projection’ must give up accurate area, shape, or distance — you can’t keep all three.","Mercator keeps directions true for sailing but inflates the poles.","Different jobs use different projections; there’s no single ‘correct’ map."], connects:"Maps → surveying → satellites",
  back:"A globe is curved and a map is flat, and you can’t flatten a sphere without stretching it — so every map is a compromise called a projection, giving up accurate area, shape, or distance because it can’t keep all three at once. Mercator keeps compass directions true, which is perfect for sailing, but it balloons the poles until Greenland rivals Africa. There’s no single ‘correct’ map, only the right projection for the job." },
{ id:"satellites", cat:"Navigation", accent:"#5b8fb0", motif:"orbit",
  title:"The Satellites That Know Where You Are", hook:"Right now, a few dozen satellites are quietly triangulating your pocket.",
  facts:["Your receiver times signals from several satellites to work out where it is.","At least four satellites fix your position and correct your device’s clock.","GPS now shares the sky with Galileo, GLONASS, and BeiDou."], connects:"Atomic clocks → satellites → self-driving cars",
  back:"Satellite navigation works by timing: your receiver listens to signals from several satellites, and because it knows exactly when each was sent and how fast radio travels, it can work out its distance from each — and thus its position. At least four satellites are needed, which also lets your device correct its own cheap clock against their atomic ones. GPS now shares the sky with Europe’s Galileo, Russia’s GLONASS, and China’s BeiDou." },
{ id:"self-driving", cat:"Navigation", accent:"#6f7f86", motif:"grid",
  title:"How a Car Drives Itself", hook:"A self-driving car builds a live 3-D model of the world many times a second.",
  facts:["Lidar, radar, and cameras fuse into one moving picture of road, cars, and people.","Software predicts what everything nearby will do next, then plans a path.","Precise maps and GPS tell it where it sits to within a lane."], connects:"GPS → sensors → AI",
  back:"A self-driving car fuses several senses into one live model of the world, rebuilt many times a second: lidar and radar measure distances, cameras read signs and lane lines, and detailed maps plus GPS pin its position to within a lane. Software then predicts what every nearby car and pedestrian is likely to do next and plans a safe path through them. It’s less about steering than about perceiving and predicting fast enough to act." },

/* ---- Materials ---- */
{ id:"stone-tools", cat:"Materials", where:"Prehistory", accent:"#b07d3f", motif:"facet",
  title:"Stone Age Tools", hook:"The first technology was knowing which rock breaks into a sharp edge.",
  facts:["Knapping flint or obsidian flakes off razor edges under careful control.","Sharper tools meant better hunting, butchering, and woodworking.","Toolmaking runs back over three million years."], connects:"Stone → bronze → iron",
  back:"Humanity’s first technology was a deep understanding of rock: certain stones like flint and obsidian fracture in predictable, glass-sharp flakes when struck just right, a skill called knapping. Sharper, more reliable edges transformed hunting, butchering, and woodworking, and the ability to make tools compounded across generations. Stone toolmaking stretches back over three million years — older than our own species — making it the longest-running technology we have." },
{ id:"bronze", cat:"Materials", where:"~3300 BCE", accent:"#b07d3f", motif:"facet",
  title:"Bronze", hook:"Mixing two soft-ish metals made something hard enough to name an age after.",
  facts:["Copper plus a little tin makes bronze, far harder than either alone.","It cast cleanly into tools, weapons, and art.","Tin was rare, so bronze drove long-distance trade."], connects:"Bronze → iron → steel",
  back:"Bronze was humanity’s first great alloy: melt copper with a little tin and you get a metal far harder and more useful than either on its own, one that casts cleanly into tools, weapons, and art. Its importance was so vast we named an age after it. Tin was scarce and rarely found near copper, so making bronze forced early peoples into some of the first long-distance trade networks — metallurgy quietly building an interconnected world." },
{ id:"iron", cat:"Materials", where:"~1200 BCE", accent:"#6f7f86", motif:"facet",
  title:"Iron", hook:"Iron ore is everywhere — the trick was a fire hot enough to free it.",
  facts:["Iron is common but needs high heat and skill to smelt and work.","Once mastered, cheap iron put good tools in everyone’s hands.","Wrought iron is tough but soft; the next leap was controlling carbon."], connects:"Iron → steel → skyscrapers",
  back:"Unlike scarce tin, iron ore is everywhere — the hard part was reaching temperatures high enough to smelt it and gaining the skill to work it. Once mastered, iron democratized technology: good tools and weapons no longer depended on rare trade metals, so they spread to ordinary people. Early wrought iron was tough but soft, and the next thousand years of metallurgy would be a quest to control one crucial ingredient inside it — carbon." },
{ id:"steel", cat:"Materials", accent:"#6f7f86", motif:"grid",
  title:"Steel", hook:"Steel is just iron with a pinch of carbon — and it built the modern world.",
  facts:["A small, controlled amount of carbon makes iron far stronger and springier.","The Bessemer process (1850s) made steel cheap at scale.","It made railroads, skyscrapers, ships, and long bridges possible."], connects:"Steel → railroads → skyscrapers",
  back:"Steel is iron with a carefully controlled trace of carbon, and that small addition makes it dramatically stronger, harder, and springier than plain iron. For millennia steel was precious and hand-made, until the Bessemer process in the 1850s let it be produced cheaply at industrial scale. That flood of affordable steel is what physically built the modern world — the railroads, skyscrapers, ships, and long-span bridges that would collapse under their own weight in any weaker material." },
{ id:"roman-concrete", cat:"Materials", where:"Ancient Rome", accent:"#6f7f86", motif:"grid",
  title:"Roman Concrete", hook:"Roman harbors have stood in seawater for 2,000 years — modern concrete cracks in decades.",
  facts:["Their mix used volcanic ash and lime.","Seawater actually triggered new minerals to grow, healing cracks.","Scientists still reverse-engineer it for durable, greener concrete."], connects:"Concrete → architecture → cities",
  back:"Roman concrete has survived two millennia submerged in seawater, while much modern concrete crumbles in decades — a puzzle scientists are still unpacking. The Roman mix used volcanic ash and lime, and rather than being attacked by seawater, it reacted with it: new minerals grew inside the material over time, actually sealing cracks. Understanding that self-healing chemistry could help us build more durable, less carbon-hungry concrete today." },
{ id:"aluminum", cat:"Materials", accent:"#5b8fb0", motif:"facet",
  title:"Aluminum", hook:"Aluminum was once more precious than gold — until electricity set it free.",
  facts:["It’s the most common metal in Earth’s crust but bonds tightly to oxygen.","The Hall–Héroult process (1886) uses electricity to smelt it cheaply.","Light and rust-resistant, it made modern aircraft possible."], connects:"Aluminum → aviation → space",
  back:"Aluminum is the most abundant metal in Earth’s crust, yet for most of history it was more precious than gold — because it bonds so tightly to oxygen that freeing the pure metal was nearly impossible. That changed in 1886 with the Hall–Héroult process, which uses a strong electric current to smelt it cheaply. Suddenly a light, strong, rust-resistant metal was everywhere, and it made modern aircraft — and much of the space age — possible." },
{ id:"carbon-fiber", cat:"Materials", accent:"#6f7f86", motif:"grain",
  title:"Carbon Fiber", hook:"Thread thinner than a hair, woven and glued, can beat steel and weigh a fraction as much.",
  facts:["Fibers of nearly pure carbon are spun, then set in resin.","The weave is stiff and strong along the direction of the fibers.","Used in jets, race cars, bikes, and wind-turbine blades."], connects:"Carbon fiber → aviation → clean energy",
  back:"Carbon fiber is exactly what it sounds like — threads of nearly pure carbon, each thinner than a human hair — woven into cloth and locked in resin. Aligned along the fibers, the result is stiffer and stronger than steel at a fraction of the weight, though it’s directional: strong the way the threads run. That strength-to-weight ratio is why it shows up wherever weight is the enemy, from jets and race cars to bicycles and wind-turbine blades." },
{ id:"graphene", cat:"Materials", accent:"#8f7bc0", motif:"grid",
  title:"Graphene", hook:"A sheet of carbon one atom thick — among the thinnest and strongest materials known.",
  facts:["It’s a single layer of graphite, first isolated with sticky tape in 2004.","It conducts heat and electricity superbly and is nearly transparent.","Researchers are chasing uses in electronics, batteries, and filters."], connects:"Graphene → electronics → future chips",
  back:"Graphene is a single layer of carbon atoms locked in a honeycomb lattice — a sheet just one atom thick, yet among the strongest materials ever measured. Famously, it was first isolated in 2004 by peeling graphite apart with ordinary sticky tape, an experiment that won a Nobel Prize. It conducts heat and electricity superbly and is nearly transparent, and researchers are still chasing its potential in electronics, batteries, sensors, and filtration." },

/* ---- Physics, computing, energy ---- */
{ id:"semiconductors", cat:"Computing", accent:"#8f7bc0", motif:"grid",
  title:"Semiconductors", hook:"The whole digital world runs on a material that’s neither a good conductor nor a good insulator.",
  facts:["Silicon can be ‘doped’ so current switches on and off — a transistor.","Billions of transistors are etched onto a chip smaller than a fingernail.","Phones, cars, and fridges now all run on them."], connects:"Quantum mechanics → chips → computers",
  back:"A semiconductor like silicon sits in a useful middle ground — neither a good conductor nor a good insulator — and by adding tiny amounts of other elements (‘doping’) engineers can make it switch current on and off on command. That switch is the transistor, and billions of them etched onto a chip smaller than a fingernail form the brains of every computer. The entire digital age rests on this one trick of controllable conduction." },
{ id:"quantum", cat:"Physics", accent:"#8f7bc0", motif:"orbit",
  title:"Quantum Mechanics", hook:"At the tiniest scales, the universe stops being certain and starts dealing in odds.",
  facts:["Particles act like waves and can sit in a mix of states at once.","Some pairs of things — like position and speed — can’t both be known exactly.","It underlies lasers, chips, and MRI machines."], connects:"Quantum → semiconductors → lasers",
  back:"At the scale of atoms, the familiar rules break down: particles behave like waves, can occupy a blur of several states at once, and are governed by probabilities rather than certainties. There’s even a hard limit — you can’t pin down some pairs of properties, like a particle’s position and its speed, both exactly. It sounds like philosophy, but this strange machinery is real and practical, quietly underpinning lasers, computer chips, and MRI scanners." },
{ id:"lasers", cat:"Physics", accent:"#2f8f9d", motif:"pulse",
  title:"Lasers", hook:"A laser is just light marching in perfect lockstep — and that changes everything.",
  facts:["Atoms are pumped with energy, then release light all in step.","That coherence makes a tight, pure, powerful beam.","Lasers read discs, cut steel, carry data, and do eye surgery."], connects:"Quantum → lasers → fiber optics",
  back:"Ordinary light is a jumble of many colors and phases; a laser is light made orderly. Atoms are pumped full of energy and then coaxed to release it all in step, producing a beam that is a single color and marches in perfect lockstep — ‘coherent’ light. That coherence makes the beam tight, pure, and controllable, which is why the same basic device can read a disc, cut steel, carry internet traffic through glass, and reshape a cornea." },
{ id:"fiber-optics", cat:"Computing", accent:"#2f8f9d", motif:"pulse",
  title:"Fiber Optics", hook:"The internet mostly travels as pulses of light in glass thinner than a hair.",
  facts:["Light bounces down a glass fiber by total internal reflection.","It carries far more data, far farther, than copper wire.","Undersea fiber links whole continents at nearly light speed."], connects:"Lasers → fiber → the internet",
  back:"Most of the internet travels as flashes of laser light racing down hair-thin strands of ultra-pure glass. The light stays trapped inside by ‘total internal reflection,’ bouncing along the fiber for miles without leaking out, and it carries vastly more data, much farther, than copper wire ever could. Bundles of these fibers cross entire ocean floors, linking continents at nearly the speed of light — the physical backbone of the online world." },
{ id:"internet", cat:"Computing", accent:"#5b8fb0", motif:"grid",
  title:"How the Internet Actually Works", hook:"There’s no ‘cloud’ — it’s cables, and a clever trick called packet switching.",
  facts:["Messages are chopped into packets that each find their own route.","Shared rules (TCP/IP) let any network talk to any other.","The data mostly rides physical fiber, including cables across the ocean floor."], connects:"Fiber → the internet → AI",
  back:"The ‘cloud’ is a comforting fiction — underneath, the internet is cables and a clever idea called packet switching. Every message is chopped into small packets that each find their own route across the network and are reassembled at the far end, so no single failure stops the flow. A shared set of rules, TCP/IP, lets any network talk to any other, and the whole thing rides on very physical fiber, right down to cables lying on the ocean floor." },
{ id:"ai", cat:"Computing", accent:"#8f7bc0", motif:"grid",
  title:"How Modern AI Learns", hook:"Today’s AI isn’t programmed with rules — it’s shown examples until the patterns stick.",
  facts:["Neural networks nudge millions of numbers to shrink their own mistakes.","More data and computing power made them suddenly capable.","They predict likely patterns — powerful, but able to be confidently wrong."], connects:"Chips → data → AI",
  back:"Classic software follows rules a human wrote; modern AI works differently. A neural network starts with millions of random numbers and is shown vast numbers of examples, nudging those numbers again and again to shrink its mistakes until useful patterns emerge. Feed it enough data and computing power and it becomes startlingly capable — but at heart it’s predicting likely patterns, which is why it can be fluent, powerful, and confidently wrong all at once." },
{ id:"electricity", cat:"Energy", accent:"#e0955a", motif:"pulse",
  title:"How Electricity Reaches Your Wall", hook:"Most power still comes from spinning a magnet to shove electrons — however you do the spinning.",
  facts:["Steam, water, or wind turns a turbine that turns a generator.","Transformers raise voltage for long trips, then drop it for your home.","The grid must match supply to demand second by second."], connects:"Steam → generators → the grid",
  back:"Strip away the fuel and most electricity is made the same way: spin a magnet inside coils of wire and you push electrons through them. Coal, gas, nuclear, hydro, and wind are just different ways to turn that turbine. Transformers then crank the voltage up for an efficient long-distance journey and back down for your outlets, and because electricity can’t be easily stored, grid operators must balance supply against demand second by second, all day, every day." },

/* ---- Space & astronomy ---- */
{ id:"how-far-stars", cat:"Astronomy", accent:"#5b8fb0", motif:"orbit",
  title:"How We Measure the Stars", hook:"We’ve never visited a star — so how do we know how far away they are?",
  facts:["Nearby stars shift against the background as Earth orbits (parallax).","Certain stars pulse at a rate that reveals their true brightness.","Comparing true to apparent brightness gives distance across the cosmos."], connects:"Parallax → cosmic distance → the expanding universe",
  back:"We’ve never touched a star, yet we know their distances — through a ladder of clever tricks. Nearby stars appear to shift slightly against the background as Earth swings from one side of its orbit to the other, and the size of that shift gives their distance (parallax). Farther out, certain stars pulse at a rate tied to their true brightness, so comparing how bright they truly are to how bright they look reveals how far the light has traveled. Rung by rung, that ladder measures the cosmos." },
{ id:"rockets", cat:"Space", accent:"#6f7f86", motif:"orbit",
  title:"How a Rocket Reaches Orbit", hook:"Orbit isn’t about going up — it’s about going sideways fast enough to keep missing the ground.",
  facts:["A rocket throws mass (exhaust) down to push itself up — Newton’s third law.","Orbit means falling around Earth so fast you never hit it — ~28,000 km/h.","‘Staging’ drops dead fuel weight along the way."], connects:"Newton → rockets → satellites",
  back:"A rocket flies by Newton’s third law: it hurls mass — hot exhaust — downward, and the reaction pushes it up. But reaching orbit isn’t really about altitude; it’s about sideways speed. To orbit is to fall toward Earth while moving so fast — roughly 28,000 km/h — that the ground curves away beneath you as quickly as you fall, so you keep missing it. Since most of a rocket is fuel, it sheds spent stages along the way to avoid dragging dead weight." },
{ id:"telescopes", cat:"Astronomy", accent:"#8f7bc0", motif:"orbit",
  title:"How Telescopes See the Past", hook:"Look at a distant galaxy and you’re seeing light that left before the Earth existed.",
  facts:["Light takes time to travel, so ‘far away’ always means ‘long ago.’","Bigger mirrors gather more light and reveal fainter, older objects.","Space telescopes climb above the blur of the atmosphere."], connects:"Light → telescopes → cosmology",
  back:"Because light travels at a finite speed, every telescope is also a time machine: the farther away something is, the longer its light has been traveling, so you see it as it was long ago — sometimes before the Earth even formed. Bigger mirrors gather more of that ancient, faint light, revealing older and dimmer objects, and putting a telescope in space lifts it above the atmosphere’s blur. Looking out into space is, unavoidably, looking back in time." },

/* ---- Life, biology, medicine ---- */
{ id:"evolution", cat:"Life", accent:"#7d9b5b", motif:"grain",
  title:"How Evolution Actually Works", hook:"Nobody designs a species — small advantages just pile up over deep time.",
  facts:["Random variation plus survival of what works reshapes life across generations.","Tiny edges compound over millions of years into eyes, wings, and brains.","We watch it happen fast in bacteria and viruses today."], connects:"DNA → variation → new species",
  back:"Evolution has no designer and no goal. Living things vary randomly from one another, and whatever variations happen to help survival and reproduction get passed on more often — so over generations, populations drift toward what works. Given deep time, those tiny advantages compound into astonishing complexity: eyes, wings, brains. It isn’t just ancient history, either; we watch evolution happen in fast-breeding bacteria and viruses within a single human lifetime." },
{ id:"dna", cat:"Life", accent:"#c86b57", motif:"strings",
  title:"DNA, Life’s Instruction Tape", hook:"Every living thing runs on a four-letter code written in a twisted ladder.",
  facts:["Sequences of four ‘bases’ spell out how to build proteins.","Cells copy and read this code to grow, repair, and reproduce.","Reading and editing DNA now drives medicine and biotech."], connects:"DNA → evolution → gene editing",
  back:"Every living thing — bacterium, redwood, or human — runs on the same kind of code: DNA, a twisted ladder whose rungs are just four chemical ‘letters.’ Their order spells out instructions for building proteins, the molecular machines that do life’s work, and cells faithfully copy and read this code to grow, repair themselves, and reproduce. Our recent ability to read and even edit that code is quietly rewriting medicine, agriculture, and biotechnology." },
{ id:"vaccines", cat:"Medicine", accent:"#c86b57", motif:"facet",
  title:"How a Vaccine Trains You", hook:"A vaccine is a rehearsal — it shows your immune system the enemy with the danger removed.",
  facts:["It presents a harmless piece or version of a germ.","Your body builds memory cells that recognize the real thing fast.","That head start can stop an infection before it takes hold."], connects:"Immunity → vaccines → public health",
  back:"A vaccine is a rehearsal for your immune system. It presents a harmless preview of a germ — a fragment, a weakened version, or instructions to build one telltale piece — so your body can learn the enemy’s face without the disease. In response it builds memory cells that stand ready for years, so if the real pathogen ever arrives, the counterattack is fast enough to stop an infection before it takes hold. Multiply that across a population and diseases lose their foothold." },
{ id:"antibiotics", cat:"Medicine", accent:"#7d9b5b", motif:"facet",
  title:"Antibiotics — and Why They’re Failing", hook:"A mold that killed bacteria launched modern medicine — and overuse is undoing it.",
  facts:["Penicillin, from a mold, was the first mass antibiotic.","Antibiotics kill or stop bacteria — not viruses.","Overuse breeds resistant bacteria, a growing global threat."], connects:"Penicillin → antibiotics → resistance",
  back:"Modern medicine leapt forward when a mold, Penicillium, was found to kill bacteria — giving us penicillin and the age of antibiotics, drugs that made once-deadly infections routine to cure. But antibiotics only work on bacteria, not viruses, and every use is also a selection pressure: the few bacteria that survive pass on their resistance. Overusing these drugs is breeding tougher and tougher bugs, making antibiotic resistance one of the great slow-moving threats to global health." },
{ id:"germ-theory", cat:"Medicine", where:"1800s", accent:"#c86b57", motif:"facet",
  title:"Germ Theory", hook:"For most of history, no one knew that invisible living things caused disease.",
  facts:["Pasteur and Koch linked specific microbes to specific illnesses.","Handwashing and sterilization suddenly saved millions of lives.","It moved medicine from blaming bad ‘airs’ to targeting real causes."], connects:"Microscopes → germ theory → antibiotics",
  back:"For most of history, disease was blamed on bad ‘airs,’ imbalances, or punishment — no one knew that invisible living things were the culprits. In the 1800s, Pasteur, Koch, and others proved that specific microbes cause specific illnesses, one of the most consequential ideas in human history. Almost overnight, simple acts like handwashing and sterilizing instruments began saving millions of lives, and medicine could finally aim at real causes instead of guessing." },

/* ---- Chemistry, earth, climate ---- */
{ id:"periodic-table", cat:"Chemistry", accent:"#8f7bc0", motif:"grid",
  title:"Why the Periodic Table Looks Like That", hook:"Mendeleev’s table wasn’t just a list — its gaps predicted elements no one had found yet.",
  facts:["Elements line up by atomic structure, so each column behaves alike.","Mendeleev left holes and correctly predicted the missing elements.","The shape mirrors how electrons stack up in shells."], connects:"Atoms → the table → chemistry",
  back:"The periodic table is far more than an alphabetized list of elements. Mendeleev arranged the known elements by their properties and noticed the pattern repeated in regular cycles — so he left deliberate gaps and predicted the properties of elements no one had yet discovered. When they were later found, matching his predictions, it was a triumph. We now know the table’s shape reflects how electrons stack up in shells around each atom, which is why elements in a column behave alike." },
{ id:"plate-tectonics", cat:"Earth", accent:"#6f7f86", motif:"grid",
  title:"Plate Tectonics", hook:"The ground under you is a raft drifting on molten rock — a few centimeters a year.",
  facts:["Earth’s crust is broken into plates that slowly move.","Their edges raise mountains, open oceans, and set off quakes and volcanoes.","The idea was mocked for decades before the evidence won."], connects:"Tectonics → earthquakes → continents",
  back:"The solid ground beneath you is actually a set of enormous rocky plates drifting on the hot, slowly-flowing rock below, creeping a few centimeters a year — about as fast as your fingernails grow. Where these plates pull apart, collide, or grind past one another, they raise mountains, open oceans, and unleash earthquakes and volcanoes. The idea was ridiculed for decades until seafloor evidence made it undeniable, and it now unifies almost all of geology." },
{ id:"carbon-cycle", cat:"Climate", accent:"#7d9b5b", motif:"pulse",
  title:"Why CO₂ Warms the Planet", hook:"Some gases let sunlight in but trap the heat trying to leave — physics, not opinion.",
  facts:["CO₂ and methane absorb the infrared heat Earth radiates back out.","Burning fossil fuels releases carbon locked away for ages.","More of these gases means the planet holds more heat."], connects:"Fossil fuels → CO₂ → warming",
  back:"Sunlight arrives as visible light, warms the ground, and the Earth re-radiates that energy as invisible infrared heat. Gases like carbon dioxide and methane are transparent to incoming sunlight but absorb that outgoing heat — so the more of them in the air, the more heat the planet retains. It’s straightforward physics, demonstrated in the 1800s. Burning fossil fuels releases carbon that was locked underground for millions of years, thickening that blanket faster than at any time in human history." },
{ id:"deep-time", cat:"Geology", accent:"#b07d3f", motif:"grain",
  title:"How We Read the Age of the Earth", hook:"Rocks keep time — if you know how to read radioactive decay.",
  facts:["Some elements decay into others at a fixed, clock-like rate.","Measuring the ratio dates the rock.","It shows the Earth is about 4.5 billion years old."], connects:"Radioactivity → dating → deep time",
  back:"Rocks contain built-in clocks. Certain radioactive elements decay into other elements at a fixed, unchangeable rate — a known half-life — so by measuring the ratio of parent to daughter atoms in a mineral, scientists can calculate how long ago it formed. This radiometric dating reveals a history almost too vast to grasp: the Earth is about 4.5 billion years old. Learning to read deep time reshaped how humanity understands its own tiny place in the story." },

/* ---- History, civilization, economics, math, building, flight ---- */
{ id:"writing", cat:"Human history", where:"~3200 BCE", accent:"#b07d3f", motif:"scroll",
  title:"The Invention of Writing", hook:"Writing began not as poetry but as accounting — receipts for grain and taxes.",
  facts:["Early cuneiform tracked goods and debts in Mesopotamia.","Recording let knowledge outlive memory and travel across time.","It’s arguably the technology that made history itself possible."], connects:"Writing → records → civilization",
  back:"Writing didn’t begin with poetry or prayer — it began with accounting. The earliest cuneiform tablets from Mesopotamia are receipts: tallies of grain, livestock, and debts, made as cities grew too complex for memory alone. But once ideas could be fixed in clay, knowledge could outlive the person who held it and travel across distance and time. It’s arguably the invention that made history itself possible — everything before it is, literally, prehistory." },
{ id:"agriculture", cat:"Agriculture", where:"~10,000 BCE", accent:"#7d9b5b", motif:"grain",
  title:"How Farming Rewrote Humanity", hook:"When people started planting instead of chasing food, nearly everything else followed.",
  facts:["Reliable food surpluses let populations settle and grow.","Surplus freed some people to specialize — crafts, rulers, priests.","It enabled cities, writing, and inequality alike."], connects:"Farming → cities → states",
  back:"For hundreds of thousands of years humans foraged and hunted; then, around ten thousand years ago, several peoples independently began to farm. Planting and herding produced storable surpluses, which let populations settle in one place and grow. Crucially, a surplus meant not everyone had to find food — freeing some people to become potters, priests, soldiers, and rulers. That single shift set off a chain reaction that produced cities, writing, states, and steep new inequalities alike." },
{ id:"money", cat:"Economics", accent:"#c9a24b", motif:"grid",
  title:"What Money Actually Is", hook:"Money isn’t wealth — it’s a shared story about who owes what.",
  facts:["It solves barter’s problem: you needn’t want exactly what the other has.","It works only because everyone trusts everyone else will accept it.","From shells to gold to numbers on a screen, the trust is the technology."], connects:"Barter → money → banking",
  back:"Money isn’t wealth itself; it’s a shared agreement about value. Barter only works if two people each happen to want what the other has, which is rare — money slips into that gap as something everyone will accept, so any trade can be split into a sale and a purchase. Its real substance is trust: gold, cowrie shells, paper, and numbers in a database have all served as money for exactly as long as people believed others would take them in turn." },
{ id:"zero", cat:"Mathematics", accent:"#8f7bc0", motif:"orbit",
  title:"The Number That Took Millennia to Invent", hook:"Nothing is easy to count — treating ‘nothing’ as a number was a revolution.",
  facts:["Zero as both a placeholder and a number came via India, then the Arab world.","It made our place-value number system and easy arithmetic possible.","Without it there’s no algebra, no calculus, no computing."], connects:"Zero → algebra → computers",
  back:"Counting things is ancient, but treating ‘nothing’ as a number in its own right was a genuine conceptual leap that took civilizations millennia. The idea of zero — both as a placeholder that makes 1, 10, and 100 distinct, and as a quantity you can calculate with — matured in India and spread through the medieval Arab world into Europe. It’s the quiet keystone of the number system we use today, and without it there is no algebra, no calculus, and no computing." },
{ id:"arches", cat:"Architecture", accent:"#b07d3f", motif:"facet",
  title:"Why the Arch Changed Building", hook:"Stack stones in a curve and gravity holds them up instead of pulling them down.",
  facts:["An arch turns downward weight into a sideways push its sides resist.","It spans wide gaps using small, weak pieces like brick or stone.","Arches, vaults, and domes built aqueducts, cathedrals, and bridges."], connects:"Arch → vault → dome",
  back:"A flat stone beam cracks under its own weight across any real span — but bend that line of stones into a curve and something wonderful happens: each block presses on its neighbors, turning the downward pull of gravity into a sideways squeeze that the arch’s supports absorb. Suddenly small, weak pieces like brick or cut stone can span wide gaps. Stretch an arch and you get a vault; spin it and you get a dome — the geometry behind aqueducts, cathedrals, and bridges for two thousand years." },
{ id:"flight", cat:"Flight", accent:"#5b8fb0", motif:"wave",
  title:"How a Wing Actually Lifts", hook:"A wing works by throwing air downward — the plane rises as the reaction.",
  facts:["Wings deflect air down; the air pushes back up (Newton, again).","Shape and angle set how much air gets turned.","Enough speed over the wing makes enough lift to fly."], connects:"Wings → engines → jets",
  back:"The clearest way to understand a wing is Newton’s third law: a wing is shaped and tilted so it deflects a great deal of air downward, and in reaction that air pushes the wing — and the plane — upward. The wing’s curve and its angle to the oncoming air set how much gets turned and thus how much lift is produced, and moving fast enough forces enough air down each second to hold tons of aircraft aloft. Flight is, in a sense, continuously throwing the sky beneath you." },
{ id:"jet-engine", cat:"Flight", accent:"#6f7f86", motif:"pulse",

function openPack(setName){
  var setCards=cardsOf(setName), pool=setCards.slice(),i,j,t,picks=[];
  for(i=pool.length-1;i>0;i--){j=Math.floor(Math.random()*(i+1));t=pool[i];pool[i]=pool[j];pool[j]=t;}
  for(i=0;i<PACK_SIZE;i++){ picks.push(pool.length?pool.pop():setCards[Math.floor(Math.random()*setCards.length)]); } /* unique first, then repeats fill small sets */
  var res=picks.map(function(c){
    var foil=Math.random()<FOIL_P, had=S.coll[c.id], isNew=!had;
    if(!had) S.coll[c.id]={n:0,foil:false};
    S.coll[c.id].n++;
    var newFoil=false; if(foil&&!S.coll[c.id].foil){S.coll[c.id].foil=true;newFoil=true;}
    return {c:c,foil:foil,isNew:isNew,newFoil:newFoil};

  var dups=res.filter(function(r){return !r.isNew;}).length;
