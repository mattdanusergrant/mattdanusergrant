<style>

:root{
  --display:'Fraunces','Hoefler Text','Iowan Old Style','Palatino Linotype',Palatino,Georgia,serif;
  --body:'Newsreader','Iowan Old Style','Palatino Linotype',Palatino,Georgia,serif;
  --label:'Archivo','Helvetica Neue',system-ui,-apple-system,sans-serif;
  --bg:#0d1413; --bg2:#131c1b; --plate:#16211f; --ink:#f3ede1; --ink-soft:#d8d2c5;
  --muted:#93a09c; --line:#243230; --line2:#33453f; --gold:#c9a24b; --gold-soft:#e3c987;
  --shadow:0 30px 70px -32px rgba(0,0,0,.85); --accent:#c9a24b;
}
:root[data-theme="dark"]{ --bg:#0d1413; --bg2:#131c1b; --plate:#16211f; --ink:#f3ede1; --ink-soft:#d8d2c5;
  --muted:#93a09c; --line:#243230; --line2:#33453f; --gold:#c9a24b; --gold-soft:#e3c987; --shadow:0 30px 70px -32px rgba(0,0,0,.85); }
@media(prefers-color-scheme:light){ :root{ --bg:#eae7de; --bg2:#f2efe7; --plate:#f7f4ec; --ink:#182421; --ink-soft:#3a4744;
    --muted:#6f7a72; --line:#d8d3c4; --line2:#c6c0ae; --gold:#9c7a2b; --gold-soft:#b89440; --shadow:0 26px 56px -30px rgba(40,44,40,.4); } }
:root[data-theme="light"]{ --bg:#eae7de; --bg2:#f2efe7; --plate:#f7f4ec; --ink:#182421; --ink-soft:#3a4744;
  --muted:#6f7a72; --line:#d8d3c4; --line2:#c6c0ae; --gold:#9c7a2b; --gold-soft:#b89440; --shadow:0 26px 56px -30px rgba(40,44,40,.4); }
*,*::before,*::after{box-sizing:border-box}
@media(prefers-reduced-motion:reduce){*{scroll-behavior:auto!important}}
body{margin:0;background:radial-gradient(140% 100% at 50% 0%, color-mix(in srgb,var(--gold) 6%, transparent), transparent 55%),var(--bg);
  color:var(--ink);font-family:var(--body);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;font-optical-sizing:auto;min-height:100vh}
a{color:inherit;text-decoration:none}
::selection{background:var(--gold);color:#0d1413}

.topbar{position:sticky;top:0;z-index:50;display:flex;align-items:center;justify-content:space-between;gap:10px;
  padding:11px clamp(12px,4vw,32px);background:color-mix(in srgb,var(--bg) 86%,transparent);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
.wordmark{display:flex;align-items:center;gap:.55em;background:none;border:0;cursor:pointer;font-family:var(--label);font-weight:700;
  letter-spacing:.1em;text-transform:uppercase;font-size:clamp(10px,2.3vw,12px);color:var(--ink);white-space:nowrap}
.wordmark .dot{width:6px;height:6px;border-radius:50%;background:var(--gold);box-shadow:0 0 10px var(--gold)}
.controls{display:flex;gap:7px}
.btn{font-family:var(--label);font-weight:600;letter-spacing:.05em;text-transform:uppercase;font-size:11px;color:var(--muted);
  background:none;border:1px solid var(--line2);border-radius:999px;padding:7px 12px;cursor:pointer;transition:color .2s,border-color .2s;white-space:nowrap}
.btn:hover,.btn:focus-visible{color:var(--ink);border-color:var(--gold)}
.btn:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
.btn.tab.on{color:var(--bg);background:var(--gold);border-color:var(--gold)}
.btn .cnt{display:inline-block;min-width:16px;padding:0 4px;margin-left:5px;border-radius:999px;background:color-mix(in srgb,var(--ink) 16%,transparent);
  font-size:10px;line-height:15px;text-align:center;vertical-align:1px}
.btn.tab.on .cnt{background:rgba(0,0,0,.22)}
.iconbtn{display:inline-flex;align-items:center;justify-content:center;padding:7px;width:36px;height:36px;color:var(--muted)}
.iconbtn svg{display:block;transition:transform .3s ease}
.iconbtn:hover svg,.iconbtn[aria-expanded="true"] svg{transform:rotate(45deg)}
@media(max-width:440px){.btn{padding:6px 9px;letter-spacing:.02em}.iconbtn{padding:6px;width:34px;height:34px}.wordmark span.full{display:none}}

/* settings menu */
.menu{position:fixed;top:54px;right:clamp(10px,4vw,30px);z-index:70;width:250px;max-width:calc(100vw - 20px);
  background:var(--bg2);border:1px solid var(--line2);border-radius:14px;box-shadow:0 26px 60px -22px rgba(0,0,0,.7);
  padding:8px;animation:menupop .16s ease both;transform-origin:top right}
@keyframes menupop{from{opacity:0;transform:translateY(-6px) scale(.97)}to{opacity:1;transform:none}}
@media(prefers-reduced-motion:reduce){.menu{animation:none}}
.menu[hidden]{display:none}
.menu-h{font-family:var(--label);font-weight:700;letter-spacing:.13em;text-transform:uppercase;font-size:10px;color:var(--muted);padding:8px 10px 6px}
.menu-sep{font-family:var(--label);font-weight:700;letter-spacing:.13em;text-transform:uppercase;font-size:9px;color:var(--muted);
  padding:9px 10px 5px;margin-top:4px;border-top:1px solid var(--line);opacity:.75}
.menu-row{width:100%;display:flex;align-items:center;justify-content:space-between;gap:10px;background:none;border:0;cursor:pointer;
  font-family:var(--body);font-size:15px;color:var(--ink);text-align:left;padding:11px 10px;border-radius:9px;transition:background .15s}
.menu-row:hover,.menu-row:focus-visible{background:color-mix(in srgb,var(--ink) 7%,transparent);outline:none}
.menu-val{font-family:var(--label);font-weight:700;letter-spacing:.06em;text-transform:uppercase;font-size:10.5px;color:var(--accent)}
.menu-plus{font-family:var(--label);font-weight:700;color:var(--gold);font-size:15px}
.menu-row.danger{color:var(--ink-soft)}
.menu-row.danger:hover{background:color-mix(in srgb,#c0483a 16%,transparent);color:var(--ink)}
.menu-row.armed{background:color-mix(in srgb,#c0483a 22%,transparent);color:var(--ink);font-weight:600}

.view{max-width:1040px;margin:0 auto;padding:22px clamp(14px,4vw,28px) 70px}
.chead{display:flex;align-items:flex-start;justify-content:space-between;gap:14px 18px;flex-wrap:wrap}
.chl{min-width:0}
.chead-actions{display:flex;align-items:center;gap:9px;margin-top:8px;flex-wrap:wrap}
.scrollbtn{display:inline-flex;align-items:center;gap:7px;font-family:var(--label);font-weight:700;letter-spacing:.05em;text-transform:uppercase;
  font-size:12px;color:var(--ink);background:none;border:1px solid var(--line2);border-radius:999px;padding:12px 16px;cursor:pointer;transition:.18s}
.scrollbtn .sci{font-size:14px;color:var(--gold)}
.scrollbtn:hover,.scrollbtn:focus-visible{border-color:var(--gold);color:var(--ink)}
.scrollbtn:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
.openpack{position:relative;flex:none;display:inline-flex;align-items:center;gap:9px;
  font-family:var(--label);font-weight:700;letter-spacing:.05em;text-transform:uppercase;font-size:12px;color:var(--bg);
  background:var(--gold);border:1px solid var(--gold);border-radius:999px;padding:12px 18px;cursor:pointer;
  box-shadow:0 16px 36px -14px color-mix(in srgb,var(--gold) 70%,#000)}
.openpack .opct{display:inline-flex;align-items:center;justify-content:center;min-width:22px;padding:2px 8px;border-radius:999px;
  background:rgba(0,0,0,.2);font-size:11.5px;letter-spacing:.04em}
.openpack::before{content:"";position:absolute;inset:-6px;border-radius:999px;border:2px solid color-mix(in srgb,var(--gold) 60%,transparent);
  animation:fabring 2.6s ease-out infinite;pointer-events:none}
@keyframes fabring{0%{transform:scale(.9);opacity:.9}70%{transform:scale(1.15);opacity:0}100%{transform:scale(1.15);opacity:0}}
.openpack:hover,.openpack:focus-visible{filter:brightness(1.06)}
.openpack:focus-visible{outline:2px solid var(--gold);outline-offset:3px}
.openpack.zero{color:var(--muted);background:var(--bg2);border-color:var(--line2);box-shadow:var(--shadow)}
.openpack.zero::before{animation:none;opacity:0}
.openpack.zero .opct{background:color-mix(in srgb,var(--ink) 10%,transparent)}
@media(prefers-reduced-motion:reduce){.openpack::before{animation:none;opacity:0}}
.vhead{font-family:var(--display);font-weight:500;font-size:clamp(27px,5.5vw,40px);letter-spacing:-.01em;margin:6px 0 0;text-wrap:balance}
.vsub{color:var(--muted);font-family:var(--label);font-size:12.5px;letter-spacing:.02em;margin-top:8px;line-height:1.6}
.banner{margin:18px 0 4px;padding:14px 16px;border-radius:12px;border:1px solid color-mix(in srgb,var(--gold) 40%,transparent);
  background:color-mix(in srgb,var(--gold) 12%,transparent);font-family:var(--body);font-size:15.5px;color:var(--ink-soft)}
.banner b{color:var(--ink);font-weight:600}

/* booster packs — one tappable face, all info on it, tap to open */
.pack{aspect-ratio:3/4.5;cursor:pointer;position:relative;-webkit-tap-highlight-color:transparent;--accent:var(--gold);
  display:flex;flex-direction:column;overflow:hidden;text-align:left;border-radius:14px;padding:0;
  border:1px solid color-mix(in srgb,var(--accent) 40%,var(--line2));
  background:linear-gradient(158deg,color-mix(in srgb,var(--accent) 52%,var(--plate)),color-mix(in srgb,var(--accent) 20%,var(--bg2)) 52%,color-mix(in srgb,var(--accent) 6%,var(--bg2)));
  box-shadow:0 24px 48px -20px rgba(0,0,0,.65),var(--shadow),inset 0 1px 0 rgba(255,255,255,.07);transition:transform .18s ease}
/* full-bleed per-set design: the set's motif as a big faint watermark over its color (no boxed art) */
.pbg{position:absolute;inset:0;z-index:0;overflow:hidden;pointer-events:none}
.pbg div.motif{background:none!important}
.pbg svg.motif{opacity:.5;transform:scale(1.45);transform-origin:70% 30%}
.pbg::after{content:"";position:absolute;inset:0;background:radial-gradient(120% 80% at 20% 8%,color-mix(in srgb,var(--accent) 34%,transparent),transparent 60%),linear-gradient(transparent 30%,color-mix(in srgb,var(--bg2) 78%,transparent))}
.pack:hover{transform:translateY(-5px)}
.pack:focus-visible{outline:2px solid var(--gold);outline-offset:3px}
.pack::before{content:"";position:absolute;inset:0;border-radius:14px;padding:1.4px;pointer-events:none;z-index:3;
  background:linear-gradient(145deg,color-mix(in srgb,var(--accent) 96%,transparent),color-mix(in srgb,var(--gold) 42%,transparent) 30%,color-mix(in srgb,var(--accent) 18%,transparent) 48%,color-mix(in srgb,var(--accent) 22%,transparent) 56%,color-mix(in srgb,var(--accent) 70%,transparent));
  -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor;mask-composite:exclude}
.pack::after{content:"";position:absolute;inset:0;border-radius:14px;pointer-events:none;z-index:2;
  background:linear-gradient(118deg,rgba(255,255,255,.16) 0%,rgba(255,255,255,.03) 22%,rgba(255,255,255,0) 34%),radial-gradient(95% 48% at 18% -8%,rgba(255,255,255,.10),transparent 70%)}
.crimp{flex:none;height:13px;z-index:1;border-bottom:1px solid color-mix(in srgb,var(--accent) 45%,var(--line2));
  background:repeating-linear-gradient(90deg,color-mix(in srgb,var(--accent) 62%,var(--bg2)) 0 3px,color-mix(in srgb,var(--accent) 20%,var(--bg2)) 3px 7px)}
.crimp.b{border-bottom:0;border-top:1px solid color-mix(in srgb,var(--accent) 45%,var(--line2))}
.part{position:relative;z-index:1;flex:1;min-height:0;display:flex;flex-direction:column;padding:24px 13px 13px}
/* the set's Series, tucked into the pack's top-right corner (e.g. "NATURE") */
.pcorner{position:absolute;top:11px;right:14px;z-index:2;max-width:60%;text-align:right;font-family:var(--label);font-weight:700;font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);opacity:.95;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-shadow:0 1px 6px color-mix(in srgb,var(--bg2) 70%,transparent)}
.pname{flex:none;margin-top:2px;font-family:var(--display);font-weight:600;font-size:clamp(17px,5vw,24px);line-height:1.02;color:var(--ink);text-wrap:balance;
  text-shadow:0 1px 10px color-mix(in srgb,var(--bg2) 70%,transparent)}
.pblurb{flex:none;margin:9px 0 0;font-family:var(--body);font-size:12.5px;line-height:1.34;color:var(--ink-soft)}
.pstats{flex:none;margin-top:auto;padding-top:10px;font-family:var(--label);font-weight:700;font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-soft);opacity:.85}
.pk-slot{min-width:0}
@media(max-width:460px){.pblurb{font-size:11px}.part{padding:22px 10px 10px}}

/* token → booster choice */
.pk-choice{padding:8px 4px}
.pk-choice .kicker{font-family:var(--label);font-weight:700;letter-spacing:.16em;text-transform:uppercase;font-size:10.5px;color:var(--gold)}
.pk-choice h2{font-family:var(--display);font-weight:500;font-size:clamp(21px,4vw,29px);letter-spacing:-.01em;margin:8px 0 0;color:var(--ink)}
.choicegrid{display:grid;grid-template-columns:repeat(2,minmax(120px,220px));gap:clamp(12px,3vw,22px);justify-content:center;margin:22px 0 16px}

/* series tabs > set tabs + binder */
.seriestabs{display:flex;gap:10px;padding:16px 0 2px;flex-wrap:wrap}
.seriestab{display:flex;flex-direction:column;align-items:flex-start;gap:2px;font-family:var(--label);font-weight:700;letter-spacing:.05em;
  text-transform:uppercase;font-size:12px;color:var(--muted);background:none;border:1px solid var(--line2);border-radius:12px;
  padding:10px 15px;cursor:pointer;transition:.18s}
.seriestab .srct{font-weight:600;font-size:9px;letter-spacing:.08em;opacity:.75;text-transform:none}
.seriestab:hover{color:var(--ink);border-color:var(--gold)}
.seriestab.on{color:var(--bg);background:var(--gold);border-color:var(--gold)}
/* mobile: a clean, uniform 2-col grid instead of a ragged wrap; drop " Series" so labels fit one line */
@media(max-width:600px){
  .seriestabs{display:grid;grid-template-columns:1fr 1fr;gap:9px}
  .seriestab{padding:11px 13px;font-size:12.5px;justify-content:center}
  .seriestab .ssw{display:none}
}
.settabs{display:flex;gap:8px;overflow-x:auto;padding:12px 0 6px;-webkit-overflow-scrolling:touch}
.settab{white-space:nowrap;font-family:var(--label);font-weight:600;letter-spacing:.02em;font-size:11.5px;color:var(--muted);
  background:none;border:1px solid var(--line2);border-radius:999px;padding:8px 13px;cursor:pointer;transition:.18s}
.settab:hover{color:var(--ink)}
.settab.on{color:var(--bg);background:var(--sc,var(--gold));border-color:var(--sc,var(--gold))}
.setinfo{margin-top:14px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.setinfo .pct{font-family:var(--display);font-size:22px;color:var(--ink)}
.setinfo .foils{font-family:var(--label);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
.pbar{flex:1;min-width:140px;height:7px;border-radius:999px;background:var(--line);overflow:hidden}
.pbar i{display:block;height:100%;border-radius:999px;background:linear-gradient(90deg,var(--sc,var(--gold)),var(--gold-soft))}
/* the open binder — two 3x3 pages side by side */
.binder{display:flex;gap:clamp(10px,2vw,22px);margin-top:18px;flex-wrap:wrap;justify-content:center}
.bpage{position:relative;flex:1 1 300px;min-width:262px;max-width:492px;display:grid;grid-template-columns:repeat(3,1fr);
  gap:clamp(8px,1.5vw,12px);padding:clamp(10px,1.8vw,16px) clamp(10px,1.8vw,16px) clamp(28px,3vw,34px);
  border:1px solid var(--line2);border-radius:16px;box-shadow:var(--shadow);
  background:linear-gradient(168deg,color-mix(in srgb,var(--plate) 94%,var(--gold) 6%),var(--bg2))}
.bpage::after{content:"";position:absolute;inset:0;border-radius:16px;pointer-events:none;
  background:radial-gradient(120% 60% at 50% -8%,rgba(255,255,255,.05),transparent 60%)}
.bpno{position:absolute;bottom:9px;left:0;right:0;text-align:center;font-family:var(--label);font-weight:600;
  font-size:8.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);opacity:.8}

/* mini card */
.mini{position:relative;aspect-ratio:63/88;border-radius:12px;overflow:hidden;border:1px solid var(--line2);cursor:pointer;
  background:linear-gradient(165deg,var(--plate),var(--bg2));box-shadow:0 14px 30px -22px rgba(0,0,0,.8);--accent:var(--gold);
  display:flex;flex-direction:column;transition:transform .15s}
.mini:hover{transform:translateY(-3px)}
.mini:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
.miniart{flex:none;aspect-ratio:16/9;position:relative;border-bottom:1px solid var(--line)}
.mininame{flex:1;min-height:0;font-family:var(--display);font-weight:500;font-size:14px;line-height:1.12;color:var(--ink);
  padding:8px 9px 0;overflow:hidden;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical}
.mininum{flex:none;font-family:var(--label);font-size:8.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);padding:5px 9px 8px}
.mini .ministar{position:absolute;top:6px;right:7px;z-index:2;font-size:12px;color:#20160c;background:linear-gradient(90deg,#ffd76e,#a0f0d0,#9fd0ff,#e6a8ff,#ffd76e);
  background-size:220% 100%;border-radius:999px;width:20px;height:20px;display:flex;align-items:center;justify-content:center;animation:holoTag 4s linear infinite}
.mini .newbadge{position:absolute;top:6px;left:6px;z-index:2;font-family:var(--label);font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  font-size:8.5px;color:var(--bg);background:var(--gold);border-radius:999px;padding:2px 7px}
.mini.locked{cursor:default;border-style:dashed;align-items:center;justify-content:center;
  background:color-mix(in srgb,var(--plate) 55%,var(--bg2));box-shadow:inset 0 3px 12px -4px rgba(0,0,0,.18)}
.mini.locked .q{font-family:var(--display);font-size:30px;color:var(--line2)}
.mini.foil::before{content:"";position:absolute;inset:0;border-radius:12px;padding:1.3px;pointer-events:none;z-index:3;
  background:conic-gradient(from 200deg,#e8869b,#7cc8f5,#93e6a6,#f5d76e,#c79bf0,#e8869b);
  -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor;mask-composite:exclude}
.mini.foil .miniart::after{content:"";position:absolute;inset:0;pointer-events:none;
  background:linear-gradient(58deg,rgba(255,120,190,.16),rgba(120,210,255,.16) 40%,rgba(150,255,180,.16) 70%,rgba(255,225,120,.16));
  background-size:260% 260%;animation:holo 7s linear infinite}
@keyframes holoTag{to{background-position:220% 0}}
@keyframes holo{0%{background-position:0% 50%}100%{background-position:100% 50%}}
@media(prefers-reduced-motion:reduce){.ministar,.mini.foil .miniart::after,.card.foil .face::after,.foiltag{animation:none}}

/* overlay (pack reveal + card modal) */
.overlay{position:fixed;inset:0;z-index:100;display:none;align-items:center;justify-content:center;padding:22px;
  background:radial-gradient(120% 90% at 50% 0%,color-mix(in srgb,var(--gold) 7%,transparent),transparent 60%),color-mix(in srgb,var(--bg) 96%,transparent);
  backdrop-filter:blur(22px) saturate(1.05)}
.overlay.on{display:flex}
.close{position:fixed;top:14px;right:16px;z-index:101;width:38px;height:38px;border-radius:999px;border:1px solid var(--line2);
  background:var(--bg2);color:var(--ink);font-size:16px;cursor:pointer;display:none}
.overlay.on ~ .close,.close.on{display:block}
.sheet{max-width:760px;width:100%;max-height:92vh;overflow:auto;text-align:center}
.done{margin-top:6px;font-family:var(--label);font-weight:700;letter-spacing:.06em;text-transform:uppercase;font-size:13px;color:var(--bg);
  background:var(--gold);border:1px solid var(--gold);border-radius:999px;padding:12px 26px;cursor:pointer}
.done:hover{filter:brightness(1.07)}
.cardwrap{display:flex;justify-content:center}
@keyframes rise{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(4px)}}
/* pack reveal — the 3 cards in a close snap row (left-to-right), flick between them */

   "It feels as though time zones must be as old as time itself. In fact, shared standardized time is younger than the steam engine — and it was the railways that dragged it into being. Before trains, no one needed a whole region to agree on the hour, and so no one did; each town simply kept its own.",
   "Every town set its clocks by its own local noon, the instant the sun crossed overhead. That meant a city a hundred miles to the east ran several minutes ahead of its neighbor, with every place between keeping a slightly different time. For centuries this was harmless — until the railroad arrived, and a single timetable had to stitch together dozens of towns each insisting on its own ‘now.’ The result was missed connections, confusion, and collisions.",
   "The railways’ solution was radical: carve the map into broad bands and force every town within one to keep the same clock, whatever the sun was doing overhead. Standard time zones spread through the 1800s, first along the rails and then across entire nations, until the idea that ‘noon’ named the same moment across a whole region became utterly ordinary. The sun no longer set the clocks; the network did.",
   "Once regions shared a clock, far more than trains fell into step. Stock exchanges could open together, telegraph offices could coordinate their messages, and factories and ships could run on a common beat. The humble need to keep trains from crashing had quietly laid one of the foundations of a connected world economy — a piece of industrial plumbing so successful that we now forget anyone ever had to invent it."

  "article": [
   "Every message you send, every payment you make, and every line written into a server’s log carries a timestamp — and for the internet to make sense, those timestamps must agree, often to within a few thousandths of a second. Yet the network is built from a billion cheap clocks, each quietly drifting in its own direction. Keeping them all honest is a ceaseless, invisible act of coordination.",
   "The workhorse behind it is the Network Time Protocol. A computer politely asks a more accurate clock what time it is, but the reply is already stale when it arrives, delayed by its trip across the network. So NTP measures how long the round trip took, assumes the delay was roughly equal in each direction, and subtracts it — landing on a corrected ‘now’ good to a few milliseconds despite all the messy, variable wiring in between.",
   "These reference clocks are arranged in a strict pecking order. Ordinary machines sync to better-connected servers, which sync to still better ones, and at the very top sit a small number of clocks disciplined directly by GPS or by national timekeeping laboratories. Follow any timestamp far enough up the chain, and it leads, ultimately, back to a cesium atom counting its own flips.",
   "So the internet, for all its outward chaos, runs on atomic seconds trickling down from a handful of master clocks. That silent agreement is what lets a trade settle in the correct order, a video call stay in sync, and two servers on opposite sides of the planet accept that the same instant really is the same instant. ‘Now’ has quietly become a shared utility, piped everywhere at once."

   "Closer to land, the sea began to whisper. Swells bend and rebound off unseen islands, leaving patterns a navigator could read; certain birds fly out to fish at dawn and home again at dusk, pointing the way to land over the horizon; a green shimmer on the underside of a distant cloud betrays a lagoon below it. None of it was written down. The whole living map was carried in memory and chant, passed from teacher to apprentice across a lifetime.",

   "For most of history, to sail out of sight of land was to gamble your life on the weather. Navigators held their course by the sun and stars, and when cloud swallowed the sky, they were effectively blind. Then came a device so simple it seems almost like cheating: a sliver of magnetized iron that always remembers which way is north, no matter what the sky above happens to be doing.",

   "Try to flatten an orange peel onto a table and it tears and buckles; you simply cannot make a curved surface lie flat without distorting it. A map faces exactly this problem. The Earth is a sphere, a map is a rectangle, and squeezing one onto the other is impossible without stretching something. Every flat map, therefore, is a kind of honest lie — and knowing which lie it tells is the whole art of reading one.",
   "The technical name for the compromise is a projection: a recipe for casting the globe’s features onto a flat sheet. The cruel catch is that a map can preserve accurate area, or accurate shape, or accurate distance, but never all three at once. Choosing a projection means choosing which truth to keep and which to sacrifice, and no cleverness can cheat the underlying geometry.",
   "The most famous choice is the Mercator projection, drawn in 1569 for sailors. It keeps compass directions perfectly straight, so a navigator can rule a line on the chart and follow a constant bearing — priceless at sea. But it pays for that by stretching everything toward the poles, until on a Mercator map Greenland looms as large as Africa, though Africa is in truth about fourteen times bigger.",
   "So there is no single ‘correct’ map of the world, any more than there is one correct photograph of a person. Some projections guard area, for comparing countries fairly; others guard shape, or true distance from a chosen point. The right map is simply the one whose distortion you can live with for the task at hand. A map is not a window onto the world so much as an argument about which of its truths matters most."

   "As you read this, a small constellation of machines twenty thousand kilometers overhead is quietly working out where you are, to within a few meters, without you ever asking. Satellite navigation can feel like magic, but underneath it lies one elegant idea: if you know how long a signal took to reach you, and how fast it travels, then you know exactly how far away its sender must be.",
   "Each navigation satellite does almost nothing but broadcast, over and over, the precise time and its own position. Your receiver picks up several of these signals at once. Because radio waves travel at the fixed speed of light, the tiny delay in each signal reveals your distance from that satellite. One distance places you somewhere on a sphere; overlap the spheres from several satellites and they meet at a single point — you.",

   "For decades ‘GPS’ meant the American system alone, but the sky is now crowded with rivals and partners: Europe’s Galileo, Russia’s GLONASS, and China’s BeiDou each fly their own constellations. Modern receivers quietly listen to all of them together, which means more satellites in view, faster fixes, and better accuracy in cities where tall buildings block much of the sky. The little blue dot has never been so well attended."

   "It sounds like alchemy, and in a way it was. Take copper, soft enough to bend by hand, and tin, another unremarkable metal, melt them together in the right proportion, and you get something neither could be alone: bronze, hard enough to hold a keen edge and tough enough to survive a battle. Humanity’s first great alloy was so transformative that we named an entire age of the world after it.",

function faceHTML(c, foil, copies){
  copies=copies!=null?copies:((S.coll[c.id]&&S.coll[c.id].n)||1);
  var info=cardPageList(c,copies);
  return '<div class="card'+(foil?' foil':'')+'" data-id="'+c.id+'" data-copies="'+copies+'" data-page="0" data-rot="0" tabindex="0" role="group" aria-label="'+c.title+', swipe left and right to page through" style="--accent:'+c.accent+';--rot:0deg">'+
    '<div class="flipper"><div class="face fa">'+cardPageInner(c,foil,info,0)+'</div><div class="face fb"></div></div></div>';
}
/* flip one page forward (dir=+1) or back (dir=-1) */
function flipCard(cardEl, dir){
  var c=cardById(cardEl.dataset.id); if(!c) return;
  var copies=+cardEl.dataset.copies||1, info=cardPageList(c,copies);
  var cur=+cardEl.dataset.page||0, target=cur+dir;
  if(target<0||target>info.pages.length-1) return;
  var curRot=+cardEl.dataset.rot||0, targetRot=curRot+(dir>0?-180:180); /* rotation follows the swipe */
  var showsB=Math.abs(Math.round(targetRot/180))%2===1;
  var faceEl=cardEl.querySelector(showsB?'.fb':'.fa');
  faceEl.innerHTML=cardPageInner(c,cardEl.classList.contains('foil'),info,target);
  fitFace(faceEl);
  cardEl.dataset.page=target; cardEl.dataset.rot=targetRot; cardEl.style.setProperty('--rot',targetRot+'deg');
}

/* spending a token = deal 3 random boosters, keep 1 */
function tokenFlow(){
  if(S.tokens<1) return;
  var pool=SETS.slice(),i,j,tmp;
  for(i=pool.length-1;i>0;i--){j=Math.floor(Math.random()*(i+1));tmp=pool[i];pool[i]=pool[j];pool[j]=tmp;}
  var offer=pool.slice(0,2);
  var h='<div class="pk-choice"><h2>Choose one</h2><div class="choicegrid">';
  for(i=0;i<offer.length;i++){ var s=offer[i], owned=ownedInSet(s), foils=foilsInSet(s);
    h+='<div class="pk-slot"><button class="pack" data-choose="'+s+'" aria-label="Open '+s+' booster: '+PACK_SIZE+' cards, costs 1 token" style="--accent:'+SET_COLOR[s]+'">'+
       '<div class="pbg">'+motif(SET_MOTIF[s],SET_COLOR[s])+'</div>'+
       '<div class="crimp"></div>'+
       '<div class="part">'+
         '<div class="pcorner">'+SET_SERIES[s]+'</div>'+
         '<div class="pname">'+setShort(s)+'</div>'+
         '<p class="pblurb">'+SET_BLURB[s]+'</p>'+
         '<div class="pstats">You own '+owned+' / '+TARGET+(foils?' · '+foils+' ✦':'')+'</div>'+
       '</div>'+
       '<div class="crimp b"></div>'+
    '</button></div>';
  }
  h+='</div><div class="pr-hint">costs 1 token · you have '+S.tokens+'</div></div>';
  openOverlay(h);
}
function renderCollection(){
  var totalOwned=Object.keys(S.coll).length, t=S.tokens;
  var op='<button class="openpack'+(t<1?' zero':'')+'" data-openpack aria-label="'+(t<1?'No Pack Tokens. A new one arrives tomorrow':'Open a pack ('+t+' token'+(t===1?'':'s')+' left)')+'">'
    +'<span class="opct">✦ '+t+'</span><span class="oplb">'+(t<1?'+1 tomorrow':'Open a pack')+'</span></button>';
  var sc=totalOwned>0?'<button class="scrollbtn" data-scroll aria-label="Scroll Mode: browse your collection one random card at a time"><span class="sci">↕</span>Scroll Mode</button>':'';
  var h='<div class="view"><div class="chead"><div class="chl"><div class="vhead">Your Binder</div>'+
    '<div class="vsub">'+totalOwned+' / '+CARDS.length+' cards · '+t+' Pack Token'+(t===1?'':'s')+' (+1 every day)'+(S.sparks?' · ✧ '+S.sparks+'/100':'')+' · tap a card to read it</div></div>'+
    '<div class="chead-actions">'+sc+op+'</div></div>';
  var msg=MSG,msgN=MSGN; MSG=null;
  if(msg==="welcome") h+='<div class="banner"><b>Welcome!</b> You start with <b>3 Pack Tokens</b>. Hit the gold <b>✦ Open a pack</b> button to rip your first booster: we deal two packs, you keep one.</div>';
  else if(msg==="daily") h+='<div class="banner"><b>Daily Pack Token'+(msgN>1?'s':'')+'!</b> +'+msgN+' token'+(msgN>1?'s':'')+' added. The gold button awaits.</div>';
  else if(msg==="notokens") h+='<div class="banner"><b>No Pack Tokens left.</b> A fresh one arrives tomorrow. Duplicates you pull also drip ✧ sparks toward free tokens (100 ✧ = 1 token).</div>';
  else if(msg==="sparks") h+='<div class="banner"><b>✧ 100 sparks!</b> Your duplicates just melted into <b>+'+msgN+' Pack Token'+(msgN>1?'s':'')+'</b> ('+S.sparks+'/100 toward the next).</div>';
  else if(msg==="firstbinder") h+='<div class="banner"><b>This is your binder.</b> Every card you own lives here. Tap any card to read it and flip for the full story. Open more packs anytime with the gold button, and come back tomorrow for a fresh token. First goal: <b>complete a set</b> (18 cards).</div>';
  var activeSeries=SET_SERIES[activeSet], i, s;
  h+='<div class="seriestabs">';
  for(i=0;i<SERIES.length;i++){ var sr=SERIES[i], srSets=setsOf(sr), srOwned=0;
    for(var j=0;j<srSets.length;j++) srOwned+=ownedInSet(srSets[j]);
    h+='<button class="seriestab'+(sr===activeSeries?' on':'')+'" data-series="'+sr+'"><span class="srcn">'+sr+'<span class="ssw"> Series</span></span> <span class="srct">'+srSets.length+' set'+(srSets.length===1?'':'s')+' · '+srOwned+' card'+(srOwned===1?'':'s')+'</span></button>';
  }
  h+='</div><div class="settabs">';
  var srList=setsOf(activeSeries);
  for(i=0;i<srList.length;i++){ s=srList[i];
    h+='<button class="settab'+(s===activeSet?' on':'')+'" data-set="'+s+'" style="--sc:'+SET_COLOR[s]+'">'+s+' <span style="opacity:.7">'+ownedInSet(s)+'/'+TARGET+'</span></button>';
  }
  h+='</div>';
  var setCards=cardsOf(activeSet), owned=ownedInSet(activeSet), foils=foilsInSet(activeSet), pct=Math.round(owned/TARGET*100);
  h+='<div class="setinfo"><span class="pct">'+owned+' / '+TARGET+'</span><div class="pbar" style="--sc:'+SET_COLOR[activeSet]+'"><i style="width:'+pct+'%"></i></div>'+
     '<span class="foils">'+foils+' foil'+(foils===1?'':'s')+'</span></div>';
  h+='<div class="binder">';
  for(var p=0;p<2;p++){
    h+='<div class="bpage">';
    for(i=p*9;i<p*9+9;i++){
      if(i<setCards.length){ var c=setCards[i], rec=S.coll[c.id];
        h+=rec?miniHTML(c,{foil:rec.foil,lvl:cardDepth(c,rec.n).lvl}):miniHTML(c,{locked:true});
      } else h+='<div class="mini locked" aria-hidden="true"><span class="q">+</span></div>';
    }
    h+='<span class="bpno">Page '+(p+1)+'</span></div>';
  }
  h+='</div></div>'; view.innerHTML=h;
}
/* no scrolling on cards, ever: shrink a face's page (via the --ps scale var) until it fits its box.
   content pages clip inside .cbody, so measure that too, not just the face. */
function faceOverflow(faceEl){ var o=faceEl.scrollHeight-faceEl.clientHeight, b=faceEl.querySelector('.cbody');
  if(b) o=Math.max(o,b.scrollHeight-b.clientHeight); return o; }
function fitFace(faceEl){ if(!faceEl) return;
  var v=1; faceEl.style.setProperty('--ps',v); var g=0;
  while(faceOverflow(faceEl)>1 && v>0.62 && g++<40){ v-=0.03; faceEl.style.setProperty('--ps',v); }
}
function fitCard(card){ fitFace(card.querySelector('.face.fa')); var fb=card.querySelector('.face.fb'); if(fb&&fb.innerHTML.trim()) fitFace(fb); }
function fitCards(){ var cs=sheet.querySelectorAll('.card'),i; for(i=0;i<cs.length;i++) fitCard(cs[i]); }
function openOverlay(html){ sheet.innerHTML=html; overlay.classList.add('on'); closeBtn.classList.add('on'); document.body.style.overflow='hidden'; sheet.scrollTop=0;
  fitCards(); if(document.fonts&&document.fonts.ready) document.fonts.ready.then(fitCards); }
function closeOverlay(){ overlay.classList.remove('on','reveal','scrollmode'); closeBtn.classList.remove('on'); sheet.innerHTML=''; document.body.style.overflow='';
  renderCollection(); }

/* opening a pack = the 3 full cards in a close row; flick left-right, tap to flip */
/* opening a pack = a vertical scroll-feed through the pulled cards, one per screen */
function packBadge(r){
  return r.newFoil?'<span class="pr-badge foil">✦ New foil</span>'
       : r.foil?'<span class="pr-badge foil">✦ Foil</span>'
       : r.isNew?'<span class="pr-badge">New card</span>'
       : '<span class="pr-badge dup">Duplicate · +1 ✧</span>';
}
function packSlots(res){ var h=''; res.forEach(function(r){ h+='<div class="sf-slot pr-slot2">'+packBadge(r)+faceHTML(r.c,r.foil)+'</div>'; }); return h; }
/* toggle the "more below" cue for a vertical feed; returns the updater so callers can poke it */
function wireCue(feed, cue){
  function upd(){ if(!cue) return; cue.classList.toggle('on', feed.scrollHeight-(feed.scrollTop+feed.clientHeight) > 26); }
  feed.addEventListener('scroll', upd, {passive:true});
  setTimeout(upd,80);
  if(document.fonts&&document.fonts.ready) document.fonts.ready.then(function(){ setTimeout(upd,0); });
  return upd;
}
function packFlow(setName){
  var res=openPack(setName), anyFoil=res.some(function(r){return r.foil;});
  var newN=res.filter(function(r){return r.isNew;}).length, dups=res.length-newN;
  var more=S.tokens>0;
  var h='<div class="sf-top">'+setName+' Booster'+(anyFoil?' · ✦ foil pull!':'')+' &nbsp;·&nbsp; swipe ‹ › to read · swipe up for next</div>'+
        '<div class="sf-feed" id="prfeed">'+packSlots(res);
  if(more){
    h+='<div class="sf-slot pr-arm" id="prend"><div class="pr-armcard">'+
       '<div class="pr-armh">Rip another pack?</div>'+
       '<div class="pr-armchev" aria-hidden="true">⌄</div>'+
       '<div class="pr-arms">Keep scrolling to choose your next · ✦ '+S.tokens+' left</div>'+
       '<button class="done" id="revealdone">I’m done</button></div></div>';
  } else {
    var summary=newN+' new'+(dups?' · '+dups+' duplicate'+(dups>1?'s':'')+' (+'+dups+' ✧, '+S.sparks+'/100)':'');
    h+='<div class="sf-slot pr-end2" id="prend"><div class="pr-endcard">'+
       '<div class="pr-endh">'+res.length+' cards added to your binder</div>'+
       '<div class="pr-ends">'+summary+'</div>'+
       '<button class="done" id="revealdone">Done</button></div></div>';
  }
  h+='</div><div class="sf-cue" id="prcue" aria-hidden="true"><span class="cuelbl">scroll</span><span class="cuechev">⌄</span></div>';
  overlay.classList.add('scrollmode');
  openOverlay(h);
  var feed=document.getElementById('prfeed');
  wireCue(feed, document.getElementById('prcue'));
  document.getElementById('revealdone').addEventListener('click',closeOverlay);

  /* keep scrolling past the arm slot → the normal 1-of-2 pick for the next pack (spends a token on choose) */
  if(more){
    var cooling=false, atEnd=false;
    var chkEnd=function(){ atEnd = feed.scrollHeight-(feed.scrollTop+feed.clientHeight) <= 6; };
    var goChoose=function(){ if(cooling) return; cooling=true; overlay.classList.remove('scrollmode'); tokenFlow(); };
    feed.addEventListener('scroll', chkEnd, {passive:true});
    feed.addEventListener('wheel', function(e){ if(atEnd && e.deltaY>8) goChoose(); }, {passive:true});
    var ty=null;
    feed.addEventListener('touchstart', function(e){ ty=e.touches[0].clientY; chkEnd(); }, {passive:true});
    feed.addEventListener('touchmove', function(e){ if(ty==null) return; if(atEnd && (ty-e.touches[0].clientY)>30){ goChoose(); ty=null; } }, {passive:true});
    feed.addEventListener('touchend', function(){ ty=null; }, {passive:true});
    chkEnd();
  }
}
function showCardModal(id){ var c=cardById(id); if(!c) return; var foil=S.coll[id]&&S.coll[id].foil;
  openOverlay('<div class="cardwrap">'+faceHTML(c,foil)+'</div>'); }

/* First-run onboarding: wonder-first, then a guided first pack, landing on a non-empty binder */
function runOnboarding(){
  var starter=['gps-einstein','atomic-clocks','why-sky-blue','measuring-time','time-relative'].filter(function(id){return cardById(id);})[0]||CARDS[0].id;
  var c=cardById(starter);
  if(!S.coll[starter]){ S.coll[starter]={n:1,foil:false}; save(); } /* a welcome gift, so the binder isn't empty */
  var h='<div class="ob"><div class="ob-step" data-step="1">'+
      '<div class="ob-kicker">Welcome to Micro Discovery Gacha</div>'+
      '<h2 class="ob-h">Collect how the world works.</h2>'+
      '<div class="ob-card">'+faceHTML(c,false)+'</div>'+
      '<div class="ob-hint">Swipe the card left &amp; right to read it. Each swipe turns to a new page.</div>'+
      '<button class="done" data-goto="2">Next</button>'+
    '</div>'+
    '<div class="ob-step" data-step="2" hidden>'+
      '<div class="ob-kicker">How the game works</div>'+
      '<h2 class="ob-h">Open packs. Fill your binder.</h2>'+
      '<ul class="ob-list">'+
        '<li><b>✦ Pack Tokens</b>: you have three. A fresh one arrives every day.</li>'+
        '<li><b>Boosters</b>: spend a token, we deal two packs, you keep one (5 cards).</li>'+
        '<li><b>Level up</b>: pull a card you already own and it goes a level deeper.</li>'+
      '</ul>'+
      '<button class="done" id="ob-start">Open my first pack →</button>'+
      '<button class="ob-skip" id="ob-skip">Skip intro</button>'+
    '</div></div>';
  overlay.classList.add('intro');
  openOverlay(h);
  closeBtn.classList.remove('on'); /* no X during intro — Next / Skip drive it */
  sheet.querySelector('[data-goto="2"]').addEventListener('click',function(){
    sheet.querySelector('[data-step="1"]').hidden=true;
    sheet.querySelector('[data-step="2"]').hidden=false; sheet.scrollTop=0;
  });
  document.getElementById('ob-skip').addEventListener('click',function(){ finishOnboarding(false); });
  document.getElementById('ob-start').addEventListener('click',function(){ finishOnboarding(true); });
}
function finishOnboarding(openPack){
  S.onboarded=true; save();
  overlay.classList.remove('intro');
  MSG="firstbinder";
  if(openPack && S.tokens>0){ tokenFlow(); }   /* straight into the real pick-1-of-3; firstbinder shows after Done */
  else { closeOverlay(); }
}

/* Scroll Mode — an endless feed of your owned cards, one random card per screen */
function scrollMode(){
  var owned=CARDS.filter(function(c){return S.coll[c.id];});
  if(!owned.length) return;
  var bag=[], last=null;
  function refill(){ bag=owned.map(function(c){return c.id;});
    for(var i=bag.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)),t=bag[i];bag[i]=bag[j];bag[j]=t; }
    if(owned.length>1 && bag[bag.length-1]===last){ var s=bag[0];bag[0]=bag[bag.length-1];bag[bag.length-1]=s; }
  }
  function nextId(){ if(!bag.length) refill(); var id=bag.pop(); last=id; return id; }
  function slotHTML(){ var id=nextId(), c=cardById(id); return '<div class="sf-slot">'+faceHTML(c,S.coll[id]&&S.coll[id].foil)+'</div>'; }
  var h='<div class="sf-top">✧ Scroll Mode &nbsp;·&nbsp; swipe ‹ › to read · up-down for next card</div><div class="sf-feed" id="sffeed">';
  for(var i=0;i<5;i++) h+=slotHTML();
  h+='</div><div class="sf-cue" id="sfcue" aria-hidden="true"><span class="cuelbl">scroll</span><span class="cuechev">⌄</span></div>';
  overlay.classList.add('scrollmode');
  openOverlay(h);
  var feed=document.getElementById('sffeed'), ticking=false;
  var updCue=wireCue(feed, document.getElementById('sfcue'));
  feed.addEventListener('scroll',function(){
    if(ticking) return; ticking=true;
    requestAnimationFrame(function(){ ticking=false;
      if(feed.scrollHeight-(feed.scrollTop+feed.clientHeight) < feed.clientHeight*1.5){
        var add=''; for(var k=0;k<4;k++) add+=slotHTML();
        feed.insertAdjacentHTML('beforeend',add);
        var cs=feed.querySelectorAll('.card'); for(var j=Math.max(0,cs.length-4);j<cs.length;j++) fitCard(cs[j]);
      }
      while(feed.children.length>16 && feed.children[0].getBoundingClientRect().bottom < -60){
        var hgt=feed.children[0].offsetHeight; feed.removeChild(feed.children[0]); feed.scrollTop-=hgt;
      }
    });
  });
}

/* ===== events ===== */
document.getElementById('home').addEventListener('click',function(){ renderCollection(); window.scrollTo(0,0); });
closeBtn.addEventListener('click',closeOverlay);
overlay.addEventListener('click',function(e){ if(e.target===overlay) closeOverlay(); });

view.addEventListener('click',function(e){
  var op=e.target.closest('[data-openpack]'); if(op){ if(S.tokens<1){ MSG="notokens"; renderCollection(); window.scrollTo(0,0); } else tokenFlow(); return; }
  var sm=e.target.closest('[data-scroll]'); if(sm){ scrollMode(); return; }
  var sr=e.target.closest('[data-series]'); if(sr){ activeSet=setsOf(sr.getAttribute('data-series'))[0]; renderCollection(); return; }
  var st=e.target.closest('[data-set]'); if(st){ activeSet=st.getAttribute('data-set'); renderCollection(); return; }
  var mn=e.target.closest('.mini[data-id]'); if(mn){ showCardModal(mn.getAttribute('data-id')); return; }
});
view.addEventListener('keydown',function(e){ if(e.key==='Enter'||e.key===' '){ var mn=e.target.closest('.mini[data-id]'); if(mn){ e.preventDefault(); showCardModal(mn.getAttribute('data-id')); } } });
sheet.addEventListener('click',function(e){ if(e.target.closest('a')) return;
  var ch=e.target.closest('[data-choose]'); if(ch){ S.tokens=Math.max(0,S.tokens-1); save(); packFlow(ch.getAttribute('data-choose')); return; }
  var card=e.target.closest('.card'); if(card){ if(card._noclick){ card._noclick=false; return; }
    var r=card.getBoundingClientRect(); flipCard(card,(e.clientX-r.left)>r.width/2?1:-1); } });
/* horizontal swipe pages the card (vertical swipes pass through to the feed) */
var _sx=0,_sy=0,_sc=null;
sheet.addEventListener('touchstart',function(e){ var card=e.target.closest('.card'); _sc=card; if(!card)return; card._noclick=false; var t=e.changedTouches[0]; _sx=t.clientX; _sy=t.clientY; },{passive:true});
sheet.addEventListener('touchend',function(e){ var card=_sc; _sc=null; if(!card||e.target.closest('a'))return;
  var t=e.changedTouches[0], dx=t.clientX-_sx, dy=t.clientY-_sy;
  if(Math.abs(dx)>38 && Math.abs(dx)>Math.abs(dy)*1.3){ card._noclick=true; flipCard(card,dx<0?1:-1); } },{passive:true});
sheet.addEventListener('keydown',function(e){
  var card=e.target.closest&&e.target.closest('.card');
  if(card&&(e.key==='ArrowRight'||e.key==='ArrowLeft')){ e.preventDefault(); flipCard(card,e.key==='ArrowRight'?1:-1); } });

var root=document.documentElement;
try{var saved=localStorage.getItem('mdg-mag-theme'); if(saved)root.setAttribute('data-theme',saved);}catch(e){}
function curTheme(){ return root.getAttribute('data-theme')||(window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light'); }

/* settings menu */
var gear=document.getElementById('gear'), menu=document.getElementById('settings'), themeVal=document.getElementById('theme-val');
function syncTheme(){ themeVal.textContent=curTheme()==='dark'?'Dark':'Light'; }
syncTheme();
var menuOpen=false, dangerBtns=[];
function disarmDanger(){ dangerBtns.forEach(function(b){ if(b._disarm) b._disarm(); }); }
function openMenu(){ menuOpen=true; menu.hidden=false; gear.setAttribute('aria-expanded','true'); disarmDanger(); }
function closeMenu(){ menuOpen=false; menu.hidden=true; gear.setAttribute('aria-expanded','false'); disarmDanger(); }
gear.addEventListener('click',function(e){ e.stopPropagation(); menuOpen?closeMenu():openMenu(); });
menu.addEventListener('click',function(e){ e.stopPropagation(); });
document.addEventListener('click',function(){ if(menuOpen) closeMenu(); });
document.addEventListener('keydown',function(e){ if(e.key==='Escape'&&menuOpen) closeMenu(); });

document.getElementById('set-theme').addEventListener('click',function(){
  var nxt=curTheme()==='dark'?'light':'dark'; root.setAttribute('data-theme',nxt);
  try{localStorage.setItem('mdg-mag-theme',nxt);}catch(e){} syncTheme();
});
document.getElementById('dbg-packs').addEventListener('click',function(){
  S.tokens+=10; save(); renderCollection(); closeMenu();
});
/* danger buttons take two taps: first arms (shows confirm label), second fires */
function armButton(btn, label, confirmLabel, onConfirm){
  btn._disarm=function(){ btn._armed=false; btn.classList.remove('armed'); btn.firstChild.textContent=label; };
  btn.addEventListener('click',function(){
    if(!btn._armed){ btn._armed=true; btn.classList.add('armed'); btn.firstChild.textContent=confirmLabel; return; }
    btn._disarm(); closeMenu(); onConfirm();
  });
  dangerBtns.push(btn);
}
armButton(document.getElementById('dbg-unlock'),'Unlock All Cards','Tap again to confirm: unlock all '+CARDS.length,function(){
  CARDS.forEach(function(c){ var max=cardPageList(c,1).maxContent, rec=S.coll[c.id]||{n:0,foil:false};
    rec.n=Math.max(rec.n,max); S.coll[c.id]=rec; }); /* max level = every page unlocked */
  save(); renderCollection();
});
armButton(document.getElementById('dbg-reset'),'Reset','Tap again to confirm: wipe everything',function(){
  try{ localStorage.removeItem(SKEY); }catch(e){}
  MSG=null; MSGN=0; activeSet=SETS[0];
  load(); initEconomy(); renderCollection(); runOnboarding();
});

load(); initEconomy(); renderCollection(); if(!S.onboarded) runOnboarding();
