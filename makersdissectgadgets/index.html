<style>
/* ============ MAKERS DISSECT GADGETS — a jewel-box reader ============ */
:root{
  --display:'Fraunces','Hoefler Text','Iowan Old Style','Palatino Linotype',Palatino,Georgia,serif;
  --body:'Newsreader','Iowan Old Style','Palatino Linotype',Palatino,Georgia,serif;
  --label:'Archivo','Helvetica Neue',system-ui,-apple-system,sans-serif;

  /* deep-water jewel box (default / dark) */
  --bg:#0d1413;
  --bg2:#131c1b;
  --plate:#16211f;
  --ink:#f3ede1;
  --ink-soft:#d8d2c5;
  --muted:#93a09c;
  --line:#243230;
  --line2:#33453f;
  --gold:#c9a24b;
  --gold-soft:#e3c987;
  --shadow:0 24px 60px -30px rgba(0,0,0,.8);
  /* per-article accent — overwritten inline */
  --accent:#c9a24b;
  --accent-soft:#e3c987;
}
:root[data-theme="dark"]{
  --bg:#0d1413; --bg2:#131c1b; --plate:#16211f; --ink:#f3ede1; --ink-soft:#d8d2c5;
  --muted:#93a09c; --line:#243230; --line2:#33453f; --gold:#c9a24b; --gold-soft:#e3c987;
  --shadow:0 24px 60px -30px rgba(0,0,0,.8);
}
/* cool shell (light) — deliberately cooler than the cream cliché */
@media(prefers-color-scheme:light){
  :root{
    --bg:#eae7de; --bg2:#f2efe7; --plate:#f4f1ea; --ink:#182421; --ink-soft:#3a4744;
    --muted:#6f7a72; --line:#d8d3c4; --line2:#c6c0ae; --gold:#9c7a2b; --gold-soft:#b89440;
    --shadow:0 22px 48px -30px rgba(40,44,40,.35);
  }
}
:root[data-theme="light"]{
  --bg:#eae7de; --bg2:#f2efe7; --plate:#f4f1ea; --ink:#182421; --ink-soft:#3a4744;
  --muted:#6f7a72; --line:#d8d3c4; --line2:#c6c0ae; --gold:#9c7a2b; --gold-soft:#b89440;
  --shadow:0 22px 48px -30px rgba(40,44,40,.35);
}

*,*::before,*::after{box-sizing:border-box}
html{scroll-behavior:smooth}
@media(prefers-reduced-motion:reduce){html{scroll-behavior:auto}}
body{
  margin:0;background:var(--bg);color:var(--ink);
  font-family:var(--body);font-size:19px;line-height:1.65;
  -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
  font-optical-sizing:auto;
}
a{color:inherit;text-decoration:none}
img{max-width:100%}
::selection{background:var(--gold);color:#0d1413}

/* ---- reading progress ---- */
#progress{position:fixed;top:0;left:0;height:2px;width:0;z-index:60;
  background:linear-gradient(90deg,var(--gold-soft),var(--gold));transition:width .12s linear}

/* ---- top bar ---- */
.topbar{position:sticky;top:0;z-index:50;display:flex;align-items:center;justify-content:space-between;
  gap:14px;padding:12px clamp(16px,5vw,40px);
  background:color-mix(in srgb,var(--bg) 86%,transparent);backdrop-filter:blur(10px);
  border-bottom:1px solid var(--line)}
.topbar .wordmark{font-family:var(--label);font-weight:700;letter-spacing:.14em;text-transform:uppercase;
  font-size:clamp(10.5px,2.4vw,12.5px);color:var(--ink);display:flex;align-items:center;gap:.55em;cursor:pointer;
  background:none;border:0;white-space:nowrap}
.topbar .wordmark .dot{width:6px;height:6px;border-radius:50%;background:var(--gold);box-shadow:0 0 10px var(--gold)}
.topbar .controls{display:flex;align-items:center;gap:8px}
.btn{font-family:var(--label);font-weight:600;letter-spacing:.08em;text-transform:uppercase;font-size:11.5px;
  color:var(--muted);background:none;border:1px solid var(--line2);border-radius:999px;padding:7px 13px;cursor:pointer;
  transition:color .2s,border-color .2s}
.btn:hover,.btn:focus-visible{color:var(--ink);border-color:var(--gold)}
.btn:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
@media(max-width:470px){
  .topbar{padding-left:12px;padding-right:12px;gap:8px}
  .topbar .wordmark{letter-spacing:.05em}
  .topbar .controls{gap:6px}
  .btn{padding:6px 9px;letter-spacing:.05em}
}

/* ---- shell ---- */
main{max-width:1120px;margin:0 auto;padding:0 clamp(16px,5vw,40px)}
.kicker{font-family:var(--label);font-weight:700;letter-spacing:.22em;text-transform:uppercase;
  font-size:12px;color:var(--accent);display:inline-flex;align-items:center;gap:.7em}
.kicker::before{content:"";width:22px;height:1px;background:var(--accent);display:inline-block}

/* ============ COVER ============ */
.cover-mast{padding:clamp(36px,7vw,72px) 0 clamp(22px,4vw,34px);text-align:center;
  border-bottom:1px solid var(--line);position:relative;overflow:hidden}
.cover-mast .issue{font-family:var(--label);font-weight:600;letter-spacing:.34em;text-transform:uppercase;
  font-size:12px;color:var(--muted);margin-bottom:20px}
.cover-mast h1{font-family:var(--display);font-weight:600;font-optical-sizing:auto;
  font-size:clamp(40px,9.4vw,104px);line-height:.96;letter-spacing:-.02em;margin:0 auto;max-width:11ch;
  text-wrap:balance;
  background:linear-gradient(180deg,var(--ink),color-mix(in srgb,var(--ink) 72%,var(--gold)));
  -webkit-background-clip:text;background-clip:text;color:transparent}
.cover-mast .tag{font-family:var(--display);font-style:italic;font-size:clamp(17px,3.2vw,22px);
  color:var(--ink-soft);margin-top:18px}
.shimmer{height:1px;width:min(560px,80%);margin:26px auto 0;position:relative;
  background:linear-gradient(90deg,transparent,var(--line2),transparent)}
.shimmer::after{content:"";position:absolute;top:0;left:0;height:100%;width:120px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);animation:sweep 5.5s ease-in-out infinite}
@keyframes sweep{0%{transform:translateX(-60px);opacity:0}
  15%{opacity:1}50%{transform:translateX(min(440px,70vw));opacity:1}65%,100%{opacity:0}}
@media(prefers-reduced-motion:reduce){.shimmer::after{animation:none;opacity:.6}}
.ethos{max-width:640px;margin:22px auto 0;color:var(--muted);font-size:16px;line-height:1.7}
.ethos b{color:var(--ink-soft);font-weight:500;font-style:italic;font-family:var(--display)}

/* hero feature */
.hero{display:grid;grid-template-columns:1.05fr .95fr;gap:clamp(20px,4vw,52px);align-items:center;
  padding:clamp(32px,6vw,64px) 0;border-bottom:1px solid var(--line)}
@media(max-width:760px){.hero{grid-template-columns:1fr;gap:22px}}
.hero .plate{aspect-ratio:4/3;border-radius:4px;border:1px solid var(--line2);position:relative;overflow:hidden;
  box-shadow:var(--shadow);order:2}
@media(max-width:760px){.hero .plate{order:-1;aspect-ratio:16/10}}
.hero-txt{order:1}
.hero-txt h2{font-family:var(--display);font-weight:500;font-size:clamp(34px,5.6vw,60px);line-height:1.02;
  letter-spacing:-.015em;margin:16px 0 0;text-wrap:balance}
.hero-txt .dek{font-family:var(--display);font-style:italic;color:var(--ink-soft);font-size:clamp(18px,2.6vw,22px);
  line-height:1.4;margin:16px 0 0}
.hero-txt .go{margin-top:24px;display:inline-flex;align-items:center;gap:.6em;font-family:var(--label);
  font-weight:600;letter-spacing:.06em;text-transform:uppercase;font-size:12.5px;color:var(--ink);
  border-bottom:2px solid var(--gold);padding-bottom:4px}
.hero-txt .meta{margin-top:14px;font-family:var(--label);font-size:11.5px;letter-spacing:.14em;
  text-transform:uppercase;color:var(--muted)}

/* contents index */
.contents{padding:clamp(30px,5vw,52px) 0 clamp(48px,8vw,90px)}
.contents .h{font-family:var(--label);font-weight:700;letter-spacing:.28em;text-transform:uppercase;
  font-size:12.5px;color:var(--muted);margin:0 0 6px}
.contents .h-rule{height:1px;background:var(--line);margin:0 0 6px}
.entry{display:grid;grid-template-columns:auto 1fr auto;gap:clamp(14px,3vw,30px);align-items:baseline;
  padding:22px 0;border-bottom:1px solid var(--line);cursor:pointer;transition:background .2s}
.entry:hover{background:color-mix(in srgb,var(--gold) 6%,transparent)}
.entry .folio{font-family:var(--display);font-size:clamp(20px,3vw,26px);color:var(--accent);
  font-variant-numeric:tabular-nums;min-width:1.6em}
.entry .body .kicker{font-size:11px;margin-bottom:9px}
.entry .body h3{font-family:var(--display);font-weight:500;font-size:clamp(24px,3.6vw,34px);line-height:1.06;
  letter-spacing:-.01em;margin:0;text-wrap:balance}
.entry:hover .body h3{color:var(--gold-soft)}
.entry .body .dek{font-family:var(--display);font-style:italic;color:var(--muted);font-size:16.5px;
  line-height:1.4;margin:8px 0 0;max-width:52ch}
.entry .rt{font-family:var(--label);font-size:11px;letter-spacing:.12em;text-transform:uppercase;
  color:var(--muted);white-space:nowrap;text-align:right}
.entry .rt b{display:block;font-family:var(--display);font-style:normal;font-size:22px;color:var(--ink-soft);letter-spacing:0}

/* ============ ARTICLE ============ */
.article{max-width:720px;margin:0 auto;padding:clamp(26px,5vw,52px) 0 40px;animation:rise .5s ease both}
@keyframes rise{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
@media(prefers-reduced-motion:reduce){.article{animation:none}}
.article .band{height:6px;border-radius:3px;margin-bottom:26px;
  background:linear-gradient(90deg,var(--accent),color-mix(in srgb,var(--accent) 30%,var(--gold-soft)))}
.article h1{font-family:var(--display);font-weight:500;font-size:clamp(38px,7vw,70px);line-height:1.0;
  letter-spacing:-.02em;margin:14px 0 0;text-wrap:balance}
.article .dek{font-family:var(--display);font-style:italic;color:var(--ink-soft);
  font-size:clamp(20px,3.2vw,25px);line-height:1.4;margin:20px 0 0;text-wrap:pretty}
.article .byline{font-family:var(--label);font-size:11.5px;letter-spacing:.16em;text-transform:uppercase;
  color:var(--muted);margin:24px 0 0;display:flex;gap:14px;flex-wrap:wrap;align-items:center}
.article .byline .sep{width:4px;height:4px;border-radius:50%;background:var(--accent)}
.article .platewide{aspect-ratio:16/8;border-radius:4px;border:1px solid var(--line2);overflow:hidden;
  margin:30px 0 8px;position:relative;box-shadow:var(--shadow)}

.prose{margin-top:26px}
.prose p{margin:0 0 22px}
.prose p a{border-bottom:1px solid var(--line2)}
.prose > p:first-of-type::first-letter{font-family:var(--display);font-weight:600;float:left;
  font-size:4.3em;line-height:.78;padding:.02em .12em 0 0;color:var(--accent)}
.prose h2{font-family:var(--display);font-weight:500;font-size:clamp(24px,3.6vw,31px);line-height:1.15;
  letter-spacing:-.01em;margin:44px 0 4px;text-wrap:balance}
.prose h2 + p{margin-top:12px}

.pull{font-family:var(--display);font-style:italic;font-weight:400;font-size:clamp(24px,4.2vw,33px);
  line-height:1.24;color:var(--ink);margin:38px 0;padding:6px 0 6px 26px;border-left:3px solid var(--accent);
  text-wrap:balance}

.note{background:var(--bg2);border:1px solid var(--line);border-radius:6px;padding:20px 22px;margin:34px 0;
  font-size:17px;line-height:1.6}
.note .lab{font-family:var(--label);font-weight:700;letter-spacing:.14em;text-transform:uppercase;
  font-size:11px;color:var(--accent);margin-bottom:8px;display:block}
.note p{margin:0}

/* material spec list */
.spec{border-top:1px solid var(--line2);margin:34px 0}
.spec .lab{font-family:var(--label);font-weight:700;letter-spacing:.16em;text-transform:uppercase;
  font-size:11px;color:var(--muted);padding:12px 0 4px}
.spec dl{margin:0;display:grid;grid-template-columns:auto 1fr;gap:0}
.spec dt{font-family:var(--label);font-weight:600;font-size:12.5px;letter-spacing:.04em;text-transform:uppercase;
  color:var(--ink-soft);padding:12px 20px 12px 0;border-bottom:1px solid var(--line);white-space:nowrap}
.spec dd{margin:0;padding:12px 0;border-bottom:1px solid var(--line);color:var(--muted);font-size:16.5px}

/* the how-it's-made sequence (numbering is real here) */
.steps{margin:34px 0;counter-reset:step}
.steps .lab{font-family:var(--label);font-weight:700;letter-spacing:.16em;text-transform:uppercase;
  font-size:11px;color:var(--accent);margin-bottom:6px}
.step{display:grid;grid-template-columns:auto 1fr;gap:20px;padding:22px 0;border-top:1px solid var(--line);
  counter-increment:step}
.step::before{content:counter(step,decimal-leading-zero);font-family:var(--display);font-size:26px;
  color:var(--accent);font-variant-numeric:tabular-nums;line-height:1}
.step h4{font-family:var(--display);font-weight:500;font-size:21px;line-height:1.2;margin:0 0 6px;letter-spacing:-.01em}
.step p{margin:0;font-size:17px;line-height:1.6;color:var(--ink-soft)}

/* footer nav */
.artnav{border-top:1px solid var(--line);margin-top:48px;padding:30px 0 0;display:flex;justify-content:space-between;
  gap:16px;flex-wrap:wrap}
.artnav a{font-family:var(--label);letter-spacing:.06em;text-transform:uppercase;font-size:12px;font-weight:600;
  color:var(--muted);display:flex;flex-direction:column;gap:4px;max-width:46%}
.artnav a:hover{color:var(--ink)}
.artnav a .t{font-family:var(--display);text-transform:none;letter-spacing:0;font-size:19px;color:var(--ink-soft);
  font-weight:500}
.artnav a.next{text-align:right;align-items:flex-end;margin-left:auto}

/* page footer */
.pagefoot{border-top:1px solid var(--line);margin-top:60px}
.pagefoot .in{max-width:1120px;margin:0 auto;padding:40px clamp(16px,5vw,40px) 60px;
  display:flex;justify-content:space-between;gap:20px;flex-wrap:wrap;align-items:flex-end}
.pagefoot .wm{font-family:var(--display);font-size:34px;font-weight:600;color:var(--ink);letter-spacing:-.01em}
.pagefoot .wm span{color:var(--gold)}
.pagefoot .col{font-family:var(--label);font-size:12px;letter-spacing:.04em;color:var(--muted);line-height:1.9;text-align:right}
.pagefoot .col b{color:var(--ink-soft);font-weight:600}

/* motif svgs fill their plate */
.motif{position:absolute;inset:0;width:100%;height:100%}
</style>
</head>

<script>
/* =================== ISSUE DATA =================== */
var ISSUE = { no:"Nº 1", season:"Summer 2026", theme:"Hawaiian Jewelry" };

/* motif: layered gradient + inline SVG line-art, tinted by accent. No external images. */
function motif(kind, accent){
  var a = accent, svg;
  if(kind==="scroll"){
    svg = '<path d="M20 130 C 60 60, 120 60, 150 120 S 250 180, 290 110" fill="none" stroke="'+a+'" stroke-width="1.4" opacity=".9"/>'+
          '<path d="M40 150 C 90 100, 150 100, 190 150 S 300 200, 340 140" fill="none" stroke="'+a+'" stroke-width="1" opacity=".5"/>'+
          '<circle cx="150" cy="120" r="3" fill="'+a+'"/><circle cx="290" cy="110" r="2.5" fill="'+a+'"/>';
  } else if(kind==="wave"){
    svg=''; for(var i=0;i<5;i++){var y=48+i*28;svg+='<path d="M0 '+y+' Q 90 '+(y-22)+' 180 '+y+' T 360 '+y+'" fill="none" stroke="'+a+'" stroke-width="1.2" opacity="'+(0.85-i*0.13)+'"/>';}
  } else if(kind==="grain"){
    svg=''; for(var j=0;j<7;j++){var x=30+j*45;svg+='<path d="M'+x+' 10 C '+(x+26)+' 70, '+(x-20)+' 150, '+(x+14)+' 230" fill="none" stroke="'+a+'" stroke-width="'+(0.8+j%2*0.7)+'" opacity="'+(0.35+j%3*0.18)+'"/>';}
  } else { /* facet — gem */
    svg='<polygon points="180,30 300,120 240,220 120,220 60,120" fill="none" stroke="'+a+'" stroke-width="1.3" opacity=".9"/>'+
        '<path d="M60 120 L180 120 L300 120 M180 30 L180 120 M120 220 L180 120 L240 220" stroke="'+a+'" stroke-width="1" opacity=".55" fill="none"/>';
  }
  var grad = 'radial-gradient(120% 140% at 78% 8%, color-mix(in srgb,'+a+' 30%, transparent), transparent 60%),'+
             'linear-gradient(160deg, var(--plate), var(--bg2))';
  return '<div class="motif" style="background:'+grad+'"></div>'+
         '<svg class="motif" viewBox="0 0 360 240" preserveAspectRatio="xMidYMid slice" aria-hidden="true">'+svg+'</svg>';
}

/* =================== ARTICLES =================== */
var ARTICLES = [
{
  id:"heirloom", folio:"01", accent:"#c9a24b", motif:"scroll", readMin:7,
  kicker:"Gold & Fire", hero:true,
  title:"The Black-Letter Bracelet",
  dek:"How a plain band of gold becomes a Hawaiian heirloom — cut by hand, engraved with scrollwork, and filled with black fire.",
  byline:["The Editors","Honolulu"],
  spec:{ label:"Materials", rows:[
    ["Metal","14k or 18k yellow gold sheet"],
    ["Blackening","Vitreous enamel or black rhodium in the engraving"],
    ["Tools","Gravers, a jeweler's saw, a wrist mandrel"],
    ["Time","Two to five days of hand-engraving"]
  ]},
  blocks:[
    ["p","As the story is told, it began with a gift. In the 1880s Queen Kapiʻolani and Princess Liliʻuokalani travelled to England for Queen Victoria's Golden Jubilee, and came home carrying a very Victorian idea: a gold bangle, its owner's name set in black Old-English letters. In mourning-obsessed Britain the black-and-gold look meant remembrance. In the Hawaiian Kingdom it became something warmer — a band you give to a daughter, a wife, a friend, with her name on it, meant to be worn for a lifetime and then handed down."],
    ["p","That handing-down is the whole point. \"Hawaiian heirloom jewelry\" isn't a style so much as a promise, and every step of the making is built to survive a hundred years of wrists."],
    ["h2","From flat sheet to a wrist"],
    ["p","It starts as nothing romantic at all: a flat strip of gold rolled to an even thickness. The maker saws the band to length, files the ends true, and bends it around a tapered steel wrist mandrel until it takes the soft oval of a real arm — not a circle, because arms aren't round."],
    ["steps",{ label:"How it's made", items:[
      ["The blank","Sheet gold is rolled to a couple of millimetres and cut to the wearer's wrist. Heavier gold means a bracelet that keeps its shape for generations, so heirloom bands are noticeably thicker than fashion ones."],
      ["Shaping","The strip is annealed — heated soft — then formed over a mandrel into a wrist oval. Getting the ends to meet cleanly is what separates a hinged, clasped heirloom from a cheap open cuff."],
      ["The layout","The design is drawn or transferred onto the surface: a scrolling border, maile leaves or plumeria, and the name that will run down the center in Old-English script. Nothing is stamped; the layout is the map the engraver will cut by hand."],
      ["Hand-engraving","With a sharpened graver pushed by the heel of the palm, the maker cuts every line into the metal. Flowers and leaves are carved so they appear raised against a cut-away background — a technique called relief — which is why good heirloom work has real depth you can feel."],
      ["The black fire","The recessed letters and background are filled with black: either powdered glass enamel fused in a kiln, or black rhodium plating, then polished flush. The black survives only down in the cuts, so the name reads sharp against bright gold."],
      ["Finishing","The whole piece is polished, a clasp and safety chain fitted, and — the quiet final step — the name and often a date are set for good. From here it is nobody's inventory; it's somebody's."]

    ["pull","The black isn't paint. It's the shadow the engraver left in the metal, and light can't wash it out."],
    ["p","Because it's all cut by hand, no two heirloom bracelets are identical, even from the same shop. The width of a maile leaf, the curl of a scroll, the exact weight of the letters — those are the maker's fingerprints, and they're a large part of why a serious heirloom bracelet is priced like an investment rather than an accessory."],
    ["note","Heirloom, literally",[["p","The tradition treats these as objects to inherit, not to replace. Many families add a name for each generation, or re-engrave a bracelet when it passes hands. If you're buying one, weight and hand-engraving — not flash — are what you're paying for, and what will still matter in fifty years."]]]
  ]

/* =================== RENDER =================== */
var app = document.getElementById('app');
function byId(id){for(var i=0;i<ARTICLES.length;i++)if(ARTICLES[i].id===id)return {a:ARTICLES[i],i:i};return null;}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;');}

function renderBlocks(blocks){
  var out='';
  for(var i=0;i<blocks.length;i++){
    var b=blocks[i], t=b[0];
    if(t==="p") out+='<p>'+b[1]+'</p>';
    else if(t==="h2") out+='<h2>'+esc(b[1])+'</h2>';
    else if(t==="pull") out+='<blockquote class="pull">'+esc(b[1])+'</blockquote>';
    else if(t==="steps"){
      var s=b[1]; out+='<div class="steps"><div class="lab">'+esc(s.label)+'</div>';
      for(var j=0;j<s.items.length;j++) out+='<div class="step"><div><h4>'+esc(s.items[j][0])+'</h4><p>'+s.items[j][1]+'</p></div></div>';
      out+='</div>';
    } else if(t==="note"){
      out+='<aside class="note"><span class="lab">'+esc(b[1])+'</span>';
      for(var k=0;k<b[2].length;k++) out+='<p>'+b[2][k][1]+'</p>';
      out+='</aside>';
    }
  }
  return out;
}
function renderSpec(spec){
  if(!spec) return '';
  var out='<div class="spec"><div class="lab">'+esc(spec.label)+'</div><dl>';
  for(var i=0;i<spec.rows.length;i++) out+='<dt>'+esc(spec.rows[i][0])+'</dt><dd>'+spec.rows[i][1]+'</dd>';
  return out+'</dl></div>';
}

function renderCover(){
  var hero=ARTICLES.find(function(a){return a.hero;})||ARTICLES[0];
  var rest=ARTICLES;
  var h='';
  h+='<section class="cover-mast">'+
       '<div class="issue">Issue '+esc(ISSUE.no)+' &nbsp;·&nbsp; '+esc(ISSUE.theme)+'</div>'+
       '<h1>Makers Dissect Gadgets</h1>'+
       '<div class="tag">Taking things apart to show you how they&rsquo;re made.</div>'+
       '<div class="shimmer"></div>'+
       '<p class="ethos">A digital magazine you <b>read</b> instead of watching. No ads, no autoplay — '+
         'just makers taking things apart to show how they&rsquo;re built and how they work. '+
         'Each issue digs into one world; this one is the jewelry of Hawaiʻi.</p>'+
     '</section>';
  // hero
  h+='<section class="hero" data-go="'+hero.id+'" style="--accent:'+hero.accent+'">'+
       '<div class="hero-txt">'+
         '<span class="kicker">Cover Story · '+esc(hero.kicker)+'</span>'+
         '<h2>'+esc(hero.title)+'</h2>'+
         '<p class="dek">'+esc(hero.dek)+'</p>'+
         '<span class="go">Read the story →</span>'+
         '<div class="meta">'+hero.readMin+' min read · Issue '+esc(ISSUE.no)+'</div>'+
       '</div>'+
       '<div class="plate">'+motif(hero.motif,hero.accent)+'</div>'+
     '</section>';
  // contents
  h+='<section class="contents"><div class="h">In this issue</div><div class="h-rule"></div>';
  for(var i=0;i<rest.length;i++){var a=rest[i];
    h+='<div class="entry" data-go="'+a.id+'" style="--accent:'+a.accent+'">'+
         '<div class="folio">'+esc(a.folio)+'</div>'+
         '<div class="body"><span class="kicker">'+esc(a.kicker)+'</span>'+
           '<h3>'+esc(a.title)+'</h3><p class="dek">'+esc(a.dek)+'</p></div>'+
         '<div class="rt"><b>'+a.readMin+'</b>min read</div>'+
       '</div>';
  }
  h+='</section>';
  app.innerHTML=h;
  bindGo();
  document.title="Makers Dissect Gadgets — how things are made";
}

function renderArticle(id){
  var f=byId(id); if(!f){renderCover();return;}
  var a=f.a, prev=ARTICLES[f.i-1], next=ARTICLES[f.i+1];
  var h='<article class="article" style="--accent:'+a.accent+'">'+
    '<div class="band"></div>'+
    '<span class="kicker">'+esc(a.folio)+' · '+esc(a.kicker)+'</span>'+
    '<h1>'+esc(a.title)+'</h1>'+
    '<p class="dek">'+esc(a.dek)+'</p>'+
    '<div class="byline"><span>By '+esc(a.byline[0])+'</span><span class="sep"></span><span>'+esc(a.byline[1])+'</span>'+
      '<span class="sep"></span><span>'+a.readMin+' min read</span></div>'+
    '<div class="platewide">'+motif(a.motif,a.accent)+'</div>'+
    '<div class="prose">'+renderBlocks(a.blocks)+renderSpec(a.spec)+'</div>'+
    '<nav class="artnav">'+
      (prev?'<a data-go="'+prev.id+'"><span>← Previous</span><span class="t">'+esc(prev.title)+'</span></a>':'<a data-go="__cover"><span>← Cover</span><span class="t">Back to contents</span></a>')+
      (next?'<a class="next" data-go="'+next.id+'"><span>Next →</span><span class="t">'+esc(next.title)+'</span></a>':'<a class="next" data-go="__cover"><span>Cover →</span><span class="t">Back to contents</span></a>')+
    '</nav>'+
    '</article>';
  app.innerHTML=h;
  bindGo();
  document.title=a.title+" — Makers Dissect Gadgets";
}

function bindGo(){
  var els=app.querySelectorAll('[data-go]');
  els.forEach(function(el){
    el.style.cursor='pointer';
    el.addEventListener('click',function(){
      var t=el.getAttribute('data-go');
      location.hash = (t==='__cover')?'' : '/'+t;
    });
  });
}

/* router */
function route(){
  var hash=location.hash.replace(/^#\/?/,'');
  window.scrollTo(0,0);
  if(hash && byId(hash)) renderArticle(hash);
  else renderCover();
  updateProgress();
}
window.addEventListener('hashchange',route);

/* controls */
document.getElementById('home').addEventListener('click',function(){location.hash='';});
document.getElementById('toc').addEventListener('click',function(){
  if(location.hash){location.hash='';}
  setTimeout(function(){var c=document.querySelector('.contents');if(c)c.scrollIntoView({behavior:'smooth'});},60);
});

/* theme toggle (persisted) */
var root=document.documentElement;
try{var saved=localStorage.getItem('mdg-mag-theme'); if(saved)root.setAttribute('data-theme',saved);}catch(e){}
document.getElementById('theme').addEventListener('click',function(){
  var cur=root.getAttribute('data-theme');
  if(!cur){cur=window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';}
  var nxt=cur==='dark'?'light':'dark';
  root.setAttribute('data-theme',nxt);
  try{localStorage.setItem('mdg-mag-theme',nxt);}catch(e){}
});

/* reading progress */
var prog=document.getElementById('progress');
function updateProgress(){
  var h=document.documentElement, max=h.scrollHeight-h.clientHeight;
  prog.style.width=(max>0?(h.scrollTop/max*100):0)+'%';
}
window.addEventListener('scroll',updateProgress,{passive:true});
window.addEventListener('resize',updateProgress);

route();
</script>
</body>
</html>
