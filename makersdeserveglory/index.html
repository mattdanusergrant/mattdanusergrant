<style>
/* ============ MAKERS DESERVE GLORY — a micro-learning maker feed ============ */
:root{
  --display:'Fraunces','Hoefler Text','Iowan Old Style','Palatino Linotype',Palatino,Georgia,serif;
  --body:'Newsreader','Iowan Old Style','Palatino Linotype',Palatino,Georgia,serif;
  --label:'Archivo','Helvetica Neue',system-ui,-apple-system,sans-serif;

  --bg:#0d1413; --bg2:#131c1b; --plate:#16211f; --ink:#f3ede1; --ink-soft:#d8d2c5;
  --muted:#93a09c; --line:#243230; --line2:#33453f; --gold:#c9a24b; --gold-soft:#e3c987;
  --shadow:0 24px 60px -30px rgba(0,0,0,.8);
  --accent:#c9a24b; --accent-soft:#e3c987;
}
:root[data-theme="dark"]{
  --bg:#0d1413; --bg2:#131c1b; --plate:#16211f; --ink:#f3ede1; --ink-soft:#d8d2c5;
  --muted:#93a09c; --line:#243230; --line2:#33453f; --gold:#c9a24b; --gold-soft:#e3c987;
  --shadow:0 24px 60px -30px rgba(0,0,0,.8);
}
@media(prefers-color-scheme:light){
  :root{ --bg:#eae7de; --bg2:#f2efe7; --plate:#f4f1ea; --ink:#182421; --ink-soft:#3a4744;
    --muted:#6f7a72; --line:#d8d3c4; --line2:#c6c0ae; --gold:#9c7a2b; --gold-soft:#b89440;
    --shadow:0 22px 48px -30px rgba(40,44,40,.35); }
}
:root[data-theme="light"]{ --bg:#eae7de; --bg2:#f2efe7; --plate:#f4f1ea; --ink:#182421; --ink-soft:#3a4744;
  --muted:#6f7a72; --line:#d8d3c4; --line2:#c6c0ae; --gold:#9c7a2b; --gold-soft:#b89440;
  --shadow:0 22px 48px -30px rgba(40,44,40,.35); }

*,*::before,*::after{box-sizing:border-box}
html{scroll-behavior:smooth}
@media(prefers-reduced-motion:reduce){html{scroll-behavior:auto}}
body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--body);font-size:19px;line-height:1.6;
  -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;font-optical-sizing:auto}
a{color:inherit;text-decoration:none}
::selection{background:var(--gold);color:#0d1413}

/* top bar */
.topbar{position:sticky;top:0;z-index:50;display:flex;align-items:center;justify-content:space-between;gap:10px;
  padding:12px clamp(14px,4vw,32px);background:color-mix(in srgb,var(--bg) 86%,transparent);
  backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
.wordmark{display:flex;align-items:center;gap:.55em;background:none;border:0;cursor:pointer;
  font-family:var(--label);font-weight:700;letter-spacing:.13em;text-transform:uppercase;
  font-size:clamp(10.5px,2.4vw,12.5px);color:var(--ink);white-space:nowrap}
.wordmark .dot{width:6px;height:6px;border-radius:50%;background:var(--gold);box-shadow:0 0 10px var(--gold)}
.controls{display:flex;gap:8px}
.btn{font-family:var(--label);font-weight:600;letter-spacing:.06em;text-transform:uppercase;font-size:11.5px;
  color:var(--muted);background:none;border:1px solid var(--line2);border-radius:999px;padding:7px 13px;cursor:pointer;
  transition:color .2s,border-color .2s}
.btn:hover,.btn:focus-visible{color:var(--ink);border-color:var(--gold)}
.btn:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
@media(max-width:430px){ .btn{padding:6px 10px;letter-spacing:.03em} .wordmark{letter-spacing:.05em} }

/* the feed */
#feed{display:flex;flex-direction:column}
.card{min-height:calc(100svh - 54px);display:flex;flex-direction:column;justify-content:center;
  padding:clamp(30px,6vw,64px) clamp(18px,5vw,32px);border-bottom:1px solid var(--line);position:relative}
.card .inner{max-width:640px;margin:0 auto;width:100%;animation:rise .5s ease both}
@keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
@media(prefers-reduced-motion:reduce){.card .inner{animation:none}}

.kicker{font-family:var(--label);font-weight:700;letter-spacing:.2em;text-transform:uppercase;font-size:12px;
  color:var(--accent);display:inline-flex;align-items:center;gap:.7em;margin-bottom:16px}
.kicker::before{content:"";width:22px;height:1px;background:var(--accent);display:inline-block}
.card h2{font-family:var(--display);font-weight:500;font-size:clamp(38px,8vw,66px);line-height:1;
  letter-spacing:-.02em;margin:0;text-wrap:balance}
.card .hook{font-family:var(--display);font-style:italic;color:var(--ink-soft);font-size:clamp(20px,3.4vw,25px);
  line-height:1.35;margin:16px 0 0;text-wrap:pretty}

.plate{aspect-ratio:16/5;border-radius:5px;border:1px solid var(--line2);overflow:hidden;position:relative;
  box-shadow:var(--shadow);margin:26px 0}
.motif{position:absolute;inset:0;width:100%;height:100%}

.how{margin:6px 0 0;counter-reset:step;border-top:1px solid var(--line)}
.how .lab{font-family:var(--label);font-weight:700;letter-spacing:.16em;text-transform:uppercase;font-size:11px;
  color:var(--accent);padding:14px 0 2px;display:block}
.how li{list-style:none;display:grid;grid-template-columns:auto 1fr;gap:14px;align-items:start;
  padding:12px 0;border-bottom:1px solid var(--line);counter-increment:step}
.how ul{margin:0;padding:0}
.how li::before{content:counter(step);font-family:var(--display);font-size:17px;color:var(--accent);
  line-height:1.4;font-variant-numeric:tabular-nums;min-width:1.1em}
.how li span{font-size:16.5px;line-height:1.5;color:var(--ink-soft)}

.visit{margin-top:26px;display:flex;flex-wrap:wrap;align-items:center;gap:14px}
.visit a{display:inline-flex;align-items:center;gap:.5em;font-family:var(--label);font-weight:700;
  letter-spacing:.03em;font-size:13px;text-transform:uppercase;color:var(--bg);background:var(--accent);
  border:1px solid var(--accent);border-radius:999px;padding:11px 20px;transition:filter .15s,transform .12s}
.visit a:hover,.visit a:focus-visible{filter:brightness(1.08);transform:translateY(-1px);outline:none}
.visit a:focus-visible{outline:2px solid var(--gold);outline-offset:3px}
.visit .where{font-family:var(--label);font-size:11.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}

.next-hint{position:absolute;left:0;right:0;bottom:20px;text-align:center;font-family:var(--label);
  font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);pointer-events:none}
.next-hint .arr{display:block;font-size:15px;margin-top:6px;animation:bob 1.8s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(4px)}}
@media(prefers-reduced-motion:reduce){.next-hint .arr{animation:none}}

#sentinel{height:1px}
.foot{padding:34px 20px 60px;text-align:center;color:var(--muted);font-family:var(--label);font-size:11.5px;
  letter-spacing:.08em;border-top:1px solid var(--line)}
.foot b{color:var(--ink-soft);font-weight:600}
</style>
</head>
<body>
<div class="topbar">
  <button class="wordmark" id="home" aria-label="Makers Deserve Glory — start over"><span class="dot"></span>Makers&nbsp;Deserve&nbsp;Glory</button>
  <div class="controls">
    <button class="btn" id="shuffle">Shuffle</button>
    <button class="btn" id="theme" aria-label="Toggle light and dark">Theme</button>
  </div>
</div>

<main id="feed"></main>
<div id="sentinel"></div>
<footer class="foot"><b>Makers deserve glory.</b> No ads — just real makers, and how they make things. Keep scrolling.</footer>

<script>
/* motif: layered gradient + inline SVG line-art, tinted by accent. No external images. */
function motif(kind, a){
  var svg;
  if(kind==="scroll"){
    svg='<path d="M20 130 C 60 60, 120 60, 150 120 S 250 180, 290 110" fill="none" stroke="'+a+'" stroke-width="1.4" opacity=".9"/>'+
        '<path d="M40 150 C 90 100, 150 100, 190 150 S 300 200, 340 140" fill="none" stroke="'+a+'" stroke-width="1" opacity=".5"/>'+
        '<circle cx="150" cy="120" r="3" fill="'+a+'"/><circle cx="290" cy="110" r="2.5" fill="'+a+'"/>';
  } else if(kind==="wave"){
    svg=''; for(var i=0;i<5;i++){var y=48+i*28;svg+='<path d="M0 '+y+' Q 90 '+(y-22)+' 180 '+y+' T 360 '+y+'" fill="none" stroke="'+a+'" stroke-width="1.2" opacity="'+(0.85-i*0.13)+'"/>';}
  } else if(kind==="grain"){
    svg=''; for(var j=0;j<7;j++){var x=30+j*45;svg+='<path d="M'+x+' 10 C '+(x+26)+' 70, '+(x-20)+' 150, '+(x+14)+' 230" fill="none" stroke="'+a+'" stroke-width="'+(0.8+j%2*0.7)+'" opacity="'+(0.35+j%3*0.18)+'"/>';}
  } else if(kind==="strings"){
    svg=''; for(var s=0;s<4;s++){var x2=120+s*40;svg+='<path d="M'+x2+' 18 L'+x2+' 224" stroke="'+a+'" stroke-width="1.2" opacity="'+(0.85-s*0.13)+'"/>';}
    svg+='<circle cx="180" cy="150" r="36" fill="none" stroke="'+a+'" stroke-width="1.3" opacity=".7"/>';
  } else {
    svg='<polygon points="180,30 300,120 240,220 120,220 60,120" fill="none" stroke="'+a+'" stroke-width="1.3" opacity=".9"/>'+
        '<path d="M60 120 L180 120 L300 120 M180 30 L180 120 M120 220 L180 120 L240 220" stroke="'+a+'" stroke-width="1" opacity=".55" fill="none"/>';
  }
  var grad='radial-gradient(120% 160% at 80% 0%, color-mix(in srgb,'+a+' 32%, transparent), transparent 62%),'+
           'linear-gradient(160deg, var(--plate), var(--bg2))';
  return '<div class="motif" style="background:'+grad+'"></div>'+
         '<svg class="motif" viewBox="0 0 360 240" preserveAspectRatio="xMidYMid slice" aria-hidden="true">'+svg+'</svg>';
}

/* =================== THE COLLECTION — one real maker per card =================== */
/* Each grows the collection. Fields: maker, kicker (craft), where, url (link back),
   accent, motif, hook (one line), how[] (bite-sized "how it's made"). */
var MAKERS = [
  { id:"philip-rickard", maker:"Philip Rickard", kicker:"Hawaiian heirloom gold", where:"Honolulu", url:"https://www.philiprickard.com/", accent:"#c9a24b", motif:"scroll",
    hook:"The jeweler who traced the Hawaiian heirloom bracelet back to a Victorian gift — and still makes them by hand.",
    how:["A band of gold is cut, formed to the wrist, and hand-engraved with scrolls, maile leaves, and a name.","The engraved letters are filled with black enamel and polished flush, so the name reads sharp against bright gold.","Rickard spent six years researching the craft's 1880s origin and wrote the book on it."] },
  { id:"na-hoku", maker:"Nā Hoku", kicker:"Hawaiian heirloom jewelry", where:"Honolulu · since 1924", url:"https://www.nahoku.com/", accent:"#c9a24b", motif:"scroll",
    hook:"A Honolulu family that has hand-engraved Hawaiian heirloom jewelry for a hundred years.",
    how:["Every heirloom piece is engraved by hand — so no two are ever identical.","Flowers are carved in relief, standing up from a cut-away background.","The black in the lettering is enamel sunk into the metal, never paint."] },
  { id:"maui-divers", maker:"Maui Divers Jewelry", kicker:"Hawaiian black coral", where:"Lahaina, Maui · est. 1958", url:"https://www.mauidivers.com/", accent:"#6f7f86", motif:"facet",
    hook:"They found Hawaiʻi's black coral in 1958 — then figured out how to harvest it without wrecking the reef.",
    how:["Licensed divers selectively cut mature black-coral colonies over 150 feet down.","The living tissue is stripped to a hard black skeleton that polishes up like glass.","They pioneered sustainable harvesting with the University of Hawaiʻi; black coral is the state gem."] },
  { id:"niihau-heritage", maker:"Niʻihau Heritage Cultural Foundation", kicker:"Niʻihau shell lei", where:"Niʻihau & Kauaʻi", url:"https://niihauheritage.org/", accent:"#d8a7a0", motif:"wave",
    hook:"Keepers of the world's rarest lei — necklaces sewn from shells smaller than a grain of rice.",
    how:["Tiny kahelelani shells wash up on Niʻihau after winter storms and are sorted by size and color by hand.","Each shell is pierced with a fine needle and strung in traditional patterns.","One lei can hold ten thousand shells and take a year — the name is protected by Hawaiʻi law."] },
  { id:"kauai-curators", maker:"Janelle Kienow", kicker:"Niʻihau shell lei · Kauai Curators", where:"Kauaʻi", url:"https://www.kauaicurators.com/about/janelle-kienow/", accent:"#d8a7a0", motif:"wave",
    hook:"Fifteen-plus years sorting and stringing Niʻihau shells — and defending the craft's name.",
    how:["Shells are graded by color: plain white is common; deep reds and blues are rare and costly.","Each shell is hand-pierced and knotted so it faces the light.","She advocates for protecting the 'Niʻihau' name from cheaper imitations."] },
  { id:"martin-macarthur", maker:"Martin & MacArthur", kicker:"Koa wood", where:"Hawaiʻi", url:"https://www.martinandmacarthur.com/", accent:"#b07d3f", motif:"grain",
    hook:"Hawaiʻi koa makers who will openly show you how a koa ring is made.",
    how:["Curly koa is chosen for grain that shimmers as it turns — an effect called chatoyance.","Rings are turned or bent-laminated, stabilized with resin, and finished to a deep gloss.","That shimmer is the wood catching light at different angles, not a stain."] },
  { id:"pono-woodworks", maker:"Pono Woodworks", kicker:"Koa rings", where:"Big Island", url:"https://ponowoodworks.com/", accent:"#b07d3f", motif:"grain",
    hook:"Koa rings made only from trees that were already dead or fallen.",
    how:["No living koa is cut — the wood is salvaged or fallen.","It's resin-stabilized under pressure so a ring can take daily wear.","A metal or second-wood liner adds strength inside the band."] },
  { id:"nakoa", maker:"Nakoa", kicker:"Koa jewelry", where:"Hawaiʻi", url:"https://nakoajewelry.com/", accent:"#b07d3f", motif:"grain",
    hook:"Forty-plus years hand-carving jewelry from Hawaiʻi's canoe wood.",
    how:["Koa built voyaging canoes and royal bowls long before it circled fingers.","Pieces are carved and sanded by hand to pull the curl forward.","Koa isn't indestructible — an occasional wipe of oil keeps it glowing."] },
  { id:"flotsam", maker:"Flotsam & Co.", kicker:"Sunrise shells", where:"North Shore, Oʻahu", url:"https://www.flotsamand.co/sunrise-shells", accent:"#e0955a", motif:"facet",
    hook:"They free-dive a hundred feet for a thumbnail-sized shell that blushes pink to gold.",
    how:["Sunrise shells bury in deep sand channels; divers fan the sand by hand to find them.","The color lives in a thin layer, so they're never bleached or over-scrubbed.","The fragile shells are bezel-set in gold so they can actually be worn."] },
  { id:"monica-shore", maker:"MonicaByTheShore", kicker:"Sunrise shell jewelry", where:"Haleʻiwa, Oʻahu", url:"http://www.monicabytheshore.com/", accent:"#e0955a", motif:"facet",
    hook:"North-Shore sunrise-shell jewelry, made one shell at a time.",
    how:["Once reserved for aliʻi, sunrise shells are Hawaiʻi's most coveted beach find.","Shells are graded on color, symmetry and no chips; matched pairs for earrings are hardest.","Each is set in gold to protect the thin, fragile shell."] },
  { id:"kamaka", maker:"Kamaka Hawaii", kicker:"ʻUkulele", where:"Honolulu · since 1916", url:"https://kamakahawaii.com/", accent:"#b5732f", motif:"strings",
    hook:"Four generations building ʻukulele by hand — and they still air-dry their koa for six years.",
    how:["Koa is air-dried five to six years so it won't warp — never kiln-dried.","Sides are wetted and bent over heat; the top is braced to tune its voice.","Twenty-plus hands touch each one, and the president plays every uke before it ships."] },
  { id:"koaloha", maker:"KoAloha", kicker:"ʻUkulele", where:"Oʻahu", url:"https://www.koaloha.com/", accent:"#b5732f", motif:"strings",
    hook:"Founded by an inventor who ran a plastics factory before he made 'koa + aloha.'",
    how:["Alvin 'Pops' Okami started KoAloha in the mid-1990s.","A distinctive internal bracing gives it a bright, projecting tone.","Still made by the Okami family and their team on Oʻahu."] },
  { id:"kanilea", maker:"Kanileʻa ʻUkulele", kicker:"ʻUkulele", where:"Oʻahu · since 1998", url:"https://kanileaukulele.com/", accent:"#7d9b5b", motif:"strings",
    hook:"They plant a koa tree for every single ʻukulele they build.",
    how:["Founded in 1998 by Joe and Kristen Souza.","High-end instruments made with a stated environmental streak.","One uke, one tree — trying to give back the forest they draw from."] },
  { id:"koolau", maker:"Koʻolau", kicker:"ʻUkulele & guitars", where:"Oʻahu", url:"https://www.koolauukulele.com/", accent:"#b5732f", motif:"strings",
    hook:"The fourth Hawaiian 'K' — building with far more than koa.",
    how:["Uses spruce, redwood, rosewood, tropical ash and more.","Leans into custom, made-to-order instruments.","Has focused on manufacturing fine Hawaiian ukes for decades."] },
  { id:"pyzel", maker:"Pyzel Surfboards", kicker:"Surfboards", where:"Waialua, North Shore", url:"https://pyzelsurfboards.com/", accent:"#2f8f9d", motif:"wave",
    hook:"The North Shore shaper behind the boards John John Florence rides to world titles.",
    how:["Jon Pyzel started in a backyard shaping bay in the mid-'90s.","A board is carved from a foam blank with a wood stringer, then glassed in fiberglass and resin.","The boards get tested on the heaviest waves on earth, minutes from the bay."] },
  { id:"tokoro", maker:"Tokoro Surfboards", kicker:"Surfboards", where:"Oʻahu", url:"https://www.tokorosurfboards.com/", accent:"#2f8f9d", motif:"wave",
    hook:"One of Hawaiʻi's most respected shapers — and surfers.",
    how:["Wade Tokoro shapes on Oʻahu.","Shaping is subtraction: cut the outline and curves, millimeters at a time.","Then glassed, hot-coated, sanded, and finned by hand."] },
  { id:"aipa", maker:"Aipa Surf Co.", kicker:"Surfboards", where:"Oʻahu · since 1970", url:"https://www.aipasurf.com/", accent:"#c86b57", motif:"wave",
    hook:"Ben Aipa invented the swallowtail — and his sons still run the shop.",
    how:["Aipa started shaping in 1970 and rewrote what a surfboard tail could do.","He invented the double-edged swallowtail (1972) and the split-tail (1974).","The shop is now led by his sons, Duke and Akila."] }
];

/* =================== THE FEED — random, infinite =================== */
var feed=document.getElementById('feed');
var bag=[], lastId=null, firstCard=true;

function shuffle(arr){ // Fisher–Yates
  var a=arr.slice(), i, j, t;
  for(i=a.length-1;i>0;i--){ j=Math.floor(Math.random()*(i+1)); t=a[i]; a[i]=a[j]; a[j]=t; }
  return a;
}
function refill(){
  bag=shuffle(MAKERS);
  if(bag.length>1 && bag[0].id===lastId){ bag.push(bag.shift()); } // avoid an immediate repeat
}
function nextMaker(){
  if(!bag.length) refill();
  var m=bag.shift(); lastId=m.id; return m;
}

function cardHTML(m){
  var how='<div class="how"><span class="lab">How it’s made</span><ul>';
  for(var i=0;i<m.how.length;i++) how+='<li><span>'+m.how[i]+'</span></li>';
  how+='</ul></div>';
  var hint=firstCard?'<div class="next-hint">Scroll for another maker<span class="arr">↓</span></div>':'';
  return '<article class="card" style="--accent:'+m.accent+'"><div class="inner">'+
    '<span class="kicker">'+m.kicker+' · '+m.where+'</span>'+
    '<h2>'+m.maker+'</h2>'+
    '<p class="hook">'+m.hook+'</p>'+
    '<div class="plate">'+motif(m.motif,m.accent)+'</div>'+
    how+
    '<div class="visit"><a href="'+m.url+'" target="_blank" rel="noopener noreferrer">Visit '+m.maker+' ↗</a>'+
      '<span class="where">the maker, in their own words</span></div>'+
    '</div>'+hint+'</article>';
}
function addCard(){
  var wrap=document.createElement('div');
  wrap.innerHTML=cardHTML(nextMaker());
  feed.appendChild(wrap.firstChild);
  firstCard=false;
}
function reset(){
  feed.innerHTML=''; bag=[]; lastId=null; firstCard=true;
  addCard(); addCard(); // seed a couple so there's always something below
  window.scrollTo(0,0);
}

/* infinite scroll — keep a few cards ahead of the viewport */
var io=new IntersectionObserver(function(entries){
  if(entries[0].isIntersecting){ addCard(); addCard(); }
},{rootMargin:'800px 0px'});
io.observe(document.getElementById('sentinel'));

/* controls */
document.getElementById('home').addEventListener('click',reset);
document.getElementById('shuffle').addEventListener('click',reset);

var root=document.documentElement;
try{var saved=localStorage.getItem('mdg-mag-theme'); if(saved)root.setAttribute('data-theme',saved);}catch(e){}
document.getElementById('theme').addEventListener('click',function(){
  var cur=root.getAttribute('data-theme')||(window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');
  var nxt=cur==='dark'?'light':'dark';
  root.setAttribute('data-theme',nxt);
  try{localStorage.setItem('mdg-mag-theme',nxt);}catch(e){}
});

reset();
</script>
</body>
</html>
